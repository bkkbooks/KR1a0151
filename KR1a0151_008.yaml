body:
  text: 易翼述信卷八廬州府同知王又朴撰坎下兌上困亨貞大人吉無咎有言不信彖曰困剛掩也險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也仲誠張氏曰君位臣位賢位皆剛皆困厄而不能伸所以為困子瞻蘇氏曰困者坐而見制無能為之詞也隂之害陽者多矣然皆有以侵之困不見其侵而見掩隂有以消陽而陽無所致其怒其為害也深矣按此與坎同言亨然坎言心亨此直曰亨者蓋坎之剛未出乎險故其亨維心亨而已其行則有尚也此則下險而上說將無入而不自得心亨道亦亨也梁氏參義曰困而能亨則得其正矣有大人之德矣吉而旡咎矣將貞字連下一串與彖傳合既曰吉而又言旡咎者二以剛中之德而不當位乃上以兑說處之則有亨通之吉而無不正之咎矣故彖傳但言吉以概無咎非有所遺也余氏集說謂曰貞曰大人吉旡咎皆指九二有言不信則指上六困之成卦蓋在此兩爻也項氏玩辭與緝說皆同如胡氏謂歸重在九五一爻則宜曰剛中正不苐曰剛中已矣觀於九五之象而傳亦止曰剛直可見項氏又曰特置貞字於大人之上明能堅固無剛以勝天下之變如師之御衆克敵是以謂之貞非以居位得正為貞也此即大傳所謂貞夫一者也師貞於法律故稱丈人困則貞於道故稱大人洗發更透彖傳有於困而不失其所斷句者然朱子曰困而不失其所亨這句自說得好蓋所亨即顔子不改之其樂原有義在安溪李氏謂險以說非險而說因習險而有得於心然惟習險有得乃不失其所亨此朱子所謂說得好也尚口乃窮蓋不可以口舌爭者童溪易傳曰當此之時自說可也說人不可也聖人重復發明兌說之旨恐萬世以下處困之君子誤用其心也德培沈氏曰不忘於心故不忘於言耳乃字要看如云困何足窮我惟心失所亨而急於自明乃至於窮窮字正與亨字相對敬承程氏曰信者安義命之實心象曰澤無水困君子以致命遂志致命遂志困之亨也安溪李氏曰致命者委之於命不以夷險二其心體習坎之象也遂志者必心安而理得體兑說之象也初六臀困于株木入于幽谷三歲不覿象曰入于幽谷幽不明也初變麗澤兑坎為通而遇兌塞之故有困木入谷之象凡兑之初爻多稱臀者如夬之九四正兑也姤之九三反兑也然以此為變氣之義而又不然以咸艮二卦爻象例之則知此指四爻也蓋夬姤皆以乾為體體自臀而分上下夬上為兑為毁折姤下為巽為寡髮故夬之四姤之三皆曰臀無膚也是三四皆可言臀不必以兑之反正也坎為堅木故曰株木初在坎之最下故曰幽谷二三四互離曰覿以初之幽故曰失其明也項氏玩辭曰此卦爻辭以困為首字者謂本爻也困上加别字者指應爻言之初六加臀謂九四也初六與九四為正應欲藉以拯困而九四巽木方顛為兌金所毁折故為臀困於株木之象不明必待其終也初六之三歲即九四之有終凡卦以三爻為終三爻既終即與四遇故雖不覿而不言凶按此與程子易傳合安溪李氏曰卦以剛掩為義則惟剛者為能處困柔者不能也又惟君子之困為時之窮小人則往往自取之而已童溪易傳曰柔之所附者剛也剛既見掩則柔亦失所附矣夫剛掩則剛困柔失所附則柔亦困二說皆精九二困于酒食朱紱方來利用亨祀征凶旡咎象曰困于酒食中有慶也二變萃致孝亨之時也故利用亨祀萃之二曰引吉此亦曰方來蓋謂五也坎遇坤坎陷尊罍象兌為口食象坤為漿故曰酒食易於坎多言酒食者坤為裳為帛在體下紱象二三四互離南方卦也朱象三為離主臨於二上方來象坎為隱伏鬼神象故言祭祀易小傳曰困於酒食祿未足也朱紱方來同剛德也利用亨祀德可薦也征凶旡咎未出險也又曰九二言困於酒食釋者皆謂豐於祿饜飫之也夫君子食其祿必任其事為酒食所困豈君子之正乎若其享厚祿而不得辭焉則施祿以及下可也未聞以祿為困也獨乾鑿度以為困於酒食祿不及也蓋得之矣復齊易說曰未得與九五宴樂白雲郭氏曰酒食以見君臣相遇交際之道不得乎此雖如伊尹樂堯舜之道不過老死莘野而已終旡亨天心革夏正之事也是知酒食之間有天下之大慶存焉故需卦於九五言需於酒食而詩人於鹿鳴言燕樂蓋一義也程傳亦主此義而未透傳又曰諸卦二五以隂陽相應而吉惟小畜與困乃厄於隂故同道相求小畜陽為隂所畜困陽為隂所掩也隂陽相應者自然相應也如夫婦骨月分定也五與二皆陽爻以剛中之德同而相應相求而後合如君臣朋友義合也安溪李氏曰三陽卦之所為困也而皆取飲食車服之象者貧賤患難不足以困君子進退牽係道閉行蹇乃君子之困也易酌取諸葛忠武以實之頗有見其以鞠躬盡瘁食少事繁為征凶此莊子所謂為宗廟之犧牲者也萃之卦詞用大牲其此意也歟六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也三變大過有棺槨象故凶合參易小傳紫巖易傳人之進將以求名也四有篤實之德三在下而掩之非所困而困焉是將獲罪於天下後世故名必辱也人之退將以安身也二以剛中之德三處其上而凌之非所據而據焉天下起而攻之矣故身必危也蓋坎而為巽巽為進退不果在險而進退有難困於石據於蒺藜之象也紫巖易傳又曰互體離中離不當位坎復易之為不見其妻大可毛氏亦曰三居互離之中而前後掩窒此非中空若房世俗之所稱離宫者哉夫坎男之隂亦即離女之隂也既為坎男而已入離宫即欲再求所為離女者而何可復得此意頗巧愚按即變氣論互體之離為乾此亦不見其妻之意也安溪李氏又曰三隂皆困此又所謂行險以徼幸者故其困獨甚九四來徐徐困於金車吝有終象曰來徐徐志在下也雖不當位有與也四變習坎澤始通也流而未疾來徐徐之象始塞終通初吝有終之象合訂謂初阻於二不得應四初之困也四欲與應亦畏金車之阻而徐徐不决初之困即四之困也程傳云有終者事之所歸者正也初四正應終必相從也寒士之妻弱國之臣各安其正而已苟擇勢而從則惡之大者不容於世矣玉吾俞氏曰初之所以三歲不覿者以九四之來徐徐也既歷三歲始雖不覿今則覿始雖吝終則有與也仲氏易曰易例於上於三每曰有終四非終而亦曰終者以初為始則以四為終而已小象止釋來徐徐句困金車以下無解安世項氏曰四兌為金人所乘為車以九乘四不得其正不可以有行也故為困於金車吝象所謂雖不當位即解此句也有終者終與初遇象所謂有與也即解此句也此說甚新而與夫子象傳極有體㑹至王氏輯說則謂困之世隂掩陽者也故陽不以隂為應而以同德相求四不應初而求二也四之志在下之二而來徐徐所以困也以九居四不當陽剛之位以四求二不當相應之位然二與四有同德相與之誠故曰雖不當位有與也說與諸儒異録之以偹參考焉九五劓則困于赤紱乃徐有說利用祭祀象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也五變解兌遇震兑毁折震恐懼又震為足毁折其足有刖象艮為鼻震則倒艮有劓象解者動而免乎險也故徐有說震可以守宗廟祭祀故利用祭祀王氏輯說曰二五同德相求而五以陽剛為上所掩譬諸鼻之通氣於上者而見劓是五欲通於下而不能逹也所賴剛中之二相與濟困而二又為初所掩譬諸足之主行於下者而見刖則是二欲進於上而不能行也此二與五俱困之象赤紱在下而謹行之飾君之困在無賢佐二處險中謹其行而未進則五困矣故曰困於赤紱然二五皆以剛居中以直相與九二必徐徐出險而之說故徐有說為五者亦宜盡其精誠以致之如用祭祀則可以得天下之賢濟天下之困矣竊以二之利用亨祀者言上帝居歆所謂黍稷非馨明德維馨也利用祭祀者祭地而祀天言上下皆受其福也童溪易傳曰二五皆以至誠相感通故同以祀事明之然要之獲應助之力者五也此受福之言所以獨歸之五焉程傳曰不曰中正與二合者云直乃宜也此爻先儒以劓刖為刑去上下之小人言者然於象傳志未得未合蓋二五原非正應故加乃字一轉而五之上二之下又皆為柔所掩是以其志未得以其皆有剛直之德故徐有說而志始得伸矣項氏玩詞曰初在卦之始以得上卦為有終二則在坎之中以得兑為有說上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也上變訟兑遇乾兌為進退為不果故曰困於葛藟於臲卼兌口乾言為曰象乾健為動象征象訟為悔象玩辭曰上六徒動而不去則成訟故自謂動悔若去而之初則為漸之吉吉在於必行而不在於徒動故曰吉行也翼傳曰所應在三三以柔附已而牽之葛藟也所比者五五以剛載已而難安臲卼也玩辭又曰六三非所當牽而牽之九五非所當乘而乘之此小象所謂未當也合訂取田氏之說曰動悔有悔之所以吉者以能行而得之也行也二字是解征吉之義此亦有味與玩辭去而之初為漸說合易酌曰動悔有悔悔其所行則不行其所悔故行而吉也彥陵氏曰困不自振之日全賴陽剛之才上以隂柔處困極欲有為則才力不及欲安息則時勢危迫要做不得做要歇不得歇是困於葛藟於臲卼之象動輒有悔矣所以然者病在隂柔無振拔之才故至於此然時勢交窮之㑹正豪傑斡濟之秋誠能自悔其失一旦奮發有為則這一假震動的精神主張在我豈至為困所束縛征則可以得吉豈可坐待其困而不悔哉趙氏曰五爻皆不言吉獨於上六言之者要當時而不可欲速也九二征凶九四來徐徐九五乃徐有說至上六始有征吉之辭紫溪蘇氏曰心無所纍則拂鬱亦皆樂地心有所纍則通顯祗屬危機故曰困德之辨莫辨於此矣巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也卦辭蒙引謂於德體象變一無所取止據井之理言非也坎陷而為窞而有物以入之入於水而出於水即德即體也言其象初六為泉眼二三為井腹四為甃五為井實上為井口又巽為繩繘象互離為附麗繘井象巽又為進退不果汔至亦未繘井象兌為口為毁折倒兌則口在下羸象離中虛瓶象上坎之形宛若轆轤下二剛一柔井也此皆象之有可似者且卦自泰來上坤為邑坤改為坎改邑象不改井者先儒多未釋此義合訂謂邑改而井見毛氏意同詞費皆未了然竊意乾之初潛而勿用之陽也今遷而之五則以剛中正位居體陽得其所而有為是所改者止坤之邑而於井養之道則未之有改焉蓋有所改者此得則彼必喪今以乾初而得柔似乎喪然天道已上行旡喪也以坤五而得剛似乎得然地道實下降旡得也旡喪旡得則雖有所改而猶之勿改矣又凡有所改者此往而成一義彼來而又成一義今乾之往得所養而往往為井也坤之來求所養而來來為井也往來皆井則雖有所改而實則無改矣蓋旡喪旡得往來井井正改邑不改井之義彖曰井養不窮已將此義倒提於前以剛中釋之即足矣繫辭大傳曰井居其所而遷遷者改邑也居其所者不改井也彖與繫詞已解釋明白而世何猶昧昧耶汔至四句玩象亦是二義蓋幾於至者仍未嘗至亦與未繘井者同耳此半塗而廢者也故曰未有功羸其瓶則並其器而壞之不惟無功且凶矣所為德體象變實兼有其義如此至於萬邑之井如一不溢不竭道路之人往來取給以况先王之政大公不私無過不及理固有然者然不得舍卦之德體象變而泛為鋪陳理學籠統話頭也象曰木上有水井君子以勞民勸相坤以勞之勞民也巽以申命勸相也初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也初變需巽遇乾乾旱也泥象巽口向下不食象以本氣言則曰井泥不食以變氣言則曰舊井無禽故象釋上句為下釋下句為時舍蓋井以泰變乾之初遷於坤之五而成井也今動而之乾是仍其舊矣巽為鸛三四五互離為飛鳥初既不遷則巽不成巽離不成離故曰無禽以時義論之自當舍其舊而新是圖也九二井谷射鮒甕敝漏象曰井谷射鮒無與也二變蹇巽遇艮三為艮主山也二居其下谷象互兌下又倒兌兌澤所有魚也故曰鮒巽為木為直矢象上承坎弓故曰射三四五為離之瓶甕象互兌毁折甕已敝矣變氣互坎外卦又坎下承之以柔折中空水入於地是漏也初之舊井法已廢也無禽行法之不得其人也二則以剛中之質非若初六之無才矣然居柔在田乃鄉黨自好之士而無康濟天下之大略則鮒而已上無正應九五明王雖不與之共治然猶下顧及之故曰射鮒也夫其人既不足以行政則法仍壞矣故曰甕敝漏而傳曰旡與無人則無法甕之敝漏不復釋焉九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也三變習坎上下皆水故曰泄在下卦故曰不食坎為加憂心惻象本氣巽入固遜而甘伏於下自無所怨尤者乃變氣為坎而上之坎乘之則我不以為憂而他人為憂之故曰為我心惻為我惻者正應之上九也上無位傳故曰行而得位者九五則王也三四五互離則王明也夫以巽入之德變坎則非掘井而不及泉是可用汲以濟物者矣九五王非不明然以剛遇剛又非應三既剛而不援上四在大臣之位又柔而不能汲引惟上六為正應而無位而近於五庶幾其求於五而用以為汲則君享厚名民享厚利並受其福矣傳加一求字甚有意上無位則必求近於五則可求夫髙髙在上豈有所陳於王前然天人一氣默以相之如帝賚良弼之類是也六四井甃無咎象曰井甃無咎修井也四變大過坎遇兌水之為澤者也以未上出於井故猶未及濟物又以柔變剛合二三與五成一體在井之中為甃井象大可毛氏曰以離中之火燒坤土為甓亦有意按本氣互二三成兌變氣互五六亦成兑毁折也毁故修之四以柔而在臣位雖無剛正之德未成利濟之功然能虛以承五又變氣為兌說君臣一心是能培植人材以待上用者也初廢之則四修之矣九五井洌寒泉食象曰寒泉之食中正也五變升坎遇坤險者順入者升故井洌可食以其升於地中故為寒泉本氣自初至四而成大坎五為外卦坎主水滿象也不言吉者安溪李氏曰居尊位職在養人有孚惠心勿問之矣上六井收勿幕有孚元吉象曰元吉在上大成也上變重巽巽入故曰收巽為繩中離為瓶繩既上於井則非汔至而未繘井者矣繩既挈瓶而收於井則又非未繘而羸其瓶者矣坎口向上故曰勿幕上下皆巽一氣之感故曰有孚重巽以申命繩繩不已往來井井者此也故曰元吉傳之所謂大成也離下兌上革已日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉離為日在澤之下日之已過者故曰已日孚者兌之說也已日來氏毛氏謂為十干之已近有補注又謂為十二支之已說皆新竒可喜然細味彖傳革而信之正以革釋已日而釋乃信釋孚毛氏以與六二爻詞說不去不知爻詞之已日乃謂已孚之日與彖雖異而意實互通其義則先儒言之詳矣而蘇子瞻謂革不能免于悔特有以亡之耳說有味程傳于四爻則謂事之可悔而後革之革之而當其悔乃亡尤與彖傳義合象曰澤中有火革君子以治歷明時治歷明時即彖傳天地革而四時成也來注曰晝夜一日之革也晦朔一月之革也分至一歲之革也元㑹運世萬古之革也說本西溪李氏初九鞏用黃牛之革象曰鞏用黃牛不可以有為也初變咸遇艮咸則情相感而固結不可解故曰鞏艮則事宜止故傳言不可有為革必已日乃孚故初無革法此牛之革則不變者也用黃牛之革者謂比於六二離為牛六二柔順中正故曰黃牛革字亦取卦名而義不同合訂云革亦取變革之義鳥獸皮毛逐時更變五虎變上豹變六二未能為虎豹黃牛焉耳六二已日乃革之征吉旡咎象曰已日革之行有嘉也二變夬遇乾夬剛决柔也故曰革之乾健有為故曰征吉而傳以有嘉贊之易酌曰卦言已日乃孚已革之日乃孚也爻言已日乃革已孚之日乃革也蓋卦詞舉全象爻則止此一爻之義君臣之分不同也二以中正柔順為文明之主與五正應故為已孚而革之象既吉而又無咎也九三征凶貞厲革言三就有孚象曰革言三就又何之矣三變隨遇震為决躁而三又處離之極以察察為明當改革之際有征象過剛不中故凶變而之隨有貞象然本體既察震又躁自不能靜以安其居故厲上為正應兑之口言象中爻互乾亦為言就成也離居三合三四五成乾故言三就征既凶貞又厲然則何如而可惟豫謀其所以革而不必即行革之事庶幾人共信之而徐以俟其成耳辨疑曰三就者內謀于乃心而無疑人謀則卿士從庶人從鬼謀則蓍從龜從是三者皆成就其革也仲誠張氏曰之往也事至於三就則理已無可逃又何必亟亟欲往乎此有其理而事可待耳此爻大槩以隨人而不自用為義內卦主革者故皆言革外卦變革者故言改言變九四悔亡有孚改命吉象曰改命之吉信志也四變既濟兌遇坎人心雖悅而其事則險湯武之征誅伊霍之放廢皆改命也本體合二三成巽命象在下卦之上合三五又成乾改命象四剛而不中故有悔變為既濟則悔亡矣程傳之言悔亡與諸說異然彖曰革而當其悔乃亡義正合也觀彖謂在已為悔亡在人為有孚亦好四多懼之爻而傳舉其才其時其勢其任其志其用而極贊其盛者傳故曰惟其處柔也故剛而不過近而不逼順承中正之君乃中正之人也合訂云易言命必於四爻四革爻也乾四或躍在淵文言釋之曰乾道乃革訟四曰復即命又曰渝安貞渝即革也否四曰有命四為否泰之轉關君命即天命也了凡袁氏曰信事者孚在事後此卦詞信志者孚在事先此爻之詞九五大人虎變未占有孚象曰大人虎變其文炳也五變豐遇震五既君位中三四五互乾震為帝出故曰大人震為新君又震動動則變也九五體剛而有道德之威用中而得神化之宜自然明著動變風行於廟堂之上而草偃於邦國之間禮樂文章之治光於四表格于上下矣虎變自緊貼大人言至上爻方為天下化成矣彥陵張氏曰湯武本征誅而有天下聖人不欲示人以隙故諱武而言文上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也上變同人遇乾乾道變化各正性命而人既同故有君子小人皆變之象君子小人皆在下之人合臣民而以德言也君子謂其秀者小人謂其蠢者既彬彬有大雅之士亦皥皥無梗化之民遵道遵路蕩蕩平平革道大成故曰吉也非上六之才如此特於上六之時取義耳征凶居貞吉者所謂以人治人改而止也傳義稍深合訂曰革曰靣者黎民於變只在氣象間見之順以從君猶云順帝之則說極是書仲夏鳥獸希革仲秋鳥獸毛毨離為夏兌為秋故革卦言牛之革言虎豹之變仲誠張氏曰變革之道莫如鳥獸之皮毛舊毛盡新毛生而皮不為之病天下變革之事能如皮焉可矣說甚精說統君啓陸氏曰天下莫安于仍舊莫善于更新莫患於因循既久而不為振刷之謀聖人以蠱幹天下之弊禍莫禍于瑕釁已萌而猶為調停之說聖人以革掃天下之凶然而一規一隨庸人足以諧時三甲三庚聖人不免駭世夫非常之原黎民懼焉欲與衆人同之則利不長不與衆人信之則志不行故革莫重于孚孚也者聖人之所以消懼而免駭以行其志者也然孚而不待其孚則變而不覺其變殺不怨利不庸遷善而不知變革之道于是為極故以虎變之文當龍飛之造均稱大人焉巽下離上鼎元吉亨彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨安溪李氏曰凡卦名下直曰元亨而無他辭者二大有鼎也大有之義與比相似然比以一陽統衆隂所有者民也大有以一隂得衆陽所有者賢也鼎之義與井相似然井以木巽水在邑里之間所養者民也鼎以木巽火為朝廊貴器所養者賢也易之義至于尚賢則吉無以加故其辭皆直曰元亨蓋鼎以取新故有元德烹飪之事遍天下故有亨德彖傳則取其象而以才言之巽則心思深入所謂思曰睿也離為目自初至五為大坎坎為耳所謂亶聰明作元后也巽而耳目聰明是有主鼎之德矣柔進而上行得位又有定鼎之權得中而應乎剛又有調鼎之佐此所以元亨也象曰木上有火鼎君子以正位凝命來注云位譬之鼎命譬之實器正而後實凝故初四之顛折而出之覆之也項氏曰存神息氣人所以凝夀命中心無為以守至正君子所以凝天命又有以位為素位之位命為維天之命言者亦通初六鼎顛趾利出否得妾以其子旡咎象曰鼎顛趾未悖也利出否以從貴也初變大有巽遇乾初為趾應四而乾健上行則顛趾矣初非有實者然巽入而變乾為大有是有者乃先入之宿物所謂否也趾既顛則巽將為兌之毁折而入者出矣二三四互乾老夫也巽顛而為兑少女也故為妾象夫親迎得妻夫婦相得而中饋有主人道之常莫順於是今乃倒行逆施不得於其妻而得於妾者何也則以四比五為上卦初應四而顛倒成兑合成坎之中男為子所謂母以子貴也鼎以取新然不吐故新何由納出否未及取新故又言得妾以子二義皆從顛趾來故傳曰未悖未悖即釋旡咎并非止指出否一事而從貴則并得妾以子皆兼言之矣此聖筆化裁之妙子瞻蘇氏曰夫鼎烹而熟之至於可食苟有不善者在焉則善與不善皆熟而善者棄矣故及其未有實而顛之以出其不善猶為未悖如待其有實則夫不善已汚之矣夫顛趾而出否盡去之之道也盡去之則患鼎無實聖人之於人也責其身不問其所從論其今不考其素鼎以出否為利而擇之太詳求之太備天下無完人故曰得妾以其子旡咎從其子之為貴則其出於妾者可忘也按此義頗精合訂頗采之九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也二變旅遇艮艮止其所也大傳曰親寡旅也謂二與五正應親也今二變艮則止其所而不與親矣蓋凡卦皆喜應獨鼎以下應上則不取二以剛中為鼎之實三剛為腹二為底鼎實之在底者也仇匹也詩曰公侯好仇不必作仇讐解三四五互兌為毁折有疾象疾者病我之不往也蓋巽既伏變艮又止鼎而受養者兮為羈旅之人矣此二以賢人在田不求人知雖上罪之而究求一見而不可得所謂自愛其鼎者也故傳以慎所之贊鼎有實以終旡尤贊我仇有疾蓋確有不拔之操必能髙不見之節雖負抗上之譏而終無失身之悔也然則人君雖大烹養賢若賢者苟於就養則枉道狥人一不慎而愆尤叢集矣此采張氏疏略之說先儒解此爻皆以比初為言甚無義故合訂從此但以有疾謂如齊王之有疾以六五之隂柔而比四為少異耳九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也三變未濟遇坎坎為耳處上下卦革變之際故曰耳革西溪李氏曰全體一鼎分上下體為二鼎上體之鼎有兩耳而無足故九四之鼎折足下體之鼎有足而無耳故九三之鼎耳革說甚精巽為進退不果坎險阻行塞象離為雉坎為膏本體合四五成兌食象變坎則不成兌矣故曰不食變坎又合四五亦成坎雨象先儒說此爻多不同有謂為不仕無義者有謂為非義而躁進者竊詳此爻與上非應則以為絶人遁世既無其義而以耳革為熱中又似鼎上下有兩耳且揆之方雨虧悔之義二者皆不合應從程傳但以雉膏為祿位似不如本義作膏澤講為確蓋陽居鼎腹而上承文明之離本有雉膏之美足以食天下者也然舉鼎在耳行道在君今與五非應而不同道無耳矣則不得君以行其義雖有膏澤而無以下於民此其悔也然三五終同功者也既自初至五成大坎而三之變氣又為坎則天地和而雨以降君臣合而道以行悔其虧而終獲吉矣傳於方雨虧悔不復釋者從爻義之重也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也四變蠱蠱壞極也故有折足覆餗之凶遇艮艮止也鼎之下卦受養者也有應則為援上上卦養人者也不應則為棄賢四與初應本有足者合三五互兌為折又變艮止氣盈而不下交故有折足象四居鼎腹之上實已盈而欲傾又折足則公餗覆矣公餗公家之糈也形渥者汚其鼎也覆餗則實喪形渥則名辱名實俱虧其凶可知蓋竊據尊位而器小易盈則未有不敗人家國者大傳言之詳矣傳曰信如何言所以信任之者為何如而乃若此甚歎國家養士而不食士之報也六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也五變姤遇乾五耳中黃乾金獨鉉在上而彖曰鼎象也則自初至上皆各有其象不應于五并上兼言之或以二為鉉亦非仲誠張氏曰黃耳金鉉一物也黃取中義耳取空義猶言中空也金取堅義鉉取環外之義猶言外堅也總為鼎耳之象一鼎兩耳空中對峙各為半環以聯鼎緣就其空中可納上鉉者言之曰耳就其堅外以固中者言之曰鉉猶人之耳虛中曰耳外環曰輪廓是也又曰烹飪既成則提耳行以享之猶人君享其成之義也貞正而固也耳不正則鼎偏舉而欹矣鉉不固則耳脫敗而傾矣又曰黃耳言中也中之虛本為鼎實而設無此耳之中虛雖有實不可以行何能享乎說皆妙按利貞謂人君養賢宜始終勿替之意傳曰中以為實蓋二為實四應之惟其中虛以為受實之地也責在五故金鉉不復釋焉且變風為姤姤者柔遇剛也亦此意言利貞不與卦辭同者以爻專言養賢也上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也上變恆遇震為玉故曰玉鉉上無位而居五之上為人君之尚賢也故能震動有為可大可久之業在此焉大吉無不利卦辭之所以云元亨也仲誠張氏曰鉉有二一為耳鉉形小與鼎一體而對峙鼎緣一為上鉉形大别為一物懸于鼎上以貫耳鉉之中耳雙不便兼舉舉上鉉則雙耳皆行離有鉉義遇震為足為動有行義取於玉者鼎烹則耳熱不可以執鉉異體不寒不熱如玉之溫也按九剛居上之柔位以其剛節五之柔又變氣恆其六爻剛柔相應下巽上震隂陽相錯故傳言剛柔節也如此則成享矣賢者與君異體而情聨剛柔交濟相與有成何以異此賢者得行其道大吉也人主得成其治旡不利也安溪李氏曰凡彖辭直曰元亨爻辭曰吉無不利者大有鼎之卦及其上爻而已以知兩卦尚賢之義兩爻當之也看來卦辭固大而爻義亦自無窮蓋鼎象也承鼎為足實鼎為腹行鼎為耳舉鼎為鉉鼎以取新必先革故初之傾否所以旡過也二三四皆鼎腹而有實者然實方在底而遽欲來享則底蘊易盡二之所以不即也雖有實矣而提挈無人則不得不屯膏以待三之所以行塞也物盈則虧四之所以覆也中虛則受五之所以享也水火既調五味相濟上九之所以為養也此則占者自得之耳震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚遠而懼邇也出可以守宗廟社稷以為祭主也先儒皆以震來為自外至者安溪李氏曰卦皆人心之德須主從中出者為是况中未有不感於外而起故後復繼以震驚百里之象而六爻言震亦皆兼內外言之無兩義也按四之震泥似止言外然曰泥則不能震於其內者矣蓋震為動是有所行也然不思而遽行則為妄動故以乾之健而尤以惕若為心孟子所云思則得之不思則不得也虩且行且停若有所思故取以為恐懼修省之象虩虩兩剛也笑言啞啞四柔也剛爻各一故曰震來柔爻各二故曰笑又曰言啞啞者笑若不出聲言若不出口謹之又謹故曰有則一陽在坤土之中主百里之象二三四互艮為手執而不喪之象三四五互坎為棘為酒醴故曰匕鬯匕以棘為之者也一剛載二柔鼎肉尚在匕互坎於仰盂之中酌酒尚在斚故曰不喪蓋無所震於其中者未有不震於其外君子憂勤惕厲凡事致謹則翼翼小心不愧不怍此其所以當大任而不驚無故加之而不怒也又按平居無事此心嘗若震之來故曰震來於易縱其情之際而一無所放故曰笑言啞啞後有則即所謂終有則也夫子蓋㑹初爻詞而為言其謂彖言震之後象言笑言之後者未免執而鑿彥陵氏曰震亨二字聖人不添注腳亨全從震看出人當常存此心耳震則自亨惟震故亨合此二意孩如鄭氏曰雷驚百里然出吾凝定之神以當之可以不喪匕鬯九廟之靈賴以安妥而為祭主也可為祭主是解不喪匕鬯之意原無脫此說頗好但講出字未免矯强竊按說卦傳曰帝出乎震為此出字來歷殊覺確當也象曰洊雷震君子以恐懼修省恐在外懼在心修其德省其愆必修省方為真恐懼上六所謂戒也初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也初變豫遇坤雷原自地而奮初為地之下震之主爻也說統曰此一爻可作一震卦故悉仍卦詞而特於笑言啞啞上加一後字下承一吉字後字正與震來字相對見得必始於懼而後得以無懼也看初字最重竊按仍卦詞而特加一後字者正以其為初爻耳玩傳曰有則則啞啞亦非無懼况恐致福已有能懼意在內矣此之有則蓋以有初者始有終也又按震之初變豫則先憂後樂恐致福也豫之初變震則先樂後憂志窮凶也所謂生於憂患死於安樂也六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也二變歸妹遇兌十萬曰億大也凡易言大皆謂陽剛觀五爻之象傳可知蓋剛德宜中今以柔居柔是喪其剛德矣然方乘初剛而躋乎其上變氣合四為離離為龜蚌貝也剛外而柔內又貝所以為飾喻人之威儀言詞也二三四互艮故曰陵九謂陽又極數如所謂九天之意下乘初陽而上攀艮故曰躋艮數七變離為日故曰七日自二至上復自初至二歷七爻也勿逐者未嘗喪也七曰得者陽復也蓋以長子之剛變為少女之柔似乎其大者喪矣然處震厲之時不得不少自貶損特其所喪者外耳而德之在中者斂之而愈著抑之而彌髙如升陵然實未嘗喪也夫喪之則必求之既未嘗喪亦何必求七日則一陽復矣尺蠖之屈不久即伸此蓋邦無道危行言孫者也全不論比應專即震之本體及變氣取象諸儒說此爻俱矯强必合五爻之象傳而細玩之其義始得蓋傳言乘剛不獨釋震來厲一句凡億之喪貝及躋九陵七日得皆以此三字概之聖言簡而該如此六三震蘇蘇震行無眚象曰震蘇蘇位不當也三變豐豐多故故曰行曰眚遇離麗上下兩震附麗不絶詞故有兩震字上爻同此意三四五互坎多眚眚目災也變氣為離為目明故曰旡眚三去初已逺則震蘇蘇而若可緩矣然附麗上震君子不敢以其事之未及而苟安也即震懼以為行雖不能致謹於先時而猶得收功於末路可無眚也上震為震驚下震為震懼雷電皆至豐故其象如此位不當以柔臨剛位且逺初非若二爻之乘剛也九四震遂泥象曰震遂泥未光也四變復遇坤本體合三五互坎水土併又一陽復於地之下故曰泥也震為雷雷自地奮初又以陽處陽而君子之修省貴在未事之先此初之所以致福而有則也若四則居人位又以陽處隂而震動於有事陷於重隂之間終亦何能自震耶二柔得中非剛而實剛也則躋陵下可以上矣四剛而不中似剛而非剛也則遂泥上可以下矣下而上者雷之升於天而萬物發生也上而下者雷之伏於地而萬物閉藏也傳故曰未光焉六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也五變隨遇兌初始震往也四洊震來也此邦有道危言危行者也傳特明著之五有中德有事即修省之事故剛德旡喪若無事而茍安則日見其喪矣此震變兌意與二同五亦乘剛而不言者以二例之二亦有中德而不言者以五例之也但五雖柔而居剛位剛柔既節而所乘之四剛又居柔位故億旡喪而與二之以柔居柔喪而復得者異焉上六震索索視矍矍征凶震不於其躬於其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也上變噬嗑遇離噬嗑之大象曰雷電蓋以下震為雷上離為電凡雷未作而電必先見故上與三爻皆有明哲之德苐三處陽位健而能行上卦又接連一震而當改革之際故以行生明而曰震行無眚也以上之窮而又以柔處柔故行則凶雖能見幾自幸無過而不能免人之謗也索索蕭索而不能自振之象亦以遠於四也此兩震字上震為震懼下震為震驚矍矍翹視貌有驚在逺翹目而視之也既已見矣而猶進則惟於禍故曰征凶躬謂上鄰謂五震為長男離為巾女故曰婚媾兌為言安溪李氏謂與夬有言不信同為占外反决之詞然先儒皆作不能免於人言講觀繫此句於旡咎下而象傳不復釋當是也此與三爻同有二意中未得即位不當畏鄰戒即以震行三不釋者亦互見也艮下艮上艮其背不獲其身行其庭不見其人旡咎彖曰艮止也時止則止峙行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人旡咎也安溪李氏曰陽上隂下陽性動隂性靜故陽居下居中其勢未止則不得靜也動極於上隂陽各得其分則止矣止斯靜矣又曰艮連其背為文者與履同人一例皆因其義不復其文也背之文從北從肉而艮字有反身之象艮其背者止於止之方也天地人之道南與東西皆見而北獨隱前與左右皆見而後不見不見者止之方靜之處故周子曰艮其背背非見也程傳曰止於所不見此大傳所謂退藏於密中庸所謂未發之中而周程得之以為主靜定性之學者也凡天下之動以靜為本靜之道以驗於動為至靜亦定動亦定然後為靜之至也故方其靜也廓然而大公是不獲其身也及其動也物來而順應是行其庭不見其人也內不見已外不見人則義理周流而感應之纍免矣故旡咎按周程之說朱子以為誤而極辨之本義雖精然程傳之理終不可廢故於近思録又引之說統曰不獲其身求其所以為身者而不得也身無聲色臭味安佚之欲并其耳目口鼻四肢都似無有故曰不獲按兩山並峙有各止其所之象止其所則靜其并動而亦靜者莫若人身之背背為身所具而不得為身所用與人并到而不見所到之人聖人取象精矣安溪之說彖傳曰言天下之道行止如循環然不可偏於一也但止為行基耳能當止而止則能當行而行而動靜不失其時矣止靜之中人所不見疑於不光明也惟其為動行之本而應用不窮故曰其道光明又曰以一體言陽上隂下各止其所止之義也以兩體言六位隂陽雖敵應而不相與亦止之義也止其所則靜矣故內不見已而不獲其身敵應而不相與則動亦靜矣故外不見物行其庭而不見其人也說統曰時在即止之道道在即止之所爾瞻葉氏曰時者心之圓機道者時之定理心妙乎時而道光為止非膠執空寂之謂也行止對待言二之也動靜連綿說一之也易行止為動靜者太極全體也動即靜之動靜即動之靜動靜合而時在焉行止因時心無纎翳何光明如之朱子亦曰定則明則莊子所謂泰宇而天光發亦未可厚非然與安溪李氏說異可參觀之又庸成陸氏曰背雖不動而五臟皆繫於背九竅百骸之滋潤背為之輸是以無用為用者也知其所而止之則取象在背而得理在心不言心而背之即心可知也聖人明以心作所而忌言心心活物也著認心不得然誤認背亦不得故以所代背此以知背非背也艮背非離身但無獲心耳亦非絶人但無見心耳故艮兼背心名卦是猶咸去其心之謂也又孩如鄭氏曰卦不言艮其心而曰艮其背以見艮不在心也彖傳不言艮其背而曰艮其止又以見艮不在背也皆所以交互發明心學無方無體之妙龍溪王氏曰隂陽和則交謂之和應不和則不交謂之絶應皆隂皆陽雖應而不和謂之敵應敵應者應而未嘗應也和應俗學也絶應禪學也不墮二見應而不留敵而不相與聖學之宗傳也竊按天道向南而背北北極居其所而不動而實為七政之樞紐是靜所以寄動也此艮其背之義也不獲其身內卦為已也不見其人外卦為人也艮為門闕兩門之間為庭三四五互震為行又三四為人位男子以背為陽以靣為隂今止有背而無面是不獲其身也四則隂暗故曰不見艮以一陽升於上隂不得而掩之故曰光明又按敵應八純卦所同而不相與則艮止之所獨也象曰兼山艮君子以思不出其位大象標出一思字正從二三爻詞心字來說統曰位字與所字只一樣從定理而論曰所從現在而論曰位又曰彖傳動靜即是位時者思之行乎其間也思者以時而行乎其位也以時為位是故能六位時乘時止時行止於無位之位也其思亦何思何慮之思也初六艮其趾旡咎利求貞象曰艮其趾未失正也初變賁遇離蓋腳跟不定全體皆差初之艮止即從腳跟用力起中庸所謂遠之近風之自微之顯知幾者也離之明也傳曰未失正可見難持而易失故利永貞永貞者敦之始也按咸之初曰拇此曰趾趾乃足之後踝也二之腓亦在後皆背意也六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也二變蠱遇巽巽為股腓象腓隨股以動者也又為隨象蠱壞極巽伏而不上行有不拯其隨之象合三四互坎坎為加憂為心病巽又倒兌也不正成兌失所說也皆心不快之象坎為耳痛故傳曰未聽三之不退聽釋二即所以釋三故於三無釋焉安溪李氏曰三處心位二所隨也六二中正能艮其腓者然不能拯其所隨則心未快矣蓋咸之四不中不正而三以不中失正承之故曰執其隨艮之三不中失正而二以中正承之故曰不拯其隨咸之義則明形之不可隨心而動而制於外之不可已艮之義則明形之不足以檢其心而妨於末者之未仁也兩義相須心學始備推之事物無不皆然九三艮其限列其夤厲熏心象曰艮其限危熏心也三變剝遇坤剝以下五隂剝上一陽也夫人所以應事有為惟此剛德精義以入神利用以安身者也故必貞於一貞一者止也定靜安慮以得者也今惟一陽而亦剝而去之此真所謂虛無寂滅之學者矣然釋氏有真空頑空苦空之别而莊子亦有虛室生白之㫖道亦求其真是耳三在上下卦界故曰限初二兩隂兩列而三橫艮之而變坤亦如脊骨之兩列故曰列其夤中爻互坎坎險為心病故曰厲熏心安溪李氏曰咸艮皆以人身取象咸取三陽之中爻為心艮取中之陽爻為心故諸象大略皆同惟以心之位則變又曰止其限峙其夤則屈伸俯仰之用廢而心無安泰之時矣心者靜虛而應萬事者也茍知止之為止而廢其應物之用其精者為枯槁無用之學下則不顧事理頑然悍然者而已然天下未有理不得而心安者此艮限列夤所以必至於危而熏心也其與憧憧應感者雖有間矣而其為心之病則一故聖人於咸艮互發之或曰三為艮主而與卦義不同何也曰震陽動於下故以下卦之陽為主也艮陽止於上故以上卦之陽為主也震四下有二隂其勢不可以動互艮之故故動而遂泥艮三上有二隂其勢未可以止互震之故故止而熏心按此乃惡動而求靜者夫惡之求之則心已先動矣此所以危而熏心也蓋不求於氣而力制其心之所為至熏心則氣一而動志矣六四艮其身無咎象曰艮其身止諸躬也四變旅遇離親寡旅也則隻身矣故有艮其身之象安溪李氏曰在心之上口之下與咸之脢同乃背位也象與卦合又以柔正而居上體故為艮其身而無咎然不直言艮其背者艮其背則不獲其身矣不待制也止之於身則猶待於制四雖柔正而不中故也爻言艮其身傳言止之乎身則意明矣辨疑曰艮其身者非禮勿視聽言動是也又龜山楊氏曰伸為身屈為躬屈伸在我不在物兼爻象之身與躬而言則是屈伸兼用矣此别是一意六五艮其輔言有序悔亡象曰艮其輔以中正也五變漸遇巽以漸而入故為有序之象輔與言但即其部位象之亨仲鄭氏曰爻言輔不言口言身不言腹言夤不言臍皆背面而立之象上九敦艮吉象曰敦艮之吉以厚終也上變之謙遇坤坤為厚德謙曰有終故傳曰以厚終爾雅丘再成曰敦者正兼山之艮也合訂曰爻曰敦象傳曰厚終繫詞所謂以成終也吉則篤實光輝萬事萬物從此始矣說甚精蓋終則有始艮所以成終而成始故卦詞止曰旡咎而於上九艮爻之終言吉也艮下巽上漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也仲誠張氏曰在內者止而不動在外者遜而欲退巽本退縮之性但內已艮而無可退則不得不進矣漸之義如此有女歸之義焉巽為女女子本在閨閫至於及期則六禮次舉醮以外之不能復入輪以御之不能復退何啻山艮於後而不可卻乎故告占者曰漸之進也如女歸則吉也是禮義之次第不得已而漸進非妄求進者也竊按艮為少男巽為長女長女年不可待矣然以歸少男勢又不可不待雜卦傳曰漸女歸待男行也然曰女歸者亦謂其有待而進於漸義有合非必於長女少男有所取也程傳曰乾坤之變為巽艮巽艮重而為漸在漸體而言中二爻交也由二爻之交然後男女各得正位初終二爻雖不當位亦陽上隂下得尊卑之正亦得位也此就男女言而訂詁又云但取畫之隂陽更不論卦之男女亦是竊按進得位亦因本卦漸進之義而言之非必執定為三進於四即如傳所論亦因乾坤索而得六子則六卦皆由乾坤生出以為有往有來則可乃大可毛氏因朱子有卦變一說遂謂剛柔相推而生變化創為聚分以及三易四易矣鮮來氏改卦變為錯綜雖皆本於漢儒焦氏易林以至宋衷干寶虞翻荀爽陸績侯果蜀才諸子然多穿鑿附㑹而於大義反晦且即其所執之分聚互易錯綜之法以槩之諸卦則可通者取之不可通者置之且其所本者又人人異詞亦可見其說之拘而非定論矣安溪李氏曰卦變之說於先儒無所折𠂻然不若古注直指卦體爻畫虛象之為愈也按剛得中又於諸爻中特表出九五來止而巽通論卦德象曰山上有木漸君子以居賢德善俗安溪李氏曰修己治人其培養成就皆以漸也初六鴻漸于干小子厲有言旡咎象曰小子之厲義無咎也初與上無位中四爻互離坎離為飛鳥而居坎水之上鴻之象也物之漸進莫若鴻又奠鴈婚禮也切女歸義故諸爻取之初變家人遇離艮止則不進也變離麗則援上而又欲進矣故為漸干之象始進之時不可援上故雖有孤危讒謗之傷而於義為無咎也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也二變重巽巽為臭味合三四互坎為酒飲食象重巽故曰衎衎巽伏而入有凝固意故為磐象卦惟此爻以隂應陽又得中正之德夫能措天下於磐石之安有功如此是伐檀之君子為和羮之大人矣何素餐之有九三鴻漸于陸夫征不復婦孕不育凶利禦冦象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也三變觀遇坤坤為地而三居下卦之上故有陸象以水鳥而止陸此失其所止之道者也三重剛不中與上同剛卦又為進則任剛以動而不安於所止所謂好勝者必遇其敵强梁者不得其死是死於敵應也故云夫征不復此參君啓陸氏之說又剛中鄭氏曰三上無應而親四四下無應而奔三三務進而妄動故征則不可還四失守而私交故孕則不敢育彥陵張氏曰夫婦而出於正應則為媾夫婦而出於私情之比䁥匪媾也而實寇也惟以禦寇之法禦之庶幾不受私情之纍乃為利耳此後二說與程傳頗合傳又曰非理而至者寇也守正以間邪所謂禦寇也蓋少男長女非耦相從故山風有蠱惑之私而風山亦失女歸之道按三與初二本屬一體又變坤為衆所謂羣醜也今不止於其所而上比於四是出位而離羣醜也艮男夫也變坤為母夫而不夫矣故曰不復坤母故孕互坎中滿亦孕象變坤則中滿不見是不育也互坎互離為盜為戈兵禦寇象以禦寇為利則必反其所失之道坤為順德傳故曰順相保者合夫與婦并言之蓋順乎安汝止之道以保其血氣未定之天則無夭札堪虞而與衆以俱生者不至先衆而獨死順乎待男行之道以保其十年不字之貞則無中冓貽羞而標梅之失時者仍得螽斯以衍慶凶者其不凶矣易為寡過之書其義有如此者六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也四變遁遇乾巽木故曰鴻漸於木遇乾金有削平之義為桷象巽為不果故曰或乾不可為順然遁則順矣而本體以柔居柔是能順者也四多懼順以巽則柔而能權自可安耳按四不於夫婦取義者以變乾之剛健耳九五鴻漸于陵婦三歲不孕終莫之勝吉象曰終莫之勝吉得所願也五變兼山艮有陵象卦為女歸故九五亦曰婦互離中虛又變艮為固止而不進故曰不孕三歲者天道小變一卦之數也然爻為時之小變而卦為時之大統爻雖不漸而無如卦之為漸也故莫之勝時過則合吉而得所願矣按先儒多以二五為三四所隔為言夫隂陽爻相為正應豈有能隔之者苐三為艮之主爻四為巽之主爻而一男一女上下相比則謂為能隔理或然也凡易於上下正應多言志言願所願得者本氣之巽入為之主也上六鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也上變蹇遇坎坎險蹇難上處窮位時無可進則退矣下艮一剛橫亘象陸此亦同之鴻復漸於陸雖非其得時之地然知難則退確乎有不拔之操為世所儀而象之者也合訂云陸為人所往來之處三過剛而妄進不免罾􅗤之虞上無位又以陽居隂忘機之鳥也故翺翔自如儀謂飛翔可觀在人則亮節清風頑亷懦立亦一代之光也說甚精蓋以巽之精詳處坎之險艱者也義有如此易翼述信卷八
