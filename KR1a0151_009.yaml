body:
  text: 易翼述信卷九廬州府同知王又朴撰兌下震上歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也旡攸利柔乘剛也雲峰胡氏曰卦詞惟臨與井言凶否與剝言不利歸妹既凶又無攸利六十四卦不吉未有若是之甚者彖傳天地大義人之終始在程朱及各家皆作泛言其理以為起端然咸恆漸皆言男女配合之義者何不於彼發之而獨著於此雙湖胡氏曰卦自泰來乾九三交坤而為九四坤六四交乾而為六三是天地交也出震見離說兌勞坎是萬物興也兌為少女女之終震為長男男之始是歸妹人之終始也蓋乾以資始坤以大終乾交於坤之始則為震坤交於乾之終則為兌而二三四互離三四五互坎全乎四正故曰乾坤之大義乾男坤女坤三索而得兌女道已終乾一索而得震男道方始故曰人之終始也是則但觀於卦之體象似無所為不善者而何以名之曰歸妹蓋卦最重德說以動則男女雖交而無如所歸者妹也其德既非而位又不當則始合不正是無始也柔又乘剛則家道終乖是無終也其於天地之犬義為何如哉故不得僅以其交體互體而善之也象曰澤上有雷歸妹君子以永終知敝安溪李氏曰雷動雨作陽感而隂應者正也澤者積隂之處而其上有雷是以隂而感陽也亦有歸妹之象焉竊按謂永終知敝是反正二義蓋愼始則永其終矣始之不愼即知終之必敝也初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也初變解遇坎兌為毁折在下足跛象坎為曳跛而能履象九二眇能視利幽人之貞象曰利幽人之貞未變常也二變洊雷震本氣互離為眇能視象按震東日出方也兌西月生方也月借日以為光故朔為哉生眀今兌變震是月有光矣故曰眇能視也觀六五之震變兌為月幾望可見履之三亦曰眇能視跛能履而夫子謂為不足與行與有明而此初之跛能履則曰相承二之眇能視不復釋者義各異也按安溪李氏以為凡下卦與同類應者則取從嫡而歸之象應而隂陽反者則取未歸之象故初曰歸妹以娣而二則並歸妹二字亦無之然初曰跛能履則說君以動出乎險中娣之從嫡無専行僭越之失故征吉者以其相承也二曰眇能視則以說而懼發乎情止乎禮義昏而能眀者也故以幽人之貞為宜而夫子釋之曰未變常常即恆也蓋長男長女之配合始為恆歸妹非恆而歸者以娣則恆矣男女居室人道之常而不為茍合則雖守字終身而於常道亦未為變也初則循分以行二則明義以處履之三爻柔正當兌之缺處故言其不足於仁智意主於眇與跛也此之初二爻剛為說以動故雖不足於行而有所依藉以前雖不足於明而不致冒昧以動意則主於能履能視也六三歸妹以須反歸以娣象曰歸妹以須未當也三變大壯遇乾大壯之三變歸妹曰小人用壯而履之三兌變乾亦曰嘻人曰武其義固可知矣蓋此爻為兌說之主四為震動之主所歸之妹此其是已但說以動變乾之健鋭意以歸而三四卦當革之際又皆不當位震起而不下接則求為正嫡不可得也且與上六為同類之從則歸而為娣而已仲誠張氏曰須即鬚生於口上反垂於口之下是無德之女急於爭上而反得下者也此解雖奇創然按賁之二曰賁其須須亦作鬚蓋離之中爻也此與二四互離故亦象之又賁之二與三離體一氣故與上興此三四內外位隔故不相比耳九四歸妹愆期遲歸有時象曰愆期之志有待而行也四變臨遇坤易小傳曰歸妹愆期無應也遲歸有時待禮也動而順女子之正也是以能待禮也卦變為臨不行之為臨愆期之象也傳曰愆期之志有待而行夫待者時也詩曰士如歸妻逮氷未泮又曰卬須我友則待而不得所友寧遲其歸坤之順後得之義也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也五變麗澤兌易小傳曰乙者隂之首也五者帝之位也陰居尊位是以為帝乙也震正東也日所出也兌正西也月所出也月幾望之象也按日為君月為臣以震變兌與下卦一氣君下於臣而為一家也五以陰應二之陽位尊而交於卑卦為歸妹故有帝女下嫁諸侯之義此與泰五詞同而止曰吉者蓋以說動者情也視上下交以道而為元吉者不侔矣安溪李氏曰卦義之所以不善者為以女先男是妹自歸也然婚姻之義皆男求女獨帝女下嫁以女求男比爻適當其象則歸妹之意不徒無凶而反吉矣又按月幾望者光未滿也以五之尊應二之卑而柔順以將其謙抑之德如月與日望而未敢望也蓋月無正與日望者正與日望則月亢日而月為之蝕是陰盛矣此爻為君則四爻為娣以二爻皆在上卦故為衣取於袂者所謂長袖善舞動而取悅者也五柔而四剛此之變氣又為兌缺故君之袂不如其娣之良也四不中正五柔中反言以見君之德不似娣之尚容飾也按傳以下二句釋上二句又一例言其以德為貴不必以容飾為尚耳行謂卑約之行也上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也上變睽遇離居卦終而無應居終則過時無應則無配睽又乖異故有士女婚嫁不成之象震士兌女震為竹離麗也有筐象兌女在下承筐象兌為羊變離戈兵刲象震仰盂空虛變離亦中虛坎中滿又為血上爻過乎坎是無實無血也傳專釋承筐者安溪李氏曰眀上六之為女也離下震上豐亨王假之勿憂宜日中彖曰豐大也眀以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎卦詞最難通傳義及諸說皆以為徒憂無益或且以為不必憂竊按聖人憂盛危眀豈有反以憂為無益而令人勿憂者矣鮮來氏則曰勿憂宜日中當憂其遂日昃如此又成歇後而於宜字亦混竊觀夫子之說彖曰豐大也眀以動故豐倒釋王假之意又曰尚大也夫所尚者大則必至於大而後可以慰其心是勿憂宜於日中耳而夫子又釋之曰宜照天下蓋必能照天下始為日中也則亦必照乎天之下下卦為離凡窮鄉僻壤之地匹夫匹婦不能上達之情無不能曲體而曲遂之俾無一人之不獲其所焉然後大者真大而王真能至之也釋卦詞者止此而自初爻至五皆此義也至日昃以下則又推及日中以後之可憂朱子所謂發卦外意者夫子特以備上六一爻耳非卦詞本義也蓋嘗論之後天卦位震居東離居南矣而東南之交則為巽今觀卦象震上離下其中巽也日麗震為日之始出乃歷二三四過巽而至五是為離位日正中矣夫必歷二三四始至日中日豈易中者又必日中始所至者大大又豈易至者惟王明以動至之而此明動之間有巽焉其德為入則沉潛邃密亦謹小愼微使所明能得於所見而不能得於所不見則懼其有遺照也使所動能及於人所共知而不能及於人所不及知則懼其有弛行也然則聖人憂勤惕勵之懷上震也當有臨之者震下離也而即與之俱永也是王所以假之者大有憂在焉故曰勿憂宜日中則未日中而宜憂者多矣夫憂盛危明賢主之所為也而庸愚者方且安危利菑又豈能當全盛而憂之故聖人不與之爭憂不憂亦不與之爭豐之至不至而苐曰宜日中而已宜日中宜照天下也果能照焉則自不能不憂則亦無時而可謂為豐之至此聖人之微㫖吾蓋熟審夫夫子之所以釋之者而始有以知之也象曰雷電皆至豐君子以折獄致刑凡雷電皆電先而雷後今雷聲一聞於天而電光即著於地故曰雷電皆至易酌曰噬嗑之明刑敕法曰先王立法者也明在上也豐之折獄致刑曰君子奉法者也明在下也旅之愼用刑與不留獄則上下君子皆當然也初九遇其配主雖旬旡咎往有尚象曰雖旬無咎過旬災也初變小過離遇艮遇其配主者不期而見曰遇謂變艮也先天之震位即後天之艮位故四為初主也又配者敵體也艮震先後一體故曰配又配者合而有助也初與四應以卑而上合乎尊明之始動之初相與以有成也雖旬旡咎旬先儒多釋為均然於傳曰過旬費解合訂有二說其前說曰旬十也十者數之終也六爻自初歷四至上而周又轉而至初則為七至四則為旬雖旬無咎謂不但有始有終即時㑹再更尚復可延此往而有為之所以可尚也義頗佳按往有尚尚大也以四為旬過旬即五則日中而將昃矣故曰災聖人以訓雖字大學見賢而不能舉一節即所謂過旬也此亦變氣小過之義安溪李氏曰下三爻離體皆為以明明人之象上三爻震體皆為求明自明之象他卦之義重在有應惟豐不然者豐盛大也盛大而有應則益其盈滿之心故以同德而不相應者為足以相成也節齊蔡氏曰豐為多故難以盡見也惟以剛遇剛以柔遇柔則所見同而可以無疑以剛遇柔則剛者明而柔者暗終不能相信此與安溪說并相發明者六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也二變大壯離遇乾蔀草名二三四互巽為柔木大過下巽初曰白茅泰之初變巽亦曰拔茅是也二為在田故有蔀象豐其蔀見所豐者小傳於九三之沛釋之亦如日中見斗於九四釋之義互見也離之光在外其中為暗虛二即暗虛也又變乾為天斗者天樞星大見斗則日之明微矣乾健故往戰則得疑疾二中正五以虛中相應故有孚乾故能發也了凡袁氏曰三光皆屬離盛則為日微則為星二乘剛為疾疑者明之反也反疑為孚竊按有孚發若傳訓信以發志先儒皆謂人臣積誠以啓君之明此皆泥於蔀為蔽明之說也夫蔽則不發發則非蔽一爻豈有凶吉二象者乎蓋此有孚自從五來志即得志澤加於民之志發如聞文王作而興者也九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也三變洊雷震凡雷電之作電小則雷聲小電大則雷聲大無電之雷則殷殷不絶而已故以豐沛見沫象之子夏傳沛作芾小也劉熙曰沛者水草相生之名公羊傳草棘曰沛齊侯田於沛是也崔駰達㫖曰蟲蚋之趣大沛沫者子夏傳曰星之小者程傳謂星之微小無名數西士利瑪竇曰雲漢蓋無算小星而成然則沫為雲漢矣見沫則日之明為尤微也三四五互兌澤故取象於沛與沫也兌為毁折其變氣互二四成艮為手肱象陽爻故曰右觀師之左次明夷之左股左腹皆隂爻可見無咎者雖終不可用以有為而於義則無過也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也四變明夷震遇坤震為萑葦合二三巽體變坤為地故與二皆曰蔀明夷則日在地下而明有所傷斗為帝車坤為大輿故二曰見斗而四亦曰見斗也初與四皆陽爻又後天卦位離正南其西即坤西南得朋者也朋為同類故曰夷因變而得朋故亦曰遇先天之離位即後天之震位故初為四主也吉行者動罔不臧也合二三四觀之二三之爻詞上言其時下言其才四則合其時與才而并言之以豐尚大而豐蔀豐沛皆不可大者詩所謂小康也然非其所豐者小也其所明者微也所以明之微者皆日未可自謂已中而勿憂者也夫二以柔應柔小而微宜矣四則剛也而又在上何亦小且微夫子曰不中不正不當位故也然二非當位者乎苐以中正處下則在田之大人也士也雖有其德而無其位故所就者小矣且往見不義祗取辱焉故必有孚始發之此逹可行於天下而後行之者也若三則不然剛而不中又變震上下一氣勇於有為而不顧其時之不可雖於已有所傷而於義則無所負此殺身以成仁者也至於四則居得為之地當可為之時苐不中不正雖有其位而無其德則所成亦不能大也惟求賢以相濟則吉已此以人事君者也按先儒皆以蔀為蔽日更有以二三四為下之蔽上者又以日中見斗見沫為日有所蔽如日蝕之意不惟二句犯復且說易必通前後若以豐蔀為蔽日之象則豐其屋不通矣若以蔀為雲日之蔽則蔀其家又不通矣且以二五柔爻敵應為蔽又以五上二柔乘剛為蔽既蔽矣則二何以能發五四五何以能遇初來二乎象傳又何以不言剛掩不言柔中無應不言柔乘剛而苐曰幽不明乎然則夫子於四之豐蔀釋為位不當者其又何以解焉又按上蔡張氏以二四為大臣蔽君曲說也但謂斗有運旋之權似諸侯亦甚有理蓋二德盛四位尊皆能成一時之業苐所就者小耳日中見斗者當時以為盛其實非盛也如謂非日之中特見斗耳至於沫則為庶士如書洪範所言師尹惟日卿士惟月庶民惟星之類六五來章有慶譽吉象曰六五之吉有慶也五變革震動遇兌說革故取新而樂取於人以為善故能來二之章以有慶也凡內應外曰往外應內曰來此非二之來也所謂欲有謀焉則就之者也五以柔居震動之中動而不見其動當日中之位而不見離象明而不有其明變為兌說明良喜起為協和為時雍所謂不見而章不動而變無為而成者上六豐其屋蔀其家窺其戶闃其無人三歲不覿凶象曰豐其屋天際翔也窺其戶闃其無人自藏也上變明兩作離上位高如屋震為棟宇變離為輪奐豐其屋象先天離位即後天震位而變氣又離故以下卦為家蔀其家者震為萑葦而在離家之上也所謂昔之峻宇雕墻今則荒烟蔓草矣離為目故曰窺中虗故其户無人爻三成卦離位亦三故言三歲上下兩離明極而暗上之窮明之終故不覿也上為天離為飛鳥豐其屋如翬斯飛傳故曰天際翔蓋上六之矜高自恣無所底止光景似之然則闃其旡人者非無人也有人而已不之見與無人同傳所謂自藏而非賢人君子之甘於遁世也安溪李氏曰陰柔無自明之德又無同德之助與時偕極者也按象傳天際翔釋豐屋即所以釋蔀家也自藏釋無人即所以釋不覿也聖人立言之妙如此竊嘗考之唐虞之際號為中天正日之方中也然而博施濟衆堯舜猶病則終古無豐之時矣是豐也者聖人之所不敢言也惟庸人則自以為豐故初與五不言豐而有尚者豐有可幾有慶者豐有可稱而二三四與上則皆言豐苐二三四未豐而自視為豐也則亦不過星斗之明而已上則已豐而猶過求其豐也則反得歉而已蓋旭日初出歷二三四至五為中至上則日中而昃矣初當離震同宮始旦者此也帝出者此也故遇主此即明即動者也二三四雖皆為過巽之日然二在辰近震四在已近離故其豐皆為蔀而所見皆為斗微而猶未甚微也三則正當巽方去震離皆遠故所豐所見則愈加微焉且二餘於明而不足於動以其自四來四舊比五者故五以動應之則發四餘於動而不足於明以其自二往二舊比初者故初以明遇之則吉此明動相資者也三居下明之終智己怠而昏矣而與上動隔體力又不足以有為也故又有折肱之象此明動皆絀者也五當日中而無日象可以有為而不知所以為也故必下求明者以為明作之助此以明為動者也上則日已昃矣嚮晦宴息可也乃自曰豫智變離也而妄動不已此明動俱極故窮大失居豐而受之以旅也夫爻各有位位各有其時義一爻一時義也諸儒之說二三四竟與上爻一例是執彖傳日中則昃發明卦詞卦義者而全失夫卦詞中之義所謂觀彖而思過半者謂何此則余所不敢安而必求其當也艮下離上旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉小亨者坤之亨也彖傳兩言之蓋以柔得中乎外而順乎剛釋小亨之義而以止而麗乎明釋小亨為旅貞之所以為吉也順即是亨非坤無所為順者然先儒之說順乎剛皆謂五順上與四夫五順上似矣而於四則為乘剛不可為順剛程傳又以麗乎上下之剛為順剛合觀易卦全離為麗不聞以中爻為麗也且離麗坤順亦未有既以為麗又以為順者而歷來諸家遂紛紛臆說有謂順剛為能依强輔如此是援勢也或又謂以剛强之人能順之正見柔之得中此又吐剛而畏强禦也夫客子畏人自古已然自非狂騃未有在旅而敢凌人不謙恭遜順以取侮辱者也此又何俟聖人垂訓而始知之且旅瑣瑣爻之初即以卑猥不振為譏而於卦詞則又取之無此理矣又柔得中謂五也然二之得中視五更正何以獨取乎五夫既以得中取五矣又以順剛為順乎上與四是專以外離言也如此則大有噬嗑晉豐鼎睽諸卦皆柔得中乎外而順乎剛者何於諸卦一不之及而獨繫於此卦耶且以此句說上卦止而麗乎明句又說上下兩卦偏全不同亦非體例夫先儒不謂乾坤生六子八卦又生六十四卦乎然則凡卦無有不生於乾坤者矣夫乾坤者天地之德也陰陽剛柔之分也不但三竒畫為乾即一奇亦乾也不但三耦畫為坤即一耦亦坤也以三竒三耦論今以坤之三往居五柔得中乎外也以乾之五來居三以止下之二柔柔順乎剛也蓋聖人正因旅久則勢孤或援乎勢或畏乎强流離瑣尾不能寬裕而自得也於是特訓之以坤亨為處旅之正而守之則吉焉夫含宏光大坤之亨也君子體之則為直方柔得中乎外者義以方外也順乎剛者敬以直內也何以言之乾之五剛在外今來於三以止下之柔也而二之柔即居其所而不動所謂順也夫內止其所則敬以直內矣坤之三柔在內今往於五為明之麗宅乎二剛之中不偏不倚明而得中以為肆應義以方外者也夫敬義立而德不孤矣以之處旅能固守之雖患難夷狄將無入而不自得吉何如歟故又贊其時義之大也若如諸儒之說謂亨為通如吉祥一例既與下犯復且以小亨謂羈旅本無大通之理羈旅而亨雖大亦小然則孔孟必得志鄒魯方為大通如其棲棲於陳蔡楚衛逰於齊梁而有遇焉亦當如管仲之器小也歟象曰山上有火旅君子以明愼用刑而不留獄龍溪王氏曰旅皆逆境莫甚於囚之在獄獄者不得已而設豈可留滯久淹也此於旅字頗相關初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也初變兩離察察為明不免苛索而在艮小尤為細屑故有瑣瑣之象斯其所取災先儒多作一句讀謂為自取其災而又以瑣瑣為輿儓卒𨽻夫輿儓卒𨽻即為旅終身亦不過賤耳何至於取災聖人不為此輩謀也大可毛氏獨以斯其所三字斷句引說文爾雅毛詩以斯為分析之義其意以為他鄉寄跡情已逼仄所恃廣大自處同類相親則四海兄弟天涯比鄰庶足共相慰藉也而乃小利小害較量錙銖此往彼來疑慮畏葸必至分析其處所而後已則所親益寡豈不取災此說視諸說較勝竊按所字亦不必專指處所即凡行李財貨童僕器物一切同寓者彼此管照庶得無失若猥瑣猜嫌則各不相顧矣傳曰志窮災也窮字正與卦詞亨字反對知瑣瑣之為志窮則聖人以亨廣旅人之志可知已六二旅即次懷其資得童僕貞象曰得童僕貞終旡尤也二變鼎艮遇巽六二柔居柔位即次也變巽而本爻合三四又互巽巽近利資也居中懷資也鼎受實亦懷資象艮為閽寺童僕象二居中而上下剛柔長少皆得得童僕也艮止則無外心巽入則能謹密童僕貞也三者皆旅之善爻未言吉故傳以終旡尤補之易酌曰雖厮役皆以正道相朂則主人因而寡過矣何尤之有爾瞻葉氏曰貞不徒責童僕須在我有以得之不能得是我之尤也終旡尤蓋嘉其德之詞二說皆佳九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也三變晉遇坤火在地上則無屋可居又坤三往五為離火五遂來居於三旅焚其次之象焚其次則并其資而盡之故不又言喪資也坤為臣妾之道五本尊為主來居三傳故曰與下也而又變坤則又下同臣妾矣合四五互兌為脫喪童僕象合訂曰主僕之分雖流離瑣尾不可失也若如等夷相與則尊卑無别不成其為主僕矣故曰其義喪又曰本欲與之而反失之亦由喪其順德故也按貞字程傳連上本義連下各有義九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也四變全艮處旅之心雖欲其貞而為旅之身則不欲其久久則處而留羈他鄉矣詩曰于時處處是也離麗變艮止麗暫而止久也上下艮止其止也故曰旅于處合二三互巽故皆有得資象離為兵合三五互兌金而在巽木之上斧象麗其兌金得斧象旅以柔中得位四剛不中故傳曰未得位此句承上起下故下直述爻詞非若諸象傳之各自為解也若曰惟不得位而旅處故雖得資斧心未快也玩傳義孟子在齊王欲養之以萬鍾而孟子不豫而去似之孩如鄭氏曰下體庶人之旅求貨利者上體士君子之旅求功名者六五射雉一矢亡終以譽命象曰終以譽命上逮也五變遁離遇乾離文明火炎上故象雉為戈兵射象乾數一又為金一矢象此爻程傳與本義異諸家之說雖各有見而俱未確易酌疑射雉為死雉何以得譽命亦太泥竊按此不過言柔往而剛來耳蓋射雉欲得雉也然雉得而矢亡矣三雖居五得中以成離而乾之一剛已失今仍變乾是始失而終得也蓋五原在三為坤自往外為離是以剛得來於三合二四以互巽命合四五以互兌譽耳是始因柔之上逮而失剛終以柔之上逮而得譽命也此爻詞無旅字亦并無旅意然六五以坤柔出外是即旅也傳故特以上逮二字注明之又按五為離主爻火在山上不留而變氣為遁自古功成者身退堯老舜攝終成放勳伊尹之復政告歸周公之欲讓後人於丕時而阿衡著美碩膚揚休此物此志耳上九鳥焚其巢旅人先笑後號咷喪牛於易凶象曰以旅在上具義焚也喪牛於易終莫之聞也上變小過有飛鳥之象離火遇震木麗於木又科上槁者且在上爻故有焚巢象三四五畫在上爻之先互兌為說先笑象至上變震為懼後號咷象離之三曰或歌或嗟家人之三亦離也曰嗃嗃嘻嘻震亦曰虩虩後啞啞故有此象凡旅人始皆苟合而久則必離故曰親寡焚巢無可依之居也親寡無可依之人也所以然者以上之過也傳故曰以旅在上其義焚也蓋以焚巢概却號咷一句彥陵張氏曰在旅而喪其童僕孰不曰人之無良也而聖人則曰其義喪不尤人也在旅而焚其巢孰不曰數之適然也而聖人則曰其義焚不怨天也故曰正已而不求於人則無怨所謂旅貞者如此按離之卦詞曰畜牝牛吉變震則喪牛矣夫牛為柔順而貞之物旅以柔順而貞為道者也故以為象乃五則畜之上則過而失之二則止而畜之上則動而失之畜之何其難失之何其易聖人歎知德者希故曰終莫之聞也此句正與旅之時義大矣哉前後呼應易小傳曰同人亦柔得位也雜卦於同人則曰親也於旅則曰親寡何謂也同人柔得位乎內陰外而中可同乎人也是以親者衆也旅得位乎外火行而上無所麗也是親者寡也以柔同乎內始難同也克而後遇是以同人先號咷而後笑也以柔旅乎外初易合也客不利久是以旅人先笑後號咷也二卦所以異也巽下巽上巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人安溪李氏曰王輔嗣以卑順解巽義後多因之然順為坤之專德巽未聞有順義考之於經曰伏雜卦曰入說卦曰制曰齊繫詞皆與順義差别王氏蓋見柔順乎剛之詞且見爻多牀下之象故以卑順釋之然牀下者陰所伏也巽在牀下所以入而制之也能使柔順乎剛則齊矣卑者巽之形順者巽之效皆非巽字正解若以人心之德言之以為沉潛深密之義則可不可以卑順訓也又曰一陰伏於二陽之下在天地為陰氣始凝在人心則邪欲潛動於政事亦奸慝伏匿之象也風者陰氣而能散乎陰以其本生於陽也張子所謂陰在內而陽不得入則周旋不舍而為風是也故陰伏在內陽必入而散之邪動於中必深察以除之奸慝伏匿王者必命令誥誡以飭治之命令象天之風也竊按風之散陰也如氷為陰氣所凝至堅之物日以融之不得惟遇風則消故月令曰東風解凍必東風者風之根於陽者也天地不能有陽而無隂人不能有道心而無人心國家不能有君子而無小人但陰順陽以行則時和而物亨人心聽命於道心則形踐而性盡小人聽命於君子則政平而事理夫陰者陽所資以為用而亦反而相敵者也故陰蔽於外陽鬱而不伸則奮而為雷國家之威令振作人心之恐懼修省是也隂匿於中陽融而未暢則繞而為風國家之宣諭化導人心之感發警悟是也又按繫詞大傳曰巽稱而隱又曰巽以行權論語亦曰巽與之言能勿悅乎是則巽之為德概可識矣鄭氏曰九二巽乎中者也重巽則兼五言之傳曰巽乎中正而志行如此則分曉矣又曰初六順乎剛者也重巽則兼四言之故曰柔皆順乎剛尤分曉建安邱氏曰巽雖主於柔而二五之剛得中故論成卦則以初四之柔為主論六爻則以二五之剛為重惟二五之剛能巽乎中正則剛不過而志得行矣故曰剛巽乎中正而志行此以二五兩爻釋利有攸往之義皆順謂初順二四順五也柔者多不能自振故必順乎剛則柔得剛助而後可行故曰柔皆順乎剛此以初四兩爻釋利見大人之義然大可毛氏曰巽有兩利一則以退為進而可以尚往由下至上曰往一則由小陰通大陽而可以見大人二五為大人蓋巽為命令大人之事命以行事而重以申之誠以陽剛兩爻皆得巽入二五而行中正之志陰柔兩爻不拂乎剛而順乎剛是攸往者其行而見大人者又其順也据此則利有攸往亦不止於論剛爻利見大人亦不止於論柔爻矣蓋必剛得中正然後柔順之而無所愆又必柔順乎剛而後中正之志始藉以行而無所阻所謂陰陽兩相待也又按小亨非謂小吉小利夫水火風雷山澤天地之大物恩坎威離刑震政巽法兌制艮國家之大事起震止艮升兌沉巽急離緩坎人心之大德六子雖不能如乾坤之全備四德然亦何至為小小休祥之占乎且彖傳曰重巽以申命夫維天之命於穆不已君子之德純亦不已重巽為坤之旡疆實同於不息之乾此豈小事哉象曰隨風巽君子以申命行事大象巽之申命則屬人事與彖不同夫申命以其入也然入而能散之則非止於入而已故又補出行事初六進退利武人之貞象曰進退志疑也利武人之貞志治也初變小畜遇乾健故曰武人履之六三互巽變乾亦曰武人合訂曰武人出師號令嚴明進則進退則退有一定之律此師之貞也如是則利矣易酌曰把狐疑念頭整頓起來不使汚壞卑委了志治也按乾卦文言曰乾元用九天下治也蓋初順二之剛者故有此利德焉九二巽在牀下用史巫紛若吉旡咎象曰紛若之吉得中也二變漸遇艮巽為木為繩直初柔虛二以剛臨其上牀象也陰柔伏於近身之地二近初也三四五互離為龜史所掌也此合三四互兌為巫紛若者既用巫下巽又用史上巽反覆不已所謂重巽申命也蓋初與二一陰一陽陽得中而陰順之則一氣也初既進退不果故二用巫用史助其決以尚往耳安溪李氏曰史以察吉凶巫以除災害入之至深能察其害而急除之此說與卦意合且察吉凶申命也除災害行事也紛若重巽以申命行事也與大象亦合其吉固宜乃但曰旡咎者以陽不當位中而不正應有咎而旡咎也傳故曰得中而與九五之位正中者不同九三頻巽吝象曰頻巽之吝志窮也三變渙巽入又遇坎陷二巽三又巽變坎為勞故曰頻巽三以剛居剛而又乘剛剛太過矣所謂進鋭退速頻巽則亦頻失者也然頻巽亦猶之乎重巽何以重巽則亨而頻巽獨吝蓋一陰一陽之謂道初一陰二一陽為巽四又一陰五又一陽為重巽重巽者終則有始所謂乾坤并德貞下生元天命不已君子之自强不息也是巽之德幾於乾坤矣頻巽則剛之巽也既數而柔之順也無時此程傳與本義所以皆謂勉為屢失者也傳曰志窮蓋謂剛不中正而柔順之志遂窮而旡所往耳大抵巽卦雖以陽為主而其美則在陰卦詞言小亨彖傳言順言志行爻言志疑志治志窮皆謂柔也又言凡言咎在不及者為吝變氣為渙是隂已散矣而猶散之不已陽有餘而隂不足也六四悔亡田獲三品象曰田獲三品有功也四變姤遇乾姤為柔遇剛此卦之美全在於柔之順剛四以柔居柔而在多懼之位得毋有悔然變氣為乾以柔遇剛悔焉得不亡乎合三五互離為戈兵網罟大可毛氏曰巽固利倍而此為巽主爻有乾之實倍而又倍遂凖卦畫之數而全獲三品誠以位居離中適當心腹而隂爻又復成巽股之體上中下殺悉於所獲有相孚也在禮一乾豆二賔客三充庖注云上殺中心乾之為豆實次殺中髀骼以供賓客下殺中腹充君庖厨此以離為心腹巽為髀骼正相合按田所以講武初與四皆取其順剛又俱變乾故皆以武象之然初有其志故曰武人四則有其事故曰田而獲也三品備物也姤之彖曰品物咸章在天地則草木鳥獸魚鱉咸若在國家則卿尹庶士咸得其人在人心則耳目手足咸順其則此柔順剛之美彖所謂小亨也傳故以有功歸之按五多功非以言四也但初與四皆以柔能順於中正之剛為美故初曰利武人之貞合二以為言而此曰有功亦合五以為言也四與五皆言悔亡者見剛能巽柔而陰之凝者皆散也初二與此同功而不言悔亡必至四五始言之見私之難散而篤實沉潛之功無一時可已者也九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也五變蠱遇艮五得位所謂剛巽乎中正者故曰貞以陽居陽而二又以陽應似乎陽過宜有悔矣然巽乎中正下柔順之悔可亡而且無所不利無不利者利有攸往利見大人也巽以柔為初爻無初也剛得中正而在重巽之際有終也坤為先迷後得主者無初有終明乎其為小亨矣是舉全卦詞義皆在此爻尤非二之所得望也庚者兌也先三日為巽後三日為艮是為蠱卦艮之所以為成終而成始者蓋震以初之剛為始艮以三之剛終之自巽至艮萬物之功用盡矣至震又起首故蠱者繼前人已壞之緒而飭治之為有事於始也今先言有終而又言先庚後庚蠱之終則有始者以見天命不已人事無窮君子之申命行事可有一息之宜間也哉此則專以變氣言之貞吉者無初有終之吉也先庚後庚吉者終則有始之吉也非復也故象傳止以九五之吉概之又按巽為進退不果故必至重巽而後決四之所以有功也然亦非僅一重之而即已故五言先庚後庚終而復始以見申命之無窮乾之反覆道不過是已上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也上變井巽入遇坎陷夫井巽乎水而出水者以其巽乎水故亦曰巽在牀下謂下巽也巽為利資象又為木合三五為離兵合二三為兌金斧象旅四之離兌在爻上為得此離兌在爻下故曰喪也喪其資斧則嬴其瓶矣是以為凶此陽不足而隂有餘者按巽為伏夫陰之伏也於下不於上則巽之為功亦在下而不在上今之位已上矣是不得巽者不得巽而巽則失其巽故曰喪其資斧傳若曰巽在牀下者也今在上則窮而宜變矣宜變而不變而固執之以為巽之正乎則適得其凶而已蓋貞為正固自來止以正字替貞字而遺却固字一層遂以卦爻皆戒占者之詞至此爻傳又何以解焉此融㑹程傳意似妥夫巽之德為剛入而散夫隂柔伏而順乎剛也乃初與四為順剛之柔二與五為入柔之剛故二合初五合四均為吉占三則剛巽而柔不及故吝上則剛不得巽而柔過焉故凶蓋風散夫隂而隂不能匿則與陽偕行是為晴風朗日淨掃隂氛為發奸摘伏之無遺為克伐怨欲之不行利武人之貞史巫紛若之象初與二是也又為和風甘兩相資利物為小人變化於君子為百體從令於天君田獲三品貞吉悔亡之象四與五是也風散夫隂而隂不能隨則為所牽是為既有凄風亦有苦兩為再三瀆之童蒙為不能勝之人欲頻巽之象三是也風散夫隂而隂不能散則與陽戰是為飄風之發或雺或霾為小人得志而君子無權為人欲縱橫而心為形役喪其資斧之象上是也兌下兌上兌亨利貞彖曰兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉卦辭亨句利句貞句兌蓋有此三德也說屬情人事之後起者故不曰元與咸同雲峯胡氏曰咸取無心之感兌取不言之說是也夫兌何以為說說卦傳曰兌正秋也萬物之所說也又曰說萬物者莫說乎澤蓋陽在內而敷散隂潤於外萬物得之莫不欣欣向榮以有成是兌為說之意也彖傳剛中柔外釋利貞順天應人釋亨若曰所以利貞者剛中而柔外也所以亨者說以利貞也蓋和義而正固方能嘉㑹而合天人也順天謂上兌應人謂下兌本義曰又取坎水而塞其下流之象仲氏易曰一陽居中而以兩隂導其旁川流下泄則謂之坎半坎上瀦而以一陽窒其底障坎下流即謂之澤是坎為勞卦而塞之以兌而勞以亡坎為死位坎位北曰朔月死之名離四居大坎而曰死是也而兌以閼之而泯其死是不特兌為毁折可以祛憂兌為附決用能致快也此說雖巧亦自有意誠齊楊氏曰民知聖人勞我以佚我死我以生我也是以說而自勸夫勸民與民自勸相去遠矣故聖人大之象曰麗澤兌君子以朋友講習咸卦內止而外說故九四貞於一此內外皆說故大象澤而麗麗者兩相附也合訂曰我說人人亦說我而六爻取義俱合上下兩卦並論是也朋友講習之為麗澤為說先儒之論備矣初九和兌吉象曰和兌之吉行未疑也初變困遇坎合訂謂初四相麗二五相麗三上相麗初即四四待商初所以費調也此本仲氏易說以為上下貞悔無應敵而有比儷一如大象之所謂麗澤者以兩離重巽兼艮習坎洊震各卦詞例之誠然且與變氣亦合蓋說而遇險則有所詳審調劑非以水濟水者矣安溪李氏曰凡說道以剛為正以柔為邪故卦之四陽皆闕九四商兌未寧介疾有喜象曰九四之喜有慶也四變節遇坎說於險非輕說者故有商象有未寧義蓋麗初之剛又比三之柔所以商也麗初而逺比三而近所以未寧也隂柔近比為疾而上下內外間之則異體雖近而不親一氣雖遠而可即矣所以有喜也傳云有慶者四居上位去邪從正則其喜不獨在一身矣又合訂云憂悔吝者存乎介介謂介乎兩者之間也一念未能決絶便是疾痛商而去之勿藥有喜矣按此以疾為不決之病不屬三爻亦備一義九五孚于剝有厲象曰孚于剝位正當也五變歸妹遇震說而妄動則為隂所剝矣孚於剝者與二麗而相孚於見剝之時也上隂柔五近而比之恐中孚之志有未能固者則非兌之利貞矣故曰有厲竊按二五同一剛中而五且正五比上二亦比三乃二則吉而五有厲何也以本氣言之二在內五在外在內者情含而未露在外者情發而易馳安溪李氏謂內卦為初外卦為終之說是也以變氣言之二為隨男動而女說陽先乎隂也五為歸妹女說而男動隂先乎陽也是以得失有不同焉夫五之本氣變氣皆宜受剝而獨毅然與二相孚不為隂柔所惑非剛中而正當其位不至此傳故贊之上六引兌象曰上六引兌未光也上變履說而以健行則相率以俱去耳故曰引兌三在內卦故曰來上在外卦故曰引來兌既凶則引兌可例矣傳曰未光所謂致飾於外務以悅人豈復以信為志者耶坎下巽上渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也歷來先儒皆以合渙為說似彖象各有其義者然則夫子所謂觀彖而思過半何謂耶竊以一卦一義即一卦之六爻亦一爻一義不應以萃為聚而於渙又為聚况合渙在後聖人亦不應以歇後謂為正義也夫王假有廟萃渙雖有同詞然細玩夫子彖傳於萃曰致孝享於渙曰王乃在中而大象又增出享帝此其間則必有辨矣乃再三反覆於剛來不窮柔得位而上同二語竊不覺有以得其解也蓋上卦本乾下卦本坤剛來於下為九二主柔之權而行其志所謂不窮也柔往於外為六四居得其位而順乎剛所謂上同也仲誠張氏曰剛柔各離其類而得通上下各離其類而得通所以為渙而渙所以亨也其亨如何王假有廟利涉大川也按此說最得亨字之㫖夫亨為嘉之㑹假廟則合子孫臣庶而皆在所以渙分形異體之岐情也涉川則任夷險平陂而皆通所以渙此疆彼界之殊軌也其為渙之嘉㑹為何如者至於利貞又自此二語看出夫乘木以有功則於物無不宜矣利也誠一以化物則一中可允執矣貞也乃王假有廟萃渙二卦不嫌同詞者蓋萃之義為聚有廟以聚祖考之精神故曰致孝享渙之義為散有廟以化形骸之畛域故曰王乃在中五君位也九君德也居中得正而九來於二同德以敵應六往於四近比而順之五乃在中靜以受二之應四之順所謂北辰居其所者奏假無言時靡有爭景象宛然惟其在中斯無所偏䁥無所恝視而序昭序穆序爵序事序齒逮賤無一人不使盡其情無一物不得順其節是萃渙同一假廟而取義則各不同也象曰風行水上渙先王以享於帝立廟風行水上水之來派不同而風之蹴波無異蓋坎為通巽為入而散非散其隔膜之私不能享帝非散其分派之私不能立廟至於享帝則乾父坤母西銘一篇大義在是故夫子曰明乎郊社之禮禘嘗之義治天下如示諸掌紫溪蘇氏曰風行水上凍解氷釋而水流蕩又易小傳曰上一帝也次一祖也耦六於左右三昭三穆也中一王在中也此又以九二為王在中亦備一義初六用拯馬壯吉象曰初六之吉順也初變中孚遇兌初既比二變中孚易小傳曰中孚柔在內而麗乎剛柔得所附之象也按坎為亟心馬故曰馬壯拯者拯否也渙否之氣在二與四初旡位與四非正應而比二傳故曰順言初非能拯者也特順乎能拯之二而已九二渙奔其機悔亡象曰渙奔其機得願也二變觀坎遇坤涉水則險履地則安二三四互震木也上卦又為巽木木器之能安身者莫若機又剛為几身下柔為足三四五互艮為手以憑之故取象焉蓋渙之所以為渙以二與四二為坎之主爻四為巽之主爻二與四適互震動而得所安故曰奔其機也九來於二變氣為得地六升於四據於下卦之上而又為木非奔機而何本氣以剛居柔位為坎險似乎過而有悔者然變氣得地而安安則能慮能得故悔亡而傳曰得願願即志也君子得志則大行其道道前定則不窮彖與爻一義也六三渙其躬無悔象曰渙其躬志在外也三變隨風巽下卦本坎體變巽與上卦一氣則坎體已失是渙其躬也此亦過而宜悔者然渙否正以致泰志之所欲求仁得仁又何悔之有卦惟此爻有應於上而變氣則上下皆巽故傳曰志在外合訂曰六往居四九來居二三介於二四之間無所為渙也然上比四而下比二二不窮三亦不窮四上同三亦上同惟二與同是從而已無一毫主持於其間故曰渙其躬義甚精六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也四變訟訟務求勝有渙羣之義遇乾故曰元渙盡羣隂而陽實胎之有元之德焉吉可知也五位高四上同五合三互艮故象邱合訂曰六自否之二往居四初與三本其羣類也今離初與三而居四渙其羣也居四而上同五渙有邱也絶隂而從陽是散小羣而為大羣聚若邱陵之高也彼舊日等夷如初與三始且為之抱離羣之傷今見有邱大出望外矣渙及泰二爻朋亡同故傳俱云光大竊按言光大則並渙有邱亦釋之矣九五渙汗其大號渙王居無咎象曰王居無咎正位也五變蒙巽遇艮上卦風以散之下卦水以潤之變氣為山下出泉皆汗象巽為命令號象九大象五王象合三四互艮變氣又艮止其所也居象渙之功在二與四九五無為而功則歸之王居象按歷來句讀皆以兩渙字提起惟合訂則於渙汗句其大號渙句此蓋遵傳言王居旡咎而讀之者也渙汗即王假有廟其大號渙即利涉大川此爻實備彖詞之義玩卦象下坎一陽陷於二隂之間上卦巽風入以散之夫然後出險如人之病得汗則邪散而愈也當汗時精液周浹蓋無一毛一竅而不流貫也者夫人皆錮蔽於形骸之私以致有情而不暢惟先王有廟以為之昭格而凡器物名數所以為對越駿奔者無鬱之不伸無志之不達觀之儀禮而先王之精義可知也則推此意於政教則理將無不眀誠將無不格雖殊方異域民心之蘊結無有不解者其於治天下也何有是故知幽明之故則知渙之所以亨也合訂曰精神積於中流貫於萬事萬物猶汗為人之精液發而周浹於四體能如是則政令所及風行水湧而大號渙矣大號渙則萬國傾心為君者垂裳端拱坐致雍熙之盛故曰王居謂王居其所而天下環萃而戴之即傳所謂王乃在中也如此又何咎之有乎按此說與象傳正位義甚合夫王者一日二日萬幾若無所事事咎孰甚焉今者精神流貫於四海聲靈赫濯乎萬方無為而治自無所咎坤之文言所謂正位居體美在其中而暢於四支發於事業者此其是也上九渙其血去逖出無咎象曰渙其血遠害也上變習坎上與四應而變氣又為坎是不能渙其否者但坎為血血滯則病是身之害也巽風散隂血亦屬隂上雖不能渙天下之否而能渙一身之害何以渙之惟引身以去其去也不遠務出乎險而已矣上無位在事外故有去逖出之象不能渙天下之否咎也而能渙一身之害亦無咎也傳曰遠害并去逖出皆釋之諸儒有以渙其血為句者有以渙其血去逖出為句者何不讀夫子之傳乎易翼述信卷九
