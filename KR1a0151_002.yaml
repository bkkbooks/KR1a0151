body:
  text: 易翼述信卷二廬州府同知王又樸撰乾下乾上乾元亨利貞初九潛龍勿用九二見龍在田利見大人九三君子終日乾乾夕惕若厲无咎九四或躍在淵无咎九五飛龍在天利見大人上九亢龍有悔用九見羣龍无首吉彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧彖傳本義方敘天道忽敘聖人忽又敘天道下又補敘聖人似於文法欠順竊疑大明終始三句與上二節俱以天道言惟首出二句始說到聖人若曰昔宓羲氏畫三陽爻而名之曰乾因而重之仍名為乾文王繫之以元亨利貞四者皆天徳也乃乾有四徳而元為之首大矣哉乾之元乎萬物之所資始而為亨為利為貞胥根焉乃統括乎天徳者也是故雲之行行此元也雨之施施此元也品物之流形流形此元也是乾之亨始而亨者矣夫此始而亨也始不常始有終其始者也其終也終非竟終終而即始者也惟其終始迭運循環無端所以不息而為乾乾也此義也畫卦之聖人於畫此六陽爻而仍名為乾之時已大為明白指示矣則此元亨利貞之詞夫豈文王之臆說哉然即畫卦之聖人所以畫六陽爻而仍名之曰乾者亦非聖人師心自用也蓋七政齊而四時行日緯乎天必歴月之十二而一周其自陽氣方生以及漸長至於極盛則有初有二有三有四有五有六是六爻之位實各因乎時自然而成者也夫陽之在物者莫若能六陽即六龍也惟各因乎其自然之時則四時乘此六陽以行乎天者有春即有夏有春夏即必有秋冬是其收歛閉藏天豈别有一六隂之氣闕可測之物也總之生機既謂之元又謂之和何也元氣即和氣自其資始謂之元自其訢合謂之和總之為物或曰萬或曰品或曰庶何也萬明其數之多品見其類之異庶言其生之同各有攸當也此尒雍正乙巳年在都門所抄未審何氏所著今按其義亦多散見說統中疑為近時學人纂集前儒雜論而加暢者凡後所採皆于上標附見字為識象曰天行健君子以自彊不息潛龍勿用陽在下也見龍在田徳施普也終日乾乾反復道也或躍在淵進无咎也飛龍在天大人造也亢龍有悔盈不可久也用九天徳不可為首也程傳曰理无形也故假象以顯義㫖哉言乎一部易莫非象莫非理也朱子本義曰天乾卦之象也凡重卦皆取重義此獨不然者天一而已但言天行則見其一日一周而明日又一周若重複之象非至健不能也竊按行健二字亦即是重乾之意矣又按大象夫子多另取一義不與彖同乃此曰行健曰不息仍即彖傳終始之意即坤象厚徳亦即安貞也蓋天地之道為物不貳故不容别有所為義矣初變姤遇巽巽伏故象潛巽為徳之制又曰巽以行權故言龍而戒其勿用也傳曰陽在下陽釋龍下釋潛旣在下自然勿用故勿用不復釋也說統曰只一在字便見是安住時節勿輕動作則陽徳完固二變同人遇離明故两曰見二地位同人曰于野故此曰在田說統曰以天下同得之理感天下同然之心象日之方升雖未中天光已遍被故其施自普按此固以變氣言也三變履遇兌變氣合二四互離故曰日三為内卦之終離之三亦曰日昃故曰終日離日互在下故曰夕居下乾之終即開上乾之始而二三四五皆互乾又重剛也故曰乾乾重剛故厲而履卦辭曰履虎尾不咥人故厲旡咎傳曰反復道者程子以為進退動息必以道朱子以為重複踐行之意用六刁氏以為指出道字則終日乾乾確有可依據此三說皆極有味蓋此爻變履履者禮也朱子以九二之半與九三為亨亨禮之徳也君子嘉㑹足以合禮所謂先王之道斯為美小大由之故有終日乾乾夕惕若之象䨇湖胡氏曰初二為地地者龍之下位五上為天天者龍之上位三四人位非龍之所據乾九三一爻實居六十四卦人道之首聖人尤致意焉此諸爻所以不言乾而三獨言乾乾也四變小畜遇巽小畜上徃而施未行巽又進退不果者也故有或躍或在之象雲峰胡氏曰其位上下之交其時進退未定之際躍以或言審於進也淵以在言安於退也竊按或之者疑之也徂徠石氏曰夫子加進字以斷其疑也五變大有遇離離火炎上又為雉故曰飛五天位故曰在天離明故曰見二五有中正之徳故皆曰大人敬仲楊氏曰皆尊仰之之謂見皆䝉其澤之謂利雲峰胡氏曰二之施以徳言五之造兼徳與位言敬承程氏曰語稱天地曰造化曰大造造者天之為聖之事也聖人居天位行天道所造於天下萬世者大矣故曰大人造也仁和沈端恪公說二五两爻云雖有見龍在田之徳而尤宜見九五之大人則為下不倍矣雖有飛龍在天之徳而尤宜見九二之大人則居上不驕矣按此義實出程傳朱子據九五文言以為只是言天下利見夫大徳之君今人却别作一說恐非聖人本義乃本義又仍程說何也此間必有訛誤上變夬遇兌以乾之至健而猶有柔之決故曰亢亢亦時之所不能違者也按位以五為中正過之則盈盈不可乆者窮則變變則通也詳見文言用九節說者不一介甫王氏謂䝉上九而言雖為來註採用而理則偏程傳泛論朱子非之而取歐說謂為占得乾卦六爻皆變之辭援春秋蔡墨筮乾之坤為証乃用六刁氏疑為不然說詳後文言近於都門抄本又云爻數用九而爻位止六是為羣龍无首之象又據先天圗乾坤坎離艮兌震巽皆對待成九數為說語愈新竒而㫖愈岐出學者何所執以為信守乎竊按蔡墨既有此筮則朱子之論為確次崖林氏曰乾變之坤與本是坤者不同坤變之乾與本是乾者不同故乾旡首之吉終不可同於坤牝馬之貞坤永貞之利終不可同於乾之元亨故聖人别著自此至彼之象占折𠂻曰此亦因乾坤以為六十四卦之通例如自復而姤則長而防其消可也自姤而復則亂而圗其治可也先儒謂須合本卦變卦而占之者近是又云此不可為首與不可為典要語勢相似非戒辭也若言恐用剛之太過不可為先則天徳二字是至純至粹無以復加之稱非若剛柔仁義倚於一偏者之謂尚恐其用之太過而不可為先則非所以為天徳矣程子嘗曰動静無端隂陽無始蓋即不可為首之義如所謂不可端倪不可方物亦此意也又按都門抄本云乾六爻不言凶亦不言吉者純粹中着不得一吉字也凝庵唐氏曰六龍各極其盛并不言吉必至无首方吉甚矣龍徳之貴全也二說正可互叅文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞本義分疏四徳兼天人而言字字精確朱子又云屬北方者便着用两字董氏曰北方天氣之終始有分别之意故北字篆文两人相背至於四端五臟四獸屬北方者皆两朱子又云伊川說貞字只以為正恐未足以盡貞之義須是說正而固又曰正字也有固字意思但不分明終是欠缺按朱子諸說貞字原是正固二義不知何故於乾之卦辭及諸卦爻之言貞者又止以一正字畢之也安溪李氏曰上言性之徳下言君子所性本義曰此第一節申彖傳之意初九曰潛龍勿用何謂也子曰龍徳而隠者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可拔潛龍也敬承程氏曰龍徳而隠惟有龍徳故能隠也彦陵張氏曰提出龍徳二字便見非石隠自甘的了又曰不易不成有二說一說不為世所變易曰不易不以一善成名曰不成一說道可以易世不易者無必用之心隠可以成名不成者无㓗身之跡受軒貢氏曰人在世間都被世界轉移去不易乎世這是出風塵的漢子然纔是特立便要成名旣不易乎世又不成乎名纔潛得不凡所以遯世無悶得此已是沒世界的心腸渾乎道心之㣲矣按此此其所以為龍徳而隠者也樂行憂違先儒多作出處說旣與潛字有碍且講憂違亦牽強孔氏吳氏之說即今安溪李氏所謂去其所不願之意然文意淺且與上四句重複無味用六刁氏曰二句𦂳跟上意說一則曰无悶再則曰无悶不亦樂乎樂天知命故不憂不憂者不戚戚於貧賤也行即人生行樂耳之行違即天與水違行之違違與行反行其樂而違其憂如孔子之樂以忘憂及顏子之人不堪其憂囬也不改其樂是也此其胷中確有自得處全不以世故動其心所以為潛龍也按此說似新而實確學者詳之九二曰見龍在田利見大人何謂也子曰龍徳而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也本義以二亦字代之字似未確蓋此數句即𦂳跟龍徳正中來彦陵張氏曰人知龍徳之變化而不知龍徳所以變化處只在平常日用之間故聖人指出實地以示人耳孩如鄭氏曰善蓋一世而不伐忘乎善矣聖人以吾之所以謹而信者庸言庸行而已矣原無善也此徳之所以為博也而人之被其徳者亦化焉而不知聖人未嘗知吾之善為能有所及於人人亦安能知其善之出於聖人也安溪李氏曰在下而曰見者言行之著不可揜也至誠之感必有動也中則庸矣中則無邪矣紫溪蘇氏曰論聖人之徳則曰龍徳論聖人之學則曰庸信庸謹此乾之所以為易知也九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進徳修業忠信所以進徳也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣合訂曰徳言進業言居進者不留居者不遷也進以進其所居居以居其所進日知所亡月無忘其所能也按進徳居業本義分心與事故來註於知至句云念念不差知終句云事事皆當此即坤卦之敬以直内義以方外大學之明明徳止至善中庸之尊徳性道問學所謂内外交養千古作聖功夫不過如此孩如鄭氏曰不曰所以修業而曰所以居業蓋修辭立誠即是修了旣修了則有可居矣猶之屋然修者方在營搆旣成則可居也按此譬甚精然則修字直貫至立誠非止修其辭而已黄氏以修作修為之修謂如先行其言之意此本義所謂見於事者無一言之不實也知至至之知終終之程傳分屬知行朱子云知至則知其道之所止至之乃行矣而騐其所知也知終則見其道之極致終之乃力行而期至于所歸宿之地也是以至之終之屬行蓋知行皆有存𤼵两層功夫故大學於知先定静安以明明徳後即格物而止至善誠意先愼獨以明明徳後即潤身以止至善也此二句朱子之說甚詳細用六刁氏約其㫖曰知至是知到下手處至之便是下手了知終是知到盡頭處終之便是盡頭了看到那裏就做到那裏即知以為行知甫及之而仁便能守之也合訂曰幾者𤼵動之微善幾之動原有不容己之勢迎而導之擴而充之猶射者之機發而即至此說機字甚確又說統曰至即真幾㣲眇處幾非親履其域者不可與也與幾正見其能至耳終即義理安頓處義非畢了其事者不可存也存義正見其能終耳此等語皆極精可味刁氏又曰從下卦論之三居上則君子進徳修業於上豈有驕焉者乎從上卦論之三在下則君子進徳修業於下豈有憂焉者乎此說上下字有着落蓋在上在下皆非中故曰厲也驕與憂皆可咎不驕不憂則无咎也此兌之說也九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進徳修業欲及時也故无咎安溪李氏曰或躍者有時而躍飛潛未定之象也又變卦遇巽故曰上下進退无常无恒合訂曰无常无恒謂上下進退随乎時而無期必之意期於必上是干進也邪也期於必退是離羣也離羣隠遯避世也又曰欲及時三字詮躍字義冣切孩如鄭氏曰此立而能權之事也時者權之妙用也无常旡恒人所難測曰或曰在變化之神也非為邪非離羣與時屈伸君子之時中也若為邪若離羣則小人之無忌憚矣按無忌憚正與乾乾惕若相對盖不戒愼恐懼即無忌憚非必放僻邪侈無所不為始為小人也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也形容民胞物與道理淋漓盡致一篇西銘正好作此註脚上九曰亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也亢爻以其居上之上故曰貴曰髙上本无位又陽居隂則非同聲同氣而尊嚴深隠萬物不得而利見之矣故曰无民處上之上而下无應故曰賢人在下位而无輔也以變卦夬論之其理亦同詳見第六節本義曰此第二節申象傳之意潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也龍原能飛而上騰之物初之巽伏則下而不可上二之離明正中有君徳而時位則止於田故曰時舍明非不足於飛也舍乃傳舍言非其正位蓋至五方位乎天徳也上治當照傳義不說開以避天下治也句為是上治上字正與初爻下字對雲峯胡氏謂初之下以人言看來各爻皆專以人事言也故與前後不同用九而加以乾元者元首也以乾之首出而天徳不為首則樞始於環中以應無窮而天下有不治者乎潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天徳亢龍有悔與時偕極乾元用九乃見天則林氏曰此節上下卦相應初四為始初潛藏四乃革矣革潛為躍也二五為中二文明五乃天徳矣言徳稱其位也三上為終三與時偕行上偕極矣本義曰此第四節又申前意乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻𤼵揮旁通情也時乘六龍以御天也雲行雨施天下平也說統曰天道之運只是一氣乾元者天陽一元之氣亦如人之有元氣也萬物皆資一元之氣以為生生之始而其生生者雖析之有元亨利貞然總之一片生意而畧分其始終而已故曰天地之大徳曰生而元之所以統天也胡氏曰前言性命此言性情言性而不言命非知性之本言性而不言情非知性之用也都門抄本曰非利貞時始各正亦非利貞時始見性情如云元亨時尚未各正則資始流形即應混成一片如云雖各而未正則又東虧西欠資始流形從何處挪移補凑得來夫命見於性性見於情情見于生生見于元亨始亨即其性情至利貞時節摧殘滅沒似無復始亨之性情矣不知槁其外不槁其中剝其形不剝其神其生機隠隠躍躍始亨之性情猶不能已而後知始固乾始亨亦乾始利貞亦莫非乾始真統天者矣故曰大矣哉按此所贊大大其所利也程傳解不言所利謂為旡所不利非可指名此方與下大哉乾乎不混乃朱子則謂不言所利為貞諸家遵之似與傳相左然旡所不利即各正其性命亦非止言利而旡貞字在内喬氏以剛健中正分屬元亨利貞安溪李氏用之此義實出于本義故下曰純粹者剛健中正之至極精者又純粹之至極二語確甚勝程傳六徳之說叅說統孫氏鄭氏程氏諸論曰此條只是就他氣機運動而為元亨利貞處細細想像許多妙處出來一氣之通復是剛一氣之通復無間息是健一氣流行恰當而不遇是中一氣分派職司而不侵是正而此一氣之剛健中正者畧無混雜是純畧無疵纇是粹而此純粹之極微極妙不可名状處是精贊乾元而總歸之一精真所謂上天之載旡聲旡臭之至者也夫曰精則不容名言矣惟聖人以乾卦六爻𤼵揮之而全乾之精藴旁通而無餘精即情也微言之則曰精顯言之則曰情情之所向即是時聖人默㑹其變化之妙時乘六龍以御天之道一氣舒卷萬化歸元雲行雨施天下自平此聖人體元之極功也本義曰此第五節復申首章之意君子以成徳為行日可見之行也潛之為言也隠而未見行而未成是以君子弗用也此節初爻與上爻據諸先儒之論義皆太淺于亢之悔竟說成崇高富貴挾勢凌人如後世驕泰之君跋扈之臣而於此爻則但說個無道則隠而已竊意乾之六爻皆取象於龍龍也者能大能小能上能下出沒變化不可測識之物當其飛騰而上也則興雲致雨而澤及萬物然飛不止則亢而非潛則亦不能飛繋辭大傳曰尺蠖之屈以求伸也龍蛇之蟄以存身也是必飛而後為龍徳之至亦必潛而乃為龍徳之成論語曰隠居以求其志是也其在於人惟孔子足以當之故曰天下有道丘不與易然則天下無道而不與易則易乎世矣非敢為佞而疾固如其怵于佞而徳必不可衰則又成乎名矣此特麟鳯之不至者也而曷以稱龍徳之隠此可以知君子之行事夫徳必兼善而後成君子固以成已而成物者為行也知其不可而猶為之是又無日而不可見之行也然則龍非不潛而實又未嘗潛如必於潛焉則隠而已矣未之能見也獨行而已矣徳之未成也此則果哉而旡難者所為豈龍徳而隠首乎君子法天者也是以於此有所不為焉文言蓋首疏明潛龍之義此則疏明勿用之義也學者苟執成見而疑於余說盍取前後两叚逐字逐句細細讀之君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君徳也九二龍徳在中前言其已成之徳此則言其徳之所以成者也廣平游氏曰乾之道不盡于九二故有學問之功坤之道盛於九二故不習旡不利安溪李氏曰聚則理得於心辨則理騐於事寛居以待其熟也仁行以固其守也四者亦有元亨利貞之序九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎以乾重乾三四在重卦之間故曰重剛雲峰胡氏曰九三九四當合看復之六四曰中行四居五隂之中也益之三四皆曰中行三與四居六爻之中也乾之三四亦居六爻之中而文言以不中稱之非但謂其不中也謂其重剛而不中爾蓋下乾之剛以二為中三則重剛而遇乎中上乾之剛以五為中四則重剛而不及乎中過則憂不及則疑用六刁氏曰因乾乾之時惕而為乾乾之心故雖危而无咎也安溪李氏曰惕者平日戒懼之心疑者臨事謹審之慮又曰三人之陽也為人之正位焦氏謂四立于頭上空虗之處也合訂曰三爻之不在天不在田實象四不在田亦實象至天人相接之間上下進退无常本人也而近于天謂之在人不可也近於天而未離乎人謂之在天不可也两在两不在此所謂或之也夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎此學聚問辨之極功聖作物覩之實事也安溪李氏曰四者亦元亨利貞之徳合徳仁也合明禮也合序義也合吉凶智也又曰先天弗違者氣數未至而念與天通後天奉時者風氣旣開而因時有作震川歸氏曰自聖人言之皆從其心之欲初非有所因襲故曰先天自天而言則皆其自然之理而聖人奉之也故曰後天語皆有味亢之為言也知進而不知退知存而不知亡知得而不知䘮其唯聖人乎知進退存亡而不失其正者其唯聖人乎附見龍何以亢亢何以仍稱曰龍動以天故也伊尹之放太甲周公之正百官處非其位貴有位乎撫非其氏髙有民乎上下交疑流言朋興下有輔乎于斯時也慮退於進慮亡於存慮䘮于得餒已如褰裳而去之將能亢乎惟二聖與時偕極必用其極内無顧慮而外無所於避讓也然後能營遷于桐抗世子法于伯禽自非聖人全體一天而誰與領此周公告召公曰收罔朂不及是其悔也令非龍而亢凶咎叢之矣悔云乎哉又曰知進不知退三語是但有進而旡退所以謂之亢處亢時行亢事不如是便不謂之正如伊周桐宫負扆之時若有知退一念天下事不可為矣唯聖人極深硏幾精義入神見得處亢至正之道當如此所謂旁行不流是也非成變化而行鬼神何足語此故再曰其唯聖人乎以深贊嘆之易之為書専示人變易從道避凶趨吉也孔子着一知字特開人以學易之門也子鍾崔氏曰亢龍與時偕極聖人之不得已也何以悔曰聖人居易俟命甚無樂乎處極重之勢也凡言亢者必極重而難反是以悔悔亦聖人之情乎曰聖人未嘗逺於人情也情有喜怒哀樂聖人必不擇樂而避哀事有吉凶悔吝聖人必不擇吉而避悔說統曰龍有亢乎六位時乘亢亦龍之一位也位在則道在若慮亢之有悔而先處于不亢之地此智士之所為耳豈曰龍徳又曰聖人所為不失其正者當進存時只據理所當為時所得為分所應為的事猛力向前未甞先留一着以為退歩及時至事已把經天緯地的事業一擔收拾無一毫留戀無一毫感慨如四時之序成功者退一般此之謂進退存亡不失其正又白雲許氏曰堯老舜攝舜亦以命禹伊尹復政厥辟周公復子明辟君臣之間皆有是道合觀諸說則亢非驕亢之亢悔非悔過遷善之悔可知矣竊謂過而有咎之謂悔不及而有咎之謂吝亢龍之悔不但伊周也即湯武之慙徳夷齊之餓死小弁之怨屈原之沉凡孝子忠臣一意過當旣至此際則不得不出於此皆亢龍之有悔者也故曰與時偕極又曰知進而不知退知存而不知亡知得而不知䘮若如常說則六龍皆曰時乘是六爻各有其時時各有其義時非聖人不能也豈有九二之與時偕行為乾乾之君子者而上九之與時偕極乃為庸惡陋劣之鄙夫哉且進退存亡得䘮相因此必然之理即留侯二疏子陵君平軰皆知之不必聖人也而何以一再推重而極贊之至此若象傳盈不可乆自謂上九爻位已盈盈則難乆即所謂窮之災蓋窮則必變此各卦上爻之通義非謂勢位已盈如所謂髙明之家鬼瞰其室也本義曰此第六節復申第二第三第四節之意按此數節言有盡而意無窮夫子之贊乾也至矣坤下坤上坤元亨利牝馬之貞君子有攸徃先迷後得主利西南得朋東北䘮朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物徳合旡疆含𢎞光大品物咸亨牝馬地類行地旡疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北䘮朋乃終有慶安貞之吉應地旡疆象曰地勢坤君子以厚徳載物卦辭歴來皆以利牝馬之貞作一句讀竊疑乾坤二純卦夫子以天地象之夫天地之大一也則此元亨利貞四字在此二卦必遵夫子作四徳方是未有天備四徳而地缺其一者也應於元絶句亨絶句利絶句牝馬之貞絶句乃元亨利三徳皆與乾同獨貞謂為牝馬之貞者以四時觀之元屬春亨屬夏利屬秋當此之時皆有陽在焉謂為坤順乾以為元以為亨以為利可也至于貞則屬冬建亥之月純隂无陽似乎坤獨有其貞也者故特下一牝馬字不讀夫子之大象所謂地勢坤乎又不讀夫子彖傳所謂牝馬地類行地旡疆乎夫乾之健以言其氣也氣則渾然者爾故其才其占止此元亨利貞四字圎滿具足此外再著不得一箇字若夫坤則有形跡可言矣其元其亨其利昭然在人耳目至貞之時則有形者化有跡者滅不可得而見也不得而見將其勢不已歇乎乃化者復育滅者復生然其所育所生謂即其所化所滅者不得也形則已易也其所育所生謂非即其所化所滅者亦不得也氣則猶傳也形已易則不得以形言氣猶傳而已賦於形又不得以氣言是故曰地勢坤也惟其曰地勢也故曰牝馬之貞蓋牝馬随牡以行牡之所至牝亦至之地之順天以左旋實相類焉夫天地之形如鳥之卵氣化所運未有轉其殻内之青而不轉其青内之黃者天之行旣健而不息而地處天之中其勢亦不得不行其行之勢亦不得不與天同其不息是非地之能行也有所以行乎地者所以行者旣健則所行者自旡疆矣然何以不言他物而必取義于馬且曰牝馬者葢乾為馬也馬之貞則惟乾為能貞矣而牝馬又順乎牡者也牝馬之貞則乾貞而坤亦貞矣是則坤順天以為元亨利者而亦順天以為貞並未嘗獨有其貞也然又不可曰牝馬之元亨利貞也故止言牝馬之貞而可以例矣夫夫子于乾曰行健曰不息今于坤亦曰行地曰旡疆不幾混而同之乎蓋乾不能以旡坤坤亦不能以旡乾也乾而旡坤則元亨利貞著於何所坤而旡乾則元亨利貞憑何主持然則乾坤一而二二而一者矣夫乾坤旣合為一而必分為二卦者蓋其徳雖同而其性則異故以才言則剛者乾而柔者坤以情言則動者乾而静者坤以定體言則天為乾而地為坤以人事言則父乾而母坤君乾而臣坤夫乾而妻坤以治言則堯舜乾而禹湯坤文王乾而武周坤也以學言則孔顔乾而曾孟坤周與大程乾而伊川朱子坤也得於性者異而徳之所成則同矣或必以牝馬之行地為言試問牝馬如何能行地无疆以无疆為東西南北之寥廓耶則陵谷川澤凡牝牡馬皆不能行也以无疆為終古如斯而牝馬生生不已為取其能歴乆耶則大地之上羽毛鱗介之物未有不生生不已者何以獨取乎牝馬此其說之必不可通者世之學人萬勿昏昏讀遇菽園雜記曰牝馬受胎後牡者近身則以蹄觸之易稱牝馬之貞者以此殆所謂從一而終乎故彖曰安貞吉也乾坤同有是元亨利貞之徳乃乾於四字之外旡餘辭坤則曰利牝馬之貞下又言利又言貞不勝其詞之繁者何也蓋元亨利牝馬之貞言坤之徳卦之體也以下占詞卦之用也先迷後得主執事也得朋䘮朋與人也安貞持已也且坤旡成而代有終得主則輔主以有為君之元亨即臣之元亨矣得朋䘮朋則朋輔主以有為朋之元亨亦已之元亨矣故不復言元亨而止再言利言貞也君子有攸徃先迷後得主利十一字為句合訂曰牡者牝之主也主未徃而臣先焉岐路茫茫欲徃何之失主而迷也主徃而臣後焉亦歩亦趨利有攸徃得主而利也主何以得後之斯得之矣後之者主之也身主之心即主之念兹在兹知有主而不知有他也又曰文圗西南㢲離坤兌隂方也東北乾坎艮震陽方也賢人隠於草野羅而致之使㧞茅連茹而征是得朋于西南也旣已同升于朝則君之臣也非我朋也是䘮朋於東北也說冣精當得未曾有安貞本義作安於貞似於永貞有礙合訂作順字解蓋此占辭已屬人事與上牝馬之貞亦不嫌複彖傳於元曰順承天於亨曰合无疆蓋因卦辭未眀出坤之元亨即乾之元亨故特指而言之至利貞則已言得主而利與牝馬之貞矣故不必再贅而但贊其柔順焉先儒蓋見彖傳牝馬四語遂以卦詞利牝馬之貞為一句果如是則何不曰利柔順貞而必曰柔順利貞乎竊以利貞二徳順而相似蓋一利即貞如四時一收歛即閉藏果木一成實即墜落人事一有宜不宜即成其所宜行而不成其所不宜行故易各卦于利貞二字恒相連傳三言旡疆初言天繼言地終言人事无疆即不息也大象於乾曰天行於坤曰地勢蓋天為氣而地有形乾坤者天地之徳也夫積氣為天而行夫氣者則乾成形為地而成其形之勢者則坤故健不曰天氣而曰天行坤不曰地形而曰地勢也初六復霜堅氷至象曰復霜堅氷隂始凝也馴致其道至堅氷也本義曰按魏志作初六復霜今當從之初變復遇震為足故曰復為雷之奮為大塗奮於大塗則有復霜堅氷之意本義曰馴順習也孔氏曰若鳥獸馴狎然言順其隂柔之道習而不已乃至堅氷也來註曰馴致其道似就隂順陽而言陽初入則復霜隂始凝而順陽于始陽乆入則堅氷隂堅凝以順陽於終附見乾言雲雨陽和之氣坤言氷霜嚴凝之氣霜而曰履實實要在踐復上承受這箇霜履得霜則由此而氷氷而堅吾之操履與之俱極其至矣隂徳妙于凝有凝結凝定二義不凝如何成得氷霜不凝如何喚做順如草木之實箇箇結得堅凝聚那全陽之氣在其中方是活種㑹𤼵生凝稍不堅便旡生意臣事君子事父妻事夫徹骨髓為忠為孝為節俱有那氷心在曰馴致不過凝之極也人生天地止為有那氷霜之履在故確乎不㧞不能履霜而能雲雨旡之矣按此似與程朱諸儒說異然玩夫子彖傳文言其贊坤也總只一箇順字夫所謂順者乃陽行而隂即随之以行故來註曰陽初入則復霜而順陽于始陽乆入則堅氷以順陽于終蓋此爻變復而復之反對為姤姤五月卦也用六刁氏曰一隂始生便有凝意以其由𤼵散而翕聚也此時隂氣在下催逼上陽氣來故天道越炎熱了然驗之井泉則已寒故雖堅氷之時甚逺而聖人已見微知著若云初凍則坤之十月矣豈待智者而知之哉據此說觀之則十月之時一陽始生漸逼隂氣上來隂氣若不順以退聼則必逆而與戰如何能結得霜與氷來惟其能凝因以知其能順惟其凝之堅因以知其順之至順者地道之光者也故此曰馴致其道而上爻曰其道窮坤之地道即如乾之天則若如常說則不過由履霜而漸致堅氷耳曷以云其道而馴致之哉六二直方大不習无不利象曰六二之動直以方也不習无不利地道光也二變師遇坎師大人吉故曰直方大六二中正中故直正故方雙峰胡氏曰地之生物也藏於中者畢逹於外而无所囬隠此可見其直其成物也洪纎髙下飛潛動植随物賦形而各有定分此可見其方若其大則地之無不持載固不待言而可見矣爾瞻葉氏曰六二之動方矣然由其存於内者直是以見于外者方也庸成陸氏曰直者順之極也稍不順即枉如其直以出之則方直方故大不習者大而化也化故光地道含萬物而化光子瞻蘇氏曰夫有習而利則利止於所習矣折中曰順天理之自然而無所增加造設於其間故曰不習无不利習者重習也乃增加造設之意不習无不利即所謂坤以簡能者是也若以不習為無藉於學則所謂敬以直内義以方外者豈無所用共心哉用六刁氏曰乾以美利利天下不言所利坤以美利利天下不習所利地道其著於此乎又曰初爻言道戒其馴上爻言道戒其竆二之道盡善故贊其光安溪李氏曰乾五為卦主故五獨言天徳坤二亦為卦主故二獨言地道按此數說皆極精確可味六三含章可貞或從王事无成有終象曰含章可貞以時𤼵也或從王事知光大也三變謙遇艮之篤實輝光章象艮止含象本氣三陽位而隂居之故曰含章也用六刁氏曰三不中正本非可貞也韜晦章美故可貞耳居上卦之下從王象居下卦之終无成有終象不居成功自含章來克終臣職自可貞來庸成陸氏曰无成有終非始雖無成而後必有終也無成即於有終處見之其不敢成者正其代君以終事而不為始也是即安于後得主利之貞者與按程傳惟其知之光大故能含晦淺暗之人有善惟恐人之不知豈能含章數語東萊吕氏極贊其有味知言哉安溪李氏曰言含章者非終不𤼵也乃以時而𤼵耳或從王事即其時𤼵者也雲峰胡氏曰陽主進隂主退乾九三陽居陽故曰乾乾其徳主乎進也坤六四隂居隂故曰括囊其位主乎退也乾九四陽居隂坤六三隂居陽故皆曰或進退未定之際也特其退也曰在淵曰含章唯進則皆曰或聖人不欲人之急於進也如此三多凶故聖人首于乾坤之第三爻其辭獨詳焉六四括囊无咎无譽象曰括囊无咎慎不害也四變豫遇震之懼故有括囊慎密之意矣鮮來氏曰坤為囊隂虗能受囊之象也括結囊口也四變而竒居下卦之上結囊之象也四近君多懼譽則有專美之嫌咎則有敗事之累惟晦藏其智无咎无譽則不害矣朱子曰凡得此爻在位者便當去未仕者便當隠廬陵胡氏謂為極有功于易蓋隠忍容悦乃小人全身竊位之智非括囊之義也按含章括囊皆以韜晦不露為義然含則有時而𤼵三以隂居陽静中有動也括則無時可出四以隂居隂静而无動也庸成陸氏曰陽宜在上故乾以初為無用之地隂宜在下故坤以四為無用之地曰潛曰括其乾坤之妙用所居無事而根柢是者與隆山李氏曰譽者咎之招也六四之所以无咎者以其无譽也按此故象止言无咎而不及无譽歟六五黄裳元吉象曰黄裳元吉文在中也五變比遇坎比三不寧方來以上下應故有黄裳元之象黄中色裳下飾坤土故黄圗書皆以土之五數居中也裳本下何以象五蓋五位尊而以六之卑居之所謂闇然之章不顯之文也元者坤之所以資生文言所謂暢于四支𤼵于事業皆根於此即本立而道生者也象傳文在中實疏明此三字之義即子服惠伯之告南蒯亦分三事先儒多以元吉二字合說謂如大吉大利之類殊誤又坤全體皆順徳而以黄裳分中順者亦非按程傳作聖人示戒並舉羿莽媧武之事隆山李氏謂坤六爻皆臣道而以臯䕫稷契為言縉雲馮氏又執百官總已以聼冡宰之義謂以人臣而行君事如伊周霍光所為焦氏又引周官注及詩綠衣黄裳之喻獨取象於后然朱子謂程說云此爻何曽有這義又云不遇是說在上之人能盡柔順之道黄中色裳是下體之服能似這箇則旡不吉云云蓋易只是箇象不必指定是說何人何事此為得之也上六龍戰于野其血𤣥黄象曰龍戰于野其道窮也上變剝遇艮本有陽而隂盛極為隂剝陽本无陽而變陽則為龍之來戰龍陽也於野上在卦外也爻至上而極又遇艮止故曰窮也其血𤣥黄義詳文言安溪李氏曰此即說卦所謂戰乎乾也說卦主乎乾之健而勝隂此則主乎隂之盛而抗陽然其為戰則一也蓋隂既盛則陽必有以勝之然後人退聽而天命行其在天者陽徳之剛不戰之戰也在聖人亦如之大賢以下則戰而後勝衆人則有不能勝者而隂道盛矣用六利永貞象曰用六永貞以大終也合訂云坤全變而為乾直以為乾不可也其體固坤也仍以為坤不可也已變乾也坤以貞為主貞而永斯為坤中之乾矣四徳首元而終貞乾知大始以元為主坤作成物以貞為主用九曰乾元用六亦可言坤貞乾元不息之謂永曰永貞是以乾之始為坤之終故曰以大終也又用六刁氏曰所云无首與不可為首者即中庸所謂既無虗假自无間斷諺所謂不須另起頭是也總要打合到健字上去所云永貞大終者即其在初而凛履霜之戒在二而有直方之利在三則守含章之貞在四則為括囊之慎在五則有黄裳之吉在上則无龍戰之傷所謂永貞而大其終者也蓋大終者即艮之上九以厚終也之意總要打合到厚字上去此說與諸儒別然大象已有厚字矣似非牽鑿應備錄以存一義文言曰坤至柔而動也剛至静而徳方後得主而有常含萬物而化光坤道其順乎承天而時行先儒多以元亨利貞四徳逐句分析而又言人人殊竊按此不遇仍是將卦辭與六二之爻詞再一咏嘆增出一箇時字來所謂贊易如乾之一再中之耳四徳於乾已詳坤惟順乾而已則乾之元亨利貞即坤之元亨利貞而又何必分配以釋之乎積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也附見坤道只一順要從頭順起故𤼵於初爻蓋臣子有大順有大不順皆積漸所成也一念㡬微之際若辨之早則亂萌何由生不知隠微處積之便是弑逆胚胎從微處辨就從微處順方是履霜實際故曰蓋言順也按此說似創而實確愚昔嘗論曹孟徳與武侯同一事㓜闇之主同一專宫府之權後主之材非能賢於獻帝也况君宜自取之遺命國人皆聞則蜀為武侯所有莫不謂然後主即甚騃無知而左右如黄皓軰豈不倖功害寵以啓君臣之釁乃中外帖然至武侯沒世而卒無異議此必其始終小心一切禀令後行雖孱君在上而天威咫尺如凜斧鉞其所以順之者在㡬微之際哉觀於澹泊寜静之言及出師两表而知之矣乃由其幾微之順積為大順至于鞠躬盡瘁而其子其孫亦皆世篤忠貞所謂積善之餘慶也若夫孟徳當其初起之時豈即有弑奪之心萌于念慮其告諸文武期於死後得書故將軍曹某之墓原非假語乃自許昌迎駕獻帝於流離播遷之日得安亨玉食錦衣已屬望外嗣後芟夷羣雄操皆親之蹈不測者數矣而天子晏然其感慕傾心宜何如者顧乃猜疑嫌忌與近臣一再圗之不己非操矜己功能飛揚䟦扈輕主以凌其上積漸至於不可耐斷不至此其所為不順者亦止在此㡬微之際耳觀于奉迎之時原為挟令之謀而臣主之誼實無有也乃由其幾微之不順積為大不順至于篡逆而其子孫亦為司馬氏滅無遺種所謂積不善之餘殃也使操能於此㡬微之際早辨之亦即于此㡬微之際早順之則伊周之烈何以加焉蓋天地隂陽各有得失不必陽皆為善而隂皆為惡乃陽主舒隂主歛乾主健坤主順斂則必凝也順則其道也此順之一念能結於中由是而造次顚沛皆必于是所謂至死不變之貞矣如始而不能固結則放辟邪侈無所不為所以終身之操視其初履而辨之不可不早也然則文言與象傳前後固皆一㫖而順即是坤順不必又易以慎字如六四之所繋已直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也直方之義本義已云程傳備矣竊按乾言誠坤言敬義蓋乾畫竒故一誠字盡之坤畫偶故有敬義二義先儒多以顔子配乾仲弓配坤蓋克己復禮即閑邪存誠也敬恕即敬義也按潛室陳氏說義是把吾心做箇應事應物的尺寸區處停當是為義以方外敬即正中之警惕義即敬中之條理此方外之義非恕而何愚讀原本大學以為知止即獨中之惺惺易所謂敬以直内也慮即絜矩以格物易所謂義以方外也今觀陳氏以敬為正中之警惕義即敬中之條理又朱子云敬以直内是持守工夫義以方外是講學工夫格物正朱子所謂講學者然則愚論非謬矣敬承程氏曰人只一心被許多人欲牽扯便覺立脚不住内直則旁引不得外方則移動不得不能引與不能移合更無東西走作去處是之謂立此說立字甚精徳不孤者朱子固云敬而無義則做事出來必錯了只義而无敬則无本何以為義皆是孤也徳不孤即解大字是也又按人之所行而有所疑則必更而之他折中之所謂重習也今不必重習而所行无有不宜則又何所疑乎不疑其所行所行謂乾彖傳固云行地无疆也此坤之順以承天而時行也歟隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也易齋吳氏曰弗敢二字著力弗敢則為含章敢則為龍戰矣程子曰天地日月一般月之光乃日之光也地中生物者皆天氣也惟无成而代有終者地之道也拙侯谷氏曰爻言有終此言代有終則并其終亦非坤之所敢有也天地變化草木蕃天地閉賢人隠易曰括囊无咎无譽蓋言謹也君啓陸氏曰天地變化而獨言草木蕃者草木得氣之先蓋無情者先通其應也天地閉而獨言賢人隠者賢人見㡬明決蓋有識者預覩其微也賢人難進而易退惟其難進故當其治也草木既蕃而未出惟其易退故當其亂也草木未凋而先隠君子黄中通理正位居體美在其中而暢于四支𤼵于事業美之至也中非執一而明通公溥無所拘也通亦非圎融而脉絡分眀無所混也正其位所以立天下之大本居其體所以行天下之逹道以黄中者正位則美在其中矣以通理者居體則暢于四支𤼵于事業矣如此盛徳大業以為美美其至矣哉故曰至哉坤元也蓋以黄中正位美在其中申釋爻辭一箇黄字以通理居體暢於四支𤼵於事業申釋爻詞一箇裳字美之至申釋爻詞元吉二字諸說分析未明而說統又渾為一意皆非也合訂曰體如人身之四體元首尊而股肱卑也按此正裳字之意下文所謂四支即四體人有四端如有四體事業實𤼵於此按先儒謂六五當與六二並看二就工夫處說五就成就處說蓋直内方外之君子即黄中通理之君子敬以直内即所以為黄中義以方外即所以為通理二之直内方外是内外夾持两致其力到五之黄中通理則内外通貫旡所容其力矣隂疑于陽必戰為其嫌于旡陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄疑字諸家皆作疑似謂隂盛極與陽鈞敵而无小大之差然寒暑晝夜男女雌雄實不相類何以隂盛極而即似乎陽也如謂其鈞體相敵則此六隂之時未見又有一六陽者來與為敵也至未離其類皆謂陽尚未離隂之類此亦難解合訂又謂類字即彖詞乃與類行之類以上六統五隂而居其上是知有類而不知有君以血為殺傷此亦疑於諸說之以血為隂謂與下文不相屬耳然義俱未安竊按疑字正從六二之不疑所行來蓋坤順之徳全在以隂麗陽故初曰凝曰馴三曰含章五曰黄裳皆順乎乾而无所用其疑矣至二四六則皆以隂居隂隂則闇闇則多疑四則懼而不敢疑也二之得中有為積之厚流之光不疑故不習而无不利也惟至上六而順之道窮以六隂具足之時似无一陽而陽至反疑於是乎有戰蓋此爻實變剝者也然嫌于无陽而已非實无陽也當夫六隂升于上而乾之六陽即起于下若陽迫隂以岀者是其戰也陽主之故曰龍戰所謂天有權而人將退聽也乃人欲無窮朋從之擾類難自克不惟私中有私而公中又有私焉龍雖戰而未能即勝乎私是欲離其類而猶未能離也則為天人交戰故天理存而未存人欲去而未去所謂两傷而稱之為血然雖為血而天自𤣥地自黄理欲雖雜出而實有不可雜者存則人終不能以勝天也是以疾風暴雨不終朝旱乾水溢所間有順者常而不順者其變也安溪李氏曰夫子之意以為隂不宜稱龍陽不宜稱血故言龍戰尊陽之辭也曰血責陽之義也曰𤣥黄又存陽之意也夫子所以贊易者即其所以作春秋之微指歟乾坤總論天地孤陽不生獨隂不長乾之六畫皆陽陽幾于孤矣坤之六畫皆隂隂又似於獨矣而聖人皆繫以元亨利貞之四徳夫子一則謂其資始一則謂其資生且陽大而隂小陽正而隂邪者也以陽居隂則處失其地以隂居陽則據非其位乃乾於九二謂有大人之徳坤於六五謂有元吉之象此其故何哉葢甞論之天地雖分其實一氣而已即其輕清上升之天而指為陽然未嘗無隂也即其重濁下凝之地而指為隂然未嘗无陽也聖人有見於一嵗之内十二月之間其為隂為陽者各自初以至於六於是畫六竒以為乾畫六偶以為坤而此一嵗之内十二月之間其為六陽者實皆挾隂以俱行其為六隂者亦各附陽以迭運分之而又无可分也於是于六畫之竒不名之為陽而名之曰乾以為名之為陽則將嫌於元隂也於六畫之偶不名之為隂而名之曰坤以為名之為隂則又將疑于无陽也惟夫六陽六隂交相錯處於天地之間而天之所以行則為春夏秋冬四時節令之互嬗地之所以順乎天亦有東西南北五方風土之相資聖人於是以為皆有元亨利貞之四徳焉使四者缺其一則天之行或幾乎息而何以能健為萬物之所資始地之勢將不勝夫載而何以承天為萬物之所資生然則乾也者天之所以行夫氣坤也者地之所以厚其勢者也而豈孤陽獨隂之足病乎哉乃若殽而為爻則有隂有陽之可名矣雖然六爻之陽亦乾健之陽而非他卦之陽爻可比也六爻之隂亦坤順之隂而非他卦之隂爻可比也是以乾之九二以元亨利貞四者之健徳而處下卦之中位位不稱其徳且以陽居隂隂臣也而變同人故龍見而但在田焉然以乾健之陽而處乎隂則外實而中虗中虗則望道未之見而徳日新矣外實則充積極其盛而業富有矣此其所以與九五皆稱為大人也坤之六五以元亨利貞四者之順徳而處上卦之中位徳不愧其位且以隂居陽陽君也又變比故為黄而稱元吉焉惟以坤順之隂而處乎陽則中不息而外无為中不息則悠逺舒長而徳可乆矣外无為則垂裳端拱而業可大矣此其所以視六二而為美之至也九四則次於九二而變小畜六三則次於六二而變謙是以均无憾詞焉至於九三之重剛與六四之重隂其不中一也然以乾健之陽處下之上而變履則能惕而无咎矣以坤順之隂處上之下而變豫則能慎而不害矣若夫乾之初以陽居陽也則愛而惜之坤之初以隂居陽也則勉而望之至两上爻乾以陽居隂而以為亢坤以隂居隂而以為戰者蓋陽雖潛于下而為乾健之陽處又得地勢將奮迅欲出不終潛也第初陽甚㣲出非其時則未免失身而變姤故聖人戒其勿用焉若夫坤之初六隂麗於陽而所處又極下豈非順之至者而變復故以為有履霜堅氷至之象焉乃乾之健健而至于極上位尊而不可攀志髙而不能下且内柔而外剛又變夬能勿亢乎坤之順順而至于極上順已至而旡可復加勢已盛而有可自擅且内外皆昏而多疑又變剝能勿戰乎故夫子於两上爻皆謂之窮竆者極也乾健之所以必亢也物極則反者也坤順之所以不終也蓋必合全卦之徳再求之本爻之變而後知其說皆出于自然而不可易矣夫本卦者性也變爻者情也原性以審情亦即情以驗性此聖人說易之㫖也折中曰乾言誠實心以體物是乾之徳也坤言敬虗心以順理是坤之徳也而要之未有誠而不敬未有敬而不誠者乾坤一徳也誠敬一心也聖人所以分言之者盖乾陽主實坤隂主虗人心之徳必兼體焉非實則不能虗天理為主然後人欲退聽也非虗則不能實人欲屏息然後天理流行也自其實者言之則曰誠自其虗者言之則曰敬是皆一心之徳而非两人之事但在聖人則純乎誠矣其敬也自然之敬也其次則主敬以至於誠故程子曰誠則无不敬未能誠則必敬而後誠而以乾坤分為聖賢之學者此也附見乾六爻皆取龍為象坤之取象曰履霜曰直方曰含章曰括囊曰黄裳曰龍戰不一而足陽純而隂雜也易翼述信卷二
