body:
  text: 易翼述信卷六廬州府同知王又樸撰艮下兌上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣合訂云柔往居上剛來居四乾以一畫予坤坤以一畫予乾乾坤交至于三索交感之至矣卦象兌為澤艮為山山澤通氣隂陽感應以相與也卦徳艮止兌悅以止為恱也恱感也止則无心矣安溪李氏云感道利在于貞如取女然則吉取女者以禮合以情與以義終焉者也又咸貞之道取女如是則吉竊以此卦當與同人卦叅看同人言忠恕此則言一貫也傳釋卦詞雖有三義然皆所以言一盖二氣之感應以其一也男之下女惟其一也一故止寂然不動者也恱則貫感而遂通者也天地感而萬物化生所謂天得一以清地得一以寧也聖人感人心而天下和平所謂侯王得一以為天下貞也繫詞大傳曰天下之動貞夫一故四爻為卦主而但曰貞吉也又雜卦傳曰咸速也而感以無心則不疾而速矣象曰山下有澤咸君子以虛受人合訂曰廓然大公虚也物來順應受也盖惟虛斯靈惟靈斯應此即止而說此即一貫也初六咸其拇象曰咸其拇志在外也初變革遇離火炎上故曰志在外盖初之所感甚淺又與上皆无位故无可感而不言吉凶六二咸其腓凶居吉象曰雖凶居吉順不害也二變大過曰棟橈故凶然本氣為艮又有中正之徳故曰居吉又遇巽之小心傳故曰順不害也九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也三變萃在上之下故曰股遇坤順又本氣與四五皆陽爻也三宜應上乃不應上而隨四五故曰執其隨三四五成乾卦健行故曰往止而悅則吉往故吝也九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也四變蹇其卦詞曰貞吉者也故此亦云又兌悅遇坎險故曰憧憧蹇利西南西南則得朋故曰朋從四當心位故曰思夫思心之官也而繫詞大傳曰天下何思何慮豈竟置思于無用哉盖知止則定靜安而後能慮四乘下卦之止而為兌悅之始悅諸心則研諸慮所謂一致而百慮者此已惟同歸故殊塗惟一致故百慮先儒所謂有一方可貫也又云无忠作恕不出則同歸二句斷不可倒說朋從爾思說者皆謂為同類之人從爾思言其思之狹竊謂天下之人皆同此一心天下之心皆同此一理周子曰一實萬分張子曰萬物本一一能合異也故夫子則一貫而一間未達之顔子亦聞一知十若必逐事逐物以思憧憧然于往來之間則爾既思其報以為施人亦思其施以為報所謂感應者皆屬有形之私亦狹而可量矣此霸者之小補其民所以驩虞如者也以其小補故未光大惟貞夫一則應萬物而無心老安友信少懷君子所以篤恭而天下平也堯舜事業巍巍蕩蕩光大之風此可想見繫詞大傳所云精義入神以致用利用安身以崇徳者正言致一之學過此以往則言一已致矣九五咸其脢无悔象曰咸其脢志末也五變小過遇震雷起于下而上聞故不應二而比上為咸其脢也五自是二之應又中正當位此宜為正感而何以曰咸其脢盖應二即為有心之感而非咸矣惟本氣為咸而變氣為小過故不下應而反比上有脢象焉雖感于無心而去艮止為逺故但无悔而不可為貞吉悔亡也上六咸其輔頰舌象曰咸其輔頰舌滕口說也上為兌主兌為口舌又變之遯兌遇乾乾亦為言遁詞知其所窮上窮位也故曰咸其輔頰舌傳曰滕口說則亦不能有所感應矣巽下震上恒亨无咎利貞利有攸往彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久於其道也天地之道恒久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣安溪李氏曰剛上柔下分之定也二體皆長則定位而有常盖咸語其情故二少之交專而不貳恒言其理故二長之分定而不移也又八卦之情變化無常者莫如雷風然其相與之理終古不變觀其至無常者然後至常者可見也卦徳巽而動凡躁動則無常若沉潛謹審而動有常可知矣天地寒暑之化所以為有常者潛移黙運故也又曰凡事未有可久而不可通者是恒有亨義也又積久則必通卒然之通與卒然而通雖通或有咎也恒之亨亨且旡咎矣其占又利于守正而利有攸往盖守正貴於能恒又守正然後可以謂之恒也恒故利有所往又能守能行然後可以為恒也合訂曰恒必以貞而貞无一定事終則變變則復始有終有始者无始无終也日月之往來四時之代謝聖人之化成天下皆此道也竊按李氏謂變化無常莫如雷風觀其至無常然後至常者可見此則終則有始之義時中也惟時中而後可恒聖人之取象精矣象曰雷風恒君子以立不易方合訂曰立與咸象虛對无著之謂虛有據之謂立虛則人任來立則我不往惟不迎故不拒咸恒原無二道也竊按此說立字並以易講不易精甚初六浚恒貞凶无攸利象曰浚恒之凶始求深也初變大壯以巽之入遇乾之健故為浚恒合訂曰浚恒者欲以躐等之功致恒久之效也安溪李氏曰卦論巽體則沉潛漸漬之義所以為善以柔居初為巽主是始事而欲深入非其序矣盖持久堅重者惟剛徳能之柔則不能故也九二悔亡象曰九二悔亡能久中也二變小過遇艮傳云能久句中句九二不當位宜有悔然所以能久者以其能以中徳隨時制宜而不執乎一故悔可亡也小過過與時行正以不當位為過而與時行即中之謂也盖巽行權其變艮亦萬物之所以成終而成始與彖詞終則有始意同九三不恒其徳或承之羞貞吝象曰不恒其徳无所容也三變解恒而解則不恒矣且以巽入遇坎之險詐故為無恒之象安溪李氏曰卦惟二五中也可常之位也未至則有不可常而常之象過則有反乎常而不常之象三過二中不恒其徳也行無常度則已不安事無常法則物不順或承之羞不知其所自來也以此為貞能勿吝乎合訂曰羞自人承吝由已生也竊按中則久於其道終而有始者也所謂權也不權即非中故中字離不得一時字九四田无禽象曰久非其位安得禽也四變升本氣既恒而剛不中正變氣又遇坤之安貞傳所云久非其位也震動而坤為地為衆田象為迷從禽象為吝嗇无禽象合訂曰四與初應初求深矣招之不來猶姤四之包无魚也六五恒其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也五變大過大者過也故有婦人吉夫子凶象五雖得中然六隂柔又以震動遇兌說是以順為正者也合訂曰二與五皆中二中而無悔五中而為夫子凶者柔中非剛中也義者宜也因事制宜即彖傳所謂終則有始也以義制事權衡在我從義不從人夫子之道也上六振恒凶象曰振恒在上大旡功也上變鼎遇離有電之雷為霆故曰振恒合訂曰聖人繫爻俱從本卦起義咸六爻皆咸恒六爻皆恒通易皆然而恒更多一轉折盖卦詞原有恒久不已利有攸往兩義初三五爻貞字與往字對往則變通貞則執一也二傳曰能久中四傳曰久非其位上傳曰在上因爻辭不言貞故特補足其義震之終為振恒震者振也振動不恒也在恒之上是恒於振恒也竊按傳言大無功者大指九三易凡言大皆謂九言小皆謂六通例也三本應上以上過于振動則自用而三之剛不能有所助矣師之三爻傳亦云大无功盖謂九二比而不比也艮下乾上遯亨小利貞彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉先儒皆將遯字解成隱遯非也合訂謂為以遯致亨又據大象以為非隱退之義然則當作退遜解矣安溪李氏曰當遯之時遯而後亨不遯則身與道俱困矣小利貞者言當此之時固當不失其貞然非可直躬以行其志論語所謂危行言孫此大象所謂不惡而嚴皆小利貞之義也合訂曰此卦舊解多誤悲天憫人者聖賢不忍斯民之心當滔滔天下皆是之時猶轍環不息况二隂浸長四陽在位豈君子不可為之時乎遯謂隱忍遜避婉轉以求有濟非引身而退也按此二說皆不以小利貞指二隂也又說統曰遯與剝不同遯者造化之所以妙其機君子之所以藏其用也藏其用則不窮於用矣故亨陽為發舒為大隂為收歛為小當遯之時與時而行其貞在小又曰遯者隱藏不露形跡之意又了凡袁氏曰亨義全在行處見之時為當遯之時於當遯之時而遯易能也於當遯之時而行未易能也此諸說皆與上同義然實皆本於程傳而朱子不謂然者以為若如程傳所言則與剛當位而應與時行也之下當云止而健隂進而長故小利貞今但言小利貞浸而長也而不言隂進而長則小指隂小之小可知况當遯去之時事勢已有不容正之者程說雖善而有不通矣或問按易中小字未有以為小人者如小利有攸往與小利貞之類皆大小之小耳未知此義如何朱子曰經文固旡此例然以彖傳推之則是指小人而言今當且依經而存傳耳據此是朱子不信程傳而以夫子之彖為斷也然其解曰小人則利於守正不可以浸長之故而遂侵廹於陽也夫小人之不利於君子之進而必求所以去之也如水火之相忌此雖喻之於理道怵之以禍福而猶有不能得者乃僅僅戒之曰爾輩之勢雖漸盛然不可侵廹乎君子也聖人於此不亦迂而旡當乎且夫利者所以和義貞者所以幹事小人之浸長者能之乎即如朱子以正解貞字夫小人而能正耶能正矣而尚為小人耶且謂與否之初二兩爻相類夫否初爻謂大人以其彚貞而吉未嘗謂小人能變為君子二爻謂大人能以否亨未嘗謂小人能包容乎君子但因誤解否卦遂并此而亦誤解也然則浸而長當如何易酌曰浸而長故小利貞以人卜君子也若羣隂暴長則天下事不可為矣惟積漸而來故尚可隄防而挽囘之就中搏捖微權斡旋妙用莫可名言故極贊其大曰時曰義言因時制宜不得拘拘一轍也又曰臨遯之對大壯遯之反皆曰利貞遯加小字其非為小人謀也明矣又三陽進而為否則曰不利君子貞二隂未至於否則小小利貞以此互推其義自明盖伊川之說本註疏不可易也此說甚透但說小字仍拘於纎微之意竊按彖剛當位而應當位者九五應者六二也玩一而字則二柔之為功亦不下於九五矣再觀二爻詞義傳謂之固志其為柔之利貞又何疑乎易酌又曰朱子以知時而遯為與時行恐與剛當位而應句不侔傳曰遯者隂之始長君子知微故當深戒而聖人之意未便遽已也故有與時行小利貞之教聖賢之於天下雖知道之將廢豈肯坐視其亂而不救必區區致力於未極之間强此之衰艱彼之進圖其暫安苟得為之孔孟之所屑為也此理甚好朱子已引入近思錄至於解經獨不用何也又其說彖之末句曰本義但云處之為難孔子不云乎果哉末之難矣如何見得時義之大且上戒小人之長而下句忽贊君子之遯於文義恐亦未協竊按上乾下艮内止而外健健即行止而又以健行與時行也此毋意毋必者夫子已以與時行概止而健之義矣又何必再言至於隂進而長夫子惟於臨即曰剛浸而長而於此未聞曰隂進而長即其釋小利貞亦止曰浸而長而去夫柔字者不與隂以長也盖二隂浸長故處以坤柔利貞之徳乃亨二以隂柔應九五得中之剛所以有利貞而亨之徳也當善會彖意仲誠張氏曰亨利之在遯與人情相反人情以遯之時為塞而孰知其亨也人情以遯之事為不利而孰知其利也則遯之時有義存焉其義豈不大哉說頗佳象曰天下有山遯君子以逺小人不惡而嚴安溪李氏謂天下有山拔出於地之上而勢與天近亦違世特立之象此但疏嚴字義而與不惡無關且亦多添出一地字來不如本義為妥盖謂天盖高而卑而下之亦惟山則君子之遯非如天之不可階而升也然其巗巗氣象亦令人望而不可犯矣所謂逺小人不惡而嚴如此仲誠張氏曰天者氣也地以上皆天山勢髙起則天氣退避然亦逺之而已聲色不形也君子於此得待小人之道有好為力爭以氣節為嚴者以為非此不足扶綱常則天亦與山角矣此說亦新奇可喜初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也初變同人遇離欲同於人而附麗其羣有尾象尾者諺云尾其後是也君子見幾而作不俟終日既已後矣而猶往昧孰甚焉往則有災不往何災乎往者應四也勿往者初也此本氣止而變氣明故有然也易酌曰處亂世者或去或不去歸潔其身而已往既有厲則亦何必以逺去鳴髙勿往非甘心亂世也朱子晦處靜俟四字極好六二執之用黄牛之革莫之勝說象曰執用黄牛固志也二變姤遇巽卦全體又為大巽巽為繩直為進退本氣又應五是一氣也有固執之意居中黄象以柔居柔順之至也牛象巽為寡髪革象莫之勝說者易酌曰即遐不謂矣不啻若自其口出之意輔嗣王氏曰居内處中為遯之主物皆遯已何以固之惟有中和厚順之道可以固而安之也弱侯焦氏曰剝卦隂剝陽也而取宫人之寵以順上遯卦隂驅陽矣而取黄牛之畢以留賢玩此二說是不惟不遯且欲留遯者矣詩云縶之維之以永今朝又云毋金玉爾音而有遐心然則君子不屑去而委曲以保全善類其苦心為何如者哉是以夫子贊遯之時義大也安溪李氏引箕子之言我不顧行遯正是此意竊按後世如李東陽之不與劉謝同去而善類多賴以安亦然九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也三變否遇坤本氣合二四互巽變氣合四五亦互巽係象否疾象艮為閽寺坤有臣道妻道故曰臣妾易酌曰三陽下比二隂繫戀之而不能脫跡逺去腹心之患也善良之憂也故曰厲然豈付之无可奈何已乎若以臣妾之道畜之猶可獲吉而免於疾厲也安溪李氏曰不可大事即小利貞之意此從程朱之說易酌則曰憊者一陽為二隂所困也不可大事只可畜以臣妾不可任以大事也厚其祿賜終不假之事權則小人無所肆其毒而君子獲安矣此又一意又曰初不必遯二不可遯三不能遯聖人皆以小利貞之道望之九四好遯君子吉小人否象曰君子好遯小人否也四變漸乾遇巽乾以健斷巽以行權故曰好遯好遯程朱皆謂有所好而能遯指應初也安溪李氏則曰好者不惡之義與合訂同合訂之說曰九以陽居隂剛柔兼濟不惡而嚴者也好與惡反不惡故好也君子如此則吉非褊急小人所能為也否字承好遯不承吉字故曰君子好遯小人否也此小人謂硜硜之小人九五嘉遯貞吉象曰嘉遯貞吉以正志也五變旅遇離離為雉鳥孔子歎其時者也故有嘉遯義合訂曰遯以逺小人為義故自四至上一爻勝一爻九五彖辭所謂剛當位而應者也嘉者㑹合衆美之謂九五居尊衆陽夾輔二隂亦洗心滌慮以應之人君能任用賢臣則不動聲色而不仁者逺如姤五之含章隂邪自化是能以其正正天下之不正也此貞之所以吉遯之所以嘉也象傳曰嘉遯貞吉以正志也萬化皆本於君心君心正則旡不正矣遯六月卦於時為夏於徳為亨亨斯大矣卦言小利貞二隂之貞九五貞之也此說精甚上九肥遯无不利象曰肥遯无不利无所疑也上變咸咸相感以無心乾健遇兌說斷而說於心故傳云旡所疑也易酌曰三陽不與隂繫則與隂應獨上居乾之終遯之極在卦外而去隂最逺者也故可以超然自得稱肥遯焉傳以肥為充大寛裕本義但加自得二字余謂肥者優游泮奐之意睟面盎背疾憊之反也安往而不利哉傳曰遯者窮困之時也善處則肥矣精甚安溪李氏曰遯之下體居内而未遂其遯者也故曰尾曰執曰繫及乎上體則在外之象遯之時也然四五在事之中有應於内則事猶有所難處而志未平上居外無應故坦然无所疑而无不利也竊按遯之為卦止而健又全體成大巽巽以行權徳之制也故利貞者不在剛而在柔而各爻皆有權宜之義而言貞者獨九五一爻而已權非聖人不能而嘉遯者視天下如一人又所謂聖而不可知之謂神也乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣程傳以陽長過中為大壯竊按過中與大過何異不如本義四陽盛長之說為妥合訂曰乾剛不屈于物欲正也以乾剛之道動動以正也誰得而撓之雲峰胡氏曰心未易見故疑其詞曰復其見天地之心乎情則可見矣故直書之孟子養氣之論自此而出大者壯也即是其為氣也至大至剛大者正也即是以直養而無害竊按大壯非不亨也盖不可言亨也必利以和義則為集義以生必正固以幹事則為勿忘勿助至千萬人而往則不言亨而亨自見矣若如他卦言亨聖人恐人任血氣而不歸之于義理之大勇也象曰雷在天上大壯君子以非禮弗履大象正古人所云自勝之謂强也一履字即該視聽言動初九壯于趾征凶有孚象曰壯于趾其孚窮也初變恒遇巽方初而即有久于壯之意則是以壯自任自信者矣故曰征凶有孚程朱傳義皆以有孚為征凶可必似有孚為虛詞合訂曰壯趾之凶以凶為壯也其凶也其孚也荆軻易水歌曰壯士一去不復還彼以為還而後去非壯士也故樂為不還而甘心焉此暴虎馮河之勇亦匹夫匹婦之諒其窮也非壯之故孚之故也卦言大壯而爻義皆貴用柔故陽居隂位吉陽居陽位凶九二貞吉象曰九二貞吉以中也二變豐遇離居中壯而且明是當壯而壯者也故曰貞吉安溪李氏曰二與四皆以剛居柔不過於剛故貞吉之詞同盖以剛居柔非正也然乃處剛之宜則正道在是矣四曰悔亡此爻直曰貞吉者中以行正故也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也三變歸妹遇兌互四五亦為兌羊象陽盛則將决五與上之隂乃四隔之藩象乾陽正壯又以震而動觸藩象三處下卦之窮又以陽居陽太過則撓兌又為毁折羸角象本氣健則為血氣之勇是小人用壯也變氣說則為利物之和是君子用罔也合訂曰不曰罔用而曰用罔嫌於不用剛而或用柔君子順理而行剛柔俱无所用也若小人以剛處壯敢作敢為事未嘗不是詮貞字而激昂太過滅裂鹵莽所傷實多此由涵養未到氣質用事猶夬三之壯于頄也按此說甚細然則小人謂好剛好勇而不好學一種人非僉壬之小人也九四貞吉悔亡藩决不羸壯于大輿之輹象曰藩决不羸尚往也四變泰遇坤小往則悔亡大来則貞吉四與下卦既皆陽變氣又為泰是不為五上二隂之藩而且决之矣又震動遇坤順决而不羸者也坤為大輿而係九四之變氣故曰壯于大輿之輹安溪李氏曰前遇隂而復乘乾故有藩决不羸壯于大輿之輹之象或曰泰之三則有戒詞壯至四陽極矣何以反無戒而决其往也曰凡卦諸爻皆相備為義泰前有㧞茅馮河之象矣故于三戒之此卦初三既以壯趾觸藩為凶厲二又貞固自守而已苟非有壯于進者乘時之義安在乎卦之為壯進其義也要在于貞而已按此說發揮傳云尚往之義甚透六五喪羊于易无悔象曰喪羊于易位不當也五變夬遇兌為羊羊者陽也卦以四陽盛長為大壯而五正當陽位乃六以柔居之變氣又為兌說是不自有其壯者也不自有其壯故无悔易作疆埸為是震為大塗兌為澤塗而依澤則為疆圽疆圽有水有草正牧羊之地牧羊而喪其羊養壯而不用其壯也若作容易字則文法似欠老成位不當安溪李氏以為所處不當用壯亦是雲峰胡氏曰觀四隂有剝陽之勢至四則曰觀國之光觀五也壯四陽有决隂之勢至四則曰大輿之輹載五也凡若是者尊君也喪羊于易又若人君自喪其剛而不與衆陽較然亦尊君也上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也上變大有遇離全卦為大兌上有角象與三應故遂承上爻亦言羊也卦名大壯陽壯則隂衰以陽能决隂故曰觸上六以隂居隂既非可易决者而又與四應變氣又為離麗故有不能退不能遂之象進退兩無所據則無攸利矣震為决躁以上之窮變離之明則明而昏矣故傳曰不詳然大者壯則大既有力離又為乾卦乾之惕若有艱象艱則必詳而致吉矣竊按咎不長者謂變也變則為火天大有天祐之吉矣安溪李氏曰凡妄行取困者皆不詳之故也既不詳審于先又不艱難于後豈獨無利咎必及之矣操心危慮患深不復蹈不詳之失是艱難之道也坤下離上晉康侯用錫馬蕃庶晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也離為日君象坤為地為衆有國之象日出地上為拔出儔類之中而為君也侯象夫一陽居於尊位比之所以為天子也一隂升於尊位晉之所以為康侯也康侯云者大明蒞衆能安人安百姓者也彖傳柔進而上行正發明所以為侯之意即此已明况又有山二三四互艮有川三四五互坎有土地下卦坤甲兵上離彤弓玈矢互坎有賦下坤有廟初二三四有衆坤五以柔徳主之又衆著其象乎又按離為乾卦乾為馬故曰錫馬坤衆故曰蕃庶明出地上故曰晝日凡卦皆三畫故曰三明與順際故曰接詩云何錫予之路車乘馬然則錫馬重賜也日三接厚誼也情文皆盛故曰晉也象曰明出地上晉君子以自昭明徳卦辭言侯之康國新民也大象則言自昭明徳見新民本於明徳無二事也初六晉如摧如貞吉罔孚裕无咎象曰晉如摧如獨行正也裕无咎未受命也初變噬嗑坤順遇震動有進象初宜潛而進故摧晉如摧如者將進未進君子之難於進也貞吉者坤順之安貞也合訂曰進退大節所關况初六在下進身之始尤不可茍士君子秉禮度義難進易退雖悲憫廹於懷而抱道守貞優游自得若將終身貞也即裕也惟貞乃能裕亦惟裕始可貞貞而不裕硜硜耳悻悻耳若孔子之待價孟于之綽綽其貞而裕之謂歟安溪李氏曰獨行則信者寡獨行正所以罔孚也未受命與臨未順命相似進退之際命雖塞而心亨則命不足為我制矣竊按噬嗑口中有物間之不得合故罔孚裕則以本氣坤順也六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也二變未濟坤順遇坎艱故晉如愁如而貞吉盖進而稍上則有天下之責矣於此未有以濟之能無憂人之憂乎二以中正之徳當晉之時六五雖非正應然同徳也中與中相孚五必為之援是以終受大福語云未濟終須濟是也二三五皆隂三為母而五又上之是王母也六三衆允悔亡象曰衆允之志上行也三變旅坤遇艮坤衆象艮篤實又為成言兌象是其進也衆皆信之是以悔亡合訂曰坤三爻皆順乎明者也三尤近離其上行在前而二初隨之三爻之志同也安溪李氏曰人臣之志未易遽達於上衆人信之則其志亦上達而信於君矣故曰弗信於友弗獲乎上此之謂也九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也四變剝離遇艮艮為鼠合三五互坎為盗鼠以晝伏不以晝進四當多懼之位而九之剛據之處非其地此無才而竊髙位者以承文明之主難矣守此而不知退危可知也六五悔亡失得勿恤往吉无不利象曰失得勿恤往有慶也五變否遇乾五為柔進上行離明之主卦之所謂康侯者也而爻多戒詞何也盖五尊位而以柔居之二又應之以柔宜有悔者以遇乾健則悔可亡矣故以本氣而言則隂柔多慮未免患得患失明於趨避而不足有為惟變乾之剛則大明在上健於所往而失得舉不足以係其心所謂休否者也則焉有不利者乎以其能休否是為天下之大慶而非一人之私喜已失得勿恤朱子曰如仁人正其誼不謀其利明其道不計其功相似意甚切當上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也上變豫豫之卦辭曰利建侯行師故曰伐邑安溪李氏曰進至於極晉角之象上九以剛居之是危地也然惟勤於自治其私則雖危而吉无咎盖功名盛則所務者逺而反蔽於近勢位極則所統者衆而多䁥於私於此不謹以至危身而隕名者多矣貞吝言若以進為常而不知戒懼修省則有吝也龜山楊氏曰非日中之時剛上窮而不足以照天下道未光也故維用伐邑而已若夫道足以照天下則無思不服矣尚何伐邑之有合訂曰晉卦與坤義同坤地道也臣道也離得坤之中畫為坤之嫡派離二爻曰黄離即坤五之黄中通理也坤卦泛言地道臣道坤遇離則大地陽春發生臣子功成寵錫時矣故卦以柔為主六爻四隂皆吉而四上二陽雖貞亦厲而吝也離下坤上明夷利艱貞彖曰明入地中明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之明入地中則為昏晦何以言夷也盖明者木然之體乃忽然而昏則必有傷之者矣故不言晦而言明夷也合訂以文王箕子為互文見意然夫子既已分屬必有定解竊按離日之體本明者也而為地所掩則其晦不過暫耳既而東出中升于天其明如故矣此以文王屬明夷也至利艱貞則艱難之中固守其正是以常晦其明矣此則箕子之所為也若夫革難而為武王所訪因得明其道于天下後世則箕子之所意不計及者矣明夷先儒多以傷人之明為言竊謂不必如是之拘即以凡人論人之徳未有不明者但為私欲所蔽則昏矣蔽即傷也象曰明入地中明夷君子以蒞衆用晦而明坤為衆故曰蒞衆用晦而明即無為而治也合訂曰黄老之清靜晦而不明也申韓之苛察明而不晦也不剛不柔敷政優優君子用晦而明之道歟初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也初變謙離為雉故曰于飛而遇艮止之故曰垂其翼君子于行言行義也不謀利不計功則不食而已故傳云義不食也離為大腹又中虛故曰不食三日者凡卦皆三爻故多言三離與乾卦先天後天圖内同宫故為主人成言乎艮故曰有言夫有攸往必有所主之人始有言則所不合者多矣六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也二變泰君子道長之時故能拯左股之夷本義合訂皆以左股為九二不如安溪李氏以左股為上卦于用拯較直截此爻所以重用夷字也離遇乾為馬不必以九三為馬也九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也三變復凡坤震之卦多言行師豫與復是也又本氣離為甲兵上坤為衆亦用師象震長子故曰大首又為決躁用師而值明夷之時故不可疾而必貞也傳曰大得大謂一陽之復以變氣言也南正陽方不可疾而貞者所謂七日乃復是也六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也四變豐自下卦而上故曰入坤為腹在上故曰左腹四心位故曰獲明夷之心震為足其徳為動卦自内而外又萬物出乎震故曰出門庭此爻先儒皆謂雖夷其身而能自得其心以去為解竊以入于左腹上無明夷字則不得如夷于左股例也而心曰明夷之心則亦不得謂心無所夷也况象傳所釋必舉其重若以去為自得其心則應云自獲其心出門庭也何以反舉入腹沒緊要字句且不獨曰心而又曰意耶合訂引時論云醫書謂心在左腹明夷之心紂之心也出門庭微子之去也盖入其腹而得其心舍而决去也此說頗通又本義云左腹者幽隱之處盖四為上坤卦之初畫是闇之始也方其始而于幽隱之中窺得其心知其意向日趨于闇矣則終不可啟之使明而夷人之明者且日益甚焉于是始舍而决去耳如此于爻詞傳俱覺吻合六五箕子之明夷利貞象曰箕子之貞明不可息也五變既濟坤順遇坎難内難而正志箕子之明夷也以彖傳已言故此但直陳之利貞則戒占者之詞傳言如箕子之明夷而明不可息夫遇難而息其明者如程傳所舉揚雄是已上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也上變賁賁無色也又坤遇艮止于隂而無色則終不明矣艮為萬物之所成終而所成始故有初登後入之象初登于天謂晉也後入于地謂晉之倒為本卦也觀傳意止言其初未嘗不明後失其則始昏耳盖甚惜之詞似未有初為傷人之明終至于自傷而墜厥命之說也離下巽上家人利女貞彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣家人一家之人也若但取二五兩爻為男女之正位即謂為家人則比同人屯蹇萃觀等卦皆是盖必合上下諸爻皆正其位為父父子子兄兄弟弟夫夫婦婦之象故為家人不必如本義指定何爻也上雖位不當然觀彖云卦之上爻外也若隂居上則非男位乎外之義故惟此卦為合又合訂云男有室女有家不曰室而曰家重在女也為卦上巽下離皆女象故曰利女貞盖最難正者惟女女貞則男之貞可知矣周子所云家人離必起于婦女是也卦詞言利女貞雖所重在女而所以宜其女貞者男也故大象責重在君子而爻詞惟二四兩爻言女之貞餘則皆言利女貞焉仲誠張氏以上下二畫家象中四畫人象五剛四柔三剛二柔隂陽相配有一男必有一女之象上下二畫皆剛剛則氣聚環聚其男女而為家矣故為家人意甚精惟上下二畫為家而以剛聚之故彖曰嚴而初上兩爻曰閑曰威也象曰風自火出家人君子以言有物而行有恒風自火出言天下邦國之風化興自家人也離火為女居中用事是以堯之試舜釐降二女以觀厥刑于焉盖夫婦日相狎而地至䙝語言最易誑誕而不實舉動最易變轉而無常故君子治家必言有物而行有恒也安溪李氏云言有物如火之發明而必有所麗行有恒如風之行漸而必有所入意甚切初九閑有家悔亡象曰閑有家志未變也初變漸漸女歸吉又離明遇艮止家人最患以情勝乃發乎情即止乎禮義故曰閑有家閑者閑之于始則其本立而漸進于正矣故悔可亡也語云教子嬰孩教婦初來即傳所云志未變之意合訂但就深宫固門說恐義未備六二无攸遂在中饋貞吉象曰六二之吉順以巽也二變小畜以小畜大正隂柔之有事者也婦人之事惟酒食是議而已如其不然而攸遂則婦貞厲而月幾望矣故必主本氣之順與巽而不可任變氣之健則貞吉也六二為離之主爻離畜牝牛為至順者上卦為巽故曰順以巽觀傳所云則知此爻之為卦主矣九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也三變益離遇震震之卦詞曰震來虩虩笑言啞啞故此亦云家人嗃嗃婦子嘻嘻盖宜家者惟九五一爻九三不中不正故過則嗃嗃不及則嘻嘻也然與其不及而吝毋寧過而厲以吉也故傳上則云未失下則云失節此當從本義為確夫治家無法者時而呵叱時而笑謔固兼有之觀傳兩釋其說可見按九三重剛故有嗃嗃象下比二柔故又有嘻嘻象夫嚴厲者多姑息於妻子故嗃嗃統言家人而嘻嘻則專言婦子也六四富家大吉象曰富家大吉順在位也四變同人同人親也又曰二人同心其利斷金故有富象凡爻以陽為富此之六四亦云富者巽遇乾也乾為金為玉本氣之巽亦為近利市三倍傳曰順在位順即坤之柔六居四為得位也安溪李氏曰四之位視二為高故在中饋者至此而富家矣或疑五為卦主不言大吉四言大吉何也曰男之功成于女猶天之功成于地此家人所為利女貞也故大吉之辭于四見之竊按六四隂爻何云大吉盖地道旡成此為助陽治家柔不得而有其吉也九五王假有家勿恤吉象曰王假有家交相愛也五變賁賁柔來文剛分剛上而文柔者也故詞言王假有家而傳以交相愛釋之五尊位故曰王假與格同言感格而化之也王假而有家則國之本在是天下之本在是何恤之有初以閑而有家五以假而有家然則任情放佚與夫無道以化之者雖有家實無家矣惟有家斯可以治天下故屬之王者也上九有孚威如終吉象曰威如之吉反身之謂也上變既濟本氣既以剛居柔變氣亦剛柔相濟無所偏勝者也故曰有孚威如盖有孚其威如也惟假故有孚家人之所以有孚正以君子之言有物而行有恒者格之故夫子曰反身而止承威如以釋之耳兌下離上睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉安溪李氏曰火上水下不交者也若澤則其浸潤滲入愈下愈深所以為睽也按此似睽為乖異視未濟更甚矣又曰家有長嫡則分定矣中少二女勢不相下則情不相親故其象亦為睽又按合訂云先儒以小事為用柔合之爻詞勿逐遇巷噬膚之義允合然不但爻詞也即彖傳已云柔進而上行得中而應乎剛是以小事吉則小字明明謂為柔事矣合訂所謂隨時隨分委曲婉轉以求有濟人不我撓事可有成安溪李氏以為屯之小貞吉大貞㐫泰之勿用師自邑告命等說是也竊按火動澤動盖動則成卦也安溪李氏說彖傳曰釋名而語勢未斷即是其義亦與釋詞相連臨旡妄等卦之例也睽之時當以說為本說而後明麗焉則可以委曲審幾而不至于猜察傷物矣又柔則和緩上行則有合物之勢得中則動皆中節應剛則有和合之理此所以能行小事而得吉也行小事于睽之時惟說柔得中者能之然說柔得中用之以行小事亦以睽之時故也故連釋卦之義以釋辭也合訂曰天地一段極言同異之理而示人以用睽之道也天下事有一必有兩天地也夫婦也牝牡雌雄也睽也然天與地配男與女配雌與雄牝與牡配未有合而不于睽者也以睽為合必有所以用其睽者非苟而已也天地萬物言事男女言志者天地旡心而二氣成能萬物旡知而方以類聚若人則秉天地之性為萬物之靈倫類相接之間所以為同為異者惟其志也象曰上火下澤睽君子以同而異合訂曰同生于異不異何以有同君子異中求同亦即于同中求異萬物一體同也親親而仁民仁民而愛物同而異也初九悔亡喪馬勿逐自復見惡人无咎象曰見惡人以辟咎也初變未濟未濟者不求濟也有喪馬勿逐象又兌遇坎兌見而坎為盗有見惡人象下卦之離與乾同宫故曰馬坎為隱伏四非正應故曰喪馬兌說故勿逐而自復也喪馬見惡人皆有悔也自復无咎則悔亡矣此先言占詞後言象傳曰見惡人以辟咎可想見用柔之吉也九二遇主于巷无咎象曰遇主于巷未失道也二變噬嗑兌遇震為大塗二五正應也五為離之主爻離為日君象故曰主兌見故曰遇離中虛故曰巷以本氣睽也而變氣又有間而使之不合者故不曰于大塗而曰于巷巷者紆曲之塗非捷徑小路也六三見輿曳其牛掣其人天且劓无初有終象曰見輿曳位不當也无初有終遇剛也三變大有兌遇乾乾為車三為兌主爻兌毁折而乾健行則見與曳矣下卦之離為牝牛牛掣者不服軛也此爻在下卦之上而適當毁折上卦之離為戈兵故曰其人天且劓輿曳者無足與共載也牛掣者無足與共行也天且劓者無足與共面也甚言其睽也旡初如此然上為正應處卦之終變氣為大有故曰有終大有之三爻變此卦其詞曰公用享于天子小人弗克合叅之可知其義九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也四變損處睽而無正應介二柔之間離又遇艮止故曰睽孤損有孚无咎此爻亦云安溪李氏曰與初爻同徳相與是遇元夫交孚之象雖非正應而助己者然不合以私而合以公不助以交而助以道正得人臣無黨之義雖危何咎乎睽非善也而處大位者以特立為安則无咎之道也竊按元即大夫即人不曰大人者以初非二五也又以二剛相遇則直諒責善有非人所能堪者故曰厲六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也五變履離遇乾五與二皆中又乾離同宮以柔變剛與二一氣故曰宗噬嗑之二爻變即此卦也其詞曰噬膚此爻亦云按此爻正彖傳所云柔進而上行得中而應乎剛者也為卦主爻故二稱此為主而夫子傳曰有慶此盖言在上者處睽之道也上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪寇婚媾往遇雨則吉象曰遇雨之吉羣疑亡也上變歸妹離遇震上與三原為正應以處卦之上亢而不交故亦曰睽孤剛明之甚猜忌必深震来虩虩多懼多疑故有豕鬼種種之象三四五互坎坎為豕變震為塗故曰豕負塗坎又為狐疑故曰載鬼一車當卦之窮窮極必反故有先張弧後脫弧之象又變之歸妹故曰婚媾從離變故曰匪寇下互坎坎為水故曰往遇雨豕負塗者懼為所凂也載鬼者懼為所欺也上之清髙絶物如此然則其孤乃自孤耳天地之氣合而後雨澤降遇雨則睽不終睽矣卦為睽而爻詞多言合盖所以合之者即彖傳所謂睽之時用也能用則睽者無不合矣初爻則以無用為用二爻四爻亦皆無心于用者若五上兩爻則有心矣然五以審所宗上以釋所疑猶皆用睽者也惟三爻急于合睽而急不得合不如徐以俟其終耳睽者彼此乖隔之謂故初與三言見二與四言遇五與上言往皆取承乘比應上下爻義以成詞與比卦一例艮下坎上蹇利西南不利東北利見大人貞吉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉此卦自二以下皆得位其不得位者獨初爻耳凡事莫不衰于已然而盛于將然故既濟但曰小亨而此卦則曰貞吉也彖曰往得中者言往斯得中曰往有功者言往斯有功曰以正邦者言以此正邦皆非現在事也利西南當依安溪李氏作後意講方是盖當其蹇正道窮之時也窮則獨善其身後往則得中而有功于身家邦國先則無所利耳觀初爻之宜待及上爻之從貴可見矣若以坤艮方位言之不惟義淺且艮尚在本卦而坤則委曲取之于卦變未免近鑿得中有功正邦義一串西南得中者未正人先正己即大象所謂反身修徳也利見大人者就正有道亦修徳分内事也得中指二五當位指二爻以至上爻當位釋貞以正邦釋吉盖得中以正其身就有道以成其徳徳盛而人自化其身正而家國天下莫不皆正矣竊按東北陽方君子致君澤民之地也西南隂方君子修徳凝道之時也爻中凡言往者即卦詞之東北凡言來者即卦詞之西南也二五為修徳之位故獨不言往來安溪李氏發明此義甚詳而確象曰山上有水蹇君子以反身修徳山上有水其行自蹇及其下地則一往莫禦故反身修徳者身正而天下莫不皆正也初六往蹇來譽象曰往蹇来譽宜待也初變既濟艮遇離篤實輝光離文明且本體當蹇之初即能見險而早止可謂智矣故有譽傳曰待者即待九五之大人而利見耳六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也二變井井卦詞曰往来井井故曰蹇蹇井養而不窮本體之艮又不獲其身故曰匪躬井旡喪旡得故傳曰旡尤此爻不言往者盖見可而進知難而退乃君子保身之哲而非人臣致身之義夫往即蹇豈能免于招尤若王臣主憂臣辱險阻間關雖不濟而繼之以死皆分義宜然又何尤乎故夫子斷其終旡尤非不怨不尤亦非人不得而尤之說也九三往蹇来反象曰往蹇來反内喜之也三變比比下順從又曰上下應故曰來反而傳曰内喜之也反者就二非並初皆反而就之也六四往蹇來連象曰往蹇來連當位實也四變咸咸者感也彼此情相通也故曰來連合訂曰往蹇來連者以來為往也六四上比五下比三居近君之位以人事君之大臣也連者連三于五也竊按四承五居多懼之地喜柔惡剛六今居之實當其位來連三于五此正無技而休休有容之大臣矣六四雖不當位數句應云六四雖隂虛無濟蹇之才而能來連三于五以天下之才為其才則當位者虛而實矣若以為連五則四之承五各卦皆然何獨加一連字耶九五大蹇朋來象曰大蹇朋來以中節也五變謙坎遇坤坎一陽陷于二隂故曰大蹇陽曰大大蹇者大者蹇也坤為衆故曰朋來得道多助大難可解合訂曰五與二為應二來則連茹彚征諸爻皆進矣為天下得人難朋來而五之事畢矣象曰中節盖得濟蹇之先務也或曰以中正之道節損其勢分屈己下士故人多歸之或曰以中節次其賢用人得當故樂為來上六往蹇來碩吉利見大人象曰往蹇來碩志在内也利見大人以從貴也上變漸漸舒裕不廹故曰來碩碩非大也傳曰志在内内即内卦之艮上處蹇極而將出險猶不肯銳于進此其所以云來碩也若以為來就五則與下利見犯複來易又以為就三三雖正應而非卦主爻也五上無相從者安溪李氏曰卦爻之義主于後退内來且以見大人為利上六之位方適當之故曰利見大人而傳以從貴申之也各卦爻皆止一義亦間有吉㐫二義者獨此卦自二五外餘爻皆兼利不利言之聖人望人濟蹇之意切矣易翼述信卷六
