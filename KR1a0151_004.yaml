body:
  text: 易翼述信卷四廬州府同知王又朴撰坤下乾上否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也合訂曰否之時匪人用事時也否時之匪人豈利君子貞乎不利君子貞非君子不利貞也惟小人不利君子貞此君子所以不可不貞也責重君子極是不然君子豈有以不貞為利者耶象曰天地不交否君子以儉德辟難不可榮以祿儉德凡語言施設飲食起居一切收斂減約是也至於立身行己則無可斂所為危行言孫不變塞者也初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也初變旡妄遇震旡妄匪正有眚不利有攸往有貞吉亨義震為帝出故曰不忘君此爻歷來皆作小人變為君子講果如此則泰矣不可為否之象且曰吉又曰亨易不為小人謀乃若斯之慶幸何耶及見安溪李氏之説以此爻為見幾而作守其正道細思之頗覺確當蓋否之初是否之象未彰而否之兆已著者也國家太平之治君子在位有以致之也而位有定數一小人進必一君子退數小人進必數君子退君子未退則未可為否也有一君子退則衆君子將隨之皆退矣故曰拔茅茹以其彚也夫濟時者惟道君子惟守其正道則明哲以保身於己既吉而藏器以待時於世亦亨不然則枉道以求容身世兩失矣夫子曰志在君也正以其彚貞者非忘君者也如謂小人志在君夫志在君者猶可謂之為小人乎是皆泥內小人之言遂視與泰卦無異竊以泰卦言其交否卦言其不交不交則君子退矣言君子退則小人之進可知也且爻詞明言彚貞并不言彚征意固可見六二包承小人吉大人否亨象曰大人否亨不亂羣也二變訟遇坎訟有孚窒惕中吉有否亨義巽雖入而又德之制以行權者也故曰包承蓋二與初與三皆隂爻是上下相承皆小人矣乃二以中正權之雖隨時汚隆不為岸異於小人固無害也然身否而道則亨包之而已豈和光同塵而與之為伍哉傳故曰不亂羣也六三包羞象曰包羞位不當也三變遁遇艮遁有包羞義當否而遜順以和同降志辱身矣故曰包羞羞則愧悔而思改隂極則陽將復也九四有命無咎疇離祉象曰有命無咎志行也四變觀遇巽觀下觀而化有稟承君命之義有命君命也合訂曰四之時可以有為而九又能有為者也然居近君之位有威福專擅之嫌此時小人之伺而窺之者其黨未散萬一疑謗紛起禍且不測身不足惜其如國家何惟凡事稟命於君則上下同心小人不得而間之矣爻曰有命勉臣亦以勉君也疇謂衆賢大臣資羣才以自輔羣才托大臣以自見大臣不幸而罹禍衆賢隨之矣陳竇死而黨禍烈無命故也九五休否大人吉其亡其亡繫於苞桑象曰大人之吉位正當也五變晉晉有康侯之詞又曰君子以自昭明德故有休否義何以休否則其亡其亡凜凜焉戒愼恐懼以誠意正心而修身者也何以否休則繫於苞桑而亡者不亡焉身修家齊而國治者也上九傾否先否後喜象曰否終則傾何可長也上變而為萃澤上於地有傾義萃之上為乾遇兌毁折而説故有先否後喜義泰否二卦彖詞與傳言其往來及交與不交而兩卦爻詞象傳則兼言時位比應不交即不應此卦初與四不應故初言貞四則言命志在初行在四也二與五不應故二言包承五則言休否也三與上不應故三言包羞上則言傾否也初位下時方否故曰以彚貞二與初三上下比故曰包承又賢位故曰大人時正否故曰否位中故曰亨故曰不亂如履之九二也三位不中不正故曰羞與初二比故曰包羞又臣位隂處之時已否矣故曰不當四近君之位故曰有命與五比時將亨矣故曰疇離祉五以剛中之德處正否之時位故曰正當上之時已過而旡位故曰傾也安溪李氏曰泰之上卦以下交為義其下卦以往來為義否之下卦以不交為義其上卦以往來為義雖曰相備然下交之義當於處上位者發之然後有以致求賢之誠不交之義當於處下位者發之然後有以伸殉道之節陽之方來而慮其將往者戒在內卦也陽之既往而圖其復來者戒在外卦也易為君子謀故泰否之爻無為小人戒者又曰易於否姤之卦多言包者處時之難不得不包但至於包承包羞則已甚爾雖泰之明盛猶曰包荒此聖人所以含章回天變化萬物如寒暑之推移而人不覺者也離下乾上同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志上乾下離説卦傳曰離為乾卦是上下卦異而同也人與已異矣而此心此理則異而同也竊觀同人之象而蓋恍然於夫子之與顔子論仁也夫下卦離即明以察幾上卦乾即健以致決仁人心也一人此心千萬人皆此心宜無有不同者也而有不同者則己不欲而施於人也則所求於人者重而所以自任者輕也初之于門尚不知有己也二之于宗則有己矣三之伏戎不興明於責人而怯於自治者也四之乘墉不克攻知所以自治矣而力未健五則克己矣克己則復禮故曰相遇上之于郊則漸近野而泯人己之見可以與人同而通天下之志天下將歸仁者也君子貞言同人而非君子之貞即是小人之黨故曰惟君子為能通天下之志又説卦傳曰離為甲胄為戈兵又曰戰乎乾故爻中言戎言攻言大師克所謂天人之交戰也象曰天與火同人君子以類族辨物類族辨物明指出一禮字初九同人于門無咎象曰出門同人又誰咎也初變姤姤遇也不期而相見者也故無私於同又離遇艮艮為門離其門則出門矣故曰于門又誰咎意為彼此無所責望方不同於何咎之義即中庸所云不援上不陵下夫子所謂家邦無怨者也初之于門亦可謂無己之見矣然同人于門其所同者幾何爻義固不若全卦之義為更廣大也六二同人于宗吝象曰同人于宗吝道也二變乾上下六爻疑於皆陽是為一家故曰于宗夫私於所䁥者當下未必即吝然有吝道焉故夫子云然大象既取離明乾健為義六二為本卦主爻亦離之主爻也乃爻獨於初曰無咎而於二為吝者何耶蓋人發念之初未有不得其正者孟子所云好惡與人相近之良知也天下至明孰過於此二雖中正得位然在爻論爻本氣既專與五應變氣又以乾應乾所謂私意起而反惑者也易唯變所適不可為典要固如此九三伏戎于莽升其髙陵三歲不興象曰伏戎于莽敵剛也三歲不興安行也三變無妄遇震震為萑葦莽象在上卦之下伏象離火震木火木之氣上行升象位下卦之上髙陵象伏戎于莽防人之陵己也升其髙陵求己之勝人也然升髙為敵剛易見伏戎為敵剛未明夫子故獨申於此句無妄之卦詞曰匪正有眚不利有攸往故曰三歲不興傳曰安行也解者多謂為何所行細玩不合當是緩行為自治無勇意興者奮興也三歲者概言其久也蓋三爻當明之既盡值健之未來不中不正其冥悍之情怠緩不振之氣有如此者又草莽猥雜心目蒙蔽所謂恕己則昏也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也四變家人遇巽家人者內外之謂故有乘墉象墉者所以隔蔽內外乘墉則內外皆見而不分矣故於義當弗克也又升陵為責人之己甚也墉則不及陵之髙言其先亦欲責人中道而即自反也墉依合訂指下離卦言乘墉即乘離所謂責人則明也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也五變全離故為大師上下兩離離為目故曰相遇先號咷而後笑先難後獲也大師克戰勝也相遇得心之所同然也三之伏戎升陵四之乘墉己之私真徑敵矣故必大師乃克所云非至健不足以致其決也號咷即自怨自艾發憤自強意昔人有求道不得而痛哭者此象非誣矣笑即孔顔之樂也傳曰中直中則克其偏黨反側之己直則克其邪曲委靡之己爻曰克遇而傳曰遇克惟相遇即相克亦惟相克斯相遇相克者沈潛剛克髙明柔克也相遇者乾之天德不為首坤之永貞以大終也上九同人于郊無悔象曰同人于郊志未得也上變革遇兌革二女同居其志不相得故傳曰志未得也合訂曰志未得謂索居離羣無比匪之傷亦無同志之助欲同而未得其人者也此卦諸家之説各爻未免雜而不純細玩夫子彖爻各傳乃知安溪李氏之言為不可易也其説曰人情自同而向異其既也反異以歸同天下一家也中國一人也故于野而亨者廓然大公之象也初于門未有私也二于宗繫於私矣三伏戎私甚而猜同極而異矣四弗克攻克伐不行者也反異之機也五克相遇克己復禮者也歸同之要也上于郊漸近於野復反於同矣然曰近於郊而已終未至於野者同人於野大道之行也上處卦外有野之象而爻德之善未足以當斯義故降野而曰郊變亨而曰無悔孔子申之曰志未得也然則聖人之所志可知矣乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨彖傳與坤卦文言相仿佛者以卦本全乾而五爻變也五為卦主五變為隂則全乾變坤矣而卦詞止言元亨不言利貞卦之主爻雖在五而所有之大則在上下五陽爻大有所以名也觀夫子象傳於初上二爻特標出大有字可見象曰火在天上大有君子以遏惡揚善順天休命同人先離後乾大象曰類族辨物以言修則明善也以言治則知明也大有先乾後離大象曰遏惡揚善以言修則誠身也以言治則處當也夫子曰道之不行知者過愚者不及此觀於同人之象而知之也道之不明賢者過不肖者不及此觀於大有之象而知之也遏惡揚善下曰順天休命則天命謂性率性謂道修道謂教三言所從出也仲誠張氏曰火在天上夏月暑氣盛於天又火季夏之中星夏者大也無所不有者天之生機於無所不有中又有宜棄宜取天之休命也天不能無善惡之物而令人自為去取為休命人如不遏惡揚善而曰善惡皆天所大有之物則不知順天之休命矣竊按遏惡者乾之剛健也揚善者離之文明也順天休命者六五應天而時行也初九無交害匪咎艱則無咎象曰大有初九無交害也初變鼎遇巽鼎為烹飪聚所有於器未為人食也故無交害巽之德入故飾外則有咎艱以深造則無咎也無交害説者人人異詞獨合訂曰二以五之有為有三以其有為五之有五又以所有為上之有皆有交也有交即有害矣初在下無位上無係應故不干涉於害此説頗確觀六五之詞曰厥孚交如九三之象傳曰小人害則初與四非正應又無位自無交害矣且夫子特筆著明之曰大有初九無交害則諸爻之有交害可知矣匪字疑如詩言有匪君子之義朱子注曰文章著見之貌初與四應四之匪無咎則初之匪自有咎矣蓋大有之初非可致飾於外之時也故匪有咎而艱則無咎耳艱者歉然不足之意也若以交賢言之則匪者顯以異之也艱者愼於用之也乾之初有潛象故云爾九二大車以載有攸往無咎象曰大車以載積中不敗也二變全離乾車離牛虛中能受故為大車以載象傳曰積中惟虛故積不敗即無害也九三公用亨于天子小人弗克象曰公用亨于天子小人害也三變睽遇兌在下之上有干君象而健之至大賢也賢之大者為公其變氣為乾遇兌遇悅大有而悅於君故亨於天子而全卦則變而之睽二女不同居者也故小人弗克君子而有大才則為天子使郭汾陽之類是也小人而有大才則跋扈自擅曹孟德之類是也故不但如程傳止言貢賦一節耳九四匪其彭無咎象曰匪其彭無咎明辨晳也四變大畜篤實輝光者也故曰匪其彭若謂有而不居則九三已言之矣且有而不居為明哲保身於大有亦無義乃夫子曰明曰辨曰晳若是重言而極贊之何耶蓋此爻居乾之上為離文明之始本氣與變氣俱有光輝之象非若初之尚在暗然潛修時也大有自初至四盛矣故曰彭四之離火正在乾天之上無所不照者也故曰匪其彭夫子恐人止在三四位上取消息把匪字看錯故曰明又曰辨又曰晳即審問又愼思又明辨也詩之咏有匪君子瑟僩赫喧必本於切磋琢磨也惟知之極其明故充之極其盛此自然之發越是以曰無咎若初而遽求其文之著則的然而日亡矣四與初之所以異也若以交賢言之則匪其彭即尊顯其盛德者也六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也六五變全乾上下一氣故厥孚交如乾剛故威如體坤而用乾故孚交如而威如也孚交如揚善也威如遏惡也上九則順天休命也信以發志信在五而有以發衆爻之志所謂上好信則民莫敢不用情也易而無備易即五坤之順也無備者推心置腹毫無疑二此真所謂信矣懷德即畏威合訂所謂非信之外别有威也上九自天祐之吉無不利象曰大有上吉自天祐也上變大壯卦詞利貞合此卦詞則備乾天之四德矣故詞只言天祐吉無不利而此外無事義也五之孚信也其易則順也上九乘之履信而思順也尚賢時説多以五為賢而上尚之非也斷依鄭氏汝諧作五尚上九之賢為是安溪李氏説亦如此吉言其已然無不利言其將然也安溪李氏曰上爻終卦義者也合訂曰象傳大有上吉言大有明其為全卦發也故知大有初九其義亦同夫子所以著大有之全盛實不同於他卦也授一萬氏曰八卦乾為尊六十四卦泰為盛然乾之上九悔於亢泰之上六吝於亂盛治備福孰若大有六爻亨一吉二無咎三明主在上羣賢畢集嗚呼盛哉艮下坤上謙亨君子有終象曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也亨是言目前通達有終是言將來成就天道下濟九三也光明艮也地道卑而上行坤也天尊地卑乾坤以定今來於三是下濟也艮篤實輝光其卦之彖傳曰其道光明是也凡一奇畫即乾一耦畫即坤不必拘於三畫也象曰地中有山謙君子以裒多益寡稱物平施大象看出一個恕字來此謙之本也恕本於忠所謂人己之同心也從此入德雖詣極化神而猶然望道未見雖業隆巍焕而猶然視民如傷方不是飾詞説而已各象傳之言自牧言心言志言則言得未得言民之服不服皆根諸此中庸道不遠人一章所從出也初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也初變明夷遇離山居地下謙矣今變氣離日亦出地下謙謙也傳曰自牧牧養也仲誠張氏曰如牧牛羊多方馴之使擾位之卑下正可為養德之地授一萬氏曰涉川險難之事也涉險尚吉况平居無事乎卑以自牧即庸言庸行之慥慥也六二鳴謙貞吉象曰鳴謙貞吉中心得也二變升遇巽夫子於升之彖曰志行於此亦曰中心得一也仲誠張氏曰艮黔喙遇巽巽又為風為木風木相與皆有鳴意按本義作聲聞説則鳴字屬人程傳作聲音笑貌説則鳴字屬已合訂從傳竊玩夫子曰中心得與志未得二語似程傳為確中心得也中絶句言所以鳴謙者以柔而得中實有所心得者也昔人云學而後知不足固如此若襲取之徒則片長即自矜矣中心得即忠字鳴即恕字所謂有諸已而後求諸人也九三勞謙君子有終吉象曰勞謙君子萬民服也三變坤坤致役勞象艮止坤安貞有終象一剛為衆柔之主本宜居君臣兩位乃遜兩位不居而居其下謙也剛能任事三又勞位承上接下之間君臣皆柔而托之以政士民皆柔而依之以安勞也萬民服者書云汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功也即中庸遠有望而近不厭意六四無不利撝謙象曰無不利撝謙不違則也四變小過遇震小過之彖曰可小事不可大事故有撝謙義仲誠張氏曰凡所發揮不過與賢者商確求其嘉謨而順從之耳豈非撝謙之象乎坤順也坤遇震震動順下而動之義此説與夫子不違則之義頗切則字即其則不遠之則不違即不遠也六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也五變蹇本氣隂虛皆不富象坤為衆故曰鄰鄰謂上與四也遇坎險以衆行險故利用侵伐利字合訂隨上讀若遵夫子象傳則仍隨下讀為是無不利者授一萬氏曰勘亂尚利况於定太平是也仲誠張氏曰剛健有功者在下方讓善於君若臣君無可讓惟以富讓之人不與天下爭財利故及其臣皆不富也不富則我謙之極而人盈之極以天地神人之道揆之謙者當益盈者當裒矣故有侵伐之利也不富而利侵伐所謂無諸已而後非諸人也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也上變全艮黔喙鳴象然同一艮也下在本氣上在變氣九三實艮之主爻乃鳴謙不繫於三而繫於二今以變氣又繫於上者何耶則夫子所云心志之得與未得也心得則鳴有德者有言是也志未得則亦鳴曰號泣於旻天而負罪引慝是也用行師征邑國夫子用一可字正承上志未得來邑國者坤為邑也訟之九二比之九五謂變氣之坤此與泰皆以本氣言鳴謙而征邑國即所求乎子臣弟友而皆未能也凡一陽之卦皆有師象而此獨繫於五上二爻者以上卦為坤而坤之中爻變為坎既有以衆行險之象而又謙德處中則已無不正矣正已而後可以正人故利用侵伐以其鄰者服之者衆也用侵伐者無思不服而有不服者也如舜之罔不率俾而惟苗不即功是已上則謙之極德也已既正而人有不可得而正者則仍引咎歸已深自刻責故用行師而但征邑國所謂柔遠自邇也程子以為自治其私如帝誕敷文德而有苗格是已安溪李氏以舜事實此二爻有味哉其言曰舜命有苗之征而伯益以為滿數頑讒之惡而大禹以為傲微有是己非人之意則猶未謙也故必能以其鄰而後利用侵伐雖利行師而惟征邑國鄰也邑也皆服近而不務遠之義也文德敷象刑施而苗即功此聖人極其謙德之驗歟授一萬氏曰下三爻艮體也有吉而無凶上三爻坤體也有利而無害易中吉利罕有若是之純全者蓋靜則多吉順則多利故也坤下震上豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉屯豫二卦詞皆言利建侯而其義不同屯在險而有能動之才是侯可建也然才雖足以有為而時未可動故諸不利攸往而惟利建侯以內治而已若豫之以順動則無往不宜矣建侯行師特舉其大者言耳彖故曰天地如之也剛應而志行言剛有應非言剛應柔也自來説者皆以和樂言豫獨合訂兼豫先説此亦從各爻詞中看出耳然仲誠張氏曰日月不過者天地以節制天道為順動也而四時不忒則萬物豫矣刑罰清者聖人以節制人情為順動也而民服則天下豫矣又曰順動之義不與豫謀而豫若專謀乎豫則反不豫是豫之時有義存焉而天道聖治不能外義誠大矣此即豫先之説也屯豫皆言知幾然屯之知幾即見於爻而豫之知幾特發於繫夫知其難而不貪得以趨利其知幾猶易處其順而不溺情以速禍其知幾更難此夫子所以極贊之也象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考大象於雷出地用一奮字正與作樂意貫古詩云彈箏奮逸響奮字本此可見樂以達鬱苟鬱已達矣而猶不止是為靡靡之樂非奮矣初六鳴豫凶象曰初六鳴豫志窮凶也初變全震為雷有鳴義合上下一氣有志窮義夫在上之窮窮極而反者也在初之窮窮欲無厭者也蓋震以動為德豫樂而動不止是無厭矣六二介于石不終日貞吉象曰不終日貞吉以中正也二變解遇坎解散其難正在豫時而能豫散其日後之難則非見幾而作者不能解之卦詞曰來復有靜象故曰介于石有攸往故曰不終日夫子於繫詞獨贊此爻者蓋和豫之豫以九四為主豫先之豫又以此爻為主矣六三盱豫悔遲有悔象曰盱豫有悔位不當也三變小過坤地遇艮山有仰象仰而取於盱者繫詞曰君子上交不諂下交不瀆初之鳴則以四之下交瀆也而此之盱則以其上交之諂夫諂則承意旨伺顔色未有不注目而仰視其上者也一盱字將諂狀寫盡矣初之上援而四應之故鳴三之仰視而四非其正應故有悔然諂人者能早知人之不我應而悔則猶可及止也而無如其好諂而不知也故其悔多遲則於是真有悔矣語意與過而不改是謂過矣相似夫子曰位不當以與四隔體而非正應也九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也四變全坤以為豫以其順也故曰由豫其曰大有得合本氣變氣言也曰勿疑以本氣兼變氣也曰朋盍簪以變氣兼本氣也仲誠張氏曰衆柔無任事之質九四一剛居臣位任事君民上下皆賴以豫此所以為豫之根因也又曰勿疑勿二於五也盍簪統屬於四也四與諸爻同處君位之下有同為臣之義故為朋簪所以總貫衆髮者也衆柔無一剛任事則紛委如髮矣四雖大有為然既為臣位必存至誠無疑二於君之心然後同類得其統束若恃剛疑二於君大義不足服衆又何肯以同為臣而受其統束乎此説甚好蓋四以剛居近君之位而為上下諸柔所應其義有如此者但以為必存至誠則仍為戒詞似在象外矣夫爻無此象則聖人必無此説若以為因而示戒則何卦何爻不可申戒詞者董澤之蒲可勝既乎竊以此爻於五有勿疑象於初二三上各爻有朋盍簪象坤西南得朋變坤是上下一氣也小畜泰之四五兩爻皆然蓋四臣位非五可比止以大有得了之則混君民於一矣故特申此二語當曰四之大有得上則存至誠無疑二於君之心下則同類歸其統束也至於得君然後服衆則隨人取義非正象也六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也五變萃遇兌萃聚也順而動皆悅則安樂之極者矣夫天下未有不死於安樂者也以本氣言五乘剛無為得賢而任之不疑者也故貞上下四爻與五一氣合變氣言之則聚天下之順以豫悅於已而本氣則震而驚恐者也故疾專以變氣言以柔中變為剛中雖在逸豫之際而中正有主故恆不死蓋二五中正之位以柔居之其變則皆坤之用六永貞者也故二為介于石五為恆不死而恆不死夫子所以謂為中未亡也説參仲誠張氏頗精上六冥豫成有渝無咎象曰冥豫在上何可長也上變晉遇離以本氣言為冥豫以變氣言為成有渝蓋豫之極必冥上之窮則變而晉為進離為明始雖昏而終進於明是以其冥豫雖成而必有渝也既渝矣何咎之有安溪李氏曰一陽居上體而為卦主卦之所以為豫故其彖曰剛應而志行爻曰由豫也然惟九四一爻以和豫為義與人同樂者也餘爻以逸豫為義耽於逸豫則在下者有附勢鳴豫希權盱豫之心在上者無震動疾清明冥豫之氣初三之鳴與盱五上之有取於疾與渝者此也取於疾者徇生者易死因多疾而得不死以其警戒而不溺於欲也取於渝者昏極者難明因事變而能改遷以其怨艾而不終於昏也惟二有中正之德故能超然於諂瀆之外而知幾如神何則豫之時人皆以為無患矣惟君子見微而知彰人皆柔而無立矣惟君子見柔而知剛也二四皆豫之善而處位不同四有天下之憂而二守一身之節非有天下之憂不能措斯世於安也非有守身之節不能致身名之泰也位雖不同而其為萬夫之望則一充其介石之操知幾之哲則臨大事當大任而屹然不動坦然無疑也決矣震下兌上隨元亨利貞無咎彖曰隨剛來而下柔動而説隨大亨貞無咎而天下隨時隨時之義大矣哉隨以乾卦最上之一爻來居於坤卦六二之下於是剛皆下柔上卦二剛隨一柔下卦一剛隨二柔更無剛爻在內外二體之上者此以體言隨也剛柔相協遂成震兌兩卦內動而外悅此以德言隨也乾之上來居坤下者天德之盈不可久也坤之初往居乾上者地道之無成而代有終也乾始之而坤終之以動始而以悅終且乾之上來於初坤之初往於上循環無端非備元亨利貞之四德何以能然又曰無咎者言四德缺一即所隨之有咎矣又乾上坤下為否天地之咎也必坤上乾下而後為泰之吉亨今乾方以其已亢之衰陽返於初坤又以其始凝之微隂升於上其氣甫通而未有形其合初交而未有事故但無咎而已而夫子因而特釋之曰此亦如屯卦大者之亨貞而非坤之元亨利貞也然雖無其形無其事而陽已動而隂已悅是大者一亨貞而天下即無不隨之而亨貞者蓋有乾之資始即有坤之資生矣則隨時之義豈不大哉再按初一陽而二即隨之以隂三一隂而四即隨之以陽五一陽而上又即隨之以隂上一隂而返之初則又隨之以陽此各爻言交言係言求言獲言孚言拘係言從維之所從生也剛來而居柔以初上言也天下隨之以三四言也三居下而四居上也三四止就本爻言其變則非本卦之正若統論全卦則以下隨上言矣象曰澤中有雷隨君子以嚮晦入宴息澤為物聚生之地澤氣升則雷奮澤氣降則雷藏雷奮則物生雷收則物息此即相隨之義也澤中有雷是藏也息也故君子觀象而得宴息之道宴息者即所謂夜氣之存不然則以夜為晝非養身心之道矣初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也闕三變革遇離中女也故亦於四曰丈夫於初曰小子離火炎上故為四所係四髙位為外卦三因其係而隨之賤從貴內援外是有所求也求而得可謂稱意之占矣然而過中失正與其求而得毋寧居貞自守之為宜也所謂比而得禽獸雖若邱陵弗為此則於隨而示以不可隨之義矣聖人垂戒深哉二與三同一係同一失而夫子於二曰弗兼與於三曰志舍下何也蓋二中正之爻志欲兩全而一遠一近勢有不可故曰弗兼與若三則不中不正其棄初則故失之也故曰志舍下二變兌上下相悅而近隨初是以曰弗兼與三變革與四居內外之交遷而就之是以曰志舍下也九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也四變屯下為三所隨故有獲剛變柔與三二互坤故貞兌遇坎險位處危疑之地故凶柔而與三二同氣故有孚柔而多懼小心處九五之下故在道近天故以明何咎者履險亨屯道在是也其義凶者梅巖袁氏曰有凶之理而未必凶也處得其道如下所云則無咎矣以明合訂以為光明正大與傳義不同亦有意味凡卦四爻多言明者如屯與大有皆然蓋上與五為天四為天所照臨故也四不中不正而曰貞者三求四而四不求三也合訂云三之得二四也四之獲二三也竊以此卦止言剛來隨柔隨則得無柔又得柔之意三之得似謂既隨四而五與四一氣也得四亦并得五如小人之求得於君者必先求得近君之臣既得乎近臣之悅自必得君之用矣四之獲似謂既隨三而二與三一氣也獲三亦并獲二如大臣之為人所附者始而親信之人附之繼而疏逖之人皆附之矣九五孚於嘉吉象曰孚於嘉吉位正中也五變全震震來􅊒􅊒亦笑言啞啞又仲誠張氏曰兌為言震為行得中位為善言善行故曰孚於嘉合訂曰孚於嘉猶兌之孚於剝隨二爻變即為兌當兌之時三上二隂悅不以道剝陽者也隨元亨亨者嘉之會也上之悅悅以道者也故五孚上為孚於嘉五君位本無不孚尚賢其先務也尚賢而天下隨之嘉之會也猶兌五孚二而剝自消也此説甚精確上六拘係之乃從維之王用亨於西山象曰拘係之上窮也上變無妄實理自然也兌金遇乾金以實意比合故有拘係從維之象精誠之至可通神明故王用亨於西山安溪李氏作用賢以享於西山如堯薦舜於天意於卦義頗切當從此卦之義多以二五正應為言者不知此卦既名為隨則爻亦隨卦義而變矣止以剛來下柔為義而以一剛一柔在上在中在下為時夫隨者下隨上也無上隨下之理剛來於柔下而隨之變而不失其正也柔居於剛下而隨之雖曰常道而非此卦之正故三之得曰求而必以居貞為利隨不如不隨也四之為三所隨雖曰貞而以有獲致凶有所隨不如無所隨也凡剛爻曰交曰孚柔爻曰係無正言隨者惟三四二爻言隨而實非隨之正意以上爻例之則二之係小子為小子所係也三之係丈夫為丈夫所係也故三又言隨以别之四特言隨以别之也意若曰剛必交必孚而不徇人之求方得隨之義柔必聽人之係而不求乎人方得隨之義若三以柔求剛是上交諂也四以剛為人所求是下交瀆也以此為隨非其義矣蓋初二五上位當其時故有義三與四位不當其時故無義也曰交曰孚曰係即有彼此相隨之義非卦詞止言人隨而爻詞止言隨人也巽下艮上蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也仲誠張氏曰乾下一剛往於坤之上坤上一柔來於乾之下卦以下為基本強實者去居於上虛弱者來奠於下上重堅而下輕脆基壞而顚覆從之此卦體為蠱象也艮為止巽為入物止而不動隂濕入於下則蟲生而蠱之此卦德亦蠱象也以體論否傾則為隨城復隍則為蠱以德論凡世之懲否者亦未有不易其情而為隨處泰者亦未有不安其勢而至蠱者也隨有交象而實自否來蠱有不交象而實自泰來隨之二五剛柔各得其位故曰大亨貞而天下隨之蠱之二五柔者小心懼禍則虛己以任賢而圖治有本剛者中正任事則承寵以幹蠱而致治無難故曰元亨而天下治也利涉大川彖曰往有事則以乾之初爻往而居於坤之上以各爻論則上為無事而初為勿用以全卦論則乾始一點生氣騰然直上是大有為者也夫乾之始則震也此卦艮上而巽下艮巽之間為震位震為木故曰甲艮居震前故曰先甲巽居震後故曰後甲震先三位為乾震後三位為坤乾之初變柔則天德不為首坤之上變剛則以大終所謂終則有始天行之自然也故曰先甲三日後甲三日屯與蠱雖相似而實不同屯上坎下震其中艮也故不利攸往蠱則艮巽之間為震故利涉大川且屯之四德重在貞蠱無可守惟利於行故有元亨利而無貞也象曰山下有風蠱君子以振民育德振民育德仲誠張氏作振作其民正以育民之德講不言自治甚與卦詞爻義合若以自治言則育字與蠱義説不去初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也初變大畜利貞利涉大川者也巽遇乾根基實矣故曰有子考無咎本氣柔在下無應非有能濟之義也故曰厲然初六為巽主爻巽而能乾則以漸入而始終不懈其志故終吉夫子贊以意承考者鄭氏曰子改父道始雖厲而終則吉事若不順而意則順也九二幹母之蠱不可貞象曰幹母之蠱得中道也二變全艮巽為入艮為門為閽在內卦之中有幹母蠱義又艮止也故不可貞正符柏氏曰爻以九言懼其失於拂戾也故以不可貞戒之象以二言知其能以巽入也故以得中道豫之意各有所取也竊按得中道正解不可貞合訂曰父子之間不責善况於母乎委曲婉轉以期其入斯為得中之道也正體中用正方中圓隨時以處中則中而正矣九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也三變蒙巽之究為躁卦而遇坎難又重剛不中故有悔然本體巽也又剛變柔故悔小而無大咎也象曰終無咎者蓋始雖直遂而終能巽入也仲誠張氏曰幹蠱總皆修飭敝壞之義六爻皆無凶占即三過中失正豈小失哉而但得有幹於父之蠱則身之負過為小耳象謂非有過而終無過也亦以其於父蠱有濟也父重而已輕道之衡量然矣六四裕父之蠱往見吝象曰裕父之蠱往未得也四處多懼之位又以柔居柔雖變剛而不能勝本氣且變卦為鼎有正位凝命之象是無所為者也故曰裕蠱裕非不幹之謂乃從容不迫也自本義皆謂戒占者之詞竊按彖曰往有事此爻之象曰往未得若以緩於幹蠱為戒則往正其宜矣何以見吝而夫子曰未得乎夫治道去其太甚耳若急遽無序勢恐至於激變宋元祐之事可見四本氣為艮之止變氣為離之明地處危疑而下無正應是蓋明於輕重緩急而從容以圖不敢急遽以往者也往則見吝故欲往有所不得耳如此説似於爻詞象傳皆合六五幹父之蠱用譽象曰幹父用譽承以德也五變全巽有申命行事之象又艮山遇巽木上下皆巽則在山與山之下一片林木蔥蘢山固以多樹為名者也故曰譽上下皆巽則潛以深入五以中正之德處之則不彰父之過不揚己之名故曰用譽自本義皆以用二之多譽言合訂獨謂歸譽於父其説甚精深觀夫子象傳不言蠱而止曰用譽可見且此卦正應獨二與五二之爻象既不以應言則五似亦不必沾沾矣上九不事王侯髙尚其事象曰不事王侯志可則也上變升艮止又居五之上在事外故曰不事王侯遇坤之順故髙尚其事而夫子曰志可則也然則不事王侯固非矯激鳴髙徒以貧賤驕人者矣且地風升君子在野而風流百世聞者莫不興起其振民育德為何如者哉各爻皆言父母之蠱安溪李氏云初應四三應上四承五五承上或以隂承應於陽或隂陽自相承應皆無嫌於稱父惟二以陽應隂則不可以稱父故變其文而曰母上之上更無承應則無父母之象居卦上又有事外之象但曰不事父母不可也故又變其文曰不事王侯説頗好但隂陽既有應又有承既以陽父陽隂父隂又以隂父陽不免義雜合訂又以剛上柔下父母之道俱失不必指定某爻為某爻父某爻為某爻母然亦太覺籠統仲誠張氏説九二曰若他爻則或下卦而非中爻或中爻而非下卦皆無閫內之象故皆屬父蠱耳據此按蠱者前人已壞之緒也又序卦傳曰蠱者事也則各爻中即自有幹父母蠱之義實不必以某爻為某爻父某爻為某爻母言矣惟九二為幹母蠱確不可易至幹父蠱獨多者子於外事原多於內事耳兌下坤上臨元亨利貞至於八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至於八月有凶消不久也臨之元亨利貞説而順剛中而應也天道人事一而已矣此亦即象即占也八月本義有二説前説義長且文王當商正建丑之時未必仍用夏正也蓋從子月一陽長至巳月六陽具足以盡六爻之義又自午月一隂長而初九之陽消至未月二隂長而九二之陽又消以盡初二兩爻消變之義凡八閲月而剛之浸長者浸消矣此皆因陽剛正中以其盛而起義也又參之合訂曰臨為丑月之卦反易為觀觀為酉月卦猶是二陽也乃逼四隂之二陽即逼於四隂之二陽為臨為觀爻畫無改十二月之象即此八閲月之象也天道盈虛互乘一轉移間而方長之陽即有凶之陽此君子所以利於貞也彖傳剛浸而長句釋卦體説而順四句以卦德卦體釋卦詞不分作兩節即至於八月有凶亦根於天之道來非另一意天道豈能長而不消又豈有長而不由於消者乎此所以備元亨利貞之四德也象曰澤上有地臨君子以教思無窮容保民無疆地臨澤而澤受其範圍不泛溢有教之象地包澤而澤多所生息不涸竭有容保之象受其範圍者地之廣也無窮則又其厚者為之矣多所生息者地之厚也無疆則又其廣者為之矣初九咸臨貞吉象曰咸臨貞吉志行正也初變師遇坎咸臨者本氣也貞吉者變氣也二爻亦然初以陽居陽雖當位而在下卦之下有潛象故守正吉而傳曰志行正言志則不及行矣九二咸臨吉無不利象曰咸臨吉無不利未順命也二變復遇震下動而上順故吉而又無不利未順命時解指四隂謂小人未順天命故臨而逼之此強解可笑合訂以保命言安溪李氏亦曰未順命者知命之靡常則不可以委順於命而有立命之道故盛而不矜衰而可挽此於卦詞有合蓋就全卦論之則謂為二陽必閲八月而隂長陽消也若就此爻論之則本氣為陽剛中滿變氣為震動有為夫順受其正者居易俟命也修身立命者人定勝天也夫子固曰觀彖而思過半合訂之説不亦宜乎六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也三變泰遇乾三為説主而又變泰甘臨也位不當而以臨人為説未有能行者也故曰無攸利變氣乾乾三有惕象故曰憂能惕於心則將艱貞保泰行雖不利而於己自不至有失矣故無咎六四至臨無咎象曰至臨無咎位當也四變歸妹遇震以四之應初又切近下而臨之不無迫狹之過而能本順德以有為故無咎正大繫所云震無咎者存乎悔也程傳説至字是然曰臨之至當是臨之切至非臨之至極之謂須善會其意六五知臨大君之宜吉象曰大君之宜行中之謂也五變節遇坎水為智者之象各卦爻象多有以明言者皆謂坎如屯之六四困之初六言本氣也隨之九四言變氣也程傳曰五順應於九二剛中之賢任之以臨下乃己以明知臨天下大君之所宜也此則合本氣變氣而兼言之大君之宜止就爻位斷之耳合訂曰知臨如舜好問好察不自用而用人傳曰行中謂應陽所謂用其中是也義甚精上六敦臨吉無咎象曰敦臨之吉志在內也上變損坤土遇艮土其積益厚故曰敦臨此亦合本氣變氣而言也仲誠張氏曰位以君位為極出君之外則不臨矣當臨之時而不臨其積益厚如人有正心誠意之學宜出建治平之業而卒不出必其志在反己自修其臨之德安能不日厚乎安溪李氏曰上爻極而必反何以不根卦義申戒如泰之上也曰敦臨吉又曰無咎則謹終維始之義在其中矣故消不久者至是而其道可久矣未順命者至是而永保天命矣二説俱精竊按此爻上變艮亦有止意且艮篤實輝光者也故為不臨而厚其臨之德此漆雕開之所以見悅於夫子也歟坤下巽上觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣盥而不薦有孚顒若即不動而敬不言而信也天之神道即上天之載無聲無臭也聖人之神道設教而萬民服即篤恭而天下平也中庸末章後數節意實本此卦詞近有謂為民之愛君欲有所獻而畏不敢近此可觀不可即之義懷其德而憚其威也此説未免泥夫子彖傳下觀而化句故止就民説然下文神道又從何處看來且卦詞必兼取卦象卦德為説懷德畏威於大觀在上之象得矣其於順而巽之德則全不合蓋觀有示觀於人一層有為人所觀感一層盥而不薦有孚顒若所以示觀於人也但其義象正自難説觀中庸引奏假無言之詩下又歷引詩形容不顯篤恭之妙而嘆其至可見合訂謂為可想像而不可名言故夫子不另釋一字補出下觀而化一層非以盥而不薦二句但説民也先儒以下觀而化句為所過者化神道設教為所存者神最確切精當大觀在上大字絶句大者陽也謂九五比亦九五而不為觀者以上下皆隂羣比相附故曰比此則五與上皆陽其下四隂皆仰而上望故曰大觀在上大觀在上即其盥而不薦有孚顒若所以示觀於人者也順而巽即下觀而化為人所觀感者也中正以觀天下乃併此二層合而言之下順而上巽想見道德齊禮民日遷善而不知光景觀天之神道聖人觀之也惟其觀天故亦以之設教語意一串下與豫卦卦詞平舉天道聖人不同下觀而化觀字包得初二四爻三個觀字此觀字大觀天之神道即是三五上爻三個觀字此觀字深象曰風行地上觀先王以省方觀民設教大象於示觀為觀二義外另發出觀民一義省方觀民者存疑所謂先王巡省方國所至命太史陳詩以觀民風命市納賈以觀民之好惡是也初六童觀小人無咎君子吝象曰初六童觀小人道也初變益上之益下不過飽食暖衣而已外此則民之可使由而不可使知者也又坤遇震坤為先迷震為初生故曰童觀夫耕田而食鑿井而飲不識不知順帝之則者童觀之義也小人之道也豈君子而有大人之志與事者所宜乎樊遲欲學稼圃夫子鄙之曰小人是也六二窺觀利女貞象曰窺觀女貞亦可醜也二變渙位在下卦之中以柔居柔坤為闔户遇坎以順陷於隂中為暗中窺視之象故曰窺觀渙利貞者也故利女貞亦可醜亦字跟童觀之吝來安溪李氏曰書曰近天子之光故觀者莫如近二五正應可以觀矣而曰窺與初爻同為孺婦之智者遠也隨之失丈夫姤之無魚皆以卦義主於切近因依觀亦其類也六三觀我生進退象曰觀我生進退未失道也三變漸遇艮漸不遽進也不進則退位處上下之際上卦巽為進退故曰觀我生進退蓋觀我之所行以為進退也六四觀國之光利用賓於王象曰觀國之光尚賓也四已處髙位矣然本氣巽為入為進退為不果故但曰觀國之光變氣遇乾為君故曰王全卦變泰為上下交故曰利用賓象曰尚賓程傳以為志尚伯正符曰惟五尚賓故曰利用賓若説四尚未免輕於仕進此説頗善又程傳不指君之身而云國者觀天下之政化則人君之道德可見矣九五觀我生君子無咎象曰觀我生觀民也五變剝遇艮山尊地卑故爻曰我象曰民然一氣也故爻曰觀我生而象曰觀民也觀我觀民中庸本諸身徵諸庶民本此上九觀其生君子無咎象曰觀其生志未平也上變比遇坎近與五比故曰觀其生觀五之所生也何以言之蓋五君位上師位大人之觀獨觀化原非觀我生何以作君非觀其生何以作師然君子之心敢忘自反哉表端則影正觀民正以自觀觀其生正以觀我故夫子特曰志未平然則伊尹恥其君不為堯舜一夫不獲若撻之市求得其志也切矣平菴項氏曰觀本小人逐君子之卦但九五中正在上羣隂仰而觀之故取小人觀君子之象象雖如此勢實漸危故五上皆曰無咎言能如五之居中履正上之謹身在上僅可無咎耳不然九五居中正以觀天下雖元吉大亨可也豈止無咎而已哉明二陽向消故道大而福小也震下離上噬嗑亨利用獄彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也合同人卦看便得此卦義蓋合天下而成其大同者聖人之心也然天下皆人天下之人皆同此心宜無不可合者而有不合則為強梗者所間耳故必去其強梗而後可合此噬嗑之利以用獄也仲誠張氏曰以卦體三剛三柔分列於上中下剛柔不偏也以卦德既能動而又能明舉動不妄也以卦象雷震物電照物雷電合而物之幽伏者章顯物情不蔽也以卦中六五柔得中而居上位以行中正之道也如是雖不當位利用獄也不當位者卦有三剛各不居上下之中位也不當位他事未利惟用之治獄則利體德象中四事似無不利不知三剛皆不得中則隂主事而陽用之惟利獄也此聖人玩易最精處按隂主事謂六五離明之主爻也陽用之謂初九震動之主爻也剛柔二氣對待者也故曰分雷電一氣奮迅者也故曰合象曰雷電噬嗑先生以明罰敕法伯正符曰雷轟電掣未必擊也而衆知懼焉明以敕之亦使人畏而不敢犯耳據此説則明敕合雷電取義不必分頂又雷未奮而電先見者也然若雷自遠來則人先隱隱聞其聲而後見電其雷必不震此噬嗑之雷電所以明罰敕法也若雷起自近則人一見電而即聞雷其雷必震而或擊物此豐之雷電皆至所以折獄致刑也然則本義以為雷電當作電雷者恐猶未然耳初九屨校滅趾無咎象曰屨校滅趾不行也初變晉遇坤震為足坤為地初在下故曰屨震威為刑故曰屨校足著地者趾初九以震之主爻變而柔則無足不能動故曰滅趾而傳曰不行也不行二字即從滅趾釋無咎之義非另一象此與蒙之初六同意蓋初九過剛有咎乃變柔則不進於惡而無咎繫詞所謂小懲而大戒此小人之福是也六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也二變睽遇兌兌之主爻在三故不言口其本氣之震為倒艮其變氣合三四兩爻亦互艮艮為鼻而本氣變氣皆不正顯艮象故曰滅鼻凡噬者必滅鼻言去間之甚易也此爻本義以為甚易而不免於傷安溪李氏謂在下者滅鼻遇毒而不敢辭又有以刁悍之徒誣衊為説者細詳之噬嗑既以柔為本六二之柔既中且正何至過甚見傷又何至令人不敢辭乎若為汚衊則與遇毒一例而云胡無咎耶此皆誤看象傳乘剛之説總非確解竊按六二雖得中正而以柔居柔未免過於姑息非如五之剛柔相濟之能除暴去姦也今噬嗑如此之甚易者夫子特明之曰乘剛也蓋隂主事而陽用之故然耳夫六二過柔宜乎不能去間而有咎也因其乘剛故得無咎如此説似覺切當六三噬臘肉遇毒小吝無咎象曰遇毒位不當也三變兩離過於明察故為噬臘遇毒彖於全卦謂雖不當位利用獄三亦位不當者何以遇毒蓋彖所謂剛不當位而柔居中主事也三既非剛而處上下之際非當治獄之位者又不中正故也仲誠張氏曰禮謂三牲魚臘天下之美味也過中之噬嗑美味多矣其為折獄即為過於得情過則人反有不服罪而相犯者如噬臘遇毒也相犯則小吝矣三不中正即應有咎變而明則治獄得情何咎之有九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也四變頤遇艮頤則口得合者故為噬乾胏得金矢之象得金矢得黃金如本義解甚當蓋民受治也受治則間者去而口得合若謂九四其剛如金其直如矢於得字頗難説且觀彖而思過半彖以柔為本以剛為用非尚剛也且既以九四之剛為金而六五柔也何亦曰金乎利艱貞者四處疑懼之位變卦為艮處下卦震動之上為離明之初艮而止之夫人動則多昏靜則明生故艮有篤實輝光之象而此曰利艱貞由此思之吉可知也而傳曰未光者四在本氣變氣皆非主爻故也然則為大臣者聽訟終不若無訟明矣六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也五變無妄遇乾乾健者也故曰噬乾肉乾金在中故曰得黃金五中正非可言厲然以柔居之下無正應故曰貞厲既曰厲宜有咎矣變剛則明而能斷故無咎夫四之艱貞五之貞厲哀矜敬畏之心也知其未光而期於得當則雖得情而勿喜雖用罰而適中矣上九何校滅耳凶象曰何校滅耳聰不明也上變洊雷震為加威故有刑象在上故曰荷校重雷為霆人將掩聰故曰滅耳初之滅趾而不進於惡是以無咎而上則滅耳其聰不明雖政教諄諄而若罔聞矣豈不凶之甚乎蓋荷校滅耳所以示獄成而將制刑繫詞所謂惡積而不可掩罪大而不可解是已非以荷校即所施之刑也安溪李氏曰訟之義為下者設而必以九五之中正為聽訟之宜噬嗑之義為上者設而必以初上之止惡怙終為受刑之戒皆所以相備易翼述信卷四
