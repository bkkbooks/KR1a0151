body:
  text: 易翼述信卷十二廬州府同知王又樸撰闕鼎柔進而上行與晉睽同漸進得位專指九五進居尊位故申之曰其位剛得中也旅得中乎外而順乎剛指六五渙剛來而不窮指九二柔得位乎外而上同指六四上承九五以上十二卦皆以内外二體取往來上下為義不因卦變而取且如否泰隂陽往來文王彖辭已言之乃是以内三爻外三爻通寓往來之象豈亦可以卦變推乎論對卦安溪李氏曰易有兩卦反對而義互相𤼵者往往當以首尾顛倒觀之泰與否對其初爻雖皆曰㧞茅茹然泰之所謂征吉者否盡泰來也即傾否之時也否之所謂貞吉者泰極否來也即復隍之候也泰之二即否之五一則致泰之主爻一則休否之主爻也泰之主所以在二者上下交則其責在下且大者來而二之光大當之也否之主所以在五者上下不交則其責在上且大者往而五之大人當之也泰之三即否之四一則於泰而見否之幾焉一則於否而見泰之兆焉有以防之則食福矣有以迓之則離祉矣泰之四即否之三四當上下交而近下又以隂虚而能下賢是以交孚也三當上下不交而近上又以不中正而或上援是以包羞也泰之五即否之二五居尊而處下交之世必如帝乙之歸妹則得元吉矣二應五而值不交之時包承不可也必也固守其否而後道亨矣泰於二三著往來之義於四五著交泰之義否於四五著往來之義於二三著不交之義非獨其象之反對不為小人謀者理固當然也泰否諸爻之每言包何也曰人之荒穢可包者也不包則無以成乎物己之羞辱不可包者也包則無以潔其身審於二者之間則於處治亂之道得矣剥復相對剥之上即復之初也故近之者吉利剥五復二是也應之者亦無㐫咎剥三復四是也背之者㐫厲剥四復三是也遠之者㐫剥初復上是也惟剥二㐫而復五无悔此一爻不同盖處復時則中徳可以自成矣處剥時必有應與乃善二未有與故不免於㐫時不同故也損益相對損之上即益之初損上受下之益卦之主也受下之益者不可私其有故曰得臣无家也益初受上之益亦卦之主也受上之益者不可私其身故曰利用大作也損之五即益之二各以中徳受益神之所依也故皆曰十朋之龜弗克違損之四即益之三損其疾也用㐫事也皆所謂動心忍性以自増益受之於下者有法家拂士是也受之於上者為孤臣孽子是也損之三即益之四絶私交以益上則無二心之嫌矣禀君命以益下則無作福之私矣損之二即益之五益上者不貶道以失己益下者不求報以干名則益道之極也損之初即益之上居下受損而未當益上之任故戒以酌損居上受損而又非益下之位則為或擊之象而已夬姤相對夬之上即姤之初也故近之者宜深為之防五之夬夬去之決也二之不利賔制之宻也應之者宜善為之處三之壯頄不能決而和者也四之起㐫取女而不能制者也逺之者無害以其勢不相及也壯扵趾而欲決之能免咎乎姤其角而不與遇雖吝无咎矣背之者害亦未切故與隂相背臀之象也不能安坐而欲决欲遇之臀無膚而行次且之象也然終未可决也故制其壯則悔亡終不得遇也故雖危而旡大咎也惟夬之二姤之五雖不近隂而有決隂制隂之任焉故憂惕呼號而變可弭矣堅重待時而萌可消矣漸與歸妹相對二卦皆取女歸之義故六爻皆有女象而不論其剛柔然雖不論剛柔皆取女象而至於應爻則剛柔之分不可以不辨也盖以剛應剛則無應而無女歸之象矣以柔應柔則無應而亦無女歸之象矣以剛應柔則雖有應而隂陽反類亦無女歸之象矣惟以柔應剛者有女歸之象故在漸惟六二在歸妹惟六五與女歸之義合而其義㝡吉也漸之五即歸妹之二雖有應而反其類者也故曰不孕曰幽人漸之三即歸妹之四以剛應剛故曰不育曰愆期漸之四即歸妹之三以柔應柔本皆不善也然六四有承五之例故四得桷而三歸娣也漸之初即歸妹之上以柔應柔一則進之始也未進者也一則歸之終也無歸者也未進則謹身逺害雖危而无咎無歸則辱行失節不利而終㐫漸之上即歸妹之初以剛應剛固無歸義矣然上有師傅之象焉則可以為儀初有媵妾之象焉則可以承君盖師傅則不嫌扵老而無歸媵妾則不嫌扵少而自歸矣既濟與未濟相對二卦皆取濟水為義狐善渉水者也故二卦所謂濡首濡尾者皆象狐也既濟之上即未濟之初上為首故曰濡首初為尾故曰濡尾也既濟之初即未濟之上故初亦曰濡尾上亦曰濡首然未濟而濡尾則躁之甚而可羞當濟而濡尾則第不進以免於咎而已既濟而濡首固不能保其濟將濟而濡首猶恐不能終扵濟也既濟之五即未濟之二五過時者也故有持盈之戒二未及時也故有謹進之戒也既濟之二即未濟之五既濟之善在二故雖䘮茀而自得未濟之善在五故得无悔而有光也既濟之四即未濟之三四之時將過矣而四柔而能懼終日戒之象也三之時將及矣而三柔而不進此惟渉大川可耳以有行則㐫也既濟之三即未濟之四在既濟則三當已濟之位也在未濟則四當將濟之位也故三則伐鬼方而既克之象也四則方震動而伐鬼方之象也事之既濟則當思其難故雖克之而曰憊也事之未濟則當厲其志故當震用而曰志行也聖人命辭之審如此論卦名相對有體不對而名相對者一隂居上體畜陽故曰小畜二隂居上體畜陽故曰大畜小畜大畜之下三爻皆自畜者也其上三爻皆畜人者也復者返也復自道也牽復也皆能迴返自止而不進者也有厲而已也輿脱輻也亦能自止而不進者也三可以進矣然小畜則畜未極也於是而進則脱輻大畜則畜極矣於是而進則安驅也小畜之四以六承君則畜君者也九五居尊則畜下者也大畜之六四六五以二隂畜衆陽而居上位則皆畜下者也然小畜無吉辭而大畜則吉以畜有小大異也至兩卦之上爻則畜皆通矣然小畜有戒辭而大畜直曰亨亦以畜有小大異也若小畜之初二得吉而大畜反無之盖小畜者勢未形而能自止以道自止者也所以得吉也大畜勢已形而自止以害自止者也免於咎厲而已一詞之占其謹嚴如此大過之過在中而三四二爻者中之中也故皆取棟之象小過之過在外而初上二爻者外之外也故皆取飛鳥之象事過則宜救之以中也故大小之二五雖皆在過之分然其義皆别取而不至於㐫咎也大過之二五象楊者楊亦棟類也以其近隂而有滋生之機稍别於棟也小過之六五象雲者雲亦飛類也以其近陽而有㑹合之理稍别於鳥也兩卦之二皆善於五者二未過而五稍過也大過之初上為隂小過之三四為陽陽過則用隂隂過則用陽故初六之藉用白茅九四之不過遇之皆剛柔相濟義與時適惟上六則純柔九三則純剛矯時而過其中則與時悖矣二爻皆有㐫辭以此也大畜又對大有大有所有者大也大畜所畜者大也夫子贊二卦皆曰尚賢以六五尚上九之賢也上九為賢而六五尚之所有可謂大矣所畜可謂大矣故一則曰自天祐之一則曰何天之衢言乎尊賢之為帝心而賢路之通由扵天道之泰也然大有之義優扵大畜故在畜為不犯災者在有則无交害而已在畜為脱輻者在有為車載在畜為利往者在有為用亨以至居尊位者有牿牛豶豕之勞未若順保其盛大而竝施其孚威也小畜又對小過隂陽和則不過以小畜大隂陽未和也小過於大亦隂陽未和也以隂畜陽主在六四故其彖曰宻雲不雨自我西郊隂過於陽主在六五故其爻亦曰宻雲不雨自我西郊畜之而固則雨矣過而不過則亦雨矣雖然小之為道妻道也臣道也畜之未固固曰夫妻反目畜之而固猶曰婦貞厲也可以過者猶曰過祖遇妣不可以過者則曰不及其君遇其臣也隂陽之際小大之分易之謹之也如此大過又對大壯大過大者過也大壯大者壯也大過則顛故防其橈也大壯則止故戒其進也壯之羸角猶過之棟橈壯之壯輹猶過之棟隆論取象相對咸艮皆以身取象著人一身動静之理也其六爻所當之位稍不同者咸取三陽之中一爻為心則心位在四心位在四則初為挴二為腓三為股五為背而上為口矣艮但取中一陽為心則心位在三心位在三則初為趾二為腓四為背而五為口矣盖心者陽也身者隂也心為陽而居中故三四二位當之也咸言咸其脢艮不言艮其背者艮其背為卦義六四雖有合乎卦義而未純乎卦義也故未能不獲其身而能止其身而已卦義之次也咸之感以心艮之止以背心背之象皆在四而皆未能純乎卦義故咸四不言咸恐其憧憧而動於私也艮四不言背但止其身而未進扵忘也艮之取象既畢於五故上自以敦艮為義明上一爻為止之主徳莫善焉井鼎皆以物取象井者在邑野者也故取養民為義鼎者在朝廟者也故取養賢為義至六爻之辭則除尊位之外井自四以下為代君養民者鼎自四以下為為君所養者故其義大畧同也兩卦之初未當進用故有井泥鼎否之象然井主養人泥則不能養人宜為時所舍矣鼎主為上所養故猶有出否從貴之善也兩卦之二皆有剛徳然養人者在下則不能逺施又無應於上則射鮒敝漏而已受養者雖在下而有登進之具又上得正應故但戒以謹身而逺害也井四以柔承剛於義既善又承上以養人而不有其功所以无咎鼎四以剛承柔例多㐫者又受養既盛則必有滿盈傾覆之理也兩卦之三亦皆有剛徳且位近上體於養道合矣然皆未離下體則是井未上於瓶甕鼎未登於俎豆也又井三雖有應而上六非當位鼎三則無應而象耳革故一則曰井渫不食一則曰雉膏不食膏澤不下是以悔惻然以其有是徳而當是時也故必有明良之合而福可受有隂陽之和而悔可虧韓子所謂天將雨水氣上無擇於川澤澗溪之髙下者二爻之謂也五者井鼎之主而井五陽也有實徳故能養民也鼎五隂也能虚中故能養賢也井鼎之上養道成矣故皆得大吉而鼎之五上有尚賢之象故其辭又曰大吉无不利與大有上九同也論卦意相對離明也明夷昬也昬明治亂如晝夜循環然離初明之始也二明之至也三向昬四昬之甚五向明上則重明矣夷初昬之始也二三以明拯昏者也四五以明處昬者也上則極其昬者也然則離明之中有昬夷昬之中有明夷之下體自昬而明故三之得其大首者猶離上之折首也其上體自明而昬故上之不明晦猶離三之日昃也家人内也旅外也家人則利於女貞旅則利童僕貞也家人二四得位女之貞者也旅之初六居下童僕之不貞者也欲女之貞者宜乎以義率之而剛徳為善欲童僕之貞者宜乎以仁撫之而柔道為貴家人之吉在五上而初與三皆免乎悔厲者以其有剛徳也旅之吉在二五而三上與四皆不免乎㐫厲者以其失柔道也家人之初五稱有家旅之三上稱以旅盖以有家之心處之則為可繼也為可久也而家之道正矣以旅之心處之則所遇皆路人所居皆傳舍而旅之道失矣君子待妻拏如賔客則家猶旅也於四海如兄弟則旅猶家也萃聚也渙散也萃言王假有廟因其聚而聚之渙言王假有廟因其散而聚之也易凡言號者皆誠之𤼵也萃之義下聚扵上故號者在下能號則一轉而為笑矣渙之義上聚其下故號者在上能號則雖渙而王居無咎矣萃自初以上皆求聚者至四則佐上以聚其下者也涣自初以上皆自渙者至四則佐上而渙其羣者也萃多戒辭而渙無㐫義吾以此知保身之為小而遺己之為大養交之為危而特立之為安矣萃之極故猶齎咨涕洟以求萃渙之極故遂離羣避害而逺去然其要皆无咎者無萃上之心則是放臣屏子怨妻去婦皆若是恝也無渙上之節則是衡門不可以棲遲槃澗不可以平寛也節者約素自節也與賁之文對賁則恐其濡於華矣故尚白焉上之白白也四之皤如亦白也初之賁趾五之丘園皆是也惟二為文明之主然猶貴其附於陽三受二隂之賁然猶戒其永於貞也節則恐其窮於苦矣故尚甘焉五之甘甘也四之安節亦甘也初之不出三之嗟若未失也惟二當澤中而塞故其於義為㐫上當險極而苦故其於道為窮也白而受采則色相宣矣甘而受和則味相得矣忠信之人而學禮則文質彬彬矣闕論卦意相似困與習坎卦意相似水流洊至險相仍也水行遇澤為險所困也二卦皆以剛徳為善非剛不能處險困也處險困者莫大乎實心所以貴剛中者以其有實心也有實心則充積於中不自滿盈於外故坎之求小得中未大者此也困之利用享祀祭祀者亦此也坎四剛柔際而无咎困四有與而克終皆以承五為義盖近君之位而遭險困則是不得於君也有用缶納牖之素則終得其所際矣有來徐徐之安則終得其所與矣坎初之坎窞困初之幽谷自即於險困坎三之來往險枕困三之進退石藜遇之險困而徳不足以自㧞也坎上之徽纆叢棘困之葛藟臲卼險困之甚者也然悔悟者出乎險困之機故習險者能改而從道則其㐫止於三歳矣處困者能悔而遷則終可以得吉矣天下無終於險困之理亦求其心亨而已矣升與晋卦意相似其六五一爻皆為卦主其義至善餘爻亦以柔為善者柔静而剛動柔退而剛進升進之際宜柔不宜剛也是故卦非無剛也而彖傳推釋卦義曰柔進而上行柔以時升則所用者柔也晉下三柔皆善升之初柔亦善然晉之初二摧如愁如至三而後允升當初而即允晉之象明出地上則初二地之中未出之時也升之象地中生木則初六巽之主木生之先也晋四以剛而厲升四以柔而吉升三雖無㐫厲而亦無吉利之文惟二剛而得中故有用禴之利其義著於彖焉升晉之極晉角矣㝠升矣然以其剛而自治以其柔而守貞則雖處極而無凶害又以時義之貴柔也故晋有厲吝之戒而升則直曰利也巽與蠱卦意相似然巽小亨而蠱大亨者蠱則其勢極矣舉弊壊而更新之撥亂開治之象故曰大亨巽則勢未極也因其弊而申飭之舉墜補偏之象故曰小亨甲者事之始也有事於始亨之所以大也庚者事之中也有事於中亨之所以小也先甲所以振民後甲所以育徳先庚所以申命後庚所以行事兩卦之能盡其道者五爻也餘爻則能幹蠱者皆善也而裕之者則吝矣能入而斷者皆善也頻巽而失其資斧能入而不能斷則厲且㐫矣雖然蠱者人心之壞也巽者人欲之萌也壞者極於終萌者動於始上之髙尚其事者所以救人心之壊也初之利武人之貞者所以遏人欲之萌也故於上曰志可則也於初曰志治也君子之拯天下之壊亂也必先於自尚其志始論卦義相似大壯之四陽盛長與五陽决隂義相似也故居初而壯趾則皆有㐫咎九二得中則吉且无恤九三用壯則皆㐫厲此三爻之義同惟壯四則近二隂應決者也故曰藩決不羸夬四未近上隂不應決者也故曰牽羊悔亡夬五乃直壯四之義以其近隂也故曰夬夬猶藩決也壯五反直夬四之義以其不在壯位也故曰䘮羊猶牽羊也壯纔四陽決之未盡故至上而猶觸藩夬則五陽至上而决盡矣然非惕號則猶有凶猶之艱則吉之意也萃以二陽聚衆隂與比之一陽比衆隂義相似比五比之主也故元永貞之徳著於卦萃五亦萃之主也故元永貞之徳著於爻其義一也此四隂也近五而比於君者也萃四陽也佐五以聚其下者也其義所以不同也比初曰有孚萃初亦曰有孚然比初無應故曰有他吉萃初有應故曰往无咎也比萃之二皆有正應於上然必曰自内而不自失曰有孚而中未變則聖人之戒深矣比三上二爻皆凶萃之三上不至於凶者比三不與陽相比應萃三與四雖隔體而當萃之時可以上巽也比有後夫㐫之義而上適當之此所以無所比而㐫也萃有利見大人之義而上位近五與蹇上之義同此所以齎咨涕洟以求萃而得无咎也論河圖河圖何以作易也曰天地之間隂陽而已河圖之竒耦者所以紀隂陽之數倣隂陽之象而盡隂陽之理也一竒為陽數二耦為隂數其餘凡竒者皆従一而為陽也凡耦者皆従二而為隂也其位則節於四備於五而加於十四者天地之氣分司於四方迭王於四時之用數也五者兼其中之體數也十者倍五而成在四方四時則隂陽互藏互根之數在中央則隂陽混一和㑹之數也今以圖觀之除五十為體數居中則一三七九者竒數之始終也二四六八者耦數之始終也陽始於北盛於東極於南而終於西此圖一三七九之序也隂始於南盛於西極於北而終於東此圖二四六八之序也在北在東則竒内而耦外竒為主而耦為賔竒為生數而耦為成數此則陽主事而隂受命陽息而隂消之象也在南在西則耦内而竒外耦為主而竒為賔耦為生數而竒為成數此則隂用事而陽仰成隂息而陽消之象也盖其竝立而同運者固不容一息而相離而其迭為賔主互為始終者又無一息之不相推而相變也自其推行之迹言之謂之變化自其合一之妙言之謂之鬼神推行者變易為用而其體不可執合一者交易為體而其用不可知此河圖之緼而聖人所因以作易之源也論河圖二聖人之則圖作易也非規規於點畫之似方位之配也其理之一者有以黙啟聖人之心而已圖所列之數如此其所涵之象又如此今以易卦觀之天一地二數之源也則聖人所取以定兩儀者也五位相得而各有合象之成也則聖人所取以定四象八卦者也何則一二之數起則凡三五七九皆一之變矣四六八十皆二之變矣故竒耦之畫由此而定也相得有合之象列則隂陽之賔主辨而交易之妙具矣隂陽之消息序而變易之機行矣故四象八卦之設由此而定也今以羲文二圖觀之則先天之左右隂陽内外終始固與圖象無二而後天之北東皆陽卦也南西皆隂卦也圖象在北東則陽為主在南西則隂為主亦其義也河圖兼中數故備於十易卦除中數故止於八中數者何也以一而統四則數之主也又倍五而為十則數之全也此無極之真所以主宰包含二五之精所以停蓄完備而為分播迭用之本者也易雖不用其數而必曰易有太極説卦叙圖象既曰帝又曰神太極也帝也神也卦畫所無也然而以為易有之焉則河圖中數之精緼象雖不立而理行乎其間者也論河圖三易卦止於八而虚中數此易有太極而不著之義也言帝言神而無專位之義也固也雖然八卦之乾其統之矣夫天專言之則道也則乾太極也以主宰言謂之帝則乾帝也以妙用言謂之神則乾神也至於以形體言謂之天然後與諸卦列而為八是故以八卦為河圖四面對待流行之數而虛其中可也以乾坤為河圖之中數六子隂陽卦為四面對待流行之數可也地亦天也故坤従乾而為中數凡所以主張綱維皆其為也猶圖之以十従五而為中數也六子則以隂陽相為内外消息猶圖四面之數之相為内外消息也是故乾坤者列之則與諸卦成位統之則為諸卦之宗説卦最後去乾坤而專言六子以明乾坤之即神也孔子於乾卦彖象備天徳之形容焉則已盡乎太極之緼矣夫豈必於八卦之外求所謂太極神帝者哉論圖書卦以道隂陽之變故曰易疇以叙三才之法故曰範聖人之取諸圖也所謂陽卦竒隂卦耦者也其取諸書也所謂參天兩地而倚數者也何則天數始於一地數始於二竒耦立而隂陽之理明故圖之以一三七九二四六八相為内外互為終始也是隂陽交易變易之道也天數乗於三地數乗於二參兩行而天地之義著故書之以一三九七相乗於四正而左行二四八六相乗於四隅而右行也是天地順逆之機樞維之位也其為天地之數則一而卦因之以明變化之情趨時之用疇因之以明成位之職參贊之功故其中數也易見之則為太極盖宰隂陽而為化樞也範見之則為皇極盖中天地而立人位也太極皇極其為至理則一而易所主者天徳無聲無臭所謂太極本無極者故其名不在八卦之内範所主者王道有典有則所謂皇建其有極者故其目列於九疇之中也此二圖同異之致聖人法則之源也論圖象自八卦始成而聖人名之以象純陽純隂之為天地不可易已震㢲隂陽之初故方生而有氣陽為雷隂為風也坎離隂陽之中故既聚而成精陽為水隂為火也艮兑隂陽之終故已滯而成質陽為山隂為澤也此八卦者兩兩相耦以全體言之天地隂陽也而合徳也以氣言之雷風隂陽也而相應也以精言之水火隂陽也而互根也以質言之山澤隂陽也而交感也分定而情通此所謂交易者也及其流行於天地之間則迭王而相禪故雷與風之發各有其時水與火之盛各有其候山與澤之滋各有其節天與地之所主各有其分此所謂變易者也是故易之為道有不易有交易有變易不易者天髙地下萬物散殊者也交易者合同而化者也變易者流而不息者也不易者為體變易者為用然非有交易者存則不易者何以相逺而相親變易者何以相反而能相成哉故曰八卦相錯者猶相交也天與地交山與澤交雷與風交水與火交推之重卦則凡兩卦相合者莫不各有交焉此天地萬物之情所以感通無間而聖人之作易也既圓而列之以明其對待之交又因而重之以明其錯綜之無所不交也繫辭傳之首章天尊地卑者乾坤也卑髙以下山澤雷風水火之倫也是皆於定分之中而具交易之性者故繼之曰剛柔相摩八卦相盪相摩者所謂對待之交也相盪者所謂錯綜之而無所不交也交易之情通則變易之事起雷霆風雨寒暑六子之功也乾始坤成者天地之化也變化以生成萬物而皆有其常職則亦歸於定分而已矣是故言體則首乾坤是亦順而數之之義也言用則首雷風是亦逆而數之之義也繫辭以造化言而切易書説卦以圖象言而包造化知繫傳首章之為易理之宗則知先天卦位之為作易之本矣論圖象二隂陽卦之分起於文王信乎曰自八卦始畫而隂陽之卦定矣文王因象以起義爾非始自文王也先天之圖各有左右次序然夫子列之莫不先陽而後隂故曰自畫卦而已定矣水火之列於後何也曰乾坤之外莫大乎坎離水火者天地之用雷風山澤者又水火之用也火之用莫專於雷風則氣生於火而又感乎水之涼寒者也水之用莫專於澤山則氣滋於水而又成乎火之燥髙者也然則山澤通氣雷風相薄者歸於水火不相射而已矣後章亦先言水火相逮而後曰雷風不相悖山澤通氣者此也雷動風散以下所值氣候則何如曰閉塞之後雷以動之寒沍之餘日以暄之方長而生意未足故兑以説之於是而萬物皆相見是乾以君之也鬱蒸之極風以散之燥烈之甚雨以潤之既成而生意未固故艮以止之於是而萬物皆歸其根是坤以藏之也是故先天後天圖象錯綜而其揆一也先天不著方位而其理廣以大後天著方位而其義精以切論圖象三文王後天之説亦出於邵氏然證之周易則其大且至者無不渾合是以可信也一則隂陽卦之位繫於坤蹇解之辭夫東南為陽西北為隂然陽之生物雖至春而可見而其氣則已肇於冬之初隂之成物雖至秋而乃就而其氣亦已凝於夏之始故取其用之可見者則曰東南曰西北本其體之自生者則曰東北曰西南圖之序則入用故始東方終東北不改乎人時之舊卦之序則推本故乾統三陽於東北坤統三隂於西南獨契乎天道之精也二則隂陽始終之義見於乾坤之二用盖陽首於震而實首於乾則乾之為首不可見也故其爻義曰无首隂終於艮而實乃終於兑則隂之終者非隂也故其爻義曰以大終隂陽互根之妙皆於北方見之何則其方則隂也其卦則陽也以之為隂則陽為無始以之為陽則隂為無終猶之一日之有亥子丑也以為前日之終則晝無始以為後日之始則夜無終矣此所謂隂陽互根之妙而乾坤之用所以總歸於貞也三則圖位之序𤼵於乾坤之爻辭乾爻始於潛於圖為北方幽隠之象䧟而止也至見焉則出矣出則必惕惕者震之恐懼自修也惕則必疑疑者㢲之進退不果也由是而飛焉則相見聖人作而萬物覩者也於是受之以坤而致役焉則乾道不亢矣坤爻始於履霜㢲之伏也潔而齊之至於地道光焉則明矣无成有終者致役之義也括囊慎宻所以保其終也黄裳者中順之積而和悦之充由是隂成而聽於陽焉豈復有交争而戰之事哉四則隂陽尊卑淑慝之義例統乎六十四卦陽尊而隂卑故陽主而隂役陽清而隂濁故陽潔而隂汚坤之彖曰得主守其役之分也曰得朋引其役之類也曰䘮朋始終於主而絶類上也守其分故従王事而終吉引其類故貫魚而無不利絶其類故渙羣而元吉凡易之言尊卑者例此矣坤之爻曰履霜堅氷隂始凝也凝則滯而不潔矣又曰其血𤣥黄隂陽之雜雜則溷而汚之甚矣故於其凝也則柅豕以牽之包瓜以隕之非然則有莧陸之侵有包无魚之慮於其雜也則揚庭以去之孚號以戒之非然則用行師終有大敗无號而終有㐫凡易之言淑慝者例此矣乾者八卦之主也無敢與抗者而曰戰乎乾懼有不為役者也徳威不足以畏則反君道也懼有不潔者也徳明不足以明則猶未離其類也凡易之精意大義無不自此而出故信其為文王所建圖也論圖象四先後天卦位不同義亦異乎曰其義一也先天以畫卦之序而分者也後天以隂陽卦而分者也先明乾坤之義則餘卦之義明矣夫乾南坤北位之正也古者兆天南郊兆地北郊是也然乾北坤南氣之始也古者祀天於冬至祭地於夏至是也兩義者不可以相無則二圖不可以偏廢然後天所置則乾又不在正北而進而西北坤又不在正南而退而西南盖天道流行初無止息至無之中萬有肇焉此所謂全體此之謂大本不待乎萌動而後有以見其心矣南者正陽之位也坤功雖顯於此然避正陽之位而不居故長養萬物至西南而極盛坤彖言西南得朋者此也古人以亥為陽月以未為中央其有以知此矣天地之大義既立故先天以陽畫之消息為序自北以終於南也以隂畫之消息為序自南以終於北也後天以陽卦統始終為序自震以終於艮也以隂卦效職於中為序自㢲以終於兑也夫陽統始終而乾則以終為始隂居中間而坤則尤中之中故無聲無臭者上天之載形形色色者地道之光於穆不已之命昭矣造化孕毓之功著矣以六子象類言之日東月西者所自生也火南水北者所自盛也雷陽風隂者類之分也風雷相助者氣之合也兑居東南以説物艮居西北以止物者令之正也兑居正西説極乃成艮居東北止極乃生者用之交也先儒以先天為體後天為用要皆義理精㣲之奥古聖人所以經緯天地而出入鬼神者非二圖互𤼵則不備論圖象五陽為主於始終隂佐陽於中間天地萬物之理莫不皆然盖論陽之統貫則自始至終無非陽也然中間一節則有藉於隂而隂功見焉隂功見於中間則陽之在始終者反若離斷而不相續故草木之種實陽也枝條花葉隂也土中之種即樹上之實然無種遽成實者必歴乎枝條花葉之繁而始成也人之男陽也女隂也子為父之體然無父遽生子者必資乎嫡媵之衆而始生也圖之四隂相繼者隂道在中間故見其合也四陽不相繼者陽道在終始故見其離也然以其循環者觀之則終即為始猶之樹上之實即土中之種繼體之子即為宗子之父也是則陽之相繼也亦何間斷之有論圖象六以一歳生物觀之播種於春是震則物之始也落實於艮是艮則物之終也實落又為種艮之所以窮上反下成終而成始也乾則華葉之既脱實之方生為萬物之將終而實為萬物之大始何則使於是而不實則生生之理絶矣是故語用則有種而後有實語體則有實而後有種也於傳震為反生勾萌之初也巽為長為髙枝條之盛也方長之木其心必虚其節必弱故離中科而上易槁也枝條備則華葉繁故坤為文而為衆也將成實則枝條摧敗而華葉剥落故兑毁折而附決也乾為木果則實之方生而在木者也坎為堅多心其心堅也科之反也艮為堅多節其節亦堅也上槁之反也艮又為果蓏則既落之實種之可以復生者也又以生人觀之長而後有室震之所以居先也幼少則未長坎艮所以居後也乾則長子始成乎父道而有子者也於傳震曰長子㢲曰長女配耦之稱也離曰中女諸娣之名也坤曰母盖有嫡有娣而母道具矣兑曰少女曰妾女御之流所以代匱而廣嗣也乾曰父父道成矣獨坎艮二卦不曰中男少男者言中男少男疑於長子為兄弟以圖意而觀則震成父道而為乾坎艮者其子也三陽始終為父子相繼故於坎艮但取子之幼少而未長不用兄弟之義也論圖象七圖象皆心學也何也曰乾坤者誠明之學之源也天清虚而與太極為體故實地凝實而一順承乎天故虚心神明不測至虚者也以其具乎性之真故其道則實而配乾形色天性至實者也以其涵乎心之妙故其道則虚而配坤是故乾之文言曰存誠曰立誠實而盡性之謂也坤之文言曰敬曰義虚而順理之謂也存忠信之實心則誠之始立謹信之實事則誠之終居敬而清明在躬則明之體精義而利用安身則明之用然大傳又曰乾知而坤能者何也神明清虚故主知然必誠實易直而後有以通天下之志故曰乾以易知誠則明也形色凝實故主能然必明通簡要而後有以成天下之務故曰坤以簡能明則誠也是故虛者非實則出入無鄉不足以體乎萬物實者非虚則徇物不化不足以事我天君矣震之動坎之孚艮之止皆誠之事也㢲之入離之明兑之説皆明之事也此心學之至也以先天圖觀之震者動也志之奮也又懼也心之惕也離者麗也智之藉也又明也睿之通也兑者説也理之融心之裕也自誠而明故歸於乾焉㢲者入也察之深也又制也治之斷也坎者險也行之艱也又勞也習之熟也艮者止也積之厚性之定也自明而誠故歸於坤焉先儒言知之明好之篤離兑之徳也行之果守之固坎艮之徳也然其言學之本必曰立志持敬言行之要必曰知㡬謹獨斯則所謂益動而巽日進无疆者乎文王之學亦猶是也雖然誠者成始成終而明在其間是故震始之乾坎艮終之而中有巽離坤兑焉盖自心之震動警戒而入而察之者與之俱是震巽兩卦之義也眀於理而和順於事是離坤兑三卦之義也事之既終則形氣息而天命行是乾卦之義也更習之熟而居者安涵養之深而藏者宻是坎艮兩卦之義也以朱子之言質之震為戒懼之動機巽為省察之入機離則由省察而精之至於應物之際而萬理皆明坤則無所乖戾而萬事皆順兑則無適不然而萬物皆和矣乾則由戒懼而約之至於至静之中而存天命之本體坎則誠主於中而無所偏倚艮則深厚完固其守不失而其道不窮矣終始動静莫非誠之貫而命之流也自動念之初畢於酬酢之後則明之𤼵性之用也至語夫隂陽合徳者則終始動静亦莫非一理之行而明之繼故曰誠身曰明徳其義一也二圖之序不同而皆以震㢲為誠明之根在先天則震先而離兑次之巽先而坎艮次之也在後天則震㢲竝居先而離兑坎艮次之也先聖後聖其學豈有二哉論圖象八夫子説圖其又言帝言神何也曰六子統於天地也地又統於天也以形體言謂之天故曰天地定位以性情言謂之乾故曰乾君坤藏以主宰言謂之帝故又曰帝出乎震以妙用言謂之神故又曰神妙萬物而為言也帝與神皆天之心也以其實而有主故稱帝焉以其虚而無方故稱神焉神虛而帝實故帝誠而神明也帝與神不可知於其氣化而知之日月寒暑水火山澤風霆雨露各有專司而皆以育養成就為職如百官有司之恪事知其主之者帝也日月寒暑水火山澤風霆雨露其氣各異而不相通其道竝行而不相悖如耳目手足之㨗應知其妙之者神也是故於後天流行之迭王可以見天工之有統焉於先天對待之相須可以悟神理之無間焉雖然言帝則存乾坤之位帝有主而可名故著其所次舎如心與耳目竝為官思與貌言視聽竝為事也言神則去乾坤之位神無方而難知則不可以所在目之如視聽嘘吸之靈之無非一心動静顯藏之機之無非一體也是故天即君君即帝帝即神其分則有八卦其實統於乾而已矣自論對卦至此共計十八條皆出安溪李氏按李氏名光地字厚庵勅世以其邑表之曰安溪先生先生生平最邃于易奉論修周易折中先生一手所裁也又自有周易觀彖通諸書而傳義合訂則出自余師朱文端公余於二先生所著採取獨多然其專集已行於世世有好學之士自能取而讀之也易翼述信卷十二
