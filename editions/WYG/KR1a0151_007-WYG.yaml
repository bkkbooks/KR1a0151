body:
  text: 易翼述信卷七廬州府同知王又樸撰坎下震上解利西南无所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉利西南者西南隂方陽為君隂為臣陽方君子所以抒忠獻猷也隂方君子所以敬業樂羣也此卦震坎皆坤體坤為衆坤卦詞曰西南得朋此彖之所以云往得衆也往得衆者言由此道以往可以得多助之益蓋邦家多難之故皆由於親小人而逺君子小人之使為國家菑害並至爻所謂負且乘致寇至也如欲解難非用君子不可而亦非用衆君子不可故宜急求放佚之老成與新起之俊彦矣然小人不去則君子不來故必去讒逺色賤貨以貴徳焉爻所謂獲狐解拇也來復吉者當難作之時則無可往也即欲求賢以靖難必先有以自治故來復而反身修徳則其身正而天下歸之彖所謂得中二之得黄矢四之朋至者此也有攸往夙吉者解難之時則有所往也必知己知彼籌畫萬全慮可而進謀早定焉彖所謂往有功爻之射隼無不利者此也蓋欲解外患必先解内憂而解内憂則非反身修徳不能此解之大意而觀彖所以思過半者也利西南蓋合上下兩卦言之觀屯之象下卦初陽進而為上卦之二其氣升也此卦陽爻則下卦之二進而為上卦之初其氣降也故屯大亨貞而此卦則以西南為利象曰雷雨作解君子以赦過宥罪卦詞自解其難也大象赦過宥罪則解人之難又是一義初六无咎象曰剛柔之際義旡咎也初變歸妹坎險遇兌説水澤相得故曰无咎歸妹夫婦交也故傳以為剛柔際所云際者以初六位之不當宜有咎矣然二比之四應之皆與剛為際故於義為无咎安溪李氏曰處於最後而隂柔能靜故直言无咎仲誠張氏曰應四則受官之制而不敢蒙惡比二則憚友之嚴而有過可改皆為解之是際遇之得也説皆佳九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也二變豫豫利行師坎遇坤坤為地田象坎狐象變坤田獲狐象卦除六四為君位餘隂爻三三狐象坤之中黄象坎為弓矢故曰黄矢獲狐而矢不遺君子反身修徳則邪媚小人不待驅而自逺貞吉即卦詞所謂其來復吉也君子之可貞者惟自治而已不自治而但曰去小人則小人不可去而所去者非小人矣不然或如東漢召外兵以去宦䜿遂致大亂此又無矢射狐而用虎以驅狐者也六三負且乗致寇至貞吝象曰負且乗亦可醜也自我致戎又誰咎也三變恒坎遇巽以六隂柔居下卦之上負且乗也又上負剛四隂之分也乃又下乗剛二則非分矣巽又近利市三倍隂柔善入蓋讒佞貪利之小人也坎為盜三四五又互坎故有負且乗致寇至之象恒久也故曰貞貞吝者夫無徳竊位正宜解者而不能解一小人去而又用一小人以此為常能勿吝乎蓋咎由人侮吝為自取傳曰自我之我謂使之負且乗者非負乗之人也漢誅晁錯而用袁盎七國之兵仍不解宋獻韓侂胄之首而用賈似道終至於亡國可鑒已九四解而拇朋至斯孚象曰解而拇未當位也四變師震遇坤上卦正離坎險一陽初動而有為遇坤順之有解象師貞丈人吉有去小人而用君子象故曰解而拇朋至斯孚也震為足初為之應故曰拇坤為衆故曰朋四居高位為人所仰攀凡瑣瑣姻婭及依附之小人皆拇類也所私者去則同徳之朋方來故曰斯孚世未有不絶私黨而能進賢之大臣也傳以九四雖有剛徳而未得正則不能無私故特為而拇釋之曰未當位非謂未當位者猶能解而拇也六五君子維有解吉有孚于小人象曰君子有解小人退也五變困震遇兑震為長子故曰君子兑為少女女子小人一類也震動故有解兑説故曰維曰有孚仲誠張氏曰卦止二剛一居賢位一居臣位六五比剛臣應剛賢有君子維之象人君當解時而君子與維則其隂柔尚有不解者乎為有解之象君子維君子與人君聨結固密之義比而无應應而无比不得言維也此説維字好有解者使六五之隂柔變為剛明也有孚於小人者舉直錯諸枉能使枉者直也蓋用舍予奪一出大公徳懋則懋官功懋則懋賞小人欲指其有一毫之私而不得能勿退乎傳故曰君子有解小人退也乃小人之自退此卦所云其來復也齊桓用管仲奪伯氏邑而不怨唐太宗信用魏鄭公而能知權徳輿之佞韓魏公得政而兩宫之讒不入是其驗已上六公用射隼于高墉之上獲之无不利象曰公用射隼以解悖也上變未濟震遇離離為雉隼象為戈兵射象上位外墉象居卦之巔高象繫詞大傳曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有夫君子者利國家之器也修徳以親賢藏器于身也待時而動卦所謂夙吉彖所謂往有功者此也漢用三傑以滅項唐用裴度以平蔡殆此爻之義已傳云以解悖正謂以仁伐不仁安溪李氏以為至此則外難亦无不解者是也蓋上卦為外上爻又在位外隼性猛利乃敵國外患非宦官宫妾外戚權奸如城狐社鼠之可比耳兌下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行細玩全卦皆以有孚為主卦詞當於有孚讀㫁下自元吉至用享一氣直落觀彖傳止於損有孚句中加一而字此下則仍直敘卦詞可見元吉无咎作一截可貞利有攸往作一截曷之用二句作一截元吉者善在天下无咎者善在一身横説也可貞者善在百年利往者善在一時䜿説也二簋用享特舉事之最大者以實之而皆根有孚來損而有孚蓋其善有如此左氏所云苟有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公意本於此大可毛氏曰震為盂為竹為木合之成簋二者初與二陽數也至若下兑口食上艮門闕而致互坤之養於其間其享禮之明切如此彖傳損下益上其道上行所謂上下不必泥定君民蓋下卦本乾體其三爻則重剛不中矣上卦本坤體其上爻則龍戰於野矣今則損下之過剛以益上之過柔是乾道上行也漢儒以為陽止於上隂説而順損下益上上行之義夫乾為體質也坤為用文也陽實而隂虛故質曰質實而文曰虛文今陽道上行以實益虛而虛者皆實是不損即不能實其虛矣故曰損而有孚也二簋應有時特即用享實事標出時義來蓋二簋非常享而今用之者應有其時也是故剛宜益而柔宜損者常也若損剛益柔則非常而時為之矣何也乾之三時則盈也故可損坤之上時則虛也故宜益損盈益虛正與時偕行耳惟其時也則徵諸庶民而皆信質諸鬼神而無疑此之謂損而有孚是故元吉而非有偏質之咎是故可常無所往而不利也初曰上合志二曰中以為志三曰得友無疑四曰有喜五曰弗違上曰得志皆本有孚以立義耳象曰山下有澤損君子以懲忿窒慾大可毛氏曰内乾剛忿易六三而成兌説是懲之也外坤柔慾易上九而成艮止是窒之也初九已事遄往无咎酌損之象曰已事遄往尚合志也初變蒙詞曰童蒙求我又兌説遇坎勞有趨事之象故曰遄往初告再三瀆則不告故曰酌之已事若作自棄其事而往役則不但損之而已若作先畢其私事而後急公又於遄字不合蓋初民位而應四則往役於公或抒忠獻猷以事其上者也己事者視上之事如己之事故遄往而傳謂為上合志也酌損之者往役則量而後入抒忠則信而後諫也安溪李氏曰事之未可遽言之未可盡是其義已若作庶人輸財説為賤者占酌之則以君之事即已之事所當遄往者奈何敢損之為尊者占酌之則以國事雖即民事之所當遄往者然不損之民何以堪蓋兌變坎説者將挺而走險矣是以不可不酌也此又前賢所未及在觀彖者推類以自得耳傳曰尚合志者初與二三皆乾固一體者也三往於上以益之則初二皆以益為志矣故初曰合志而二以中為志上則大得志其志一也九二利貞征凶弗損益之象曰九二利貞中以為志也二變頤其卦詞曰自求口實夫中正者君子之所養也則至味可甘而豈肯枉道以干禄故有利貞弗損之象兌説遇震動以説而動而為損下益上之事則將以聚歛為容説菑害將至矣故曰征凶或曰初處事始而曰遄往二當事任而曰征凶何也安溪李氏曰初不言遄往則在事外者或不知益上為所當然二不言征凶則當事任者或不知損己為所當慎説最妙竊按初民位則往役義也二賢位則往見不義也大可毛氏以此卦為子母易其自泰易者本義及諸儒已言之獨其以二為易益之五剛故曰益之非汎設語亦有見不然所損者三則益上者三耳而二何以益之耶第其益之也剛仍在三并未嘗損故曰以弗損者益之六三三人行則損一人一人行則得其友象曰一人行三則疑也三變大畜兌遇乾乾行健故曰行此下卦實自乾來而損其第三爻故曰三人行則損一人此爻又變乾與上爻應故又曰一人行則得其友大畜卦詞曰不家食吉亦得君之義故曰得友六三一爻最近上體卦之所以為損者也故因成卦之象而極論損益之道繫詞大𫝊以天地男女𤼵揮此爻之義非別生一論也蓋天地男女皆一隂配一陽兩相得則專以致精二而一者也三則疑所配而不能致一矣三損其一者損有餘也兩也一人得友者益不足也兩也自三以上至於十百皆謂之三則黨與徒衆而非天地男女以兩致一神化之㫖乾之奇畫至於三是私黨矣夫人臣公爾忘私國爾忘家苟私家黨與之是徇則焉能誠信以事其君乎故得友者致一而無貳乃為誠之至此三之損而有孚也六四損其疾使遄有喜象曰損其疾亦可喜也四變睽艮止遇離明止則不遂其非明則能知其過又坎為心疾離者坎之反則去其疾矣故有損疾之象四處尊近君得位乗權既與下有睽隔之勢而以柔居柔自私自利又與下有睽隔之情其受病也多矣乃方當益時若先不自損則無以為受益之地何以勸遄往者急公之心乎必損之而使遄者有喜焉則睽者不終睽矣故曰无咎使遄有喜者四與初應也下三爻為損上三爻為益而四何以亦言損蓋上益之者也五受益者也四則在上下二卦之間將與五同受上之益第逺上而又與下卦隔體位又尊非自貶損何以親其下以為受益之地故亦曰損也六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也五變中孚安溪李氏曰居上而虛中以受益益之盛者也曰或益之言不知其所自來也如此則鬼神其依龜筮協從故曰十朋之龜弗克違十朋言衆多也累十朋而不違則其獲神人之助可知矣吉孰大於是竊按損以有孚為主而此變氣正為中孚故有龜卜無違之象夫龜卜而至於十朋之衆多而皆無違其為孚也大矣夫聖主不有其才以天下之才為才不有其徳以天下之徳為徳故一人一事之受益可得而舉也若夫虛中受善則四海之内皆將輕天下而來告之以善又可舉而數之乎故曰或益之𫝊求其故而不得曰自上祐之所謂天授非人力也夫天且弗違況於鬼神如此則合天下而成其大信則亦合天下而享其全福故曰元吉也或曰𫝊所謂上即指上爻卦詞云其道上行也亦有義蓋五承比上剛而以虛中受益汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功如此以受益也夫益此則必損彼是損者益之矣今不見有損之者則益者誰乎故曰或也十朋弗違即損而有孚而上爻之无咎貞吉利往皆與卦詞無異元吉不繫於上而繫於五者上無位而五君也大可毛氏曰大離為龜而升於艮門闕之間則正宗廟所藏者上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也上變臨剛而浸長有弗損象艮遇坤地中有山所以裒多益寡也有益之象師卦上爻坤變艮曰承家此爻艮變坤曰無家艮坤皆土故曰家土無定位故曰無家得臣者六三也六三致一以上交自損而益上是上得臣之國爾忘家者也又一義剛升於上而五虛中以承之以益天下乃為天下得人而無家天下之心此堯薦舜於天之時也大公之懷至此而極故傳曰大得志大者即乾彖傳所謂其道上行者也三與上為成卦之主爻故三専言損之有孚而此則極言受益之道而占詞與卦詞同焉大可毛氏曰三以所損為所得則所得者友也並行者也上以所益為所得則所得者臣也奉我者也觀此可見聖人下字之精細如此震下巽上益利有攸往利涉大川彖曰益損上益下民説无疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進无疆天施地生其益旡方凡益之道與時偕行合訂曰卦自否來乾坤始交而為震巽出乎震齊乎巽春陽佈澤盛徳在木天道大光萬物亨通時也其為益大矣哉竊按利往者宜於處常涉川者宜於處變彖傳自上下下句乃全卦要領如損卦所云其道上行也惟乾道下行而為震以巽夫是以動而有所入利有攸往焉无入而不自得也利涉大川焉視險如夷也初柔上行於外卦之四攸往也全卦以三四為中四以柔居柔正也震木而動上乗以巽之風故曰木道乃行也安溪李氏説日進無疆曰為學之道志氣奮發而有沈潛之功以濟之則心與理互相𤼵竊按日進无疆即包有大象遷善改過在内初自四而下為天之施四自下而上為地之生合訂曰天地之施生有時而無一定之方時之所在即理之所在與時偕行益乃無疆矣大可毛氏曰損上益下猶之損下益上也而升損卦兑之二畫於五以成倒兑是兑多説亦多也自上下下猶之其道上行也而降否卦乾之四畫以成大離是離大光亦大也象曰風雷益君子以見善則遷有過則改安溪李氏曰雷𤼵動其陽氣故有遷善之義風消散其隂氣故有改過之義竊按四之陽下居於初奮𤼵而有為初之隂上居於四小心以事上遷善也陽原在四避其勢而不敢乗權隂原在初振其靡而不甘在下改過也初九利用為大作元吉无咎象曰元吉无咎下不厚事也初變觀觀盥而不薦有孚顒若傳曰王者中正以觀天下下觀而化夫中正以觀天下則無為而治矣非無為也因民之所利而利之而已下觀而化則順帝之則也何以順之出入耕鑿不識不知而已所謂利之而不庸是故元吉而傳曰下不厚事也此爻諸儒之説皆未安獨仲誠張氏為得而大可毛氏尤加暢焉其説曰上之益下不必真有所予也夫予下㡬何而使下自益則無盡故自益之道莫如農事彼自耕植方興即謂之作書曰東作是也耕植具舉即謂之大作史曰大興農功是也蓋初二皆地道而初又民位則正小民力田之事子不云乎神農氏作斵木為耜揉木為耒耒耜之利以教天下蓋取諸益則在周易未演時亦即於益象見農事焉況初為震剛震於卦為稼於方為春於時為三月而以全象言則坤土在中前巽入而後震動有如耒耜且以震巽之木大離之牛而加於三坤之土間艮手持耒震足動耜進退田間無非耕象而初以震剛當之則彖所謂自上下而利攸往此其利也蓋不竭民力而大有功上之益下者益是而已六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也二變中孚故與損之五爻其詞無異然損之五君位也故吉而曰元此臣位也則吉而曰貞而又曰永貞者震遇兑懼其或動於容説焉故必能利幽人之貞而後克當帝心之簡亦必能隆廊廟之薦而後不同山澤之癯此永貞曰吉而王用享於帝亦曰吉也夫天位天職天禄皆非人主所得而私者則不必如堯之於舜舜之於禹始然也即大賢大用小賢小用皆為薦之於天焉第用之惟五則所以益之亦惟五而何以曰或也蓋五與二一中相契通乎至微質諸鬼神而無疑者損之五緣二以仁義道徳時為啓沃不見其益而日益也此卦之二則五以勞來匡直使其自得亦不見其益而日益也且五為正應有益人之徳乃居其所而不下既不言所利四實自上下為成卦之主乃又下至極下應初而不應二是則所以為益者但知其自外卦來而不知其為何爻也故曰或也六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也三變家人震遇離動而麗乎明則險阻艱難皆所以動心忍性曽益其所不能故曰益之用凶事三多凶而處互坤之中説文謂穿土交陷而成凶象是也且益之所損者四而為益者初其二三則同受益者也然初擅益之權故其益也大二比於初故其益也微三則與初逺而近比於所損之四則為損顯而為益更隠矣其實非損也益也又下震動而上巽入始之以𤼵奮繼之以沈潛故益用凶事而有有孚中行之象彖傳益動而巽日進無疆正指此爻蓋以内卦論之三不中而六不正以上下兩卦統論之則三又為中合震巽二徳而處其中以中行也且又處大離之中而變氣又為離有孚中行也中互坤艮二土故象圭上巽為倒兑而口開於三之上告而獲命也告公用圭者益用凶事其始莫不以為苦及有孚中行而後乃今信之曰其苦我者其成我者也則上下之情洽矣其在家人之三曰家人嗃嗃傳曰未失也與此爻詞正互相𤼵明所以謂固有之者三於卦原為凶位或又曰素患難行乎患難也此可以概有孚中行之意故𫝊不復釋云六四中行告公從利用為依遷國象曰告公從以益志也四變无妄巽遇乾乾為君有國象合訂曰内卦在否為坤六往居四二三四又互坤坤為邑内坤變為互坤遷國象大可毛氏曰四以否之坤柔遷而為益之巽柔而此巽柔者仍居於坤土之間是遷者國而所遷者亦國也兩説俱好三四皆在全卦之中三以不當位故必有孚而後以中行四則正當位故直曰中行也巽為命倒兑為口變乾為言皆有告象三四之公皆五也三與五隔逺臣也故通信用圭四比五近臣也則直告之而承其命故曰從夫遷國何利其所用以為利者依也傳曰周之東遷晉鄭焉依今四以柔居上則必以剛為依依之者初是已毛氏又曰初本四所來亦四所應以所來之方而居之所應之地則向之以四易初者下之所從益而今之以初應四者又上之所由依也説最精妙又合訂曰益之四即損之三為依猶夫得友夫損以上為友則益自以初為依矣鮮來氏曰九五坐於上三隂兩列於下中空如天府上下二陽為藩屏一統之象四為成卦之主所以為益者也故傳曰以益志焉九五有孚惠心勿問元吉有孚惠我徳象曰有孚惠心勿問之矣惠我徳大得志也五變頤頤養也彖曰聖人養賢以及萬民正此爻義卦體大離變氣又成大離故兩言有孚上有孚惠心者四也聖人之養賢也下有孚惠我徳者初也聖人之養賢以及萬民也五以益為志而四同焉此有孚惠心也四與三二互坤仰以順承乎五俯以順及於初俾陽和之澤下逮焉詩所謂羣黎百姓徧為爾徳爾徳即我徳此有孚惠我徳也然何以曰勿問勿問者無所為命令誥誡也夫益下之權君操之非人臣所敢干故四雖為益主而禀命於五五則以剛中任之俾得展其宣猷布化之才所謂得人則逸故不言而信也元吉者始而吉也外卦本乾乾始能以美利利天下不言所利故曰元吉也惠徳則有政可紀矣大得志大者得志也蓋損其剛以益柔而柔果益焉是則大之志得矣巽為命倒兑為口問象互艮變氣亦成艮勿問象上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也上變屯澤不下逮中道而屯其膏者也又巽遇坎巽為進退不果故恒之三與此皆曰勿恒坎為心病故曰立心此不益之戒也上以剛乘剛而無以益下則下誰為益之者且悖而入亦悖而出或將擊之矣夫下之惠心每視乎上之立心原夫轉易之法以益與損對者視卦畫言也若以卦名則風雷之益當對夫雷風之恒夫雷風為恒則反之而非不恒乎蓋風散其下而雷升其上恒也風在於天則隂不散雷隠於地則陽不伸不可為恒也即以卦名推之風雷不恒見是上之與下者無恒産由於上之自立者無恒心上之自立者既無恒心而責下之有惠心也能乎夫下一無惠心則不我徳而我讐者遍國皆然矣此合大可毛氏之意為講若以夫子繫詞大傳釋此爻義則安其身而後動易其心而後語定其交而後求者恒也修其三者故全全者偏之反則勿恒者必偏矣是以曰偏辭或之云者傳以為自外來所謂舟中之人皆敵國不必其為意中之仇讐矣蓋為國家計長久者未有不以益民為亟者也苟不求所以益民則草竊苟偷之流耳故觀上爻之變為坎盜而聖人繫之以立心勿恒㫖深哉安溪李氏説損益二卦曰陽實隂虛實者益物虛者受益故以三隂三陽之卦裒其一陽以相與謂之損益然非損其近上者則不達於上不至於上之上亦未足以見其為益上也非損其近下者則不達於下不至於下之下亦未足以見其為益下也又澤益深則山益高亦損下益上之象風之宣散助雷𤼵生之勢也亦損上益下之象程子曰譬如壘土損於上以培厚其基本則上下安固矣豈非益乎取於下以増上之高則危墜至矣豈非損乎竊按損下益上必下之已盈而後損損上益下當下之初虧即已益亦可見上下相交之義然兑方見其損之形而艮已止之震以起其益之勢而巽隨伏焉損極必益益極必損故雜卦傳曰損益盛衰之始也乾下兑上夬揚於王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而説決而和揚於王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也夬為剛決柔彖既以體釋其名義又贊之曰健而説決而和蓋以健説之徳決去隂柔則事不迫而從容以就理矣揚於王庭諸家皆謂聲罪致討果爾則彖何以曰柔乗五剛或曰柔以一隂而乗五剛此其罪之當決者尤曲説也來注曰正罪合志即是戎矣皆非也竊按一隂加於五陽之上而五近與之比五君位上在卦外故曰王庭乾君兑説上為兑主所謂容説之臣也以所説者在五之上則君尊顯之矣故曰揚於王庭補注謂夬揚於王庭五字連讀謂決其揚於王庭者與同人於野否之匪人履虎尾一例良是孚者積誠以感君也指二與五號者呼朋以合志也指五陽爻二五皆剛中兑為主故曰號有厲者戒懼以致其謹密也謂上與五比又與三應夫既為君所䁥近則去之難而朋儕中又有應之者去之又難故曰有厲此如遇大敵者臨事而懼好謀而成矣傳所云其危乃光也二在内卦之中為邑易凡言内治皆曰邑泰謙晉之上爻等是也兑言為告告自邑者下卦乾健之自强也不利即戎者上卦兑説之無爭也利有攸往者乾之自强不息兑之和而不流也凝庵唐氏曰以攸往為利者以往則陽必盡長而後有終也不得不決又不敢輕決必待剛之自長而為攸往之利則知決之之道矣舜臣李氏曰一隂者衆陽之所與上六雖處至窮之勢然九五與之比九三與之應九四與之同體其與之敵者惟初九九二耳又逺於上雖欲決之其勢有所不及故曰有厲卦詞有戎九二有凶上六夫有之為言不必然之詞也五陽相信而不忘於號今知其危而戒之斯有萬全之勢無一跌之虞矣雲峰胡氏曰小人有一人之未去猶足為君子之憂人欲有一分之未盡猶足為天理之累夬之陽必至於純陽為乾方為剛長乃終要味三箇乃字又曰五剛共長一柔自去所謂君子盛而小人自消不必聲色也復齋易説於剛決柔曰志於乾健而説決而和曰顔子㡬之復者其始夬者其進也柔乗五剛曰心象王庭其危乃光曰克己者如臨深淵如履薄冰所尚乃窮曰必有事焉而勿正剛長乃終曰至於乾此與胡氏皆不專主決去小人説極有意味象曰澤上于天夬君子以施禄及下居徳則忌大象不過取澤水之氣上蒸於天自沛為霖以為君子施禄及下之象不必拘拘於潰決為妥居徳則忌諸家皆謂居其徳而不徧於下則非潰決之義故忌第象傳例無反辭如此説是反其説以為戒非例矣故本義曰未詳安溪李氏則謂為以敬忌居徳防其潰也合訂同衷一李氏則云澤上於天萬物被其潤澤君子待小人之法上則決之下則養之事權雖不使與而禄有所及小人所以既畏其威復懷其惠惟吾之決而無不如意若居其徳而不施則小人絶望恩之想安知不挺而相鬭乎故忌加年堂講易亦如此此則觀於漢王允之於郭李宋元祐之於熙寧而為之説也初九壯于前趾往不勝為咎象曰不勝而往咎也初變大過四陽曰大壯此於大壯之初陽下又一陽進故大壯之初曰趾此曰前趾也大者過故有不勝為咎之意不勝者不勝決之之任者也象故曰不勝而往咎也則不待其敗而已知之矣九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也二變革本氣則乾戰故曰惕乾又為言故曰號變氣為離二地位離日在地莫夜象言其謹密也戰乎乾離為戈兵有戎象離者坎之反也坎為憂離則勿恤矣上曰惕下又曰勿恤者君子小心以成事然未嘗避禍也有戎勿恤決矣惕號莫夜決而和矣説統曰和乃事合機宜動中肯綮之謂非柔和之和也九三壯於頄有凶君子夬夬獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也三變兑本氣之乾為首而三又下卦之上有壯頄之象變氣之兑為附決上下兩兑故曰夬夬諸爻皆以健致決三則悦而與應與衆異故曰獨行上兑之澤為雨應上曰遇亦變澤為濡本氣實乾故曰若濡而非真濡者也連四五互巽多白眼而上視故曰有愠九三過剛不中而與上六應健而變悦有色厲内荏之象故曰壯於頄二五君臣皆剛健得位初與四又以剛徳助之三處於四陽之中雖欲貌從心違獨與上六為應不可得矣且恐以其黨而并及之也故有凶若以本氣之乾健從乎變氣之兑悦附於其内而決之必此志堅而又堅則外雖若與諸正人違異而染其汚實則委婉以濟事也何咎之有蓋始而遇雨則咎其失身有愠則咎其敗羣然而其跡也及至一隂退聽心事大白亦可即終而諒其始矣傳故曰終無咎也然則深避形跡而不顧國事者當非忠智之士所出也已三爻原有凶吉二義聖人兩舉之以示懲勸焉大可毛氏曰形於面則有凶拂於心則无咎此説有无二字甚有著落夬夬者兩兑也余為此説後見漢上朱氏易已言之可謂先得我心矣九四臀无膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也四變需兑遇坎坎二隂同體而相背又居上卦之下故曰臀需有待也為臀則可坐以待矣然以本氣之剛不中不正而又變而好險則不能坐待有無膚象需不進也故曰其行次且傳曰位不當若剛而當位則進而決之矣牽羊者兑為羊牽者牽連也羊以羣行不必拘作以繩牽羊諸儒解此爻多鑿而無當竊以四大臣之近君者而不中不正則有權位而無其才目擊君側之惡坐視既不安臀無膚也獨行又不能其行次且也然羣陽在下進之即皆可以有功為四計者惟有汲引正類以人事君庶可藉以補過耳蓋變氣為需待之有不速之客三人來敬之終吉故曰牽羊悔亡也然既不中不正則心無權衡而又險以傲物則其聞牽羊之言必不能信其能免於悔也哉乾為言兑為口坎為耳痛有聞言不信象又離為目明也坎反離故曰不明第聞言不信當曰不聰而何以曰聰不明蓋耳聞其言可謂聰矣而不之信是雖聰於耳而實盲於心也故云然安溪李氏曰當夬之時名義正事勢順鮮能審已從容以合於所處之道者故聞言不信莫此為甚也九五莧陸夬夬中行无咎象曰中行无咎中未光也五變大壯兑遇震五位高震為大塗故曰陸莧性隂種於三月夬三月卦也故曰莧兑為附決震為決躁本氣變氣皆決也故曰夬夬莧生於陸夬夬者既決莧并決陸所謂除之使盡無使滋蔓也大者既壯故擅其決之之能有如此以五之剛健中正而傳猶曰未光者非以中行而猶未光以其中未光故必中行而後无咎耳蓋五切近上六比而悦之六得以肆寵而揚庭者五實為之猶陸之生莧也今乃迫於衆論不得已而去之得勿有所係累而不能自割耶故必痛自克己而滌除其所以䁥近小人之私則小人不待逐而自逺矣所謂中行无咎也不然去一小人又一小人進陸實在焉莧可得而盡哉卦詞所云告自邑不利即戎者此也上六无號終有凶象曰无號之凶終不可長也上變乾則隂邪已決去而无所用其號矣然生於憂患死於安樂無所號者終必有凶也君子所以終日乾乾務使剛徳日長以終其身若以為既安且寧而无所戒嚴焉則剛不可長而何以有終耶此用安溪説長字讀上聲即卦詞所謂剛長乃終之㫖合訂引胡仲虎説亦如此諸家皆謂上六受決而無所號於五於三則是隂不可長夫易豈為小人占哉且其説亦甚無謂也巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉諸家皆以無心而遇説姤字與卦及彖傳不合又以一隂始生為女壯亦非夫一隂始生甚微何以曰壯安溪李氏以為卦以一隂為主而遇五陽則非剛之遇柔而柔之遇剛也謂以隂先倡而與陽遇故為女壯此義頗是但謂一隂遇五陽亦未免沿襲前儒之説觀上卦之彖傳曰柔乗五剛此但曰柔遇剛則知非以一柔而遇五剛乃以内卦之柔而遇外卦之剛也此遇字當作欵接之義蓋内為主而外為賓二爻曰不利賓傳曰義不及賓分明以四爻為賓觀之四亦曰利用賓於王可見且律以五月一隂生之卦為蕤賓姤五月卦也義正謂此先儒皆泥為不期而㑹為遇字正解大非孔子彖象傳之㫖嘗取復姤二卦而推言之復以坤順而當震之動陽倡隂和陽將日生而不可已故曰朋來非以一陽初生即為朋之來也姤以乾健而值巽之入隂内陽外陽則伏入而制其權繫詞傳曰巽徳之制也雜卦傳曰巽伏也又曰巽以行權故曰女壯非以一隂初生即為女之壯也以柔而遇剛即是女壯且巽長女也故彖傳不復釋焉勿用取女不可與長夫婦之道不可以不久也女壯則非能宜家者矣豈可取乎又敬承程氏曰大凡小人之漸長必有君子以引之如馴致堅冰之類與之長則長矣故曰不可與長戒君子也此以消長之長言之亦好天地相遇即反復其道七日來復之義第於復言之者喜陽之復來也於此卦止曰女壯勿用者懼隂之為主也夫子又恐人泥於勿用之詞而致有亢龍之悔也故特補出此義蓋天下無孤隂獨陽之理此固合復姤二卦而概論之也若以為天地之氣相接則是泰與既濟矣大可毛氏曰坤之所始即乾之所終天地相遇時至則然況姤辰在午五陽丁夏以仲夏恢台之候加之南離長養之時品物咸章天下於是觀姤遇焉説甚佳剛遇中正天下大行夫子又從二五爻詞看出來毛氏又曰姤而未遯則二尚為陽姤而未剥則五尚為陽從來隂長陽消迭為盛衰二五雖中正亦何易得此並據陽剛之世自遯至復為六二者六自剥至大壯為六五者六若二五皆九惟乾與夬姤而已以隂而遇陽則為詭遇以二五并據陽位則又為殊遇此説亦佳蓋專其遇女壯之不善者也相為遇物亨道行之善者也凡此皆時而已故合善與不善數義而贊其時義之大也象曰天下有風姤后以施命誥四方上乾為君后象為言誥象下巽為命四方者巽為風也安溪李氏曰風非隂氣而散隂因風可以驗隂氣之至此語説姤之象甚確夫隂靜而陽動者也靜易凝滯動易𤼵洩復一陽生而象曰至日閉關所以蓄其初𤼵之氣而不令其洩姤一隂伏而象曰命誥四方所以散其易凝之勢而不使之滯正先王調變隂陽處初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也初變乾巽為木柅象乾為金故曰金柅巽為繩繫象乾在巽口在下豕象初生微隂羸豕象初蹢躅象孚者信足而行不可得而閑也豕性汚濁信足而行則汚濁將無所不至矣詩所云不可道也言之醜也巽伏而依於乾之特立比於二貞以自守也則為繫於金柅巽入而輔以乾之妄行應乎四而有所往也則為豕孚蹢躅吉凶二義聖人備舉之以示懲勸焉傳曰柔道牽牽者合也非牽引牽絆之義九二包有魚无咎不利賔象曰包有魚義不及賔也二變遯巽遇艮巽艮為禮讓容止故有賓象魚謂初六也安溪李氏曰包容也制也容之故能制之二以剛中而遇初隂能制而伏之故曰包有魚仲誠張氏曰九二既包初六則其餘之剛皆不得與柔遇矣故不利賓利者義之和非利害之謂夫子釋之曰不利賓者義不及賓也蓋婦人以從一為義初既比二則不宜更應乎四二既有魚則四自無魚矣大可毛氏曰初二為半坎坎為豕而半則嬴之又曰二在倒兑之中為澤故有魚易曰九二剛中身任制隂之責不委其事於四故曰不利賓蓋戢惡防奸義當為則為之若自已不做靠他人做則非義矣故賓在上而不相及也此説亦有味九三臀无膚其行次且厲无大咎象曰其行次且行未牽也三變困巽遇坎本氣之巽伏將坐而待初之來遇矣而變氣則險而難安故有臀无膚之象將巽入而就之而阻於險也故有其行次且之象易氏曰夬以上為決而四阻於五姤以初為遇而三阻於二故臀无膚行次且吕氏曰後不如二之能比故臀无膚前不如四之能應故行次且二説可參看也巽為股三居巽上則為臀以其股也有行象又為進退不果有次且象巽其究為躁卦究則窮也三為巽之窮故其象如此三以陽居陽正也守正而不中是執節過甚者也不苟合則孤立而危是以厲然不過不得所偶而己无私遇亦何至於比匪受傷而大有咎乎傳曰行未牽以初與三行列不相牽連也九四包无魚起凶象曰无魚之凶逺民也四變巽四與初應卦之所謂取女者也宜為柔之所遇矣然初為卦主而二己比之得所遇矣四又以乾健變為巽懦又烏得而蓄之乎故曰包无魚夫子釋之曰逺民蓋四以不中正而失其民非民之逺實自逺其民也童溪易傳曰有夏之民癸之民也民不癸之應而湯之遇癸實逺之而湯實近之故也有商之民辛之民也民不辛之應而文武之遇辛實逺之而文與武實近之故也所謂民無常懐懐於有仁易傳曰遇之道君臣民主夫婦朋友皆在焉然則象雖言民凡為君臣夫婦朋友者皆不可不知此義起凶與見凶同言非顯然之凶也凶由此見由此起耳九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也五變鼎乾遇離乾為木果杞與瓜象離中虛含章象乾為天巽為命故曰有隕自天隕者命也以杞包瓜自傳義以來諸家之説皆多未安竊由四之象傳逺民二字看來似以二為杞以初為瓜紫巖易傳曰二居巽中有剛徳為杞初以柔居巽先為瓜是也蓋杞生於地而高參天二以賢士升田間而徳合於君似之瓜蔓於地而子離離其中又善潰初以小民處卑下而衆姓繁庶徳我則后虐我則讎也似之夫鼎以大烹養聖賢者也五用二以治初以杞包瓜也既有二以代天子民則五可無為而治矣是以含章余作是解而未敢自信既而讀易小傳紫巖易傳漢上朱氏易童溪易傳皆如此可謂先得我心者矣然其解志不舍命則童溪易傳為尤詳其説略曰一隂浸長陽道消剥者天也厚下以防中潰者人也在我者未中未正是吾憂也既中矣正矣或不遇而至於隕越者亦天之命也故含章以俟命者九五之志也雖然命天理也在天謂之命在人則中正之徳徳藴於内則我外無別有天矣天人之理相合而不相舍則天命之脩短又在我而不在天矣夫何隕越之有哉召誥一書之㫖祈天永命一語而已夏殷天命不敢知惟不敬厥徳乃早墜厥命王其疾敬徳用祈天永命吾以是知九五有中正之徳志不舍命其能祈天永命矣有隕自天非所患也上九姤其角吝无咎象曰姤其角上窮吝也上變之大過乾遇兑乾為龍兑為羊故有角象與九三義同而詞殺於三者安溪李氏曰上在事外三則與初同體相近故尤危其詞也坤下兑上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣萃有大坎象坎為宫中爻互巽艮巽木在艮闕之上廟象坎為隠伏鬼神象九五中正大人象坎為豕兑為羊坤為牛為馬大牲象王假有廟莫敢不來享也利見大人莫敢不來王也用大牲如堯舜禹薦舜禹益於天也利有攸往順乎天而應乎人也仲誠張氏曰九五為大人聚以正其聚乃亨非大人不能聚以正故萃之時利見也用大牲二句諸家皆謂豐所當豐行所當行以為順天時説皆麤淺張氏則云萃之時衆聚矣天視自民天聽自民大人舉大事聚大衆則用大牲告廟而往非一人之私謀合衆心即合天心故云吉也竊按利見大人亨利貞者四以衆隂萃五也用大牲吉者五之用四以萃羣隂也安溪李氏曰苟與其情相違則必離而去之故觀其所聚則情可見此著眼情字甚有味元成朱氏曰屯者塞而不通者也而利建侯豫則既通矣亦利建侯渙者散而不聚者也而假有廟萃則既聚矣亦假有廟蓋方塞而求通與既通而防塞者無異視也方散而求聚與既聚而防散者無異視也此聖王慎終如始之道也以一人通之何如以衆人通之則建侯之説乎以人道聚之何如以天道聚之則立廟之説乎象曰澤上於地萃君子以除戎器戒不虞孩如鄭氏曰水澤之氣上於地則萬物無不𤼵生滋長蒙引亦云凡有生氣流行而在地上者皆澤也即庶物也凝菴唐氏曰取澤之畜以畜戎器謂之除防澤之潰以防不虞謂之戒初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎象曰乃亂乃萃其志亂也初變隨故爻詞亦與隨之初九相似蓋坤遇震坤順故有孚變為震之決躁故不終是其萃也乃亂而萃耳所謂烏合之衆是也夫民非喜亂乃迫於時勢之激遂至於掉臂不顧揭竿而起一時之心力亦未嘗不齊也然非素定久則必變故有孚不終若輸誠而得所歸則衆可不散蓋初民位上連二三羣隂無統有乃亂乃萃之象與四正應四以剛萃之有若號一握為笑勿恤之象變氣震往象此仲誠張氏之説也勿恤與笑連言樂而无憂也傳曰其志亂言其心志之不齊則并有孚不終亦釋之矣觀此爻想見秦項亂時彭布等烏合其衆而王陵獨以軍歸劉其景象可見六二引吉无咎孚乃利用禴象曰引吉无咎中未變也二變困遇坎坎為隠伏鬼神象故言用禴困二爻亦言享祀引吉合訂謂引初與三而萃于五竊以引兑例之當作五引之困二爻所言朱紱方來也坎險又為心病易故于坎多言孚孚乃利用禴則左之明信澗溪之毛蘋蘩之菜可薦于鬼神者也安溪李氏曰用大牲敬之盛也用禴誠之專也二居下位貴以素誠獲上萃升之義同也合訂𤼵揮此義甚精詳夫士君子為君所引用至于諫行言聽可謂孚矣而或不免恃寵而驕沾沾自喜如王景略姚元之輩蓋雖賢者不免也故惟以約則履尊處優而不改其幽人之貞道始善焉傳曰中未變是并用禴句而亦釋之矣六三萃如嗟如无攸利往无咎小吝象曰往无咎上巽也三變咸遇艮三與上无應而變氣又艮止故有萃如嗟如无攸利之象若舍其應而于所承比之四異體以相從如隨之三四則往而无咎矣咸之三爻亦曰執其隨是也所以然者𫝊曰上巽也蓋三四雖異體而與上互巽順而入其情近耳苐牽于優柔者則有所不及而吝矣九四大吉无咎象曰大吉无咎位不當也四變比兑遇坎四以剛臨于衆隂之上此以大臣而當天下之萃者地近而偪權重而尊危疑甚矣變而為比則合羣隂而萃于五非心地光明無一毫之私者不能也此伊周孔明之象故曰大吉无咎易以陽為大隂為小必正大盡善然後无咎者𫝊所云位不當也使當其位則如比之吉而不言无咎矣九五萃有位无咎匪子元永貞悔亡象曰萃有位志未光也五變豫王者逸于得人故萃有位以九四比䁥在下之羣隂而五為所隔則五所能萃但萃其有位者而已然能任賢以萃天下則臣之功即君之功也故无咎第以兑説而變震動惟豫樂之是耽則未免以上六之近比而䁥之故有匪孚象傳所云未光也上无位而與五隂陽相比爻詞故但曰萃有位則不欲其比匪可知蓋一比匪則喜佞必且惡直而四又以剛正萃衆權勢相偪猜忌起而禍亂生其為悔也大矣然本氣剛中變氣震動非無為之主也夫乾徳首元坤徳終貞剛中則有乾元之才而帝出乎震動則必變是以全乾之元變坤之永貞者也五有如是之徳豈有孚于匪而不萃有位以萃天下者乎是以其悔可亡也漢文寵閎孺籍孺鄧通輩而不以之間大臣似此爻之象矣豫之四爻曰由豫大有得勿疑朋盍簪然則此卦以四為萃主又何疑焉又按萃與比義頗相似但比止五一陽而為羣隂所比義專主君萃以四五兩陽而萃上下四隂義則兼君臣蓋比以心言若兼比于臣則人有二心矣萃以事言夫勞來安集萃天下之衆而使之聚非一人之力所能為也故必得大臣如蕭何寇恂李泌陸贄之人而用之故卦詞曰用大牲吉也乃比之卦詞與此爻詞皆曰元永貞者以比之一陽不得以二之應而私比之不得以四與上之近而私比之故九五曰顯比也此九五則不得説上六以間四而不萃之不得憚九四之剛逼而不聽其萃之故曰萃有位也上六齎咨涕洟无咎象曰齎咨涕洟未安上也上變否否之上爻曰先否後喜意亦與此相似傳曰不安上上在卦外不安置身于局外而求所以萃之者也安溪李氏曰萃有利見大人之義而上近九五與蹇之上六同不如蹇上之吉亦不如比上之凶者無蹇往來之義亦無比後夫之象也竊按初與二皆有正應故皆曰孚其曰號曰嗟如曰咨涕洟者李氏又曰凡上下親疎至于離異不能相同相萃者惟哀誠懇切庶㡬有以感動説甚精此陸贄所以以罪已説徳宗下哀痛之詔也歟巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也至柔莫若坤柔升坤升也明夷師復泰謙之上皆坤也何以不為升以巽入於坤之下為升也蓋巽遜也巽既遜而入於下則坤升矣然則非坤之能升而巽之升也以巽之時義在焉故傳曰柔以時升至臨以四隂駕二陽而上之何以亦無升義也蓋臨則主乎二陽之生而寖盛升則主乎一隂之透而上騰隂之性伏而善藏者也巽之隂方潛而坤冒之其氣升矣補注曰坤之成始於巽之一隂漸升而至坤故曰升玩詞曰凡升者皆自初始初六為成卦之爻馮氏亦曰諦觀卦義皆主巽是也安溪李氏曰按卦下直言元亨而無利貞之詞者三大有升鼎也皆自賢人取義然大有鼎皆無他詞升則申以吉利之占蓋大有能有賢也鼎者能養賢也皆主於在上者而言故曰元亨其詞已足升之義兼乎在下者故言元亨又言其見大人之喜南征之吉也又曰訟蹇萃巽之象皆曰利見大人此曰用見大人者曰卦之大人皆以九五當之故曰利者有大人於此而利見之也升則卦無九五其六五之升階與晉之六五同皆謂升進之人耳故不曰利而曰用言用此人以見大人也隨之上益之二卦之四爻所謂王用者皆此意仲誠張氏亦曰九二剛中本為在上大徳之人乃主巽而居下終欲遜位於賢此堯舜禪位之事然則用見大人亦如堯薦舜於天舜薦禹於天矣勿恤者以貴下賢當獨斷於中無得憂疑自阻所謂任賢勿貳也如此則明良㑹合相得益彰傳所云有慶者此已孩如鄭氏曰以順而升不躁不競之謂時即漸卦漸字之意安溪李氏亦曰升晉之道皆以柔靜順正為善而柔爻皆吉漸之義亦然象曰地中生木升君子以順徳積小以高大蒙引地中生木不可説成地上生木蓋取巽居坤下而言木伏生意於地之中而後𤼵達於地之上所謂其根深者其末茂朱子云因其固然之理而無容私焉者順之謂也竊按即中庸率性謂道之意順徳坤象也初六允升大吉象曰允升大吉上合志也初變泰巽遇乾乾健行而初以一隂與坤柔合故曰允升泰天地之氣通也故傳曰上合志子瞻蘇氏曰所以為升者巽也所以為巽者初也故曰允升雙峯饒氏曰初六一爻為成卦之主升之所以得名者繫焉以兩體觀之巽在坤下如未出地之木初其根也方其勾未萌甲未拆而根株已備其勢必破地而出上升而莫禦者皆由於此故有允升大吉之象又白雲許氏曰初六居衆爻之下沈滯而難升者能自信之篤確然不疑終自拔於沈滯之中故言允升而致大吉也安溪李氏曰晉至三而後衆允且僅曰悔亡此則方初而曰允升大吉者晉三之允在下三隂升初之允在上三隂也故晉三之傳曰志上行而此爻之傳曰上合志玩詞亦曰不獨四爻為應凡上三隂皆與之合故其升也上皆允之所以在六爻之中獨為大吉又曰升坤在上下升而上允之則其升也可以大吉而無疑晉坤在下為衆已進而衆允之則其進也免于媢嫉之悔而已九二孚乃利用禴无咎象曰九二之孚有喜也二變謙巽遇艮艮止故不言升復齋易説謂為謙五信然巽為徳之制又曰行權是有感意艮為篤實故言孚而用禴易小傳曰禴薄祭也謙不足也謙者天道所益鬼神所福有喜之象也童溪易傳曰當柔升之時卦惟二剛而九二剛中又巽體也故无過剛之失而足以上應安溪李氏曰升之陽爻非時物也以其剛中而應故无咎仲木吕氏曰主升之君而才弱當升之臣而質剛天下所疑也孚而用禴質諸鬼神且不疑而況于一體者乎雲峯胡氏曰萃與升相反萃之二宜如損六二言之于反卦六五可也今皆在下卦中爻言之何哉萃六二求萃于上升九二求升于上故其義同元量李氏曰萃之二柔也則易于進之易故引吉无咎而後孚乃利用禴升之二剛也剛則能審義以進故即其才孚乃利用禴而无咎也項氏玩詞亦云萃之六二自下萃上上喜而引之固已吉而无咎矣而又於其時義當用大牲惟二之事五可以不用故于无咎之下別明此義升之九二自下升上非上所樂必如二五之孚有喜而無忌乃可用情于五而无咎也苟上下之間未能以情相與而强干之豈所謂巽而順乎故此句在无咎之上為本爻之主義孚者五用情于二禴者二用情于五也安溪李氏又曰此不言引者剛柔之義合觀諸説而萃升兩卦爻義盡矣而楊誠齋謂臣有所當然則遂事而不為專上有所重𤼵則衡命而不為悖此又廣用禴之義也九三升虛邑象曰升虛邑无所疑也三變師巽遇坎三過剛不中當升之時居巽之極遇坎則冒險輕進升而為師衆順而從上坤為國邑而隂虛也故有升虛邑之象巽為不果三升上巽毁則進而無所疑矣師之三爻亦有輕進義安溪李氏曰或躍在淵進无咎也進而无所疑其可乎比之升山升階之漸而順其義不同明矣故諸爻皆有吉利之詞而此獨否以當升之時也故亦不言凶咎先儒皆以此為湯武之升二五為舜禹之升蓋自四爻詞而例之耳晁氏案古篆文無墟字以四邑為邱邱為墟據詩升彼虛矣則以為邱墟亦通六四王用亨于岐山吉无咎象曰王用亨于岐山順事也四變恒坤遇震動則順而有所事矣安溪李氏曰以柔正居上體之初升之最順而善者人有此徳乃神明所登進所謂雖欲勿用山川其舍諸故王者當用之以亨于岐山乃為順事鬼神之道也不言西山者卦有南征之義不欲錯其文也不曰亨于帝者言亨于岐山則其為神明之亨可知矣據此可見爻義不過偶舉一事一物為象甚活潑潑地乃指太王指文王紛紛諸説亦太泥耳然順事鬼神不如直指此為順事夫孝為順徳此為順事所謂郊焉而天神格廟焉而人鬼享者也合訂亦謂為使之主祭而百神享之是已二嫌五不言升四亦不言升者進齋徐氏曰承五近尊其位不可升也故在二言孚在四五言順其義可槩見矣六五貞吉升階象曰貞吉升階大得志也五變井遇坎井之五爻曰井冽寒泉食蓋功及萬物也故傳言大得志所謂大二之陽爻也所謂得志澤加于民也先貞吉後升階者五以其貞而吉故二得厯階以升也貞者固守其正致一而勿貳也吉者吉祥善事為天下而得人也二已為五所升矣乃止言升階者巽之徳然也若以升階屬五則不應先言貞吉矣凡坤在上卦下應九二者無不以克己虛中之意為言如泰之歸妹師之帥師明夷之利貞謙之以鄰征邑國皆是此爻先儒謂升階屬五與屬二者各半觀于諸卦象則知屬五者未確矣升階小傳輯説皆謂升之有序良然紫溪蘇氏曰階即階級有次第而升者所謂積小而高大也有循序漸進之天徳便可以語必世後仁之王道此又一意上六㝠升利于不息之貞象曰㝠升在上消不富也上變蠱坤遇艮地而為山隂長上極也故曰㝠廾順而止之升者不升也故曰不息風落于山其實必隕也故傳曰消不富蓋蠱則飭也有整頓意是以曰利不息之貞傳所謂以小人貪求無己之心移于進徳則何善如之叅義引中庸弗得弗措而愚必明柔必强為言紫巖易傳曰向晦曰㝠其貞不息則有出晦之道猶日月之行地中也復齋易説曰終而復始無止也玩辭曰既已至五無所復升惟有黙升此道而已故曰㝠升九三自已而申盈變為虛上六從申入亥虛變為㝠此乾居西北之時也故曰貞自物言之消而不息謂之不富自道言之貞復為元坤之上六乾實居之何不利之有故曰利不息之貞合觀諸説則謂升無可升為消而不富者淺矣且夫子象傳亦不應止贊㝠升而於不息之貞精義反遺之也安溪李氏曰言上六以柔居柔故雖㝠升在上而能自消損不至盈滿晉上之伐邑亦以其有剛徳故也蓋消對息言不富即不息也則不息之貞即是㝠升在上君子為善惟日不足小人為不善亦惟日不足孳孳為利孳孳為善其欿然不足之懷一也若謂為貪求利欲者戒易豈為小人占哉如此則程傳移于進徳之論猶似未合象傳之意竊按乾之用九見羣龍无首乾之始于坤也坤之用六利永貞坤之終為乾也不息之貞不息即是貞非貞于不息也君子能自强不息此其所以積小以高大者歟然則此不息與乾之不息異乎曰無異也蓋不自以為息則日見其損者其進自不能已矣易翼述信卷七
