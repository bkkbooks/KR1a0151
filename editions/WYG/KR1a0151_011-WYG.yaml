body:
  text: 昜翼述信卷十一廬州府同知王又樸撰繫辭上傳天尊地卑乾坤定矣卑髙以陳貴賤位矣動静有常剛柔斷矣方以類聚物以羣分吉㐫生矣在天成象在地成形變化見矣是故剛柔相摩八卦相盪鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易従則有功有親則可久有功則可大可久則賢人之徳可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣闕上本乎地者親下春夏秋冬應乎南北東西髙下燥濕别為浮沉升降生殺之氣既異清濁之品亦殊此卦爻所以有吉有㐫也乾為天而在天者日月星辰風雷雲雨凡一切有氣者隨時而各成其象坤為地而在地者山川動植凡一切有質者随處而各成其形此乾坤之變化所以生六子以至生六十四卦也是故剛柔相摩即乾坤變化生六子八卦相盪即因而重之以生六十四卦鼓之以雷霆震也離也潤之以風雨㢲也坎也日月運行離日坎月也一寒一暑艮西北隂方也兑東南陽方也乾道成男震坎艮也坤道成女㢲離兑也言男女而凡飛潛動植之雌雄牝牡燥濕向背槩是已蓋舉天下之成形成象者莫不在乾坤變化之中是乾知大始坤作成物八卦之相盪者仍不出乾坤之一剛一柔之相摩也然則六十四卦即八卦八卦即乾坤矣夫天地間之成形成象者既自然有一乾坤八卦在焉則乾之知始其知也易矣坤之成物其能也簡矣然則體易之君子能如乾坤之易簡則一以貫萬其盛徳大業有不與天地參者哉此章説者不一有以前言造化之體用為未畫卦以前之易者然已言乾坤已言八卦已言其相摩相盪似不得謂其空空泛論一造化也即程子改八卦為八方之氣亦似未稳如其謂然則何不曰天知大始地作成物天以易知地以簡能天道成男地道成女耶且易簡後即言君子之徳業則亦未有不一言易而反先言體易者正不得以雷霆風雨日月寒暑之謂天道備於易者而仍屬之造化也至如卑髙以陳有謂為天地兼山澤者有謂為萬物者方以類聚二句有以方謂為事者有謂為方向方候東西南北之方者此皆礙下成象成形句竊按此只承上天地來虚虚籠統説為妙至大可毛氏竟以方為卦爻之方位而以陽聚隂聚分隂分陽為説則此下相摩相盪作如何解殊覺顛倒錯亂耳聖人設卦觀象繫辭焉而明吉㐫剛柔相推而生變化是故吉㐫者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉旡不利此言周易也上言聖人繋辭之通乎天下言君子學易之得乎天上節分一頭兩腹一尾下節分兩叚一結設卦與下設卦以盡情偽不同此只是就伏羲所畫之卦一陳設來看耳吉㐫者四句釋繫辭焉而明吉㐫變化者四句釋剛柔相推而生變化悔吝即在吉㐫分内進退即釋相推二字盖隂陽之消息為進退也人事之得失憂虞不外乎剛柔之盈虚消長天地人一理以貫之矣故曰六爻之動三極之道也夫既具三極之道則易誠不可以不學矣所居而安以身體之也所樂而玩以心契之也質庵孫氏曰序即時宜之理若有品第等次於其間不容一毫差越故曰序居安亦非繩趨墨守之謂只是循理而動即千翻萬覆而合之時宜若一定而不可易按自天祐之即天弗違也彖者言乎象者也爻者言乎變者也吉㐫者言乎其失得也悔吝者言乎其小疵也无咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辨吉㐫者存乎辭憂悔吝者存乎介震无咎者存乎悔是故卦有小大辭有險易辭也者各指其所之此章上釋彖爻辭之通例下明聖人繫辭所以示人寡過之心也前章之言吉㐫悔吝變化剛柔指卦爻失得憂虞指人事進退晝夜指天道若曰聖人觀卦爻之有吉㐫悔吝即人事失得憂虞之象也觀卦爻之有變化剛柔即天地消息盈虚之象也是推原所以繋辭之由以觀象為主故於辭有所不必備此則專以辭為主故由彖及爻而并及无咎也草廬呉氏曰列貴賤者存乎位覆説爻者言乎變齊小大者存乎卦覆説彖者言乎象分辯吉㐫存乎彖爻之辭覆説言乎其得失也悔吝介乎吉㐫之間憂其介則趨於吉不趨於凶矣覆説言乎其小疵也震者動心戒懼之謂有咎而能戒懼則能改悔所為而可以无咎覆説善補過也易酌曰龜山楊氏謂齊不是整齊如分辨之義竊意作整齊亦是言大大小小整頓齊一而不亂也不分辨將何以整齊又子瞻蘇氏曰隂陽各有所統御謂之齊按隂即小陽即大也又按各家言憂與震皆兩分説獨合訂串説謂憂之云何恐懼修省震之謂也震則悔悔者悔悔吝悔悔吝之萌於中也此旡咎補過之道也潘氏曰卦有小有大随其消長而分辭有險有易因其安危而别辭者各指其所向凶則指其可避之方吉則指其可趨之所以示乎人也易與天地凖故能彌綸天地之道仰以觀于天文俯以察于地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體此言聖人用易之事下皆承此而深贊之首二句贊易下分三叚上言聖人之窮理中言聖人之盡性下言聖人之至命末二句結彌即大徳之敦化綸即小徳之川流窮理一叚由幽明説至死生鬼神下以晝夜之道括之盡性一叚不違不過不流不憂能愛五句下以範圍二句括之葢窮理盡性之極致即至命也神旡方結天地之道易旡體結易之能彌綸故曰與凖紫溪蘇氏曰知周道濟與天地同事功旁行不流與天地同變化樂天知命則益無所違於天安土敦仁則益無所違於地龜山楊氏曰天髙地下必有方矣神則無方天圎地方必有體矣易則无體無在而無乎不在無為而無所不為也一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛徳大業至矣哉富有之謂大業日新之謂盛徳生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神此言天地之道與易皆不過一隂陽也上言天地中言易末通結上文而總贊之彦陵張氏曰此章大㫖只是一隂一陽之謂道便了聖人恐人外隂陽以求道故從一隂一陽上指出道來又恐人泥着隂陽求道故就隂陽中説箇不測來不測即是一字而神則所以贊道之妙非道外别有神也中間節節是道節節是神説統説繼字為接續不息之意然與之者二字語意不合應仍如先儒謂降𠂻為繼善有恒為成性意確仁者謂仁知者謂知所謂賢知之過百姓不知所謂愚不肖之不及故嘆曰君子之道鮮也來易獨謂仁知為性近之説非也仁謂造化之功用謂機緘之妙本義確不可易合訂謂顯仁為大業藏用為盛徳非與本義異也盖徳之𤼵即業業之本即徳無二事也庸成陸氏曰天地以隂陽鼓萬物其徳業之盛大能使人各一性而不能使之全其見啟其知故覺民以贊化育者惟聖人任其憂而天地不與焉於是列乾坤之畫開占事之門而易作矣按此則不與聖人同憂六字已從造化遞到作易聖言神妙如此又云易非他也即一隂一陽之道生生相推而生變化者也然即此生生處道行其中而人不知故謂之易安得就易之旡體而測之不可測非有外於隂陽也一一循環旡體自旡方所謂神而已矣此説最精透夫易廣矣大矣以言乎逺則不禦以言乎邇則静而正以言乎天地之間則偹矣夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至徳此極贊易道之大而歸之於易簡合訂曰四時日月天地之六子也竊按離日坎月震春㢲夏兑秋艮冬故曰六子子瞻蘇氏曰至剛之徳果至柔之徳深果則其静也絶意於動而其動也不可復囬深則其静也歛之無餘而其動也𤼵之必盡絶意於動專也不可復囬直也歛之無餘翕也𤼵之必盡闢也子曰易其至矣乎夫易聖人所以崇徳而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門此極贊聖人用易以起下文君子學易之意安溪李氏曰具易理於心是以易崇徳也體易理於身是以易廣業也又曰聖人能存存其本性之徳則與天地相似故其理之具於心而為知也日新月盛是道所自出之門也理之體於身而為禮也日歛日固是義所由入之門也合訂曰禮是纎細瑣碎底髙明者多忽略而疏於節目動容周旋實體而踐之則髙而能卑矣朱子謂兩脚踏地作方得按朱子之説所謂禮者履也又按生生之謂易存存之謂聖人也聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉㐫是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行𤼵乎邇見乎逺言行君子之樞機樞機之𤼵榮辱之主也言行君子之所以動天地也可不慎乎同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭初六藉用白茅无咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以徃其无所失矣勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也亢龍有悔子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也不出户庭无咎子曰亂之所生也則言語以為階君不密則失臣臣不宻則失身幾事不宻則害成是以君子慎宻而不出也子曰作易者其知盗乎易曰負且乗致㓂至負也者小人之事也乗也者君子之器也小人而乗君子之器盗思奪之矣上慢下暴盗思伐之矣慢藏誨盗冶容誨淫易曰負且乗致㓂至盗之招也此申明卦爻立象繫辭之意以見易之可用因以示學易者之方而雜舉中孚等卦七爻以為例平庵項氏曰七爻皆欲人畏謹也鳴鶴言處隱之誠同人言同心之一白茅貴慎有終當謙亢龍惡亢戸庭以教宻負乗以戒慢皆所以養人之敬心也庸成陸氏曰或類取於鶴鳴或兼夫號咷或纎及白茅而喻同負乗宜可厭惡也衆不以為誣君子不以為怪何也其假象而非實也或斷其旡咎或斷其吉或斷其有悔而致㓂宜其雜亂也時有所必歸位有所必至有典禮而非淫也所謂擬議以成其變化也如此天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒于扐以象閏五歳再閏故再扐而後掛乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而申之觸類而長之天下之能事畢矣顯道神徳行是故可與酬酢可與佑神矣子曰知變化之道者其知神之所為乎此言天地大衍之數揲蓍求卦之法首論數所以起立法之原也末總歸之神正從法與數合處贊其神妙數與法不平對也本義曰道因辭顯行以數神乃爾瞻葉氏又謂顯得道出便是神那徳行處此就是可酬酢祐神者無兩起事亦自有義易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占是以君子將有為也將有行也問焉而以言其受命也如嚮旡有逺近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此易无思也无為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也易酌曰此承上揲蓍求卦之法而推明其用也以辭變象占四句為主至精一節明尚辭尚占至變一節明尚變尚象至神一節則明辭變象占皆出於自然而非可以智計力索也極深研幾一節又明其所以至精所以至變所以至神者而以首句總結之也象辭變占前章所已言也此章合四者并言之而推本於神焉以見聖人之道所以不與䜟緯術數同歸者也安溪李氏曰前章言象辭變占以體用之序言也然學易自辭始辭因變而繫變因象而生象因占而立故其序又如此又曰以其至精故有以極深以其至變故有以研幾以其至神故感應之妙莫能知其所以然者説最精但謂言莫美於易之辭似文士尚之矣必如南軒張氏謂指其所之合訂謂為論隂陽動靜之理方確子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之徳圓而神卦之徳方以知六爻之義易以貢聖人以此洗心退藏于宻吉㐫與民同患神以知來知以藏徃其孰能與於此哉古之聰明睿知神武而不殺者夫是以明于天之道而察于民之故是興神物以前民用聖人以此齊戒以神明其徳夫是故闔户謂之坤闢户謂之乾一闔一闢謂之變徃來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉㐫吉㐫生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隠鉤深致逺以定天下之吉㐫成天下之亹亹者莫大乎蓍龜是故天生神物聖人則之天地變化聖人效之天垂象見吉㐫聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉㐫所以斷也易曰自天祐之吉旡不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉旡不利也此言以卜筮尚占也當合自天祐之為一章與首章應紫溪蘇氏曰此章若層見叠出而其實天道民故盡之矣易之書原乎造化天之道也易之用周乎天下民之故也天人之理盡於太極太極之理具於聖人之洗心此易之原也而其實則皆神之所為者也按此則首節開物成務冒天下之道是言易之卜筮明於天道察於民故也以此領起次節言聖人之於天道民故有先得於心者原不假於卜筮以見其具作易之本然後轉出聖人之以天道民故作為卜筮以前民用闔户節正言聖人所明所察以作易也上六句天道下制用咸用五句民故兩儀四象八卦天道偹矣吉㐫大業民故周矣法象莫大節則合兩節而通論之天生神物節見聖人作易本於造化之自然所為明天之道也易有四象節言聖人作易以其察民故者前民用也末以釋大有上九爻義將天人通結之而以尚賢歸重到能明天道察民故之聖人上以示學易之君子當效聖人也若末節止如中孚同人等七爻之義則言天助可矣乃又説到人又説到尚賢何也安溪李氏亦以此節繫易有四象節後子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉㐫是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎徳行此言以言者尚辭也盖極盡易之意與言而歸本於徳行焉前五節只完得箇立象以盡意末則言學易者貴於得意而忘象也敬承程氏曰前數章贊易之神曰旡方曰不測曰不疾而速利用出入葢詳哉其言之矣而尚未及用易者之以人而神也故語立象盡意而歸諸神語得意忘象而歸諸神明之人不有其人而易道豈能自神耶故神者道之入於無形者也神明者道之體於不言者也虚齋蔡氏曰書不盡言繫辭亦書也如何能盡言盖易書是箇稽實待虚只依卦爻之象説箇道理在隨甚様事都該得随甚様人都應得所以能盡其言安溪李氏曰遇事變而通之可以盡利者言盡而天下之能事畢也以是鼓舞於人可以盡神者意盡而有以通天下之志也形上即乾坤之理聖人所欲言之意也形下即乾坤之質聖人所因以立之象也天下之賾形器之分也天下之動變通之跡也立之象以極其賾繫之辭以鼓其動聖人所以盡意盡言而足以盡利盡神者此也按末節言學易者之事易酌曰非徒明之而已又必成之非徒成其道於己而已又必信其道於人此豈區區辭説之間哉必有酬酢佑神之徳行而後可安溪李氏又曰總上數章之意而結言之故多用前辭而加深切焉其所謂形上之道者即易簡之理也所謂徳化者即體易簡之理而有以成位乎其中者是也繋辭下傳八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趨時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者象此者也爻象動乎内吉㐫見乎外功業見乎變聖人之情見乎辭此言以動者尚變也盖變易之中有不易者存故於動而極言易簡之道上傳首章止言乾易坤簡而此則并爻象皆言之夫貞一即易簡也天地日月天下之動無不貞於一則凡繫辭之所謂吉㐫者亦何一而非易簡哉故爻象動乎内而吉㐫即見乎外所以成功業者在此此聖人吉凶同患之情所以見乎辭者也貞勝自如本義作常勝説極是合訂所云若歸重在正字上則下文不用申説是也乃易酌甚以為非夫朱子專以正字作貞字解豈於此而忘之况本義已明註正也常也四字矣竊以吉凶常勝者言天下更無吉㐫并存之道故惠廸則吉従逆則㐫而天下亦并旡理欲并行之事故下曰天下之動貞夫一也天地之大徳曰生聖人之大寳曰位何以守位曰人何以聚人曰財理財正辭禁民為非曰義古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之徳以類萬物之情作結繩而為網罟以佃以漁盖取諸離包犧氏沒神農氏作斵木為耜揉木為耒耒耨之利以教天下盖取諸益日中為市致天下之民聚天下之貨交易而退各得其所盖取諸噬嗑神農氏沒黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉旡不利黃帝堯舜垂衣裳而天下治盖取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下葢取諸渙服牛乗馬引重致遠以利天下盖取諸随重門擊柝以待暴客葢取諸豫斷木為杵掘地為臼臼杵之利萬民以濟葢取諸小過弦木為弧剡木為矢弧矢之利以威天下盖取諸睽上古穴居而野處後世聖人易之以宮室上棟下宇以待風雨葢取諸大壯古之塟者厚衣之以薪塟之中野不封不樹䘮期旡數後世聖人易之以棺槨盖取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察葢取諸夬是故易者象也象也者像也此言以制器者尚象也易明天道察民故而天地之六徳曰生聖人故以仁義生萬民也下所取十三卦無非理財正辭禁非之事故宜從折中合訂冠於此首而以易者象也二句總結之彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦其徳行何也陽一君而二民君子之道也隂二君而一民小人之道也易曰憧憧往来朋従爾思子曰天下何思何慮天下同歸而殊途一致而百慮天下何思何慮日往則月来月往則日来日月相推而明生焉寒往則暑来署往則寒来寒暑相推而歳成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也過此以往未之或知也窮神知化徳之盛也易曰困于石據於蒺藜入于其宮不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶易曰公用射隼于髙墉之上獲之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大戒此小人之福也易曰屨校滅趾无咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不解易曰何校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑子曰徳薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知㡬其神乎君子上交不謟下交不瀆其知㡬乎㡬者動之㣲吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知㣲知彰知柔知剛萬夫之望子曰顔氏之子其殆庶㡬乎有不善未嘗不知知之未嘗復行也易曰不逺復旡祗悔元吉天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也子曰君子安其身而後動易其心而後語定其交而後求君子脩此三者故全也危以動則民不與也懼以語則民不應也旡交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶此申眀貞一之義當依安溪李氏作一章文義始貫首二句以天下之動引出致一之義也陽卦多隂節言彖之材以下十一爻言爻之效動夫天下之動貞夫一而易簡者易之徳行也盖一隂一陽之謂道而陽卦多隂隂卦多陽則非一矣然謂其陽竒隂耦而不可以其多隂多陽者謂為非一也夫竒耦數也徳行理也今止論其竒耦而多隂多陽有所不論然則於易簡之徳行將奈何盖天下之動生於人心而心者人一身之君也陽竒則君一而民二主權專而百體皆效命焉非若隂耦者之二君一民而役反為主者也此正君子致一之道也咸之九四言之矣往來屈信同歸於生利此之為貞一也困之六三進而見困求信而反屈也解之上六動而不括屈極則必信也噬嗑之初九懲惡屈也而可以致福也其上九長惡信也而至於罹罪也否之九五其亡其亡屈而信也鼎之九四折足覆餗信而屈也豫之六二復之初九則審於理欲屈信之幾而辨之至速也損之六三益之上九則察夫上下屈信之理而處之互異也此皆言易簡之徳行者也故首以同歸一致者𤼵其端而末以致一勿恒者終其義噫㫖深哉子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合徳而剛柔有體以體天地之撰以通神眀之徳其稱名也雜而不越於稽其類其衰世之意邪夫易彰往而察來而㣲顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其㫖遠其辭文其言曲而中其事肆而隠因貳以濟民行以眀失得之報易之興也其于中古乎作易者其有憂患乎是故履徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之脩也益徳之裕也困徳之辨也井徳之地也巽徳之制也履和而至謙尊而光復小而辨于物恒雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隐履以和行謙以制禮復以自知恒以一徳損以遠害益以興利困以寡怨井以辨義巽以行權此當依安溪李氏合作一章讀盖申釋象之動乎内而吉凶見乎外以卦體彖辭言也所陳九卦正謂其稱名雜而不越小而取類大也且衰世之意與下易之興於中古亦兩相呼應安溪李氏曰後陳九卦者雖因聖人憂患而𤼵其名卦之心然所謂濟民行者亦初不外乎此雜舉九卦據朱子説為偶然然按雲峰胡氏所説履以一隂安處於三陽之下履之所以為禮謙以一陽退處於三隂之下謙之所以制禮復則一陽生於五隂之下天地之心可見由此推之天地之道有陽即有隂故恒之一陽上起而一隂即下伏也隂陽既生則各有其極故損之一陽窮於上之上而一隂窮於下之下也隂陽之窮者必反而通故益之一隂升於上而一陽動於下也陽之動者必居中然後得位以用事隂之升者必隠伏然後得制以行權故終之以巽按重巽之卦初陽位而隂居之二隂位而陽居之權也四隂居隂位五陽居陽位所謂權不離經也重巽申命㡬於不息之乾君子而聖人矣故易酌謂為非偶然者此也又按易酌謂三陳九卦初陳其徳次陳其才三陳其用亦是易之為書也不可遠其為道也屢遷變動不居周流六虗上下无常剛柔相易不可為典要唯變所適其出入以度外内使知懼又明於憂患與故旡有師保如臨父母初率其辭而揆其方既有典常茍非其人道不虗行易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰徳辨是與非則非其中爻不偹噫亦要存亡吉㐫則居可知矣知者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要无咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪此文氣似兩叚然亦當如安溪李氏合作一章讀盖皆申釋爻之動乎内而吉㐫見乎外以爻位及爻辭言也易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉安溪李氏曰此申釋功業見乎變之意盖吉㐫定而功業由是興也易之興也其當殷之末世周之盛徳邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要旡咎此之謂易之道也安溪李氏曰此申釋聖人情見乎辭之意夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻能説諸心能研諸慮定天下之吉㐫成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉㐫以情遷是故愛惡相攻而吉㐫生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈安溪李氏曰總下傳之指而約言之以終首章之意按首章乃上傳之首章言乾坤之易簡者也易酌曰上繋之首章以易簡終下繫之末章以易簡始上繋之末章以徳行終下繫之末章以徳行始前後正相闗通安溪李氏又曰乾之確然示人易坤之隤然示人簡者乃貞一之原也由此而通乎變化之道則趨時而立本者不亂由是而行乎吉㐫之塗則至動而貞勝者不易聖人説研此理於心叅驗於變化至賾吉㐫至動之故立象則變在其中繋辭則動在其中是故始作八卦者固所以肇斯文之將啟覺來裔於無窮也中古聖人值世之衰推所憂患拯世傾危是以讀其辭而情尤可見盖慮天下萬世險阻之無盡而一以易簡之道濟之是聖人之志也又於首節云此以體乾坤之徳者言之所謂易簡而天下之理得者於次節云此聖人推己以同患之本也於三節云此聖人觀察以作易之原也於四節云此乃正言聖人作易教民之事於五節六節云相攻相取相感皆生於變動之情吉㐫之辭因此而遷豈非教民去害興利而足以見聖人之情乎夫所謂愛惡情偽險之大者也重之以逺近之勢阻之甚者也聖人既心知之而因欲使民明之使人不迷於險阻之幾則有平而無傾矣此所以為聖人之情與於末節云汎舉凡人之辭以明聖人之有憂患也是故其辭危説皆精確不易説卦傳昔者聖人之作易也幽贊于神明而生蓍參天兩地而倚數觀變于隂陽而立卦𤼵揮于剛柔而生爻和順于道徳而理于義窮理盡性以至于命此篇備載卦位卦徳卦象之説而前兩章則總説聖人作易大意以𤼵其端蓍者卦之所由作也爻者卦之所以備也參天兩地而倚數以河圖生數言也和順於道徳統言其體理於義析言其用窮理盡性以至於命本義曰此聖人作易之極功也昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章此下專以立卦言原夫八卦之所以止於畫之三六十四卦之所以終於畫之六者以為三才之間性命之理為説卦之第一義也天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也雷以動之風以散之雨以潤之日以暄之艮以止之兑以説之乾以君之坤以藏之此邵子謂為伏羲八卦之位相交而成六十四卦先天之學也數往者順知來者逆説各不同合訂之説八卦相錯曰錯者變換反易之謂即下文所謂逆也往謂已畫之卦來謂未畫之卦順逆猶言正反也如乾已畫為往坤未畫為來數已畫之前為三竒即知未畫之坤逆乾而為三耦也㢲震兑艮離坎逆也推之而倒㢲為兑倒艮為震亦逆也屯蒙逆也屯與鼎亦逆也恒益亦逆也姤復臨遯皆逆也逆者易也錯綜參伍變化無窮者易之為易惟其逆而已故曰易逆數也按此説先儒所未道然於易逆數句却甚確當安溪李氏曰首言其不易之體則天地者分之尊末言其生物之用則雷風者氣之始語亦可玩帝出乎震齊乎巽相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎㢲巽東南也齊也者言萬物之潔齊也離也者眀也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治葢取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兑正秋也萬物之所説也故曰説言乎兑戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮此邵子所謂文王所定後天之學也安溪李氏曰帝者天之主宰主宰一爾而八卦之用不同則帝行乎其間焉帝之出入不可見故以萬物之出入於四時者言之又曰邵子以為文王圖位今證之周易義類多合則其説是矣其序雖以義理而起然以三陽卦終始歳功三隂卦効職於中乾不居始而以終為大始坤不居終而居中以代終三隂居中坤又中之中也於一歳亦為中央之位此則隂陽主役之分天命嗣續之機文王之精意存焉而亦一因乎卦體之自然也神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也此由後天流行之用而推本於先天對待之體也不言乾坤而謂之神者康成鄭氏曰乾坤共成一物不可得而分故合而謂之神神也者生成萬物而莫知其所以然故曰妙萬物而為言也下面雷動風撓之類皆神之所為也乾健也坤順也震動也巽入也坎䧟也離麗也艮止也兑説也本義云此言乾坤之性情竊按性情即徳也乾為馬坤為牛震為龍㢲為雞坎為豕離為雉艮為狗兑為羊本義云逺取諸物乾為首坤為腹震為足巽為股坎為耳離為目艮為手兑為口本義云近取諸身乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之巾女艮三索而得男故謂之少男兑三索而得女故謂之少女蒙引云此取諸人倫乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果荀九家此下有為龍為直為衣為言坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為炳其於地也為黑荀九家有為牝為迷為方為囊為裳為黄為帛為漿震為雷為龍為𤣥黄為旉為大塗為長子為决躁為蒼筤竹為萑葦其于馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮荀九家有為玉為鵠為鼓巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其于人也為寡髪為廣顙為多白眼為近利市三倍其究為躁卦荀九家有為楊為鸛坎為水為溝瀆為隐伏為矯輮為弓輪其于人也為加憂為心病為耳痛為血卦為赤其于馬也為美脊為亟心為下首為薄蹄為曵其於輿也為多𤯝為通為月為盗其于木也為堅多心荀九家有為宮為律為可為棟為叢棘為狐為蒺藜為桎梏離為火為日為電為中女為甲胄為戈兵其于人也為大腹為乾卦為鼈為蟹為蠃為蚌為龜其于木也為科上槁荀九家有為牝牛艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其于木也為堅多節荀九家有為鼻為虎為狐兑為澤為少女為巫為口舌為毁折為附决其于地也為剛鹵為妾為羊荀九家有為常為輔頰此明聖人作易其道甚大百物不遺所謂逺觀近取以類萬物之情也序卦傳有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之穉也物穉不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有随故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以茍合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剥也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以旡妄有旡妄然後可畜故受之以大畜物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者䧟也䧟必有所麗故受之以離離者麗也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恒恒者久也物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以觧觧者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必决故受之以夬夬者决也决必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後説之故受之以兑兑者説也説而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉朱子曰卦有正對有反對乾坤坎離頤大過中孚小過八卦正對也正對不變故反覆觀之止成八卦其餘五十六卦反對也反對者皆變故反覆觀之共二十八卦以正對卦合反對卦觀之總而為三十六卦其在上經不變卦凡六乾坤坎離頤大過是也自屯蒙而下二十四卦反之則為十二以十二而加六則十八也其在下經不變卦凡二中孚小過是也自咸恒而下三十二卦反之則為十六以十六而加二亦十八也其多寡之數則未嘗不均也虚齋蔡氏曰序卦之義有相反者有相因者相反者極而變者也相因者其未至於極者也總不出此二例周氏曰按序例有數欵曰然後曰而後曰不可曰不可以曰不可不曰必曰必有曰必有所曰莫若各有取義約之不外一中不問天道人事髙者抑之下者舉之得中者順之隨時従道以趨中而已數説最得聖人序卦之㫖程子曰韓康伯謂序卦非易之藴此不合道朱子曰謂之非聖人之精則可謂非易之藴則不可序卦却正是易之藴事事夾雜都有在裏面邵子曰乾坤天地之本坎離天地之用是以易始於乾坤中於坎離終於既未濟而泰否為上經之中咸恒為下經之首皆言乎其用也又曰乾坤坎離為上篇之用兑艮震巽為下篇之用也頤中孚大過小過為二篇之正也又曰自乾坤至坎離以天道也自咸恒至既濟未濟以人事也平庵項氏曰上經言天地生萬物以氣而流形故始於乾坤終於坎離言氣化之本也下經言萬物之相生以形而傳氣故始於咸恒終於既未濟言夫婦之道也都山汪氏曰上經首乾坤天地之大開闔也自屯䝉以次相承氣運漸開世道漸變至於泰否乃造化一大交會也自同人大有以次相承世道升降賢才進退至於剥復理欲消長事變日煩至於坎離又人道一大交㑹也首乾坤萬物之大父母終坎離天地之大槖籥也下經首咸恒人倫之有夫婦亦乾坤也至損益人事之有興衰亦否泰也至艮震人心之有動静亦剥復也而終於既未濟人情之有離合亦坎離也上經乃一隂一陽交㑹之大端下經乃隂陽一消一息千變萬化交㑹之節目合而論之天地父母之尊也坎離夫婦之别也震艮兄弟之義也巽兑姐妹之序也天尊地卑君臣之道闕主卦者六體天地否地天泰水天需天水訟天火同人火天大有是也合客卦者四體天雷无妄天澤履風天小畜山天大畜是也坤體十二除本卦二體合主卦者四體地天泰天地否地水師水地比是也合客卦者六體雷地豫地雷復地山謙山地剥地澤臨風地觀是也然所合客卦陽多而隂少又不合離上經屬陽故貴陽也坎八體除本卦二體合主卦者四體水天需天水訟地水師水地比是也合客卦者二體水雷屯山水䝉是也離六體除本卦二體合主卦者二體天火同人火天大有是也合客卦者二體火雷噬嗑山火賁是也上經六子不交故不合坎上經貴陽故不合坤與兑巽也其客卦則震有七體合主卦者五體天雷旡妄地雷復水雷屯火雷噬嗑雷地豫是也合客卦者二體山雷頤澤雷隨是也艮有七體合主卦者五體山天大畜山地剥山水䝉山火賁地山謙是也合客卦者二體山雷頤山風蠱是也巽有四體以二體合主卦風天小畜風地觀是也以二體合客卦山風蠱澤風大過是也兌有四體以二體合主卦天澤履地澤臨是也以二體合客卦澤雷随澤風大過是也然上經貴陽震陽爻在下故其合卦也除合坤外皆居下卦艮陽爻在上故其合卦也除合坤外皆居上卦巽兑亦然此上經之合卦也下經兑十二體除本卦二體合主卦者四體澤山咸山澤損風澤中孚雷澤歸妹是也合客卦者六體澤天夬澤地萃澤水困水澤節澤火革火澤睽是也客多于主者葢四隅之卦得體之偏故除正配艮也交合外止以二體合主卦其餘皆依四正之體以成卦也巽卦亦然同為隂卦故也巽十二體除本卦二體以二體交合正配雷風恒風雷益是也以二體合主卦風澤中孚風山漸是也以六體合客卦天風姤地風升風水渙水風井風火家人火風鼎是也震九體除本卦二體正配交合二體雷風恒風雷益是也以二體合主卦雷澤歸妹雷山小過是也以三體合客卦雷天大壯雷水解雷火豐是也其與艮之依正體成卦猶之巽兑也艮九體除本卦二體正配交合二體山澤損澤山咸是也以二體合主卦風山漸雷山小過是也以三體合客卦天山遯水山蹇火山旅是也其客卦乾四體合主不合客澤天夬天風姤雷天大壯天山遯是也坤四體合隂不合陽火地晉地火明夷澤地萃地風升是也下經貴隂故也坎八體除正配交合水火既濟火水未濟是也其餘皆合主不合客澤水困水澤節風水涣水風井水山蹇雷水觧是也離十體正配交合與坎同除二體合坤火地晉地火明夷是也其餘亦合主不合客火澤睽澤火革風火家人火風鼎雷火豐火山旅是也坎離所合之卦除正配外不唯離之合坤屬隂其所合之主卦皆隂多于陽此下經之合卦也學者按册求之當有信其不誣者矣蒙吉刁氏之著易酌曰按上下篇義作于程子謂卦之分以隂陽陽盛者居上而卦之有乾者居上篇隂盛者居下而卦之有坤者居下篇乃考之上篇有乾者凡十一卦有坤者亦十一卦下篇有乾者四卦有坤者亦四卦且剥有坤又隂盛乃居上篇大壯有乾又陽盛乃居下篇其説曰剥雖隂盛而爻則陽極故居上篇大壯雖陽壯而爻則隂盛故居下篇又謂五隂一陽之卦則一陽為主故皆在上篇至五陽一隂之卦如大有之彖傳明曰柔得尊位大中而上下應之矣乃謂王弼一隂為主之説非是咸卦之男下女傳有明文乃以女居男上為隂盛謂凡女居上者皆在下篇至于噬嗑又謂男下女非女勝男也諸如此類未免逐卦委曲以求合隂盛陽盛之説未見諦當故朱子作本義首言卷帙重大故分上下兩篇葢不取程子之説也然而文王所作卦辭通計六十四卦凡七百一十五字連爻辭尚不滿五千止四千九百二十三字謂之卷帙重大可乎分而為二各三十二卦可也上經三十卦下經三十四卦何為而然哉豫章蕭氏其言卦必先分而後序上經者取陽升而上之義故乾坤坎離為上經之主卦以其居四正之位而隂畫陽畫皆純正也下經者取隂降而下之義故震巽艮兑為下經之主卦以其居四隅之位而隂爻陽爻皆偏雜也上經言天道故乾坤交而六子不交乾坤交而萬物化生矣下經言人事故六子皆交六子交而萬事畢舉矣又上經主卦乾為主而坤従之坎用事而離従之故交泰以前乾南坤北有坎無離由是而陽漸衰隂漸長矣故交泰以後乾北坤南坤為主而離用事矣盈虚消長之理然也下經主卦兑最貴而巽次之盖下經貴隂又畫卦之始兌次乾而成故貴也至于上經六子不交故但以主卦之體始之終之而得卦三十下經六子皆交故遂以所交之卦始之終之而得卦三十有四似皆確不可易者雜卦傳乾剛坤柔比樂師憂臨觀之義或與或求屯見而不失其居䝉雜而著震起也艮止也損益盛衰之始也大畜時也无妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁无色也兑見而巽伏也隨无故也蠱則飭也剥爛也復反也晉晝也明夷誅也井通而困相遇也咸速也恒久也渙離也節止也解緩也蹇難也睽外也家人内也否泰反其類也大壯則止遯則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故親寡旅也離上而坎下也小畜寡也履不䖏也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬决也剛决柔也君子道長小人道憂也朱子曰雜卦以乾為首不終之以他卦而必終之以夬者盖夬以五陽决一隂决去一隂則復為純乾矣見折𠂻大全又以為䨇湖胡氏語雲峰胡氏曰易終於雜卦而交易變易之義愈可見矣每一卦反覆為兩卦而剛柔吉㐫每每相反此變易之義也自乾坤至困三十卦與上經之數相當而雜下經十二卦於其中自咸至夬三十四卦與下經之數相當而雜上經十二卦於其中此交易之義也或曰此偶然爾愚曰非偶然也皆理之自然也坎離交之中者本居上經三十卦内今附於下三十四卦震艮巽兑交之偏者本居下經三十四卦内今附扵上三十卦至若无反對者上經六卦下經二卦今附於上者二卦附於下者六卦皆交易之義也十二月卦氣除乾坤外上經泰否臨觀賁復隂之多於陽者十二下經遯壯姤夬陽之多於隂者十二今雜卦移否泰於三十四卦之中而隂陽之多少復如之特在上經者三十六畫在下經者二十四畫今附於上者二十四畫附於下者三十六畫愈見其交易之妙爾若合六十四卦論之上經三十卦隂爻之多於陽者八下經三十四卦陽爻之多於隂者亦八今則附於三十卦者陽爻七十二隂爻一百八而隂多於陽者三十六附於三十四卦者陽爻一百二十隂爻八十四而陽之多於隂者亦三十六特反對論上經隂之多於陽者四下經陽之多於隂者亦四今則附於上者陽爻三十九隂爻五十七而隂爻多於陽者十八附於下者陽爻六十九隂爻五十一而陽之多於隂者亦十八或三十六或十八互為多少非特可見隂陽交易之妙而三十六宮之妙愈可見矣是豈聖人之心思智慮之所為哉愚固曰伏羲之畫文王周公孔子之言皆天也本義謂自大過以下卦不反對或疑其錯簡今以韻協之又似非誤未詳何義愚竊以為雜物撰徳非其中爻不備此盖指中四爻互體而言也先天圖之左互復頤二卦互坤既濟家人歸妹睽四卦互坎離夬乾三卦互乾八卦右互姤大過二卦互乾未濟觧漸蹇四卦互坎離剥坤二卦互坤八卦此則於右取姤大過未濟漸四卦於左取頤既濟歸妹夬四卦各舉其半可兼其餘矣是雖所取不能無雜盖此謂雜卦而互體又其最雜者也上三十卦終之以困柔揜剛也下三十四卦終之以夬剛決柔也柔揜剛君子不失其所亨剛决柔君子道長小人道憂矣然則天地間剛柔每每相雜至若君子之為剛小人之為柔决不可使相雜也雜卦之末特分别君子小人之道言之聖人贊化育扶世變之意㣲矣蒙吉刁氏曰序卦取流行之義雜卦取對待之義雜者不拘卦序分類而言之兩兩相對也或雜前卦扵後卦或雜後卦於前卦雜也或雜上經之卦於下經或雜下經之卦扵上經雜也兩句之中或以上卦先下卦或以下卦先上卦雜也然就兩句讀之必以類相従无後先移易自乾至困三十卦當上經三十卦之數雜下經十二卦於其中自咸至夬三十四卦當下經三十四卦之數雜上經十二卦於其中恁地齊整无上下參差者以為不雜也而有雜者在以為雜也而有不雜者存聖人立言之妙如此又曰易之道隂陽而已矣隂陽之道竒偶而已矣雜卦之義兩兩反對偶也若始終一律是有偶而无竒矣是故既合上下兩經錯綜之而以兩句為偶末又合兩句錯綜之而以八卦為竒竒而偶偶而竒變化无窮正所謂一隂一陽之道也且卦之序也不外相因相反二義雜卦義取相反今以末八卦推之却亦相因如大過繼之以姤顛則宜遇也漸繼之以頤行則宜正也既濟繼之以歸妹定則宜歸也未濟繼之以夬窮則宜決也然則序卦相因也而未始不相反雜卦相反也而又未始不相因交易變易之義盖於斯可見矣紹武刁氏曰按大過以下八卦不反對本義以為未詳嘗反覆推求夫乃知雜卦之妙也易之有序卦也學之始也博文約禮有序而不可雜也易之有雜卦也學之成也變化從心雖雜而不失序也序卦分也雜卦合也由分可以得合既合其中仍分也何以合而分也首以乾坤乾坤一大男女也而萬事萬物无不在其中矣終之以男女男女一小乾坤也而類聚羣分不能外乎是矣此起止之合也然上經三十卦下經三十四卦其界限未嘗不分自師比八卦而以下經之損益交合之自咸恒八卦而以上經之否泰交合之此樞紐之合也損益後歴大畜无妄而合之以萃升否泰後歴大壯遯而合之以大有同人此對待之合也列震艮於前而以兑巽等六卦分足三十卦之數留大過頤於後而以離坎等六卦合居三十四卦之中此錯綜之合也至大過以下則以分為合矣易者教人寡過之書也女過莫如遇以女遇男其過大矣故特書曰柔遇剛也女之旡過莫若歸歸而待男以行職司中饋以供頤養道之正也宜室宜家如水火之既濟守之定也故曰歸妹女之終也女道於此終婦道於此始而女過寡矣男子之事六十四卦言之已盡所不能保其无過者窮耳維窮何病窮者天之所以玉汝於成也試觀耕莘釣渭版築魚鹽磨煉出多少聖賢豪傑祗是窮於身而不窮於心窮於遇而不窮於學又必剛克而果决則君子道長小人道憂而脩齊平治一以貫之何有過之不可寡哉又按不曰小人道消而曰道憂則聖人為天下後世深思逺慮恐其决小人之後自謂髙枕无憂不為戒備如唐之五王不旋踵而身受其毒故不曰消而曰憂也聖人之一字不茍如此真是韋編三絶之後融㑹貫通而復以細心宻理出之故有頭有尾有闗鍵有鈎連合而有分分而實合玲瓏貫串帶鎖鈎連至精至妙旡以復加學者得其法而通之以之為學以之為文以之治身心家國天下而旡不宜大哉孔子其真萬世師也已又曰乾坤兩卦不與序卦一例所謂首也大過以下尾也又乾卦自為首與夬卦變乾暗應天旡所不包故也自乾坤至困三十卦所謂界限分也坤為一卦以下皆兩卦為一卦共十五卦咸恒至訟惟小過離坎各為一卦其餘皆兩卦為一卦亦十五卦所謂小段落也損益否泰交所謂樞紐也除去乾坤為首皆在第十卦大畜旡妄交萃升與後大壯遯交大有同人所謂對待之合也自兑巽至困下經六卦與後自離坎至訟上經六卦所謂錯綜之合也大過與頤鈎連姤與夬鈎連漸與歸妹鈎連既濟與未濟鈎連此八卦上下兩經前後鈎連所謂以分為合也歸妹與未濟文法相對合而分也夬卦變而為乾首尾合一也安溪李氏説大過以下曰此八卦不反對而義相次盖陽太過則傾撓而顛矣故必與隂遇男女飲食皆隂也如漸之待歸頤之養正則陽得隂之助而和既濟之義也如歸妹之終則陽不得隂之助而窮未濟之義也然陽道不可窮故必决去隂柔而使君子之類常勝是一經之大義也竊按雜卦取義多與經不同且無一字屬經文者則此乃孔子自作之經矣而先儒則以為旡𦂳要道理又謂為偶然或者謂為序卦之變通仍其反對之偶而不仍其先後之序而胡氏因取其有反對無反對隂多於陽陽多於隂上卦下卦卦數爻畫之數縷悉分之合之以為可見隂陽交易之妙刁氏雖知其為十翼之結宂乃聖人喫𦂳教人䖏然亦但言其首尾照應分合變化錯綜鈎連似止為文字設者至於各卦相次并所以雜取下卦入前雜取上卦入後之旨則多未詳焉乃自朱子𤼵乾夬首尾之義而胡氏刁氏李氏又相繼詮釋大過以下八卦視明儒雪松潘氏之説見説統為善其於以上五十六卦仍皆未及夫豈無義而孔子故為是交互離合之辭如後世文人狡猾之技倆哉於是取刁氏之説并諸儒所疏各句下之義合以本經之旨而仍逐卦逐爻詳析分别玩之思之紬繹反覆而竊有以得其要領者盖夫子之贊乾也至矣他日亦曰吾未見剛者故於此專言剛徳之美而寄其思焉以乾剛領起而自坤至困言剛徳脩己之事而下經中震之脩省艮之居所萃之聚正升之積髙兑之講習巽之行事晉之昭徳明夷之用晦井之往來不窮困之致命遂志皆修己之屬而損以懲忿窒欲益以遷善改過尤脩身之要也且為剛柔之交天人消長之㡬故取以雜於前自咸恒至訟言剛徳治人之事而上經中大有之遏惡揚善同人之類族辨物離之繼照坎之習教事小畜之懿文徳履之定民志需之宴樂訟之違行皆治人之屬而否則天下无邦泰則上下同志尤治亂之驗也且為剛柔之交世道升降之㑹故取以雜於後至大過以下八卦則合脩己治人統言剛徳之過而雜柔之不善略舉男女君子小人以概其義盖必使人欲淨盡而天徳始純四海同風而化行始美故雜取上經之大過頤下經之姤漸歸妹既未濟而終之以夬焉乃上傳之末以相遇字遞到下傳以見脩己即所以治人明新無二事也盖一剛中正而羣隂相比此天君泰然而百體從令也樂天者也剛居下中而羣隂得統此大師相遇我戰則克也憂道者也剛必浸長而氣必上騰臨則與物以共覩觀則物來而仰承此取與之分也剛實而柔虗陽施而隂受内實外虗則與之矣上實下虗則求之矣非以名像取故曰義也剛見於上必有以固其本屯上坎下震初與五皆剛本有明徳坎又為月為水故曰見初五皆剛居剛位故曰不失剛雜於柔必有以揚其光蒙二與上以剛居柔初三五以柔居剛二夾於初與三之柔上又乗柔剛柔之雜甚矣然坎明於下艮以篤實輝光明於上故雖雜而剛自著也此顯㣲之辨也震剛下伏而實起之艮剛上騰而實止之此志必要其成而思不出其位者也剛在内忠信之實也乃損以益外外雖强而内則餒矣衰之形也剛在外威儀之美也乃損以益内内既充而外亦著矣盛之基也此審夫危㣲存亡之介而去私所以存理也剛健不可止而必止焉大畜之時也此以見功有定候人盡則天自見也柔何能止剛柔之止剛仍剛有以主柔也故小畜以二陽役一隂大畜以一陽役二隂造化必蓄而後通學問必疑而斯悟蓄之深則通斯暢矣疑之久則悟斯徹矣此時雨之化也故曰時剛健自无𤯝而有𤯝焉无妄之災也此以見學無盡境任情非所以率性也剛奮起於下而健行於上此人生之直直道而行者也然好剛不好學其蔽也狂故有災也剛失位而懼懼則不安而欲去萃以中正者臨之則效其才而下包羣隂而有之物必聚矣徳之聚者專其心而無他岐也位重剛而凶凶則途窮而思反升以得中者禦之則併其力而累積羣柔而升之志必行矣志之行者一於往而無却顧也剛為貴徳而以一剛止於衆柔之下則謙之輕也此卑以自牧望道而未之見者也剛非傲徳而以一剛乗於羣柔之上則豫之怠也此怠則自勵圖功而大有得者也剛包柔以為養而四以一剛間之噬嗑之所以食而未食也此克己始能復禮者也剛附柔以為明而上以一剛止之賁之所以旡色以為色也此衣錦則必尚絅者也艮之光輝定静安而能慮也乃䝉乗坎氷則著賁乗離火何以反無色盖在下之水光則上照而止水尤能照物故曰著也山下之火乃人所不見而已止之火尤無光故无色也兑之柔不能以自説也隂見乎外剛出而敷其潤則説此祛其外感之私者也巽之柔不能以自潔也隂伏於内剛入而散其滯則潔此消其内匿之慝者也震動必有事乃剛來而下柔柔則説而繋之隨之所以無故也此動静之有常者也艮止則旡為乃柔廢則不治剛因止而飭之蠱之所以有事也此委靡之必振者也隨蠱二卦二三四五一則剛上柔下為否之不交是以旡故一則柔上剛下為泰之志同是以有事盖雜物撰徳辨是與非非中爻不備也一剛懸於羣隂之上雖見剥焉然而爛其膚而未錮其性也一剛胎於羣隂之下乃其復也所謂反其初而非有於无也此英華雖鑠於外而實徳仍貞於中者也剛麗柔而明生焉出於地上則晉之晝也入於地下則明有所傷也此克明峻徳而遵養時晦者也剛得中正而柔順焉則剛入而出之井之所以通也此取之左右逢其原也剛陷於中而柔揜焉則柔主而賓之姤九二曰不利賓盖柔為主而賓剛也故曰遇遇之所以困也此行道而不得於心也困卦蓋澤水一體而一為陽卦一為隂卦剛柔而同一體故曰相遇節亦水澤也何以不曰遇遇者以柔遇剛不以剛遇柔盖欵接之義而非不期而遇之謂也詳見姤卦中夫陽倡於先而隂和於後始為順柔非剛敵也故凡隂先陽而其勢可與敵者曰遇姤之義也然姤何以止曰遇而此則曰相遇盖姤只一隂而初生之隂勢不敵陽而爻别無陽相遇也此則初柔二剛三柔四剛柔既居險有勢可憑是柔之遇剛也而五亦悦而降其體以其剛而遇上之柔故曰相遇也夫天地相遇品物咸章而此則澤水也所謂以水濟水誰能食之故曰困也所遇既困則所感難通必無心之感其感斯速此咸之誠於中自形於外者也又惟不執其常常斯可久此恒之既無虗假自無間斷者也柔居其地以相比剛得中正則與上同志以離之所以渙其黨同之私也柔過其位而自甘剛位乎中以止之所以制為禮義之節也渙之初二三與上皆剛居柔柔居剛獨四以柔居柔又近比五上與五同剛則有以離其羣不受其比也其功在上九節之初四五上皆剛柔各居其位而三以柔居凶又以説而介扵險是過也初與二同剛則有以止其情俾有所節也其功在初九剛出乎險解之緩也則從容圖功無欲速也剛止於險蹇之難也則反身脩徳無鋭進也剛閒柔而失位初以一剛出之睽之外也此䟽者䟽之也剛閒柔而得地上以一剛限之家人之内也此親者親之也剛往而柔來天地之交不通否之塞也剛來而柔往上下之志其同泰之亨也此反復其類明乎君子小人消長之端必有以休其否而保其泰者也剛以健而又起焉大壯則自止也雷出地即有聲故豫之象曰雷出地奮及升天則聲不聞矣故曰止剛已止而又往焉遯之宜退也此用則行而舎則蔵者也柔居尊而順剛剛以中應上則羣剛皆應矣大有者所以衆也柔得中而順剛剛以中應下則柔皆一體矣同人者所以親也此聲應氣求之同而民胞物與之仁也柔之順乎剛必柔之志同也若澤火二柔志已不相得矣不相得者革所以去故也柔之順乎剛必剛之氣通也如火風二柔内外實相資矣陽附隂中為離火陽入内而散隂之滯為巽風有所資者鼎所以取新也革之去故即卦名取義鼎之取新即象立名即其用以取義然細玩之亦有意盖革之三四五鼎之二三四皆互乾以往來例之革之乾往外為去故也鼎之乾來内為取新也此除其舊染之汚而布以維新之化也柔得中而剛失位小者之過也此通乎變不執其常者也柔在内而剛得中中孚之信也此本諸身以徴諸庶民者也明於内者無所蔽動乎外者無所弛豐之所以多故也此禮明樂備而百度具舉者也止於内者無所䁥明乎外者無所遺旅之所以親寡也此明通公溥而一物不私者也豐之多故或謂豐盛之時則人多親之以故為故舊與下親寡作對解甚陋即以旅人在外所親自少亦無意味竊以豐自多故而火在山上自無私照親寡謂所親者寡非親我者少如訟之不親也柔在下而離之火則炎上此髙明之覆物也剛在上而坎之水則潤下此膏澤之下民也剛必得柔之歛而始舒小畜以㣲隂而畜剛之行剛可得而畜乎甚矣其寡也柔必順剛之健以為貞履以孤隂而處剛之中柔能獲所安乎是故其不處也此君子所以必懿其文徳而以辨上下者定民志也剛雖健行而見難則止需所以不進也此有所待以行其志者也剛雖健行而違行則爭訟所以不親也此不得乎人心而衆志乖離者也剛聚於内而柔包之大過本末弱而必顛也此始不能脩己終不能治人者也柔初入而主乎内剛已往而賓乎外姤之柔遇剛也此私欲甫萌而天徳即減小人甫入而君子即不安者也剛柔中正而剛能下柔漸之女歸待男行也則剛包柔而順之頤之能養正也則剛柔各得而安之既濟之分定也此道心為主而人心聽命君子得時而小人奉行以之為己則順而祥以之為人則愛而公以之為天下國家無所處而不當者也如其剛柔不當歸妹之女既以先迷亦以終亂三剛失位未濟之男又何能濟其窮乎柔之不順剛之不純也必其五剛以上决夫柔則夬也乎然而柔之難决也則君子之道雖長而於小人之道則猶有所憂焉此徳已修而猶慮有欲之未浄世已治而猶恐有亂之復萌者也又按此傳亦照經分上下而上傳三十卦除乾坤外有坤者十二卦有乾者止二卦下傳三十四卦除否泰外有乾者十卦而絶無一坤夫坤上乾下者地天之泰也乃天地定位以後剛柔離揉否而泰泰而否則自損益操反類之㣲權焉故曰盛衰之始而損益之下獨繼以乾之大畜旡妄二卦者正反類之權之所在也盖剛之在下者泰也乃損之以益上益之不已將為否故在内之剛徳不可以不畜剛之在上者否也乃損之以益下益之不已將為泰故本天之剛徳不可以不脩而自萃以下則皆不任天而脩人事以畜其徳也以其上多坤而下獨有乾故經言泰否而此則言否泰然泰者剛柔之交其志同其萬物通君子之道長小人之道消者也而非純其剛徳者不能大壯則過遯則不及必如大有同人之柔得中而順乎剛而後可也革鼎以下則皆調劑剛柔致其中正以純徳之事而終以違天者違即不順乎剛者也大過以下又申明剛柔順而不違之義以總結之又按上下所雜諸卦剛爻自一畫而二而三而四而五由少至多也柔爻自五畫而四而三而二而一由多至少也上傳大畜旡妄之有乾卦者其上則有坤并有互坤者八卦其下有坤者亦八卦大畜合前之八卦為九旡妄合後之八卦亦為九皆陽數也故此二卦操否泰反類之權再下傳之有乾者皆在泰卦之後而否以上則無一有乾者此皆聖人思乾之意故曰雜而有不雜者存也意若曰易之所以首乾者以乾為剛徳天行之健終古如斯雖陽不孤立實挾隂以俱行似乎剛柔之交甚雜也然柔特順剛而已坤之柔皆乾之剛也乾坤大哉乾乎剛健中正純粹以精而君子之自强不息以之夫天理不能有得而無失也得之則樂失之則憂而求之不得則困樂者率性之聖人憂者修徳之君子比與師而何以脩之也則以其主忠信者比之九五師之九二崇之臨之初二觀之五上而心可共見為與為求亦明期始終屯䝉震艮四卦道心之㣲人心之危於彼於此交戰焉損與益故必專其志而一善之不遺者不求通而自通也大畜合萃升三卦虚其心而一私之不雜者知无妄之即妄也无妄合謙豫噬嗑賁五卦以髙明為沉潛兑與巽雖勿助而有事随與蠱威儀可歛而忠信自存剥與復明徳不昏而往來無滯晉明夷井困四卦如此以脩徳則成已即可以成物矣盖人同此性即人同此情夫人情不能有通而無塞也感之即通爭之必塞謂訟而常通不塞則恒速者感之以無心咸卦久者貞之於不變恒卦而何以相感而有常也則仍以其主忠信者貫之不濫用其情斯無異情渙節合睽三卦不急求其合而人自合解蹇合家人三卦君子之長小人之消此往彼來展轉焉否與泰故進鋭者退速大壯與遯而歸仁者洗心大有同人革鼎四卦事有不得不過誠至而人皆信之則徳化之入人者深也小過中孚豐三卦情有不得而偏明在而人皆仰之則㤙膏之下逮者普也旅離坎三卦盖天下大物非寡徳者所能勝任而無慚小畜與履而仁者先難則畏難者何以大畏乎民志需與訟是人情之通塞由於剛徳之得失然則君子終日乾乾豈容已乎夫乾乾者不雜一柔而天徳之獨純者也盖乾以資始而坤以大終大過本末弱是旡始終也旡敢先也先之則迷姤之柔遇剛後之則得漸之女歸待男行頤之養正既濟之定先迷則无始无始則无終歸妹為女之終而終始萬物者惟乾故剛不可窮也未濟則必盡决夫柔而君子之所以自强者無幾㣲之少息焉然後為乾乾也夬不然則龍戰而雜者真雜矣又按上言樂言憂言困下言感言親言親寡言不親言信此即彖象傳所謂情志所謂中心所謂願也乃至末仍結歸於憂字則是終身之勤不能不隳於一旦百年之業不能不敗於一人而君子之憂勤惕勵靡有己時矣故夫子曰作易者其有憂患乎易翼述信卷十一
