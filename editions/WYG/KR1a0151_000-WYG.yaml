body:
  text: 易翼述信易類提要臣等謹案易翼述信十二卷國朝王又僕撰又樸字介山天津人雍正癸卯進士改庶吉士官至盧州府同知是編經傳次序悉依王弼舊本而冠以讀易之法終以所集諸儒雜論其大旨専以象彖文言諸傳解釋經義自謂篤信十翼述之為書故名曰易翼述信而以朱子所云不可便以孔子之説為文王之説者為非是其闡發理蘊徴引諸家獨李光地之言為最夥而於本義亦時有異同蓋見智見仁各明一義易道廣大無所不該自不能執一説以限天下萬世又樸所論固不為無因至其註釋各卦如解乾大明終始謂畫卦之聖人於畫此六陽又而仍名為乾之時已大為明白指示解坤初六謂陽行而陰隨之以行又引來知徳説以為證此類皆為失之牽强葢其意以為每爻必取變氣坤初六變復故立説如此不知周易固兼變象然使每爻必取變體為解則紛紜破碎將致拘執而不可通終不免於自生荆棘惟其於河圖洛書及先天後天皆不列圖而叙其説於雜論之末義例明簡較為有識又第一卷内時位徳大小應比主爻諸論皆能恪遵御纂周易折中之旨而申闡其義詞意明暢亦頗有可取者焉乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀易翼述信原序余初讀周易本義於卦變圗說後云有天地自然之易有伏羲之易有文王周公之易有孔子之易又云不可便以孔子之說為文王之說時方㓜稚即疑之以為千聖一心奈何易有岐㫖乎及讀乾卦之彖元亨利貞夫子以為四徳者而朱子則謂為乾道大通而至正旣訓元為大而又謂利貞為戒占者利在正固以此為文王之本意則疑又更甚夫孔子周人也去文王數百嵗而近何以其說非文王之說而朱子逺隔二千餘年未嘗别得羲文指授何以反能知其為文王之本意而特揭而著之也苐所學未充不能確有定解遂廢而不敢再讀至乾隆丁巳歳余年已五十七嵗始又取而㝷味之覺卦爻各詞非彖象傳實有不能明者是孔子之說即文王周公之說并非孔子自為一易矣若說易而不歸諸孔子則人各異見論各異詞何所折𠂻而得其是况孔子贊易而世目之為十翼者乃謂為非三聖人之本意夫旣非其本意矣而又謂為翼則所翼者何等也今余年且七十稿凡四易雖未必其果當而惟篤信孔子之言實所以𤼵明三聖人之意而務求其相合者然究亦未嘗不合也於是名之曰易翼述信云或曰易變易也不可為典要仁者見之謂之仁智者見之謂之智子何其拘也然變易之中實有其不易者存余亦先求其所以不易者而後自得其變易者不亦可乎時乾隆十五年七月既望天津王又樸謹序
