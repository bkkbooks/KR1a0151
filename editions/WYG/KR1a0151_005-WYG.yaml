body:
  text: 易翼述信卷五廬州府同知王又樸撰離下艮上賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下離文明而艮篤實輝光此亦賁之一義卦變之說先儒多有疑之者即程子不主卦變而專以乾坤言變董銖謂為兩體變者可通而一爻變者則不通本義又往往以上體謂自某卦來下體謂自某卦來如此卦自損來自旣濟來之說則又兼有所自來是一卦乃自兩卦變而成矣竊疑如此說則無卦不可相通而何以彖有言其變而亦有不言者乎即如此卦之彖所謂分剛上而文柔若以為從損與旣濟來分其二五之剛文三上之柔則柔來而文剛亦當云分其三上之柔來文二五之剛而何以又不言分也程傳謂為分乾之中爻往文於艮之上則亦何不可言分坤之上爻來文於離之中乎升庵楊氏載王拱東周易玩詞論卦變云賁艮體四五之柔來離之二以文三初之剛離體三初之剛上艮之上以文四五之柔故曰柔來而文剛分剛上而文柔此止就本卦見在之體論似直截了當近安溪李氏亦不以卦變論凡象言剛來柔來以為内卦曰來外卦曰往而非言剛自某來柔自某來也竊按此分字噬嗑彖傳分字葢柔有疊爻而剛則三分也然則亦不必拘拘於以四五之柔來文下剛以初三之剛上文柔耳小利有攸往小字諸家皆以小事利為說而仲誠張氏則謂亨剛亨也小利柔利也非小事利猶言柔順卑下以小自處者利耳易中言小便是言柔言小利便是言柔利若此卦旣是小事利孔子如何說天文人文恁地大話故與易相反耶賁剛柔相濟為文直是大小强弱相濟為文之義人若直恁大去直恁小去便只一色不足觀大的究不能通小的亦不利往迨相文之後大的方通小的方利矣如此看來然後知孔子分釋亨利恰是文王之意說甚確可從也天文也上并不補剛柔交錯字直頂上文來亦即可見葢以卦體言天文以卦德言人文也一卦分三剛三柔此一交錯剛柔分居於上中下此又一交錯上下二體為天地天剛也而多柔地柔也而多剛此又一交錯下卦二剛一柔上卦二柔一剛此又一交錯下卦柔居中而分剛於兩上卦柔疊處而冠剛於上此又一交錯若必一剛一柔彼此相閒而後為交錯則所謂執中猶執一者矣文質彬彬故如此下離兩剛間一柔所謂質直之中具有文彩也上艮兩柔終以一剛所謂絢爛之極歸於平淡也觀彖傳着眼在二與上兩爻葢離以二為主爻艮以上為主爻也是二上兩爻為成卦之主而非五之謂矣初三上皆剛者以質始以質終以質承終始之際所謂忠信為禮之本也間之以柔者所謂禮緣後起而虚文不可以始終其事者也文明以止故為人文先進之於禮樂是也若文明而不止則奢矣不遜矣世所謂君子而聖人之所不從也賁之六二為周初之文文從質生郁郁乎文之盛者也而九三則文勝質矣當文王之時文猶未備而即於文明之止者繫之以詞周公之時文為初備而即於各爻所繫之詞致之以誠然則聖人已窮其終始正變而獨精其識也已象曰山下有火賁君子以明庶政无敢折獄大象仲誠張氏曰山文火亦文山下有火又増一片光明為山之飾故為賁火之賁山無増於山之實而加光明耳故庶政之已告成者其實事已立加飾其節目使之燦然明備若折獄豈可於實情外加飾毫末乎故君子不敢以賁道折獄也此說與本義巽然程傳曰賁飾之道非能賁其實也但加之文彩耳即張說所本合訂亦云無敢折獄以賁之道也折獄以情不以文也亦不以庶政為小折獄為大言夫兵農禮樂之司水火工虞之盛亦不可謂小也若以為賁之時義所利者止小事而已則象與彖互異夫子亦自相矛盾矣初九賁其趾舎車而徒象曰舎車而徒義弗乘也初變全艮位在下故曰趾以離之文明變而為艮止有安分而不敢僭上之義故為舎車而徒艮為手者以象山奇在上而偶在下也重艮則下又為足矣觀艮卦初爻亦曰趾可見象曰義弗乘當從程傳為確六二賁其須象曰賁其須與上興也二變大畜遇乾離本為乾卦今又遇乾則離之與乾是二是一人之一身鬚眉毛髮之與形體亦不可為一不可為二者也且文不能孤立必附質而行人之所為文者無論禮樂器數為後起之事即一切服飾亦無非自外而加於其身求其與形體俱而可以文其形者惟有鬚眉毛髪耳然毛髪中又獨鬚為形質已成之後始生之物且人當長鬚之年即屬成人而趨於衣冠文物之列矣又反卦為噬嗑有頤象附於頤者須也是以舎眉髪等而獨取象於須須依於頤頤動則須張有與上興之象離火上炎又變乾健傳故云夫人以語言舉動為觀美者故言語曰文章舉動曰威儀而言語舉動鬚即隨之低昻上下是文之本質而生而又處其後而又依質以動無有過於是者矣此聖人玩易取象最精處九三賁如濡如永貞吉象曰永貞之吉終莫之陵也三變頤遇震頤有津液潤澤又本氣承乗皆柔爻而居於其中則為所濡染矣此服物采章之盛也故曰賁如濡如然三以剛正之質但取以自潤則已若濡之不已必至陷溺於繁文縟節之中而不克自見且將日受夫人之陵侮矣故永守其正雖文而不失其本色之天真則為吉也竊見世之家傳朴素者鄰里族黨不過目之以儉而已不至甚有所非咲也惟於修飾體靣之人行事但有絲毫不到即從而譏之議之此可見陵與莫陵之意矣六四賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終无尤也四變全離本氣艮既止而不行變氣離又不同氣故不比五而與初為應也且處疑懼之位故賁如皤如而曰當位疑也初為乾畫乾為馬以其朴也故為白馬來應四故曰翰如二三四互坎為盜隔體不相比而與初正應故曰匪寇婚媾合訂曰初九守義不但不比二並不輕應四審之又審而後來來則如飛如翰矣六四於其未來則疑既來又何尤乎六居四得正故能自守惟恐賁我者反為害也竊按此與初二兩爻皆無占詞不言吉凶者象即其占人之任質與自然生文以及志從先進皆各得其分耳非必有利於此亦非有吉凶之可言也六五賁於邱園束帛戔戔吝終吉象曰六五之吉有喜也五變家人家非市朝可比又艮遇巽文欲止而漸返於質則自市朝而入山林矣故為賁於邱園然未免固陋故曰束帛戔戔此與奢寧儉者也四有返本還源之志故曰終無尤五則近於野矣而傳曰有喜有喜者非即喜也今而後喜可知者也上九白賁无咎象曰白賁无咎上得志也上變明夷遇坤明夷内文明而外柔順晦其明者也故曰白賁能晦其明則有闇然之美而非的然日亡矣故旡咎卦自四爻即有志於還質至上則果還於質矣故傳曰得志也夫上既以白賁得志則質為美矣而五爻之近質何以有吝而但曰有喜乎葢由文返質人多以為儉不中禮故曰由儉入奢易由奢入儉難是以有吝及歸於質則天下皆任其本真率性而無一毫虚假大道之行也何吝之有序卦曰賁飾也而雜卦又曰賁無色也惟無色而後致飾若有色而復飾飾則文勝之弊矣卦為賁下文明而上止飾之不可過也故下卦三爻為柔來文剛自質而趨於文也上卦三爻為剛上文柔自文而返於質也於上下卦義既協於六爻之位亦合初之徒歩本分之外無加毫末質也二之賁須則自質生文矣三之濡素以為絢文之至也四疑於賁與皤之間而卒之白馬來文盛而有志反質者也五之邱園自文趨質而未免失之野若上則復歸於質矣二為自然之飾情生文者也上為無色之賁質任自然者也故序卦之說二也雜卦之說上也坤下艮上剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也夬為剛決柔剝為柔變剛葢君子之去小人聲其罪與天下共棄之名正言順故言夬也若小人之欲去君子君子既無罪可指而小人又不敢直居其名必且隂謀詭秘或變白為黒以誣衊之或變是為非以毁謗之或浸潤以進其讒而變其君之心或假手以除怨而變其去之跡故曰變也義本隆山李氏象曰山附於地剝上以厚下安宅仲誠張氏曰山附於地山日見其剝削地日見其饒厚地厚則山益安矣為民上者頼下以安苟剝下下剝則上傾故寧剝上以厚下乃安宅之道而終不可傾者也初六剝牀以足蔑貞㐫象曰剝牀以足以滅下也初變頤遇震本卦一陽在五隂之上有牀象又牀者人所藉以安身者也乃君子為人主倚庇之象故各爻多取義於牀震為足故初曰剝牀以足蔑貞㐫見勢之所必至也傳曰以滅下下滅則上傾矣六二剝牀以辨蔑貞㐫象曰剝牀以辨未有與也二變蒙遇坎一陽間於二隂承上下之際者故曰剝牀以辨未有與安溪李氏曰初二四皆無陽之應與獨於二言之者六二中正疑非剝陽者故特申其義說最確當六三剝之无咎象曰剝之无咎失上下也三變全艮有止而不剝之意又為上正應故為剝之旡咎者失上下葢不與上下四隂應也六四剝牀以膚㐫象曰剝牀以膚切近災也四變晉遇離晉進也又四位切近於五故為剝及於膚之象有謂剝肌膚者有謂剝牀之薦席者竊按初無位所謂足者奔走使令之賢或民之俊秀也二中正而位尚卑承宣親民之賢牧也四則近君之大臣矣如牀之第也牀之所由名也剝至此則牀亡止有寢者之肌膚在而將何所藉乎貞已蔑矣故直言其㐫也六五貫魚以宫人寵无不利象曰以宫人寵終无尤也五變觀遇巽艮為閽寺巽為女故曰宫人羣隂魚象巽又為繩五位尊力足以統率其類故曰貫魚以宫人寵程傳以此爻為别設義葢易於陽之長陽之盛多危詞如臨如泰等卦是也於隂之消陽陽之就盡多幸詞如觀之五與上與此爻是也上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也上變全坤艮為果蓏以其陽也故曰碩果變坤則已剝矣故不曰在木然其本氣居然在也故曰不食不食則可種而復生矣坤為大輿變坤故曰得輿艮合下坤有廬象艮既變則廬剝坤為衆君子得輿物望所歸故曰民所載也小人剝廬者言有君子以撑持世界不獨為君子所藉之牀為民所載之輿亦小人所藉庇之廬也乃小人無不竭盡心力以剝君子者在小人之毒愈以肆而君子之德愈以著而天下之歸望於君子者愈以深則小人之技終不可用於君子徒為自失其所依耳可不為大哀哉震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎復為一陽初反宜曰元矣而卦詞止繫之以亨者葢言元則似為陽所特始而非已往而復反之義以為大亨則合全卦論之一陽甚微而羣隂猶盛非如臨之陽剛浸長也故程傳謂漸長盛而亨通不如合訂以陽氣宣通為言確當剛反言其始剛長言其終動而以順行合訂以為即孟子所謂勿忘勿助旡疾言不為紛華所奪朋來旡咎言擴充而衆善日長俱有意味七日來復從來皆以歴六隂月至建子之月為七月易月言日者幸陽之復也竊以天時計之凡十四日有餘即交一節氣則七日正當節氣之中天地之呼吸一易而醫家於寒症輒以七日得汗為期義即引此又凡人日有過舉一至夜間及平旦未有不悔計亦七閱其時矣故雖甚惡之人至七日其善心必生此即來復之說也復其見天地之心程子曰先儒皆以靜為見天地之心葢不知動之端乃天地之心也觀此則知周子太極圖說主靜立人極者程子不出以示人而特標出一敬字之故也象曰雷在地中復先王以至日閉關商旅不行后不省方雷在地中與澤中有雷不同隨言澤中有雷見澤上已無雷也此言雷不在地上而雷已在地中也一則以有見無一則以在知復初九不遠復无祗悔元吉象曰不遠之復以修身也初變全坤坤先迷後得主者也故不遠復旡祗悔與旡悔不同合訂說甚確觀夫子繫詞所言則知行先後較然矣而陽明何謂行先于知乎六二休復吉象曰休復之吉以下仁也二變臨震動遇兌說故曰休復休復者以下之初爻為仁而近比之則得其觀摩誘掖之助而已不勞焉故休觀夫子以事賢友仁答子貢之問仁是已說者皆謂下仁為二之下乎初然畫卦雖自初至上但皆以在上者為上在下者為下無以二為下以初為上者不應于此又變例也六三頻復厲无咎象曰頻復之厲義无咎也三變明夷震遇離震動離麗時動時麗又六三與剛相間是復有間也故曰頻復頻復則頻失其有過多矣但復之為義失乃有復不失何復故不患失而患不復雖有咎而于義旡咎也人豈盡能為不遠之復屢失屢復正下學循習體驗之語見失者其德已日進悔過者其咎已日寡旡知者往往摘人之過失以病人而舎其悔過救失于不取則一失而不復者雖自謂無過吾知于義為有咎矣說本張仲誠六四中行獨復象曰中行獨復以從道也四變全震震為大塗行至中途而獨反也葢四與初應夫遥相感應而能復者獨六四一爻為然非衆皆不復而四獨復也說亦本仲誠張氏六五敦復无悔象曰敦復无悔中以自考也五變屯坤為厚德遇坎之中堅又險艱而得復故曰敦復合訂曰凡卦爻言无悔者在吉㐫之間惟復卦不然有復前之悔悔而後復非不遠之復也有復後之悔復而又悔非敦於復者也初惟不遠復故无祗悔五惟敦復故无悔說甚精竊按中以自考葢以中道自考純是學問事謂為天質之美者非上六迷復㐫有災𤯝用行師終有大敗以其國君㐫至于十年不克征象曰迷復之㐫反君道也上變頤坤遇艮坤為先迷艮為徑路上則路之窮也又下妄動而上安止故曰迷復夫帝出乎震艮則為反震故傳曰反君道安溪李氏曰一陽為復之主故近之應之者休復者也背之遠之者頻復迷復者也休美于獨迷甚于頻以遠近為等也五于初非應與而曰旡悔與剝之六二爻義異者以剝復卦義異也剝則諸爻皆剝其有不剝者應與于陽也復則諸爻皆復其有不復者去陽獨遠也五有中德故可以自考而旡悔又曰處復時則中德可以自成處剝時必有應與乃善剝之二未有與故不免于㐫時不同故也又曰夫所謂天地之心者道心也一陽在内而甚𦕈故道心微羣隂在外而甚盛故人心危惟精惟一則微者著矣有不善未嘗不知精也知之未嘗復行一也其殆庶幾乎言能著其微也初之不遠復是也允執厥中則危者安矣作德日休者安也敦厚不遷者安也以其得中故也二五之休復敦復是也未能遏人欲則甚危然遏之而不能即絶也三與陽相背而處動體之極故雖復而厲言其危也未能存天理則甚微然存之而未必即著也四與陽相應而處于羣隂之中故雖復而獨言其微也天理滅而人欲肆則微者愈微矣危者愈危矣微故有迷復之㐫危故有災𤯝之及用師則大敗無以勝人欲之强也㐫及于國君無以安主宰之位也至于十年不克征又何望于七日之來哉雖然此皆心之失其職爾若心得其職則以之克己而必勝天君泰而百體從令矣又何敗亡之㐫之有故其傳曰反君道也安溪之說休復敦復與合訂少異當㕘看各有精義不可偏廢也然安溪雖以休復敦復為安乃又曰休美于獨不曰休美于不遠復者則亦未嘗即以休復敦復為自然之聖也竊以性之者之聖無復之可言者也旣曰復矣而不遠復者過而不至于過休復者有所待而後興敦復者改過而不復有過葢即其易復而曰安即其不遷而曰安非必遽謂其為自然之安也獨以三爻為背初不若張說間字為確震下乾上无妄元亨利貞其匪正有𤯝不利有攸往彖曰无妄剛自外來而為主於内動而健剛中而應大亨以正天之命也其匪正有𤯝不利有攸往旡妄之往何之矣天命不祐行矣哉无妄全講一箇正字此正字純是大聖人學問最為精微細密切莫輕看旡妄者實心實理命於天而賦於人者也人心果實而无妄則豈有不正而有不正者氣質之或偏人事之過當是有實心者未必即全實理故於匪正上特加一其字如合訂所云仁之姑息義之畏葸由是推之凡荀息之忠季札之讓微生之信仲子之廉子路之勇申生之孝皆是也是以六言六蔽惟好學則無蔽此義不可以不精而命不可以不知也剛自外來而為主于内者乾二初畫一索得震也人心日馳於外妄也來之使為主于内无妄之本也動而健外不為物欲所屈无妄之行也剛中而應上下交孚无妄之功也此所謂大亨以正天之命也夫正者精義與知命而已精義之學有二曰行義曰守義知命之學亦有二曰安命曰立命當其初斷於義而論也行之則無所往而不利守之則無所處而不安初與四是也當其中參義命而論也行義而不計利與害守義而不計安與危二與五是也當其終極於命而論也命之偶逆安之而後其行義也果而不惑命之終窮立之而後其守義也毅而不息三與上是也此无妄為天命之正也然則不但義之不行不守始為匪正而失其无妄之本真也縱行焉守焉而不能安命不能立命即為匪正而无妄者猶之妄也故曰有𤯝不利有攸往蓋不誠無物妄之無所往不待言矣而旡妄不得其正之往又何所之哉止知我心之無他不知天命之不佑以此而行行必不利以此而守守必不安所謂觀彖而思過半者此其是已玩彖傳則元亨利貞决不似占詞攸往即兼行守二義蓋行則為人守則為己皆有所往君子之分定也非必以行始為往耳象曰天下雷行物與无妄先王以茂對時育萬物大象雷行物與即命于天而賦於人之意茂對時育萬物者與時偕行而品物咸亨也初九无妄往吉象曰无妄之往得志也初變否初為震主遇坤之順无妄之往所以吉也象曰得志然則大行其道於所性固無所加矣六二不耕穫不菑畬則利有攸往象曰不耕穫未富也二變履遇兌履不處也故有攸往又履和而至以无妄而和順以至則無所庸心焉矣故曰不耕穫不菑畬則利有攸往也不耕穫不菑畬義有兩層不耕而何穫不菑而何畬是一義不於耕而望穫不於菑而望畬是一義象傳云未富正兼此二義言之誠齋易傳曰初九動之始六二動之繼是故初耕之二穫之初菑之二畬之天下無不耕而穫不菑而畬者其曰不耕不菑則耕且菑前人之所已為也六二之柔順中正是能穫能畬者也故利有攸往未富者因前人之為而不自多也猶不富以其鄰之意此說又别六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也三變同人遇離同人利君子貞者也故邑人之災惟順以安之而後无妄不然則猶妄矣或字如合訂說甚好然說繫牛於路似不若仍照本義為妥傳云邑人災也其當安命之意可思九四可貞无咎象曰可貞无咎固有之也四變益遇巽與下震皆本一氣自上下下其道大光者也故曰可貞貞者非靜守而不行也得其正而固守之無所往而不以為凖如顔子之拳拳服膺是也傳云固有之然則獨善其身於所性固無所損矣九五无妄之疾勿藥有喜象曰无妄之藥不可試也五變噬嗑遇離噬嗑頤中有物者也俗云病從口入以為无妄而食之則致疾矣故以疾言也義亦兩層无妄之疾是一義勿藥有喜是一義无妄之疾即二之不耕何穫不菑何畬之意勿藥有喜即不於耕而望穫不於菑而望畬則利有攸往之意傳云不可試蓋一試即不免希冀分外非无妄矣一試且不可况屢用乎上九无妄行有𤯝无攸利象曰无妄之行窮之災也上變隨遇兌健而有毁折故曰行有𤯝无妄之所以行有𤯝者夫子曰窮也曰窮之災則惟修身以俟之而已安溪李氏曰无妄者守義安命無圖度計較之私也又曰无妄災也者必无妄而後自外至者謂之災非然則所自取亦順受其災而後謂之无妄非然則猶有妄也彖傳曰剛自外來而為主於内然則初四者天德之初无妄之主故以往則吉以貞則无咎此以天命之本言之而未及乎氣數之參差亦以人心之始言之而未及乎思慮之反覆蓋循正獲福理之常也動與理俱義之至也二五稍遠於初矣以其有中正之德故於是而極言無妄之道夫不盡乎分義之當然則田卒汙萊其為荒也宜矣宴安酖毒其為病也多矣然不順乎天命之自至則有願望之奢而本志為之變化䕶惜之甚而正命反以蕩摇者故必服田力穡如詩所謂不稼不穡胡取于禾而又達于餒在其中之義憂道而不憂貧也必省身无妄如夫子之禱久而又坦然有吾何求哉之心如夫子之未違則不敢嘗也兩爻之義皆所謂有終身之憂無一朝之患如是而後无妄之道至矣三上處時之極災所不免然世之人往往因所遇之偶而疑其常因所行之拂而圖其濟不知禍有無故而牽連者安之而已無辨所以止謗也時有所處而皆窮者順之而已不動所以無悔也是故循无妄之素則得天之理而天命祐之矣推无妄之極則無貳爾心而修身以俟之而所以立命者在是卦之所謂正者此也說最精細確當非好學深思不能領㑹也乾下艮上大畜利貞不家食吉利渉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利渉大川應乎天也小畜之所以亨者以一隂畜乾其畜不固健而巽非能止健故剛中而志行也大畜之所以利貞者止其健所謂保合其太和也乾剛健得艮以止之則剛健之體不輕為用而篤實矣篤實積中而英華發外則輝光矣篤實輝光則日新其德此就上下兩卦逐層逓出利貞之義剛上而尚賢三句又另一意不與隂以止乾之權也賢人在上自正又能止天下之健使不得放佚於不正一正而皆正大正也說者皆以尚賢即為養賢不知乾剛為賢畜於艮之下為養所以吉者養賢則賢者皆有以自成可以保其子孫黎民矣故吉也養如孟子所云中也養不中才也養不才養字之義蓋實有以成其德非徒尊之而已方是大畜利渉大川為應乎天者艮之二隂有大川阻之象艮上一剛本乾與下乾相應如天之相通有不能阻之象故利渉大川也小畜止其行事故旣止則無可行大畜畜其道德故旣畜而有可行此所以同為畜而占之異也以上說參仲誠張氏象曰天在山中大畜君子以多識前言往行以畜其德仲誠張氏曰天理氣而已無往不在惟在山中則石性剛止而陽氣在中倍為篤厚故草木生之禽獸居之寳藏以興生物極為繁盛有大畜之象君子觀象於古人言行傳記於後世者皆深造自得之實黙識而考驗之則德之畜積不覺其日厚矣正大畜之義也初九有厲利己象曰有厲利己不犯災也初變蠱蠱壞故曰有厲乾遇巽退故曰利己九二與說輹象曰輿說輹中無尤也二變賁乾遇離明知其所當止又乾車離腹故曰輿說輹九三良馬逐利艱貞日閑輿䘙利有攸往象曰利有攸往上合志也三變損乾遇兌與上應上為艮乾之三索而得者也乾為良馬遇兌悅故曰良馬逐仲誠張氏曰相比追廹曰逐良馬象剛健之為美才也乾之三爻同類上進逐則騰躍有不能從容守正之勢故使艱難而守其正焉艱貞維何曰閑輿䘙使乘於駕服之間習於艱難正直乃成良馬占者如是乃利有攸往也九三上比兩柔而被其畜故艱貞旣畜之後而應上九剛不畜剛合志上進故利往馬悅於車乃良而利往說亦好但日字作曰字看與本義異然則良馬逐句從初二兩爻來利艱貞句從四爻來日閑輿衞句從五爻來利有攸往句從上爻來六四童牛之牿元吉象曰六四元吉有喜也四變大有艮遇離仲誠張氏曰初九雖剛不敢有所進六四畜之是乘其剛之未進而早畜其德也有童牛之牿之象艮童離牛又為止於麗有此義立法制度以畜天下之惡於未形則民日遷善而不知豈非無窮之吉象吉事方來曰喜方來則未艾曰元吉六五豶豕之牙吉象曰六五之吉有慶也五變小畜艮遇巽其取象本義旣未實疏而諸家多謂豶為去豕之勢合訂又以牙為􅳥細思義皆未安竊見豢豕者豐其食而遂其生則豕老體大而牙出五爻以中德養賢老其才以為用義頗似之且巽入正與養義相關牙又與五位合夫子傳曰有慶已受其福曰慶此蓋謂畜賢已成其德故可慶也若必例以六四皆謂制下則初以剛銳上進而預有以防之宜矣至九二之自止亦何所用其防制而必且刑之已甚乎四臣位近君故曰童牛之牿五君位故曰豶豕之牙君無為而相代之以有為也上九何天之衢亨象曰何天之衢道大行也上變泰故曰何天之衢也小畜者言一隂之畜健陽此主畜者而言故曰小而卦詞曰密雲不雨自我西郊也大畜者言健陽之畜於艮此主受畜者而言故曰大而卦詞曰利貞不家食吉利渉大川也小畜惟主畜者言故初二兩爻不能畜也三爻强畜也四爻始畜也五爻正畜也上爻旣畜也此自畜之未固說至已固也大畜惟主受畜者言故初二兩爻自畜也三爻行而必畜也四五兩爻畜而喜而慶也上爻畜而後行無不利也此自畜之旣固說至畜極而通也安溪李氏曰小畜大畜在卦詞則藴畜之義多故畜之小則如雲之醖釀而未雨也畜之大則如士之得養而登朝事之待時而獲濟也在爻詞則畜止之義多故小畜則自畜之未固以終於固大畜則自畜之旣固以終於通然畜止者即所以厚其藴畜之道故卦爻之義同歸也傳曰大畜時也者以藴畜言之必大畜而後可以應時否則無其具以畜止言之必大畜而後能以需時否則失其幾是故初二之自止也四五之止人也當其可不失其幾者也三之利往也上之大行也有其具不失其時者也然小畜為以小畜大之義則大畜亦有以大畜小之義故卦曰自我西郊隂先唱也爻曰夫妻反目婦未能畜其夫也曰婦貞厲婦旣畜其夫而當戒也皆以小畜大之義也卦曰不家食吉君能養賢而賢推之以養天下也爻曰牿牛豶豕君相之於天下止其不善所以養其善也皆以大畜小之義也三與上得時而進皆蒙不家食之義三則猶防其險上則履於夷矣皆蒙渉大川之義震下艮上頤貞吉觀頤自求口實彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉卦德下動而上止便有發乎情止乎禮義之意故曰貞吉其體大離故曰觀頤下又曰自求口實者蓋卦象如人之唇齒繫名曰頤則自養之義為多然以卦德論之動而止其所當止則養必有道觀其所以養人者即其所以自求口實者也所謂治人者食於人不然四海困窮天祿亦永終矣夫子彖傳連用二觀字者正以下句意即在上句内非兩事也合訂云觀頤之道即以其人自養者觀之正是此義天地養萬物聖人養賢以及萬民有謂皆養得其正者蒙引云重在民無正字意極是合訂從天地側重到聖人上說最確象曰山下有雷頤君子以慎言語節飲食大象皆於上下兩卦說義聞之先儒云雷之迅者曰霆又曰雷自地起霆自天來然則山下有雷則但能生物而不能殺物者矣故君子觀其象而慎言語節飲食夫慎言語則言為身文而豈以多言招尤節飲食則食以充體而豈以貪得賈禍程傳推之於養天下合訂云慎言語者言顧行行顧言非徒訥於口已也節飲食者无以小害大无以賤害貴非徒減於口已也說俱佳安溪李氏云雷收其聲如慎言語山閟其氣如節飲食意亦切也初九舎爾靈龜觀我朶頤㐫象曰觀我朶頤亦不足貴也初變剝震動遇坤順故有舎而相就之義然下雖順而相就而上則高而難親故但觀之而已此觀字亦從卦詞觀字順說來夫彼以其富我以吾仁彼以其爵我以吾義在我者本無不足也乃舎所學而從彼則為利祿所動而人已皆失矣豈不為㐫六二顛頤拂經于邱頤征㐫象曰六二征㐫行失類也二變損遇兌旣為損兌又毁折動而即有所虧也故曰征㐫本義以初上皆非其類然象傳止言征㐫下卦動體則專就求養於上言矣若近比下則不可言征六三拂頤貞㐫十年勿用无攸利象曰十年勿用道大悖也三變賁震動遇離麗動而麗於㐫故有十年勿用之義拂頤何以貞安溪李氏曰三居下體應上而有求焉則非自求者也與頤之正道正相反故曰拂頤貞說最精當又曰十年勿用無時而可也无攸利無一而可也按三不中不正居動之極而應乎上是以甚言其㐫蓋上為賢五尊而禮之養賢以及萬民宜也乃三以聲勢之私朋附干澤非義甚矣故曰大悖賁為文飾乃虛名標榜之意如漢之黨人依附蕃膺唐之黨人依附牛李之類是也六四顛頤吉虎視眈眈其欲逐逐无咎象曰顛頤之吉上施光也四變噬嗑噬嗑者去其間而口得合也蓋欲養民必先除其害民者而後民可得而養故有虎視躭躭其欲逐逐之象蓋虎食害稼之獸蜡祭中有虎非惡獸也躭躭者除奸之不疑也逐逐者加恩之無己也如此者能好而能惡惟其仁欲仁而得仁又焉貪是以无咎也按艮為虎遇離為目故曰虎視四心位故曰欲與初應故曰躭躭逐逐夫賞善罰惡一皆天理之至公而無一毫私意於其間何等光明正大故傳曰上施光也其自養也亦然觀夫子傳并無下求在初之賢下而專求而繼之說且其說亦附㑹近鑿而不切竊嘗疑之蓋從來皆不知從變爻中討消息耳六五拂經居貞吉不可渉大川象曰居貞之吉順以從上也五變益艮遇巽止而入故有居貞吉不可渉大川之象經凡言渉大川者徒歩曰渉蓋獨任艱鉅之意五才弱而當養民之位故宜養賢以及之此夫子曰順以從上也上九由頤厲吉利渉大川象曰由頤厲吉大有慶也上變復復為天地心天地以生物為心者也又艮遇坤坤為艮之母故曰由頤以在五上故厲能厲則吉利渉大川見得君之專受任之重故傳曰大有慶項氏曰上九之厲吉非能自吉也得六五之委任而吉也巽下兌上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉隂陽對待者也故兩停而不可偏勝偏勝則過矣陽為有用之才故取象於棟棟有謂為室内之中柱者然玩下爻詞及象傳似非柱且語云上棟下宇安溪李氏云二隂者楹柱之象則棟非柱明矣竊以立者謂之柱柱在前者為楹橫擔於柱上以承樑者謂之棟棟如亠字立字形者是而乘於棟之上或三或五更或七者為樑棟承上接下故有本末本末者樑與柱也惟在中者為棟故卦旣以四陽取象而爻亦以三四取象也剛過而中合訂謂二三四五皆中然按小過象曰柔得中剛失位而不中則此仍遵本義指二五爻為是巽而說行是說利字之義利者義之和也合訂引禮行遜出說最妙利字一頓有攸往言如此以往乃得通達耳安溪李氏言宜有所往然後得亨是往則亨不往則不亨矣義未全也剛而過中合訂謂如子産治鄭孔明治蜀竊以宼萊公獨斷澶淵之議岳忠武力持恢復之謀可謂獨立不懼矣然萊公之以功名自矜忠武口斥相檜之靣欺則是不能巽而說行處也又如四皓之抗志商山子陵之埋踪江水可謂遯世無悶矣然四皓為太子而挾其父子陵之足加帝腹而不為屈亦非能巽而說行者也求其巽而說行者其唐之郭汾陽張曲江宋之韓魏公諸君子乎象曰澤滅木大過君子以獨立不懼遯世無悶大象澤滅木三字自明本義多一於字反說不去初六藉用白茅无咎象曰藉用白茅柔在下也初變夬巽遇乾夬之初曰往不勝以變氣言也此則以本氣言然觀一用字則以小心而任大事其氣已貫乎始終亦非健不至此且巽為木當其初之柔則曰茅宜也乃曰白茅則為乾金之色象固叅用變氣矣又卦詞棟橈夫子謂為本末弱夫棟之橈猶不橈於末而實橈於本其本之弱則初爻也顧獨繫之於三而於初則謂其有用何耶蓋三之變為坎其卦為困坎䧟而困則剛者必至於危初之變為乾其卦為夬乾健而決柔則弱者適宜於用此其所以无咎而為善補過也九二枯楊生梯老夫得其女妻无不利象曰老夫女妻過以相與也二變咸巽木遇艮止下近初隂為水畔之木故曰楊處過之時又遇艮止故曰枯咸感而萬物化生下比於初故曰生梯咸取女吉者也以其過而下比初柔故曰老夫得女妻无不利之象傳曰過以相與葢釋老夫女妻之意曰相與則能生矣故不復釋枯楊之文也九三棟橈凶象曰棟橈之凶不可以有輔也三變困困剛揜者也又巽木遇坎䧟故有棟橈之象全卦雖曰棟橈而有中德又巽而說以行之故可亨是勢雖壞而德尚可以為輔也此則入於䧟阱之中矣是以但曰凶而夫子謂為不可以有輔矣九四棟隆吉有它吝象曰棟隆之吉不橈乎下也四變井井巽乎水而上水者也以巽木而上出故有棟隆之象夫子傳曰不橈乎下亦取於此其在本氣陽旣過而四在下之上有隆意又居柔位剛而不過棟本隆者也於此則可以居其所矣然以剛居柔再應者柔未免過柔且又處多懼之位勢恐不能固其必往之志凡曰悔者以其過也曰吝者以其不及也九四以大過人之才值大過之時而又居得為之位自當中立不倚方能井養不窮若少為私意所屈則於本志必有所不及者矣惟以變氣言則兌澤遇坎水一意無他如循本氣而應下則為有他而能免於吝乎三四居卦之中皆棟象三橈而四隆者呉氏三說皆取本氣言之然必合以變氣於義方全而夫子以不橈乎下釋有他吝之意亦顯然可見矣三四之變氣皆坎而有凶有吉則以所自之本氣與位不同故也初與上其變氣皆乾意亦同此九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可久也老婦士夫亦可醜也五變恒兌澤遇震木又近上隂故仍曰楊以其過也亦仍曰枯震為反生而與上比故曰生華兌女故曰婦以其過故曰老震男故曰夫以五有中德而居尊位故曰士以兌變震故曰老婦得士夫以大過之卦而變為恒恒雷風相與剛柔皆應者也是亦善補其過矣然其相與相應者乃屬老婦士夫則亦無可譽矣故夫子傳但言其可醜也歴來皆以上六為老婦然於句法文氣不合且亦未免於固耳上六過渉滅頂凶无咎象曰過渉之凶不可咎也上變姤兌遇乾變說為健剛已過而又以健行是真過也卦有大坎象此居最上又大過原以大才任大事獨荷艱鉅者也故曰渉上六以柔才無位而乘其陽剛之過欲以健任大事自不能勝任又大象澤滅木而此為頂變氣為姤一隂生于下壯而將用事矣是則任剛太過而不顧其才之不稱不知其時窮而不可為不知其无位而不必為而必為之勢將至於殺身故曰滅頂旣曰凶矣何以无咎夫子特為釋之曰不可咎也於補過之說又另一義葢值時窮无位然而過渉滅頂者士君子之殺身成仁不為不過而論人者豈以其非所宜為而咎之乎坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川邱陵也王公設險以守其國險之時用大矣哉習字安溪遵古註作便習訓而以夫子傳云重險為解習之意非以重訓險說甚精其實重復即便熟矣竊嘗從而推之不惟成德者可習于險而往有功也即未成德者果習于險則亦知機巧之無用而將返求其誠故習坎為人心之德卦詞有孚下曰維心亨者惟其有孚故心亨也小人不安于險而好逞私智則因其險而險之而險亦無窮所謂心勞而日拙也君子之處險惟忠信篤敬不以險應險則險不為用所謂心逸而日休也行有尚即蠻貊之邦可行之意觀二曰未出五曰不盈則知往有功非謂其能出險也夫溝澮皆盈水之無本者也虚而為盈人之無恒者也惟源泉實出于地中故盈科而進無所溢而亦無所禦焉為世利用者此也惟此心常存于人中故實而若虛無所矯而亦無所窒焉往則有功者此也水流而不盈傳義皆連下句獨安溪李氏于此畫斷單以此句為言水德蓋流即通意不盈即實意下行險句釋有孚而維心亨則仍其文者有孚即其所以亨無庸再釋也水之流而不盈以剛中人之行險而不失其信維心亨亦以剛中蓋剛則實中則通也末節葢即往有功意而極言之安溪李氏云險非善也而有險之用故不言時義而言時用也象曰水洊至習坎君子以常德行習教事教事安溪李氏謂為道藝以常德行為進德習教事為修業亦好初六習坎入于坎窞㐫象曰習坎入坎失道㐫也初變節遇兌水之停蓄者曰澤故有入于坎窞之象水之德流而不盈者也節以有坎而止重坎而又入于坎則失其流通之道矣坑坎中小穴旁入曰窞今上下兩卦重坎而變氣又為澤是所謂窞也是所謂習坎入坎也夫履道坦坦視險如夷有孚而心亨者也初本無位未即于險而六以隂柔居潛伏之地是為機變之巧者恐其或入于險而求以免之乃方自曰予智及驅而納諸罟擭陷阱之中而莫之知避所謂旁見側出不由正道終亦必亡而已矣夫子曰失道正為習險入險者警之九二坎有險求小得象曰求小得未出中也二變比遇坤水比地而行不為汪洋浩瀚則涓涓之流也故有求小得之象夫習坎者將以大有為也二以剛中之才方在下卦其上尚有險也故但求小得而已涓涓不已將為江河所得雖小而有可大之基正其有孚心亨者也夫子曰未出中未出者不求出也不求出者中也葢盈則出矣中字正釋求小得之意六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也三變井遇巽三在上下際故曰來之坎坎亦以隂柔無為而變氣又為井是將安于險矣故曰險且枕上下坎而變為井是亦坎中小穴旁入于窞也以坎陷而遇巽入故曰入于坎窞然初亦入窞者何彼㐫而此但曰勿用乎葢人生初歩最貴擇術今舎正路而不由而旁見側出是方險而即習險習險而果入險乃自失其道豈不為㐫三則來往皆險進退無地是遇也非自取也苐其委靡苟安而不反求正已是以終無功非可嘉尚而已與失道者異矣六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也四變困遇兌說言乎兌故有樽酒簋貳納約之象坎水能照物夫子于屯之四訟之初坎皆繫之以明故曰自牖此爻說者互異如程傳以納約自牖謂人臣以忠信善道結于君心必自所明處乃能入也本義亦以牖為非所由之正而室之所以受明王氏弼謂此至約自進于牖乃可羞王公安溪李氏主此說合訂又謂不于庭于堂于戸無拜獻授受之文然皆于夫子傳曰剛柔際不甚融洽及讀困之卦詞曰有言不信因反覆思之乃始恍然而得其故也夫易于中德外最重剛柔相濟今四以柔居柔至柔也五以剛居剛至剛也四又近君多懼乃以至柔比上至剛而時又在險則處此際者非有以聨上下之情則睽絶而不復相親非有以振委靡之氣則承順而不可為節未有不得咎者矣乃變氣為兌之說言以柔爻變剛爻則君臣相說迎機利導所謂和悅而諍也如此則始雖恐有咎而終何咎乎故一樽貳簋器用瓦缶者不以文而以情也夫子止承樽酒簋貳之文而繫之以剛柔際正所以明樽簋之故諸儒皆未合變氣以玩象此所以于夫子傳義多有難通耳九五坎不盈祗既平无咎象曰坎不盈中未大也五變師遇坤以本氣言則水已在上矣然變氣為地則猶然未出坎也故曰不盈曰平合訂曰未出曰祗平將出曰既平也葢四五之本氣險而過剛險而過柔皆可以有咎者惟其變而說而順故无咎耳補過之道也夫二之未出中非曰未出險中也五之中未大亦非曰以在險中故未大也中皆言德一字句安溪李氏言之詳矣曰坎有險習險之道無他惟曰有孚而已孚者實也凡實德實行之積自小而大故欲更習乎險者必先求其小得務大則出中矣人心忌于易盈况居尊者乎水德至盈無虛滿而盈者但能至于平而已君子之心無盈滿之時而其德自有充實之驗居尊位者若此則滿而不溢高而不危何咎之有未大釋不盈之義言由有中德故不盈滿而自大也二曰小得而五猶曰未大葢終始不盈者也說最精妙不易苐務大則出中句應增二字云務大則出而非中矣葢出則為盈也又曰九五為卦之主故彖傳以其詞釋卦與需大象用九五之詞同上六係用徽纆寘于叢棘三嵗不得㐫象曰上六失道㐫三嵗也上變渙遇巽坎為桎梏為叢棘巽為繩故曰係于徽纆寘于叢棘渙散也故有三嵗不得象出險以陽剛為道上則有出險之理六則失出險之道矣此夫子所以特標出上六二字也險之說有二有受險者有為險者受險者人世之險二五之陽爻是也為險者人心之險初三四上之隂爻是也然而受險者終不為險為險者終至受險故君子于險但有居易之道并無躍冶之術葢貧賤憂戚庸玊女于成則衆人之所難堪者君子方自幸其更歴世故以為動心忍性之助是以聖人畫卦重其坎以象之而特名之以習然則何以習之則如二五之剛中有孚心亨而已有孚則素位而行心亨則不為苟免此二之未出五之未大皆不為險以求出險者也若夫機械變詐人心之險也則將求出于險矣乃初恐入險而終入矣行險以徼倖者也三以在險苟安不素位而行者也四以畏懼小心僅得无過此求免而倖免者也上以走險得險途窮而不反者也故初三上皆為險而終至受險四雖不為險特懾于英明之下而不敢逞耳然其痛自節約過于委曲亦非有孚而心亨者矣何如二五之修身以俟坦然蕩蕩者無入而不自得也哉離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百榖草木麗乎上重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也離之明以無所不照為亨而必先之以利貞者以柔麗乎中正有以保合其明故也不然則無本之明其明不繼而蔽于物也亦多矣此言離之全德至畜牝牛吉則单指二五為坤之中爻而發其藴明者之事也與上非二理彖傳故不兩釋蓋坤為牛坤對乾曰牝馬者主于行也離對坤言則為牝牛主于養也順之至也畜即保合之意言畜養其明者必至順如牝牛為吉若英明之主多過于操切明而以順之中正者行之則内不役照外不傷物豈不為吉乎炳文胡氏曰坎之明在内以剛健而行之于外離之明在外當柔順以養之于中彖傳日月麗乎天是天有以保合日月之明而無不照也即釋利貞亨之意百榖草木麗乎土坤土之順徳有以畜養百榖草木而無不遂其生也即釋畜牝牛吉之意重明以麗乎正乃化成天下則合而言之柔麗乎中正三句特為點醒非上釋卦名義而下始以卦體釋卦詞亦非以上言剛麗中正為卦之德下言柔麗中正為爻之善也定之劉氏曰坎者隂險之卦惟剛足以濟之沉潛剛克也離者陽躁之卦惟柔足以和之高明柔克也竊按此卦不獨為孟子牛山章原本即大學之言明明德中庸之首章皆從此出當細玩之又按柔麗乎中正者蓋言陽麗隂柔以為明者也隂得其中正則明即無偏照矣與重明以麗乎正無兩意特為畜牝牛句故加一柔字耳象曰明兩作離大人以繼明照于四方合訂曰繼明者緝熙光明日新又新也照于四方者明明德于天下也甚確初九履錯然敬之无咎象曰履錯之敬以辟咎也初變旅遇艮初在下為足趾離為萬物相見而變氣之旅為客故有履錯然之象安溪李氏曰喻應接煩雜也人之明易蔽于物惟敬以待之則清明在躬而物不能蔽可以免咎矣剛德居初能敬者也又曰兩體取晝夜相繼二日中之象也五夜中之象也三日昃之象也四暗暮之象也初上之交昏晨之際之象也敬者人心之朝氣也人能常敬則常不昏矣夫子傳云辟咎皆以接物言敬之于未失之先即未發之致中也六二黃離元吉象曰黃離元吉得中道也二變大有遇乾合上卦玩之乃日在天之上照于四方者此也化成天下者此也故曰黃離元吉卦詞既取坤德為義坤以二為主爻離自坤再索而得者故亦以二為主而坤五之變曰黃裳元吉此則于二亦繫之曰黃離元吉明其自坤出而實非坤也夫黃中通理明之最盛者也仁統四端春首四時此喜之情得中和之正者也九三日昃之離不鼓缶而歌則大耋之嗟㐫象曰日昃之離何可久也三變噬嗑離明而遇震動明過而漸昏矣故曰日昃震為决躁又其卦詞曰震來虩虩又曰笑言啞啞噬嗑三爻之變即離亦曰遇毒故此有哀樂不常之象夫子傳曰何可久也正見無恒之人忽哀忽樂而亦即為衰亡之徴也其實大耋之嗟仍是其樂無極之意若君子則生順死安何有衰亡之懼乎縱欲極志此樂之情不得中和之正者也九四突如其來如焚如死如棄如象曰突如其來如无所容也四變賁賁者飾自後起非固有之者也故有突如其來之象離火而遇艮止之故有焚死棄之象三之震但昏妄而已四之賁則純事外飾而在内之明德亡矣突如者肆情縱欲有觸輙動也焚如者利欲熏心膏火自煎也死如者生機絶也棄如者良心喪失而不可復還也逐字入深傳曰无所容容字即孟子所云容光必照之容言胸中盡為私欲蔽塞無所容其光明也與卦詞畜字正對暴劇躁妄此怒之情不得中和之正者也六五出涕沱若戚嗟若吉象曰六五之吉離王公也五變同人遇乾合下卦玩之乃日在天之下則夜中也凡人靜則神清而於旦晝所為不免有愧悔怨艾之萌故曰出涕沱若戚嗟若沱若者悔大過也嗟若者悔小過也此復明之機故曰吉五有中順之德變氣又為夜氣之清是以如此夫子曰離王公者離字讀斷言六五之吉其離之位正當王公故不但常人能悔其過為吉已也而因以見下文上爻取象之意嗚呼人君之德莫大于悔過此秦誓之所以列于書也歟悔過思善此哀之情得中和之正者也初曰敬之此曰出涕即戒懼慎獨之意上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也上變豐遇震豐大也其卦詞曰宜日中彖曰明而動故豐然則此爻為去其昏蔽而有以復明之本體矣上處離之終重明復生之時而以剛德居之又豐之象曰君子折獄致刑故有出征折首之象折首獲匪其醜者明之至者也蓋擒賊擒王則餘衆自散不然今日取一卒明日取一將曠日持久而不得奏耆定之績是以軍之重有智將也在勝私者必使根株盡㧞方為至明若但去其微疵小過今日方免明日復然姑待異日而異日更甚則亦不智之甚矣必如此之有嘉折首而不以得其醜類為功方為善補其過者論語曰君子之過也如日月之食焉過也人皆見之更也人皆仰之此上爻之所以日復中也歟夫子傳曰以正邦此正字正應柔麗中正之正字在王公則曰正邦在君子則曰正心一而已矣克之于既發之後即已發之致和也蔡氏淵曰坎離之用在中二五皆卦之中也坎五當位而二不當位故五為勝離二當位而五不當位故二為勝易翼述信卷五
