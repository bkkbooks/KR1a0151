body:
  text: 易翼述信卷一廬州府同知王又朴撰讀法經傳次序仍王本厚庵李氏曰朱子既復經傳次序今不遵之而從王弼舊本何也曰朱子之復古經傳也恐四聖之書之混而為一也今之仍舊本也慮四聖之意之離而為二也蓋後世之注經也文義訓詁而已而又未必其得故善讀經者且涵泳乎經文使之浹洽然後參以注解未失也若四聖之書先後如一人之所為互發相備必合之而後識化工之神則未可以離異觀也按此則以夫子之說謂與文周無異者今古有同情矣按厚庵李氏本福建之安溪縣人後稱安溪李氏即是經傳合讀程朱傳義與諸儒說皆於卦爻辭下自以己意詮解一過而於彖象之傳又為之訓釋其同也是為復異也是不以夫子之說為即文周之說也故卦辭必合彖而一以彖解之爻辭必合象而一以象解之河圗洛書河圗洛書疑信紛紛然天下一切惟信之于理耳苟𠂻之理而是則其真其僞皆不足辨也繫辭大傳明有河出圗洛出書聖人則之之言矣朱子以為順數逆推皆有明法不可得而破除其信哉第聖人作易仰觀俯察逺取近取事亦夥矣圗書特其一耳故不列圗而敘其說于末以其發明說卦傳之藴抑亦存朱子之意也先後天圗學者多言此出陳希夷為異學所撰造然大傳已有天地定位及帝出乎震兩條而卦爻亦多取其義者但非全卦切要之㫖故亦不列圗而敘其說如圗書不泥諸儒之說而恪遵夫子之彖象傳如元亨利貞以為四德而必不謂為大通而利於正大小謂剛柔而必不謂為巨細乾坤之初上二爻以及屯小畜泰否隨蠱臨賁遁睽益夬姤升革豐旅㢲小過既濟等卦爻余非敢妄逞臆見以求異於朱子也夫自有易以來諸家之說橫見側出至宋邵子始得象數之真傳而程子之傳專用義理粹然一出於正朱子合而一之不惟補二先生之所未及而其有功於四聖抑豈淺鮮哉然朱子之說異於程子者亦復不少不惟象占一端而已即以義理論舉其大者如程傳於乾引舜事來說朱子以為犯手失易潔净精微之意傳于坤之六五并舉女媧武后以為大凶朱子以為硬入說得絮了𫝊於遁彖謂小利貞為君子小貞其道又專以乾坤言變卦而朱子皆直謂其不可通之類夫朱子師法程子而易傳尤其尊信謂為盛得水住者而其所言如此世不謂之背程也蓋道理亦求其真是耳然則余之所說間有異於朱子而實遵夫子之𫝊以為說又豈可謂為背朱耶又按夫子于易贊之而已未嘗自謂說易也所以然者易之理廣大精微一二字中包涵無窮欲說之而將何如以說之竊以為能讀夫子之所以贊易者亦可以知易矣故於卦爻皆不敢置一辭而專以彖象傳之說并參之文言繫辭說卦等𫝊息心靜氣以求與文周之說而得其一當然讀夫子之所以贊易者而亦無庸外求也仍以夫子之說讀之而已矣何也繫辭中所言君民剛柔逺近等說皆夫子讀易之法也而時位應比諸法則又皆具於夫子彖象傳中故揭而列之以俾後學皆如是以讀之而斯可矣彖此正夫子注易凡卦體卦象卦德無一不細細訓釋非如文言繫辭等傳之别發餘藴者可比而亦有卦辭之所未及者則必其義藴所係獨大然亦僅矣安溪李氏曰文王名卦繫辭所以觀象者深矣故總㑹其綱以命名又旁通其義以繫辭辭之於卦如幹之連於根也後之玩辭者但以卦名之義推說其理似亦足矣然當日繫辭之意既博觀乎卦中所藴以盡其言則言皆有依据而非虛說此則周公六爻所因以繫而爻辭於彖又如枝葉之連于幹也夫子彖傳既以卦義釋名矣至其釋辭也不離乎卦名之義而復推廣卦義以得其据依一則以盡文王觀象之藴也一則以起周公爻義之端也無夫子之傳則文王之彖既無以見其藴之包涵周公之爻又無以見其端之從起然則觀彖辭而思過半者非上智不能惟以夫子之彖傳為据以得乎彖辭之義則其於六爻也不亦可以推而通乎又曰卦之名義乃取象之本言陽動于下陷于中止于上是矣若隂入于內麗于中說于外則非也蓋陽性動其純者為健健者動而不息也隂性靜其純者為順順者靜而有常也陽性既動則有直上發散之意必遇隂而聚隂性既靜則有隱伏凝聚之意必遇陽而散然隂遇陽則散矣陽遇隂而聚歸于發散直上而後已此隂陽之情也陽在下而隂壓而聚之其勢必動陽在中而隂畜而聚之其勢必陷陽在上而隂承而聚之其勢必止此主陽遇隂故曰陽卦隂在內陽必入而散之是陽入隂非隂入陽也隂在中陽必附而散之是陽麗于隂非隂麗于陽也隂在外陽必敷而散之是隂得陽而說物非隂自為說也此主隂遇陽故曰隂卦夫陽為隂壓而聚必動而出者莫如雷矣為隂畜而聚必和而解者莫如雨矣為隂承而聚既極而必止者莫如山矣隂為陽入而散之者莫如風矣為陽附而散之者莫如火矣為陽敷而散之者莫如澤矣坎又謂之險者陽陷於隂則險甚矣離又謂之明者陽麗于隂則明必生焉健順雖隂陽之純然健者得順而聚順者得健而散其理無以異也此八卦之德所以能盡天地萬物之情而為凡易義類之所根也大象此則夫子之易也安溪李氏曰卦之名不盡取於象也然而取於象者多矣是故夫子之以彖傳釋卦也卦象卦德爻義蓋兼取焉而又專立一傳特揭兩象以明卦意易者象也本天道以言人事此夫子特揭之㫖也約之則有三例有卦名所以取者如地天為泰天地為否火地為晉地火為明夷澤水為困水澤為節水火為既濟火水為未濟之類是也其有别取卦名而象意則切者如一陽統衆所以為師而地中有水亦似之一陽御下所以為比而地上有水亦似之一陽來反所以為復而地中有雷亦其時也一隂始生所以為姤而天下有風亦其候也此類皆是也其有卦名别取象意又不甚切而其理則可通者如隨之為隨剛來下柔也澤中有雷陽氣下伏亦有其象焉蠱之為蠱剛上柔下也山下有風隂氣下行亦有其象焉四陽居中則為大過澤之滅木亦氣盛而大過之象也四隂居外則為小過山上有雷亦氣微而小過之象也此類皆是也其言君子之體卦德亦有三例有直以卦意言者如乾之自彊坤之厚載師之容民畜衆比之建國親侯噬嗑之明罰敕法頤之慎言語節飲食之類是也有就卦意而推廣言之者如晉之自昭明夷之用晦損之懲忿窒欲益之遷善改過之類是也有本卦意而偏指一事言者如豫之作樂隨之宴息革之作歷渙之立廟之類是也至體卦德而以其道與之相仿者如天地交泰則萬物生君子裁成輔相則萬物各遂其生非偏言開治之時裁成輔相也天下雷行則萬物育君子對時育物則萬物各得其性非偏言雷行之時茂對育物也雷風至變而有常理君子之行亦至變而有常度非偏言變動之時立不易方也洊雷震肅以作其氣君子之行亦震肅以勵其心非偏言震驚之時恐懼修省之類是也爻象此夫子審爻之時位比應德變以及剛柔貴賤逺近等象而得其辭中之義第以一語㸃明辭最謹嚴其不煩言而解者蓋爻之義藴已在彖中夫子固曰觀彖而思過半也靠定爻辭并非别論程子曰一爻之中常包涵數意聖人常取其重者而為之辭亦有易中言之已多取其未嘗言者又有且言其時不及其爻之才者須先看卦乃看得辭朱子曰易有象辭有占辭有象占相渾之辭安溪李氏曰象也者像也故或其卦取於物象而爻當之則遂以其義之吉凶斷而爻德猶其次也如屯所以為屯者以其雷在下而未起也初為震主當之故曰盤桓又以其雲在上而未下也五為坎主當之故曰屯膏需所以為需以其雲上於天也九五坎主當之故為飲食宴樂也復之六三說而承乾本卦之主然因彖言嘻人而三適當兌口之缺有受嘻之象故其傳曰位不當也言其直口之位為不當也頤之初九本有剛德能自守者也以其與上共為頤象而頤之為物其動在下故曰朵頤而得凶也咸艮以人身取象故咸二雖中正以直腓位而凶艮四雖不中正以直背位而無咎歸妹之凶以女少而自歸故也初九適當娣象則不嫌於少且自歸矣六五適當帝女之象則亦不嫌於自歸矣故皆得吉也節取澤與水為通塞九二適在澤中則塞之至也故雖有剛德而凶也凡若此類以爻德比應求之多所不通惟明於象像之理則得之又有卦雖取其象而爻義不應者則有變例如噬嗑頤中有物則初上兩爻象頤噬物者也九四一爻象物噬於人者也然既以用獄為卦義則用刑者有位之事故又變其所取之象以從爻位四反為刑獄之主初上反為受刑之人也又曰有一卦六爻専取一事一物為象而或一爻别取者則其義因以異矣如需諸爻皆取沙泥郊穴之象而五獨曰需于酒食則以五為需之主有需之德而所需之安也蠱諸爻皆象父母而上獨曰不事王侯則以上九居卦之上無復承於父母之象人未有不事父母者故曰不事王侯也咸諸爻皆取身象惟四不取者四直心位因之以論心之感應而所該者廣也大壯諸爻取羊者三其曰壯趾曰藩決亦羊象也惟二不取者有中德而居下體不任壯者也蹇諸爻皆取往來為象惟二五不言者五尊位二王臣之位義不避難無往來者也艮諸爻亦取身象惟上不取者九三雖亦艮主而直心位然止未極也至上而後止極則盡止之道者也若此之類皆其權於義者精故其取於象者審也或曰四近君之位蹇不取四為王臣而取二何也曰四近也二逺也當蹇之時為近臣者與君同心來連而已若冒險阻而濟艱難則逺臣之事也故曰同功而異位又曰六爻之辭多稱卦名以起其端例也然有稱有不稱者則義亦異矣如同人六爻皆當言同人然惟三四不言者既有伏莽乘墉之象則非同人也豫六爻皆當言豫然惟二五不言者既有介石之操貞疾之警則非豫也隨六爻皆當言隨然初二五上不言而惟三四言之則以陽倡隂隨理之正也初二五上以剛隨柔雖合時義而非隨之正三四以柔隨剛雖非時義而得隨之正也蠱之諸爻言蠱而惟上不言蓋蠱者事也上不事王侯則無事矣然事之壞也自人心始上之志可則則其事莫髙而莫尚焉噬嗑諸仌言噬惟初上别取初上噬于人者也不可言噬也離諸爻皆不言離惟二三言離諸爻皆直昏夜及昏明之際惟二三直日中與日昃也遁諸爻皆言遁惟二不言二應五不可遁者也明夷諸爻皆言明夷惟上不言諸爻皆明而夷者上則夷人之明而非明夷也夬諸爻惟三五言夬一近隂一應隂當夬之任者也姤諸爻惟上言姤去初最逺言遇者幸其不遇也歸妹惟二上不言歸妹一不歸一無所歸也豐惟初五不言豐一則未至日中一則有以處乎日中也旅惟五爻不言旅旅之最貴者則非旅也渙惟初爻不言渙渙之初則猶未渙也節惟初二不言節過而後節節之初則無所事節也中孚惟五爻言孚德既中正而乂化邦之主也既未濟兩卦惟未濟三爻言未濟他爻之既未濟皆時之為也惟未濟之三時可濟矣而不濟則才之為也故特言未濟以别之也餘卦餘爻如此類者皆可以義理惟竊按繫辭傳曰爻者言乎變者也故玩爻辭非合所變之卦則有不可得而眀者矣蓋有本氣有變氣必先取本氣之時位德應承比卦主與象定其體而以變卦之體象與彖辭通其用然後爻辭之闕察近身逺物之象亦為未見故於此更備說重卦之由及八卦所為之象謂之說卦焉序卦傳康伯韓氏曰序卦之所眀非義之藴也蓋因卦之次托象以明義朱子曰以為非聖人之精則可謂非聖人之緼則不可序卦却正是易之緼事事夾雜都有在裹面雜卦傳此則夫子自以修己治人之學别為議論以此為孔子之易非文周之說是也然不可謂非伏羲之易蓋卦次雖别而剛柔盈虛消息之道則一也時折中曰消息盈虛之謂時泰否剝復之類是也又有指事言者訟師噬嗑頤之類是也又有以理言者復謙咸恆之類是也又有以象言者井鼎之類是也四者皆謂之時草廬吳氏曰時之為時莫備于易程子謂之隨時變易以從道夫子傳六十四彖獨于十二卦發其凡而贊其時與時義時用之大一卦一時則六十四時不同也一爻一時則三百八十四時不同也始於乾之乾終於未濟之未濟則四千九十六時各有所值引而伸觸類而長時之百千萬變無窮而吾之所以時其時者則一而已位折中曰貴賤上下之謂位王輔嗣謂中四爻有位而初上兩爻無位非謂無隂陽之位也乃謂爵位之位耳五君位也四近臣之位也三雖非近而位亦尊者也二雖不如三四之尊而與五為正應者也此四爻皆當時用事故謂之有位初上則但以時之始終論者為多若以位論之則初為始進而未當事之人上為既退而在事外之人也故謂之無位然此但言其正例耳若論變例則初上亦有當時用事者蓋以其為卦主故也五亦有時不以君位言者則又以其卦義所取者臣道不及於君故也故朱子云常可類求變非例測按以位為爵位之位說出程子魯齊許氏曰初位之下事之始也以陽居之才可以有為矣或恐其不安於分也以隂居之不患其過越矣或恐其愞弱昏滯未足以趨時也大抵柔弱則難濟剛健則易行或諸卦柔弱而致凶者其數居多若總言之居初者易貞居上者難貞易貞者由其所適之道多難貞者以其所處之位極故六十四卦初爻多得免咎而上每有不可救者始終之際其難易之不同蓋如此又曰二與四皆隂位也四雖得正而猶有不中之纍况不得其正乎二雖不正而猶有得中之美况正而得中者乎四近君之位也二逺君之位也其勢又不同此二之所以多譽四之所以多懼也二中位隂陽處之皆為得中中者不偏不倚無過不及之謂其才若此故於時義為易合時義既合則吉可斷矣又曰卦爻六位惟三為難處蓋上下之交內外之際非平易安和之所也又曰四之位近君多懼之地也以柔居之則有順從之美以剛居之則有僣逼之嫌然又須問居五者隂耶陽耶以隂承陽則得于君而勢順以陽承隂則得于君而勢逆勢順則無不可也勢逆則尤忌上行而凶咎必至以陽承陽以隂承隂皆不得于君也然陽以不正而有才隂以得正而無才故其勢不同有才而不正則貴于寡欲故乾之諸四多得免咎無才而得正則貴乎有應故艮之諸四皆以有應為優無應為劣獨坤之諸四能以柔順處之雖無應援亦皆免咎此又隨時之義也按乾之諸四當是上卦是乾如天水訟之類各卦諸四同又曰五上卦之中乃人君之位也諸爻之德莫精于此能首出乎庶物不問何時克濟大事𫝊謂五多功者此也又曰上事之終時之極也其才之剛柔內之應否雖或取義然終莫及上與終之重也是故難之將出者則指其可由之方事之既成者則示以可保之道義之善或不必勸則直云其吉也勢之惡或不可解則但言其凶也質雖不美而兾其或改焉則猶告之位雖處極而見其可行焉則亦諭之大抵積微而盛過盛而衰有不可變者有不能不變者大傳謂其上易知豈非事之已成乎德德有三一根于卦乾之德健坤之德順震之德動艮之德止㢲之德入兑之德說離之德明惟坎曰陷曰險不可以心德言故于重卦之名加一習字與七卦之例别安溪李氏曰人心惟危故其心德必有所陷陷則險矣於是乎不可聼其心之陷溺而必更習於險以出乎險孟子所謂困心衡慮動心忍性皆其事也如是則亦為人心之德與七卦等矣又曰健莫如天順莫如地動莫如雷入莫如風眀莫如火止莫如山說莫如澤是皆然矣曰險莫如水則有未盡當曰行險莫如水斯為水之德爾由此言之卦名不加以習字得乎一生於爻剛柔中正是也剛柔各有善不善時當用剛則以剛為善時當用柔則以柔為善惟中與正則無不善而中為尤善焉安溪李氏曰易之義莫重於貞然亦有貞凶者矣有貞吝貞厲者矣其事未必不是也而逆其時而不知變且以為正而固守焉則凶危之道也中則義之精而用之妙凡所謂健順動止明說剛柔之施於是取裁焉先儒所謂中則無不正者此也或曰易之卦爻於貞蓋諄諄焉其於中行僅數四見而已何也正理可識而中體難眀非深於道者不能知是故難以察察言也存其義而沒其名則聖教之精也自乾坤二卦固皆利于貞矣然所謂二用者則中之極而貞之源也其餘卦之諸爻居得其正者多矣而亦鮮以正許之者惟二與五得其正者固曰以中正也或不得其正者亦曰中以行正也是則中道之大而易教之至也然則存其義而沒其名者何也曰六十四卦三百八十四爻所繫皆中也然必曰如是則得其正則人皆知道義之是守矣倘必曰如是乃得其中則有誤於依違兩可混同無辨者而不自知其非也故舜之智必問察乎善而後執其中顏子之賢擇乎中庸而必得其善正非中則正之實未至中非正則中之名亦易差聖人所以尊中之道而略其名精求乎正之實而必廣其教者此也一繫於辭元亨利貞是也四字文王繫於乾坤二卦以發各卦之例夫子彖傳文言以為四德程子以前諸儒并未有以為大通而利于正者自朱子始不用而自以己意解之謂為文王之本義如是然無所考據察其意蓋主卜筮說易故必取卦爻之辭分別其何者為象何者為占以為四德則有象無古故作此解耳然易中之有象無古者亦多至于有古無象者尤復不少蓋象即其占也即朱子亦云易有象辭有占辭有象占相渾之辭不解于此必斷作元亨為占而以利貞為戒辭何也且又誤認屯隨等五卦之彖傳為以大代元遂决意改乾坤之元皆為大又以師臨等卦彖解貞為正遂决意改各卦言貞之正而固者皆止以正之一字盡之而各卦之言亨言利者又似人事通達順利與吉凶悔吝皆屬占辭一例易於是乎難通矣不知各卦之言大皆謂乾之剛也其言大亨貞者言乾之亨貞亨即兼元貞即兼利也如春夏秋冬但言春秋東西南北但言橫豎之類其止以貞為正者單詞也故師之彖特為注眀曰貞者正也不然卦爻言貞者已歷六卦何至此而始釋之乎至於臨革無妄皆無固守義故止言正而非各卦各爻之例也蓋元亨利貞剛柔皆有此四德凡卦中爻中言元言亨言利言貞者必分别剛柔以為言斯可以讀易矣近日安溪李氏謂卦主天道之大故言元亨爻主人事之細故言悔吝似元亨專為卦之占辭此不敢違朱而必為之辭者也如但以亨為人事之通達而元亨為人事之極其通達此與言吉言大吉何異而何以需離咸萃升困之彖既言亨又言吉泰之彖既言吉又言亨小過言亨乂言大吉鼎言元吉又言亨如是之重見叠出乎且臨與無妄既皆以為大通矣而又一則以為有凶一則以為有眚此何以說也又夫子繫辭傳中所謂占辭者于吉凶曰失得之象于悔吝曰憂虞之象又曰小疵于無咎曰補過又曰吉凶悔吝生乎動又曰愛惡相攻而吉凶生逺近相取而悔吝生情僞相感而利害生是吉凶悔吝言之亦屢屢矣而元亨既為大通為卦之占辭乃一語不之及舍其大而舉其細何也大小大非洪巨乾之剛也小非纎細坤之柔也繫辭固曰卦有小大剛柔之謂也几卦中爻中及彖爻傳所言大人大君大川道大行大悖大光大戰大師大敗大輿大牲大難大烹大首益初大作豐彖傳豐大也尚大泰二傳以光大坎五傳中未大以及各彖傳所贊時義大時大說之大皆訓洪巨需二訟初之小有言蠱三之小有悔坎二之求小得未濟之彖曰小狐皆訓纎細外如屯之彖傳曰大亨貞隨臨彖傳曰大亨以正大畜彖傳曰大正升之彖傳曰大亨屯初傳曰大得民屯五爻曰大貞凶履與頤之上傳曰大有慶大有彖傳曰大中豫四爻曰大有得恆上傳曰大無功眀夷之三傳曰乃大得損上益五升五傳皆曰大得志震五傳曰大無喪既濟之五傳曰吉大來家人之四鼎之上萃之四升之初小過之彖皆曰大吉遁之彖豐三之傳皆曰大事泰之彖曰大來否之彖曰大往凡此所言大皆剛也又如屯之五爻曰小貞凶噬嗑之三爻曰小吝睽與小過之彖曰小事旅與㢲之彖曰小亨既濟之彖曰亨小賁之彖曰小利有攸往泰之彖曰小往否之彖曰小來凡此所言小皆柔也學者當分别觀之應比折中曰應者上下體相對應之爻也比者逐位相比連之爻也易中比應之義惟四與五比二與五應為最重蓋以五為尊位四近而承之二逺而應之也然近而承者則貴乎恭順小心故剛不如柔之善逺而應者則貴乎強毅有為故柔又不如剛之善夫子曰二與四同功而異位二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也夫言柔之道不利逺可見剛之道不利近矣又可見柔之道利近剛之道利逺矣夫子此條實全易之括例又曰凡比與應必一隂一陽其情乃相求而相得若以剛應剛以柔應柔則謂之無應以剛比剛以柔比柔則亦無相求相得之情矣竊按以剛應剛以柔應柔其無應者全體皆然又謂之敵應折中乂曰易中以六四承九五者凡十六卦皆吉比曰外比于賢小畜曰有孚惕出觀曰利用賔于王坎曰納約自牖家人曰富家益曰中行告公從井曰井甃無咎漸曰或得其桷㢲曰田獲三品渙曰渙其羣節曰安節中孚曰月幾望皆吉辭也惟屯需與蹇則相從於險難之中故曰往吉曰出自穴曰來連既濟則交警于未亂之際故曰終日戒亦皆吉辭以九四承六五亦十六卦則不能皆吉而凶者多如離之焚如死如棄如恆之田無禽晉之鼫鼠鼎之覆餗震之遂泥皆凶爻也大有之匪彭睽之睽孤解之解拇歸妹之愆期旅之心未快小過之往厲必戒雖非凶爻而亦不純吉惟豫之四一陽而上下應噬嗑之四一陽為用獄主豐之四為動主以應乎眀大壯之壯至四而極未濟之未濟至四而濟皆卦主也故得吉利之辭而免凶咎以九二應六五者凡十六卦皆吉蒙之子克家師之在師中泰之得尚于中行大有之大車以載蠱之幹母蠱而得中道臨之咸臨吉而無不利恆之悔亡大壯之貞吉睽之遇主於巷解之得黃矢損之弗損益之升之利用禴鼎之有實皆吉辭也惟大畜之輿說輹則時當止也歸妹利幽貞則時當守也未濟曵輪貞吉則時當待也亦非凶辭也以六二應九五亦十六卦則不能皆吉而凶吝者有之如否之包承也同人之于宗也隨之係小子失丈夫也觀之窺觀也咸之咸其腓也皆非吉辭也屯之屯如邅如遁之鞏用黃牛蹇之蹇蹇匪躬既濟之喪茀勿逐則以遭時艱難而顯其貞順之節者也惟比之自內也無妄之利有攸往也家人在中饋貞也益之永貞也萃之引吉無咎也革之已日乃孚也漸之飲食衎衎也皆適當上下合德之時故其辭皆吉夫子所謂其要無咎其用柔中者信矣自二五之外亦有應焉自四五之外亦有比焉然其義不如應五承五者之重也又曰以應言之四與初猶或取相應之義三與上則取應義者絶少矣蓋四大臣之位也居大臣之位則有以人事君之義故必取在下之賢德以自助此其所以相應也上居事外而下應于當事之人則失清髙之節矣三居臣位而越五以應上則失勿二之心矣此其所以不相應也然四之應初而吉者亦惟以六四應初九耳蓋初九為剛德之賢而六四有善下之美故如屯賁之求婚媾也頤之虎視耽耽也損之使遄有喜也皆吉也若九四應初六則反以下交小人為纍大過之不撓乎下解之解而拇鼎之折足是也以比言之惟五與上或取相比之義餘爻則取比義者亦絶少蓋五君位也尊莫尚焉而能下于上者則尚其賢也此其所以有取也然亦惟六五遇上九乃取斯義蓋上九為髙世之賢而六五為虛中之主故如大有大畜之六五上九孔子則贊之以尚賢頤鼎之六五上九孔子則贊之以養賢其辭皆最吉若以九五比上六則亦反以尊寵小人為纍如大過之老婦得其士夫咸之志末夬之莧陸兌之孚于剝皆是也獨隨之九五下上六而義有取者卦義剛來下柔故爾若初與二二與三三與四則非正應而相比者或恐陷于朋黨比周之失故其義不重此皆例之常也若其爻為卦主則羣爻皆以比之應之為吉凶焉故五位之為卦主者不待言矣如豫四為卦主則初鳴而三盱剝上為卦主則三旡咎而五旡不利復初為卦主則二下仁而四獨復夬上為卦主則三壯頄而五莧陸姤初為卦主則二包有魚而四包旡魚此又易之大例不可以尋常比應之例論也主爻折中曰凡所謂卦主者有成卦之主焉有主卦之主焉成卦之主則卦之所由以成者無論位之高下德之善惡若卦義因之而起則皆得為卦主也主卦之主必皆德之善而得時得位者為之故取于五位者為多而他爻亦間取焉其成卦之主即為主卦之主者必其德之善而兼得時位者也其成卦之主不得為主卦之主者必其德與時位參錯而不相當者也大抵其說皆具於夫子之彖當逐卦分别觀之若其卦成卦之主即主卦之主則是一主也若其卦有成卦之主又有主卦之主則兩爻皆為卦主矣或其成卦者兼取兩爻則兩爻又皆為卦主矣或其成卦者兼取兩象則兩象之兩爻又皆為卦主矣亦當逐卦分别觀之乾以九五為主蓋乾者天道而五則天之象也乾者君道而五則君之位也又剛健中正四者具備得天德之純故為卦主也觀彖傳所謂時乘六龍以御天首出庶物者皆主君道而言坤以六二為主蓋坤者地道而二則地之象也坤者臣道而二則臣之位也又柔順中正四者具備得坤德之純故為卦主也觀彖辭所謂先迷後得主得朋失朋者皆主臣道而言屯以初九九五為主蓋卦惟兩陽初九在下侯也能安民者也九五在上能建侯以安民者也蒙以九二六五為主蓋九二有剛中之德而六五應之九二仕下師也能教人者也六五在上能尊師以教人者也需以九五為主蓋凡事皆當需而王道尤當以久而成彖傳所謂位乎天位以正中也指五而言之也訟以九五為主蓋諸爻皆訟者也九五則聽訟者也彖傳所謂利見大人尚中正也亦指五而言之也師以九二六五為主蓋九二在下丈人也六五在上能用丈人者也比以九五為主蓋卦惟一陽居尊位為上下所比附者也小畜以六四為成卦之主而九五則主卦之主也蓋六四以一隂畜陽故彖傳曰柔得位而上下應之九五與之合志以成其畜故彖傳曰剛中而志行履以六三為成卦之主而九五則主卦之主也蓋六三以一柔履衆剛之間多危多懼卦之所以名履也居尊位尤當常以危懼存心故九五之辭曰貞厲而彖傳曰剛中正履帝位而不疚泰以九二六五為主蓋泰者上下交而志同九二能盡臣道以上交者也六五能盡君道以下交者也二爻皆成卦之主亦皆主卦之主也否以六二九五為主蓋否者上下不交六二否享斂德避難者也九五休否變否為泰者也然則六二成卦之主而九五則主卦之主也同人以六二九五為主蓋六二以一隂能同衆陽而九五與之應故彖傳曰柔得位得中而應乎乾大有以六五為主蓋六五以處中居尊能有衆陽故彖傳曰柔得尊位大中而上下應之謙以九三為主蓋卦惟一陽得位而居下體謙之象也故其爻辭與卦同傳曰三多凶而惟此爻最吉豫以九四為主卦惟一陽而居上位卦之所由以為豫者故彖傳曰剛應而志行隨以初九九五為主蓋卦之所以為隨者剛能下柔也初五兩爻皆剛居柔下故為卦主蠱以六五為主蓋諸爻皆有事于幹蠱者至五而功始成故諸爻皆有戒辭而五獨曰用譽也臨以初九九二為主彖傳所謂剛浸而長是也觀以九五上九為主彖傳所謂大觀在上是也噬嗑以六五為主彖傳所謂柔得中而上行是也賁以六二上九為主彖傳所謂柔來而文剛剛上而文柔是也剝以上九為主隂雖剝陽而陽終不可剝也故為卦主復以初九為主彖傳所謂剛反者是也旡妄以初九九五為主蓋初九陽動之始如人誠心之初動也九五乾德之純如人至誠之無息也故彖傳曰剛自外來而為主于內指初也又曰剛中而應指五也大畜以六五上九為主彖傳所謂剛上而尚賢者是也頤亦以六五上九為主彖傳所謂養賢以及萬民者是也大過以九二九四為主蓋九二剛中而不過者也九四棟而不橈者也坎以二五二陽為主而五尤為主水之積滿者行也離以二五二隂為生而二尤為主火之方發者明也咸之九四當心位心者感之君則四卦主也然九五當背位為咸中之艮感中之止是謂動而能靜則五尤卦主也恆者常也中則常矣卦惟二五居中而六五之柔中尤不如九二之剛中則二為主也遁之為遁以二隂則初二成卦之主也然處之盡善者惟九五則九五又主卦之主也故彖傳曰剛當位而應與時行也大壯之為壯以四陽而九四當四陽之上則四卦主也晉以明出地上成卦六五為離之主當中天之位則五卦主也故彖傳曰柔進而上行明夷以日入地中成卦而上六積土之厚夷人之明者也成卦之主也六二六五皆秉中順之德明而見夷者也主卦之主也故彖傳曰文王以之箕子以之家人以九五六二為主故彖傳曰女正位乎內男正位乎外睽以六五九二為主故彖傳曰柔進而上行得中而應乎剛蹇以九五為主故彖傳曰往得中也蓋彖辭所謂大人者即指五也解以九二六五為主故彖傳曰往得衆也指五也又曰乃得中也指二也損以損下卦上畫益上卦上畫為義則六三上九成卦之主也然損下益上所益者君也故六五為主卦之主益以損上卦下畫益下卦下畫為義則六四初九成卦之主也然損上益下者君施之而臣受之故九五六二為主卦之主夬以一隂極于上為義則上六成卦之主也然五陽決隂而五居其上又尊位也故九五為主卦之主姤以一隂生于下為義則初六成卦之主也然五陽皆有制隂之責而惟二五以剛中之德一則與之相切近以制之一則居尊臨其上以制之故九五九二為主卦之主萃以九五為主而九四次之卦惟二陽而居高位為衆隂所萃也升以六五為主彖傳曰柔以時升六五升之最尊者也然升者必自下起其卦以地中生木為象則初六者㢲體之主乃木之根也故初六亦為成卦之主困以九二九五為主蓋卦以剛掩為義謂二五以剛中之德而皆掩于隂也故兩爻皆成卦之主又皆主卦之主井以九五為主蓋井以水為功而九五坎體之主也井以養民為義而九五養民之君也革以九五為主蓋居尊位則有改革之權剛中正則能盡改革之善故其辭曰大人虎變鼎以六五上九為主蓋鼎以養賢為義而六五尊尚上九之賢其象如鼎之鉉耳之相得也震以二陽為主然震陽動于下者也故四不為主而初為主艮亦以二陽為主然艮陽止於上者也故三不為主而上為主漸以女歸為義而諸爻惟六二應五合乎女歸之象則六二卦主也然漸又以進為義而九五進居高位有剛中之德則九五亦卦之主也歸妹以女之自歸為義其德不善故彖傳曰旡攸利柔乘剛也是六三上六成卦之主也然六五居尊下交則反變不善而為善化凶而為吉是六五又主卦之主也豐以六五為主蓋其彖辭曰王假之勿憂宜日中六五之位則王之位也柔而居中則日中之德也旅亦以六五為主故彖傳曰柔得中乎外又曰止而麗乎眀五居外體旅于外之象也處中位為離體之主得中麗明之象也㢲雖主于二隂然隂卦以隂為主者惟離為然以其居中故也㢲之二隂則為成卦之主而不得為主卦之主主卦之主九五也申命行事非居尊位者不可故彖傳曰剛㢲乎中正而志行指五也兊之二隂亦為成卦之主而不得為主卦之主主卦之主則二五也故彖傳曰剛中而柔外說以利貞渙以九五為主蓋收拾天下之散非居尊不能也然九二居內以固其本六四承五以成其功亦卦義之所重故彖傳曰剛來而不窮柔得位乎外而上同節亦以九五為主蓋立制度以節天下亦惟居尊有德者能之故彖傳曰當位以節中正以通中孚之成卦以中虛則六三六四成卦之主也然孚之取義以中實則九二九五主卦之主也至于孚乃化邦乃居尊者之事故卦之主在五小過以二五為主以其柔而得中當過之時而不遇也既濟以六二為主蓋既濟則初吉而終亂六二居內體正初吉之時也故彖傳曰初吉柔得中也未濟以六五為主蓋未濟則始亂而終治六五居外體正開治之時也故彖傳曰未濟亨柔得中也以上之義皆可據彖傳爻辭而推得之大抵易者成大業之書而成大業者必歸之有德有位之人故五之為卦主者獨多中間亦有因時義不取五為主位者不過數卦而已自五而外諸爻之辭有曰王者皆非以其爻當王也乃對王而為言耳如隨之上曰王用亨于西山則因其係于五也益之二曰王用亨于帝則因其應于五也升之四曰王用亨于岐山則因其承于五也皆其德與時稱故王者簡而用之以答于神明之心也又上爻有蒙五爻而終其義者如師之上曰大君有命則因五之出師定亂而至此則奏成功也離之上曰王用出征則因五之憂勤圗治而至此則除亂本也皆蒙五爻之義而語其成效如此易中五上兩爻此類最多亦非以其爻當王也占辭吉凶悔吝旡咎五者是為占辭繫辭傳曰吉凶者言乎其失得也悔吝者言乎其小疵也旡咎者善補過也卦辭無言吝者而爻則兼之蓋有悔必有吝也夫悔者太過之有咎者也吝者不及之有咎者也凡言悔亡者有悔而可亡也旡悔者旡可悔也然則旡悔之義進于悔亡故咸四言悔亡至五則言旡悔大壯四言悔亡至五則言旡悔渙二言悔亡至三則言旡悔未濟四言悔亡至五則言旡悔以其辭義先後考之旡悔進於悔亡可知矣雖以復初之吉然旡祗於悔與敦復旡悔亦須有先後也凡易中言悔亡旡悔者以此别之按爻辭有曰元吉或言大吉坤五訟五履上泰五復初大畜四離二損五益初益五井上渙四皆元吉也家人四萃四升初鼎上皆大吉也安溪李氏曰坤五以中順之德配乾離二亦以中順而合坤德故坤曰牝馬配乾之義也離曰牝牛肖坤之義也其辭皆曰黃以此也德至中和而極故占皆元吉履上則德之成也復初則德之本也其占亦元吉此四爻皆以其德之純言也餘則凡言元吉者多指吉之在天下者也凡言大吉者多指吉之在一人者也故均之益也家人四富其家者也益五富天下者也均之聚也萃四聚其下而猶恐有樹私之嫌渙四渙其羣則已極乎大公之善也均之進也益初之義在忘身以酬上升初之義在見允而得升也均之養也井之義為養民則在上而養道成者是民得養也鼎之義為養賢則至上而養道成者是已得養也至於訟五畜四則有無訟刑措之風焉泰五損五則有虗中受下之美焉是皆非一人之吉而天下之吉此所以不特曰大而曰元也彖傳有喜有慶之義亦然愚按元吉者謂從來未有之善而今始有之也大吉者謂為剛德之得者也萃四鼎上是也家人之四以比九五升之初以比九二此皆歸功剛德蓋扶陽抑隂之意也不然而如李氏之說謂爻主人事以悔吝為人事之細則各爻但言悔吝可矣何以言大吉元吉而并無一言小吉者耶惟睽之卦辭曰小事吉如以小為瑣細則又於所言卦本天道之大一語有礙矣蓋不知小事吉為柔事之吉也又按利原為和義之德夫義者宜也然彖爻辭有言利者有言用者有言不利者有言勿用者意相近而辭則不同安溪李氏曰此占者與卦爻相為賔主之例言利不利者以占者當卦爻謂如此之德如此之時位則其利不利如此也言用不用者謂卦爻之德之時如此占者可用以如此不可用以如此也細觀其義亦須有别凡言利者皆其事後之利如訟非得大人不決蹇非得大人不濟需不犯難同人能得衆心有可以涉川之理又需者將以進也同人者將以濟也故皆言利事後之辭也凡言用者則即今而可用如升則遇時之卦見大人而無憂謙謙則德之至涉大川而必濟故皆言用當事之詞也凡言不利者事無可為之稱如剝之小人長則其時之不利攸往也旡妄之匪正有眚則其德之不利攸往也故言不利蓋終無可往之理也凡言勿用者暫且勿用之意如屯雖動乎險然猶未可輕有所往遁雖其勢當去然亦未可輕有所往故言勿用蓋恐其疑於可往而戒以未可往也然則利之詞緩於用不利之詞又急于勿用通事後而論之則利者猶在後也故緩不利者終無可為也故急即當事而論之則用者即今可用也故急勿用者惟此時勿用而已故緩若虗言旡不利旡攸利者亦包當事事後之辭也虗言勿用者亦是且就其時斷之之詞也頤之三既曰勿用又曰旡攸利則其辭彌甚矣利用禴利用亨祀祭祀及王用亨于西山岐山王用亨于帝之義亦然又按爻辭無元亨二字相連者即曰利貞者亦少其曰利永貞者以永為貞也利居貞者以居為貞也利艱貞者以艱為貞也利于不息之貞者以不息為貞也利幽人武人之貞者以幽人武人為貞也李氏又曰凡言貞吉於辭之後者即其辭所言之義而貞固守之則吉也需于酒食鳴謙介于石之類是也言貞吉於辭之前者爻有貞吉之義而辭又有他戒也咸四壯四升五㢲五未濟四五是也悔亡旡咎之義亦然惟壯二直曰貞吉恆二直曰悔亡解初直曰旡咎前後更無他詞則以爻義已足示人以觀象之例也又按安溪李氏之言曰先儒說貞凶有云雖貞亦凶者有言貞乎此則凶者有言決定是凶者是有三例也說旡咎既為補過之義又云自取凶害旡所歸咎是有兩例也夫苟二三其例則是適以眩夫占者而又何以斷天下之疑乎故夫貞者正也固也凡言貞吉者兼正固之義固由正生也凡言貞凶貞吝貞厲者主乎固之義蓋自以為正而固守之也其設戒亦不純蒙上句蓋有與上句相反為義者如泰道之終城復于隍矣斯時也勿用師自邑告命則可矣如固守其常而力爭之則吝也晉道之極晉其角矣斯時也惟自治其私則雖危而吉旡咎矣如固守其常知進而不知退則吝也此皆不蒙上句而相反為義者如弟子輿尸貞凶晉如鼫鼠貞厲喪其資斧貞凶則蒙上句直說謂固常如此而不知反則危且凶也二者文意不同然要為不可固守之占則無兩例明矣傳言旡咎者善補過也則旡咎非凶辭可知但以大過之上節之三遂謂有變例焉然過上際時窮而有處之之義節三失時義而有改悔之機是皆可以補過之例求之不必變也蓋過涉滅頂時窮而凶矣然以柔為說主不與時爭則無咎之道也不言其所以無咎者解初六之例也不節若宜得凶矣然因不節而遂嗟若亦無咎之道也臨六三之例也况節三象傳與同人初爻同則無咎之義亦應同雖解三又誰咎也為非善詞然此兩爻有無咎之文則象傳為直解無咎之義言人安得而咎我也解三爻無無咎之文而曰貞吝則象傳為解貞吝之義言我安得而咎人也其詞固不相病也惟其例之一是以辭之指有難明者皆以其占戒讀之而可知故曰定之以吉凶所以斷也竊按繫辭傳曰愛惡相攻而吉凶生逺近相取而悔吝生情僞相感而利害生夫利為夫子所罕言者乃各卦爻多言利不利而其言害者亦有之如大有之位說出程子魯齊許氏曰初位之下事之始也以陽居之才可以有為矣或恐其不安于分也以隂居之不患其過越矣或恐其愞弱昏滯未足以趨時也大抵柔弱則難濟剛健則易行或諸卦柔弱而致凶者其數居多若總言之居初者易貞居上者難貞易貞者由其所適之道多難貞者以其所處之位極故六十四卦初爻多得免咎而上每有不可救者始終之際其難易之不同蓋如此又曰二與四皆隂位也四雖得正而猶有不中之纍况不得其正乎二雖不正而猶有得中之美况正而得中者乎四近君之位也二逺君之位也其勢又不同此二之所以多譽四之所以多懼也二中位隂陽處之皆為得中中者不偏不倚無過不及之謂其才若此故于時義為易合時義既合則吉可斷矣又曰卦爻六位惟三為難處蓋上下之交內外之際非平易安和之所也又曰四之位近君多懼之地也以柔居之則有順從之美以剛居之則有僣逼之嫌然又須問居五善惡之别惟為主者不失其主之道則效役于主而隂亦陽矣夫然後君子之名立焉惟為役者不安其役之義則主役于役而陽亦隂矣夫然後小人之名立焉君子小人之名既立此人之所以有邪正世之所以有治亂而未有已也三畫之卦取類如此故六畫之卦取類如之是夫子所謂卦有小大辭有險易者而八卦其根也夫彖者材也卦之剛柔雜居此其所取之材而以定一卦之吉凶者也是故聖人推其原於隂陽卦以明材之所以區而別者以此初難終易安溪李氏曰惟彖之繫也原始而要終故爻之繫也其于初詞亦必擬而議之而卒則成其終而已此初所以難知而上所以易知也蓋初上雖非當時而實時之所以造端究竟雖非正位而實位之所以立本觀成時之變位之分惟聖人為能審其精焉至于造端立本者既得則所以究其竟而觀其成其則不逺矣傳所謂本末之意蓋如此中爻之備安溪李氏曰初上二爻事外者也中四爻事中者也以時言之則自始之中以至終之中莫非有事之時也以位言之則自出潜離隱以至席尊履貴莫非有事之位也如下文所謂多懼多譽多凶多功皆惟其有事故如此易者吉凶生大業之書故惟此四仌者於卦之義極相當對發卦之藴者必於是而始備也若初上兩爻非旡時位然以時言之則為事之將然及其已往以位言之則為人之未遇及其已退往往在于咎譽辜功之外而於本卦截定之分限蓋有不相當值者聖人於此或發其未然之戒與其過中之防或示其始進之基與其持盈之道雖一一根於卦義而實出于卦之前後旁外以周旋之故卦有初上二爻而後時變窮有中四爻而後時義備觀彖過半安溪李氏曰文王既名卦而繫之辭矣然其繫辭也必雜取夫卦義其取夫卦義也又取諸爻之剛柔上下內外比應善惡當否者為多故名之所以命也間用主爻之義然以兩象二體為括要之宗者也辭之所以繫也兼論二體之德然以六爻剛柔為取用之材者也惟其如是是以六爻未繫而其粲然分别者已具于渾然㴠蓄之中周公之繫爻也蓋本此以為權度者也或彖辭所專指之爻則其意可以發眀或彖辭所未及之爻則其義可以推廣文周一心者也彖爻一貫者也故夫未觀爻詞者擬議懸度可以預知其得失之所歸已讀爻辭者尋繹覆視可以確定其吉凶之有故吁此智者之事學易之方也二四逺近安溪李氏曰凡九二應六五者多吉蓋居下則宜有實德故貴于剛在上則宜虛中以下交故貴于柔也六四承九五者多吉蓋近上則宜有小心故貴于柔君必有剛明之德然後可以行其道故貴于剛也若以隂應隂以陽應陽以隂承隂以陽承陽則皆無相取之義其或以時義所當間有取者然非正例也如六二以隂應九五之陽九四以陽承六五之隂皆不得為善矣何則居下而柔則有援上之嫌處近而剛則有專已之失也然以六二之雖柔而中也故為能以中正自守其應九五猶多吉義惟九四承六五剛而不中以處逼近之地則其危厲甚矣是故二多譽四多懼者統言之也又云柔之為道不利逺者以見二雖多譽然惟以剛應柔者多爾且見四雖多懼然惟以剛承柔者多爾若以柔承剛則旡凶害柔之為道利近故也以柔應剛則不純吉柔之為道不利逺故也然惟二之中也故剛固有譽柔亦次之是以統之以多譽也惟四之不中也故剛固可懼柔亦未嘗忘懼也是以統之以多懼也又曰逺多譽而近多懼何也曰夫月逺日則明生近日則光失可見逺之多譽而近之多懼也若以天地言之則西南之方如月之望所謂逺也月受日之光地受天之施配而不嫌於敵盛而不疑于逼故在傳曰西南得朋乃與類行言致役于帝以養萬物則雖朋類衆多共效隂職乃分之宜也東北之方如月之晦朔所謂近也日與月合天與地交月則匿其明地則閟其氣故在傳曰東北喪朋乃終有慶言告成于陽以為終禀承於陽以為始終始之際惟陽之順無有朋私也是故逺則貴於剛者如月之藉日光地之載天氣柔其質剛其用以君父之靈濟君父之事則剛者貴矣近則貴于柔者如月之終魄於東而載魄于西地之安守于貞而順承于元純隂至順終君父之功以聽君父之命則柔者貴矣蓋不特位之逺近然也凡受事分職之時皆西南也皆逺之屬也凡歸功禀令之時皆東北也皆近之屬也自坤彖發其義而六十四卦視焉是臣之則也三五剛柔三多凶五多功亦統言之也又曰其柔危其剛勝耶言三雖多凶然惟柔處之則至危若以剛居之則或能自強而凶可免也然猶疑其詞者庶幾而不盡然也此所以為多凶也以是而例於五則多功者亦惟剛者為多若以柔居之則雖因時而有用柔之善然功不若九五之多矣蓋柔不利逺以中旡咎為二言之也而因可以例于四柔危剛勝為三言之也而因可以例於五聖人之言有舉一隅而足者皆此類也或曰三四皆髙位而四益髙四止多懼三遂多凶何也曰近而親者懼而已矣逺而任者譽可致焉不逺不近之間于情則未孚于勢則猶阻于任則已重于責則已切於進退則已難於牽掣則已多此其所以多凶也凡易之情莫重乎比應五位之尊四比而二應之三雖近髙而無比應其為危也不亦宜乎自乾卦六爻之詞而二五之功譽三四之凶懼皆發其端矣六十四卦以是推之愛惡逺近情僞愛惡以爻之時言也逺近以爻之位言也情僞以爻之德言也非時則愛惡不可知非位則逺近不可見非德則情僞不可别矣愛惡之相攻者大故生吉凶也逺近之相取者暫故生悔吝也情僞之相感尤深故生利害也然愛惡情僞之淺深又因逺近而變惟近而惡相攻僞相感者必致凶犯害其小者乃悔且吝耳若逺而無比應之義者則雖不以情相愛而凶害必不甚故近而不相得者總例也其重者則以相惡相僞為主故凶害之屬也其輕者則以相近為主故悔吝之屬也以是反觀則近而相得者必吉也利也相得而逺者亦不免乎悔也吝也皆可例求矣此三言者實觀象玩辭之要卦變易中言剛柔上下往來者先儒多以卦變之法推之然程子專以乾坤言變卦朱子則以隂陽之卦一二三四五皆有所自而來因為卦變圗以次之近日西河毛氏又執未濟大象辨物居方之言以為有合於繫辭所云方以類聚物以羣分者而逐卦以求其分聚謂此卦自某之爻相易甚且三四卦而分成一卦既紛煩無當間有合者又曲為之說而傷乎巧恐聖人作易畫卦之㫖不如是之勞攘也安溪李氏以為卦變之說於先儒無所折𠂻不若古注直指卦體爻畫虗象之為愈其說當是也然則在內卦為來在外卦為往不必牽纒卦變殊為直捷了當耳分日讀朱子曰且須熟讀正文莫看注解又曰看易須著四日看一卦一日看卦辭彖象兩日看六爻一日統看方子細竊按讀書務求有得耳苟偶有所㑹於心雖一日讀一卦亦不為簡略如無所得或多讀數日或竟置擱以俟異日之遇事感觸而得之皆無不可至於正文則卦詞爻詞也注解則夫子彖傳象傳也朱子意蓋謂世儒之所注解耳且云莫看亦先且莫看非竟不看也即正文與夫子注解處亦且莫先看惟宜細玩卦畫如某卦為何卦在內何卦在外而此內外兩卦何以合成此卦而名為某務得其所以名某者而因以求其義何者吉何者凶其有旡悔吝之咎者皆思而得之於心然後方讀卦辭亦先以已意解釋其文義然後再讀彖傳其讀爻辭象傳也亦然有所合耶是聖人之所先得者而我亦有同然也其無所合耶是聖人平日之以身心體㑹而得者而我止以文辭求之也則必思所以自治焉斯已矣以上所論皆所以示學者讀易之法也然猶有要焉朱子警學詩曰讀易之法先正其心肅容端席有翼其臨於卦於爻如筮斯得假彼象辭為我儀則又曰非是此心大假虗明寧靜如何見得是則讀易非主敬不可也然猶有道焉朱子曰易大槩欲人恐懼修省今學易非必待遇事而占方有所戒只平居玩味看他所說道理于自家所處地位合是如何故云居則觀其象而玩其辭動則觀其變而玩其占孔子所謂學易正是平日常常學之想見聖人之所讀異乎人之所謂讀想見聖人胸中洞然于易之理旡纎亳蔽故云可以無大過又曰人須是經歷天下許多事變讀易方知各有一理精審端正然則非實有所以身體乎斯易者亦不可以知易也易翼述信卷一
