body:
  text: 易翼述信卷三廬州府同知王又樸撰震下坎上屯元亨利貞勿用有攸徃利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寜卦詞有二義一物當屯時宜擇能下賢得民者而主之藏其器以待時一君當屯時宜尊賢使能以餋其民不得輕用其力以求逞安溪李氏曰元亨利貞四者乃天道而貫乎人事者也非是則不繫焉乾坤而外惟屯隨臨无妄革五卦耳葢屯與革天時之大者隨人與臨人又人事之大者无妄則天人之德之至者也竊按四者之繋於此五卦畢竟不同於乾坤故夫子以大亨貞言之且屯之時是萬物方有生機而未有生形而何以元亨利貞四德之悉備也盖萬物歸乎坎而出乎震以雲雷二象言之初以震之剛四以坎之柔是剛柔之始交也以坎震二體言之動乎險中也地天交則為泰剛柔交則為難天之氣下於地地之道以坎險而未能即上通則艱也故曰難生萬物始生必冐險難而出如草木之生必有甲有核胎卵之生必有胞有殻甲核胞殻皆險中也孚甲穿核破胞蜕殻則出乎險中也萬物必得雷雨而後出險故天地解而雷雨作雷雨作而百果草木皆甲拆若其將作未作之時二氣氤氲欝蒸充塞而其甲其核其胞其殻莫不陽動其中生意十分滿盈然後甲一孚而草必豐核一穿而樹必茂胞一破殻一蜕而物必皆肥腯碩大是屯也者乃乾道之所以資始其元亨利貞則大者之亨貞而非坤之元亨利貞也盖言亨貞而元與利概焉夫子恐人誤認而不知所分析故特釋之非以大字代元字也不然則物方屯而何以即亨且不寜矣又何以利何以貞耶此余四十年未解之疑今一旦豁然豈非快事至勿用有攸徃二句則言人事勿用與不利異不利者終不宜也勿用者暫不用也震主乎動而在坎險之下則動而未可輕動時至而後動動罔不臧矣初之居貞二之不字三之徃吝四之求徃五之大貞凶上之泣血皆勿用意也然既利建侯又何以不寜盖天造草昧亟圖内治其憂勤惕勵遹求厥寜者無時可已正大象之所謂經綸也如秦末沛子弟殺令以應諸侯議所立共推劉季季曰非敢自愛顧度可全父老否耳及羽王沛公於漢中公怒欲攻之蕭何勸其入曰餋百姓以致賢人天下可圖得此卦之意矣象曰雲雷屯君子以經綸變水雷曰雲雷何也盖彖傳言雷雨之動動者雷欲動而隱隱未有聲雨欲動而蒸蒸但有氣故不言雨而但曰雲而已若雷雨交作則難已解而不得為屯矣初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也初變比遇坤本氣初為震主雷在下未升變氣又以順為正故曰盤桓坤為衆動而得衆震為長子故曰利建侯按合訂謂為任賢使能親附百姓説得廣最確若必拘拘於擇君則國之已有君者將如何豈不與居貞説成兩事至以盤桓作柱石雖有意然觀象傳一雖字則仍照本義作難進説為是又謂行不於徃而於居正傳中志行正之意盖屯只有艱難之象並無止象故夫子於彖曰不寜於大象曰經綸夫居貞所以觀變建侯所以親民傳曰大得民者以震為乾坤之長子故曰大而變比為衆陰從陽故曰得民也六二屯如邅如乗馬班如匪宼婚媾女子貞不字十年乃字象曰六二之難乗剛也十年乃字反常也二變節遇兑二與五應五為坎主坎為盗二以震懼遇之故曰宼今以震懼變兑悦而坎陽兑陰故曰匪寇而為婚媾非以乗初之剛為寇而又以婚媾解之也觀彖曰易之道陰求陽不以陽求陰也上求下不以下求上也故凡六五九二之應無不吉者為以陰求陽上而下交則在上者有虚衷之美居下者有自重之實凡九五六二之應時義所當亦有相助之善然徃徃有戒詞焉者盖以下援上以陽應陰則在下者有枉已之嫌在上者有失人之誚按班如合訂云凡行馬謂班馬故以行馬言則六四方説得去然則此爻詞意當云其屯如邅如之欲進不進者此乗馬之班如也以為匪宼而婚媾當徃乎然近則逼於初而不能徃逺又援乎上而不可徃理勢既皆非所宜則惟守其貞以俟之而已按二三四互坤順故曰女子貞也變節為不可貞者而貞之十年故曰反常也六三即鹿无虞惟入於林中君子㡬不如舍徃吝象曰即鹿无虞以從禽也君子舍之徃吝窮也三變既濟遇離離麗為綱罟即鹿象也上無應故曰無虞三以陰居陽在下之上處危地而不安有妄動之意也震木合二四互坤為衆為迷而在艮山之下故曰入於林中入於林中者昏而無得當局者迷也四之象曰明而此爻近之旁觀者清也故曰君子㡬不如舍徃吝占詞吝以遂非言卦既主動而三已離下而近於上尚未入險止於窮無所得而已故不言凶詞曰不如舍傳曰舍之異文者盖不如乃旁觀代籌之詞若當局則竟舍之矣𫝊盖以三句撮成一句註出一窮字耳六四乗馬班如求婚媾徃吉无不利象曰求而徃明也四變隨遇兑本氣既為坎水之智變隨則又上下相維繫者盖合二三四五互為大離故傳曰明也明即知㡬經傳相為補備者也按四以坎險變兑之悦本無動象以求初故亦曰乗馬班如亦曰徃也震陽兑陰故亦曰婚媾四以陰居陰本無濟險之才而能悦賢則求才自輔賢之所徃即其徃也四雖不動而以動者為動故曰吉又曰無不利能濟事曰吉吉之中又無所不宜也夫子曰知㡬其神乎君子上交不諂下交不瀆其知㡬乎然則知㡬二字學者之要務也屯為人事之首故特於此卦發之三四又上下之交也故特於此二爻見之九五屯其膏小貞吉大貞凶象曰屯其膏施未光也五變復遇坤坎水膏象在上而不下逮屯象變氣陰柔為復陰小故小貞吉本氣陽剛為坎險陽大故大貞凶先儒説易以大小為洪纎以貞為正於義多難通而其最不可通者尤莫如此爻其説曰以處小事則守正猶可獲吉以處大事則雖正而不免於凶夫大者孰如綱常名教此而不正可乎且綱常名教亦未有正而得禍者程子及汝楫趙氏梁氏實知其難通也謂小貞為以漸而正大貞為整齊振刷之術夫見小欲速自是兩事即使整齊振刷而以不正行之可乎盖易之言大即乾之剛言小即坤之柔也内事為柔外事為剛自治為柔治人為剛因人成事為柔獨斷自己為剛因俗為治為柔移風易俗為剛安静不擾為柔明作有為為剛貞者貞固足以幹事而事猶未即立在天之行為冬閉藏之時非發舒之時也在人之德為智灼然於所徃非毅然有所徃也此即大學之知止而定而静而安尚未至慮而得也故繫詞大傳曰天下之動貞夫一又曰天下何思何慮是貞字之義昭然可揭矣乃舍夫事之幹者而竟謂為行事舍夫貞而固者而但止以一正字概之即夫子於臨革无妄謂之正者亦如大學所謂正心之類乃竟謂其措諸躬施諸世貞字義已如此則亨與利又當何如此易之所以晦也夫小貞吉者盖以坤之德貞之則吉也坤何貞所謂牝馬之貞柔順之貞也大貞凶者盖以乾之德貞之則凶也乾何貞所謂即終即始健行之貞也所以然者屯之卦詞固曰勿用有攸徃者也故雖初為震主而亦以盤桓居貞為義况夫九五之坎澤不下究者乎傳曰屯其膏施未光非惜其未光正戒其光盖時當屯膏一求光則非勿用攸徃之義矣上六乗馬班如泣血漣如象曰泣血漣如何可長也上變益遇巽則風以散之矣五之屯膏尚有膏也此則膏已散坎非雨而為血故曰泣血漣如也乗馬者馬陽也乗者以陰求陽也六二之於九五六四之於初九是也至上與三旡應何以亦曰乗馬盖三陽位也四於初求所宜求故徃旡不利二於五非所宜求故止應守身以俟以初與五皆陽也若三則有陽之虚位而無陽之實德而上以屯極欲通之時亦下求之則徃無所之惟有泣血漣如而已此乗馬雖同而吉凶則異也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也雲峰胡氏曰有天地即有君師乾坤之後繼以屯生震之一陽而曰利建侯君道也又繼以蒙主坎之丅陽而曰童蒙求我師道也竊按蒙何以亨險而止止則亨矣彖曰以亨行時中者山峙於上川流於下各得其宜川之流行乎其所不得不行也山之峙止乎其所不得不止也所謂以亨之德行其時中之義也匪我求童蒙童蒙求我謂之志應者以静待動其志相應如云吾無知而鄙夫問我叩兩端而竭焉者也以剛中者其初志誠也瀆䝉者瀆則䝉也所謂勿貳以二勿參以三是也䝉以餋正謂之聖功者授一萬氏謂䝉之良知良能䝉之正也聖人之無不知無不能亦不失此蒙之正説精矣象曰山下出泉蒙君子以果行育德大象二義一以山下出泉蒙而已露如學者之機雖已啓而識猶未開故行湏果則機斯暢矣内卦坎也一以山下出泉蒙而未顯如學者之量雖能受而力猶未逮故德湏育則量斯宏矣外卦艮也果行則發蒙是也育德則包蒙是也義雖不出象爻之外然象爻以教者言大象以學者言初六發蒙利用刑人用説桎梏以徃吝象曰利用刑人以正法也初變損遇兑損之以就中以險變兑説此發蒙刑期無刑之義也夫初何以有用刑桎梏等象考噬嗑初爻本義曰初上旡位為受刑象通於此卦則上剛為擊初柔為受刑且初為蒙之小過而坎為桎梏以陰柔慈愛者處之故為刑其小過而脱其桎梏大罪也刑人亦不必拘於加刑懸象讀法即是其曰以徃吝者盖陰柔則多姑息故又有此象因象而各著其利與吝此則聖人之教也傳曰以正法即彖傳餋正之正盖謂刑之非不愛之也乃以正為養蒙之法則也不然則姑息長奸何以能脱其大罪哉如此於爻義始盡聖人之言約而該非止泛泛無所發明如世之所謂但取叶韻而已者也九二包蒙吉納婦吉子克家象曰子克家剛柔接也二變剝遇坤坤為子母為吝故有納婦等象合訂曰包容也保也即彖所謂餋也婦人餋子者也慈爱者或流於姑息如九二之包則可謂能餋子者矣故占者娶婦吉母能餋子則子之克家可知故又曰子克家九二以剛中為六五所應五猶子二猶母也象傳剛柔接剛謂二柔謂五易齋云克家之子惟有剛德者足以當之五不足於剛而聖人以克家許之者二五合而剛柔接子肖其母則德在五也化柔中為剛中引童蒙入聖域觀剛柔接之詞愈知餋正之義矣竊按剛柔接即應也二五皆中剛柔相濟又二以剛居柔位五以柔居剛位尤為互濟故云六三勿用取女見金夫不有躬无攸利象曰勿用取女行不順也三變蠱遇巽巽為長女為近利故有見金夫之象盖三危地又下比二之剛危則不能守而妄動比則非其類而强從以不中不正之身而處此其象可知矣然何以不言不利取女而言勿用盖男子未有不取者也言不利則終不取矣但於此時取女則必得此人故暫且勿用耳下无攸利者取女為繼嗣訃今得此人則且不能以正持其身又何能以正餋其子其不克家可知故旡所宜也以二爻傳言剛柔接例之則上之剛應三之柔子為母化何所利乎傳所謂行不順者正以三與上應而以下援上為失已近比於二為非應其行為不順也且此爻合四五為坤之順然居内卦之上與外卦非一氣又已變巽不為順矣似不必以順為慎再觀五上二爻詞之傳其義正相發也初二四五上皆言蒙或謂教者或謂受敎者惟此爻不言蒙何也盖居下卦之上則年已非幼又以柔處剛位則不自安於蒙是已漓其天真者矣是以見金而失身也六四困蒙吝象曰困蒙之吝獨逺實也四變未濟遇離以陰處陰既逺於陽而應承乗又皆陰也傳所謂逺實也且變氣為未濟故為困蒙象六五童蒙吉象曰童蒙之吉順以巽也五變涣遇巽本氣陰爻變巽長女何以不言女而言童以處剛正之位而有虚己之志者也三亦剛位也然而不當故非五比三多㐫五多功也程傳云童取未發而資於人者也語最精切竊按傳云順以巽者順以本氣合三四為坤巽謂變氣也以順德而能入所謂初筮之誠此爻實當卦義上九擊蒙不利為冦利禦冦象曰利用禦冦上下順也上變師遇坤變師故有擊蒙為冦禦冦之象合訂曰二剛皆治蒙者二包而上擊擊則非養矣治蒙而不能養治之適以害之也故曰爲寇利禦寇爲受治者言謂擊固無利於蒙然爲蒙者能資其剛嚴以禦邪妄則上之擊蒙又何甞不利乎象傳上下順下謂九二上謂六五能順下而受其包亦能順上而資其擊則二剛皆我師矣竊按上下順句葢以艮變坤是上順也而以五四二爻合下卦之三亦爲坤是下順也合訂論其義而此則所取之象也安溪李氏曰象詞及傳専言教學葢舉其大者爻義則所該者廣齊家化民教法刑禁無非發蒙之事故納婦取女刑人禦寇連類及之乃所以旁通其義非直以備占詞也乾下坎上需有孚光亨貞吉利渉大川彖曰需須也險在前也剛健而不䧟其義不困窮矣需有孚光亨貞吉位乎天位以正中也利渉大川往有功也以有孚光三字絶句合訂之獨見也讀此不覺有㑹於誠形著及闇然日章之義矣安溪李氏曰需之義甚廣凡事必寛以居之皆是也而又非優㳺無事之謂故曰居易以俟命又曰修身以俟之學則從容涵飬以俟其通治則積久漸摩以俟其化皆由此義也觀此則知此卦次於屯蒙之後之説按九五是卦之主爻然必合下之乾方盡有孚光亨貞之義有孚光者内之藴蓄也亨貞者外之設施也當其處坎積而為孚乾之積於九五也及乎坎出發而為光九五發乾之光也處坎則貞以保乾之體出坎則亨以大乾之用故曰吉也彖傳位乎天位即乾之九五位乎天德之意所謂九五合下之乾也正中二字有端拱无為氣象以言乎需也與下九五爻曰中正二字相連者不同徃有功者以需而出乎坎則非需而居然乾矣是以能大有為也象曰雲上于天需君子以飲食宴樂雲上於天和氣緼釀有飲食宴樂之象雜卦傳亦曰需者飲食之道也初九需于郊利用恒无咎象曰需于郊不犯難行也利用恒无咎未失常也初變井遇巽井不變其所者也故有恒象文炳胡氏謂初九以陽居陽恐其躁急故雖逺險猶有戒詞其實初以陽潜地下自有用恒之象九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也二變既濟遇離二以剛中乾離一體故曰衍在中此即終吉之由故傳於下句即不再釋此以一句釋上下文又一例也九三需于泥致宼至象曰需于泥災在外也自我致宼敬慎不敗也三變節遇兑兑為澤有需泥之象近坎之盜故曰致宼兑以悦德故曰敬慎不敗此又夫子補爻詞所不及處災在外明指四爻六四需于血出自穴象曰需于血順以聽也四變節遇兑坎為血兑為毁折需於血象兑上缺穴象合訂曰卦之為需乾為坎需也坎之險由二陰陷陽此衆陽所欲決而有待者也至上下之間陰陽逼近陽不能復需必争之勢也三之宼四宼之四之血三傷之也猶坤之龍戰於野其血𤣥黄也四為三傷則陰不敵陽矣故聖人教之以需需有將就順從意謂當血之時惟有順從乎陽庶幾陽免於險而陰亦得出於穴兩得之道也象傳順以聽謂順而聽命於陽也九五需于酒食貞吉象曰酒食貞吉以中正也五爻變泰遇坤泰交故有酒食之象九五統全卦之主故大象小象皆同酒必需釀而後可飲食必湏炊而後可食其釀其炊可以想雲上於天之意此其間正有如許休飬生息以充適斯民之體如許涵濡薰陶以厭飫斯民之心正非宴安可比五惟中正故需於酒食而無侈汰之心彖合孚光亨貞吉而此獨舉貞吉者以貞尤切於需意故傳申酒食貞吉而即不言需字也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也上變小畜遇巽上無位需者至此無所需矣故詞無需字而傳曰不當位也巽為倒兑其德入故有入穴象下乾健行故有客來而坎險在前巽又以入為德是不速之客也巽伏故有敬之之義上雖無所需而下應九三之陽爻初與二又以類相從健而履險以進故雖已無力以出險而借人之力則亦無大失矣安溪李氏曰初與二未陷於險而需者也四與上既陷於險而需者也未陷於險而需以不入於陷以其有貞於不入之操也既陷於險而需以能出乎險以其無急於求出之心也坎下乾上訟有孚窒惕中吉終㐫利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終㐫訟不可成也利見大人尚中正也不利涉大川入於淵也彖傳逐句詳註甚明剛來得中總註有孚窒六字有孚即所謂有實情也有情而窒情不能伸也此訟之所由來也惕中本義作得中諸家多作中止中止之義與各爻詞合葢惕於中道或惕於中心則必止矣但各卦徃來之義似依安溪李氏作虛象説為妥必拘拘於自某卦來多不可通耳入於淵者淵深而不可測訟而入淵則機械變詐無情而有辭是終訟者矣正與惕中者反象曰天與水違行訟君子以作事謀始水氣升天則順天以澤物既自天而下於地矣則天左旋自東而西水右流自西而東卦上天下水其象如是是為違行也然當其在天之始則未嘗違也夫天者何理而已矣九四所謂命是也人苟順於天理即合乎人情何至有訟有訟則必違其初念之天理可知也及不克訟乃反求其本故曰歸曰復即命聖人特為探本之論以為己訟而中惕而終无成何如謀於始而無訟之為貴乎葢謀於其始自必慮及於其終諺云屈死莫告狀亦此意也初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也初變履遇兑兑悦則不窒故不永所事兑為言六陰爻為小故曰小有言初應四二三合四互離傳故曰明也九二不克訟歸而逋其邑人三百户无眚象曰不克訟歸逋竄也自下訟上患至掇也二變否遇坤剛而變柔逋也二本柔位今仍為柔歸而逋也坤為地為衆故有邑人三百户象陽剛雖竄而陰位自存為无眚象正與上之褫鞶帶之錫對然則二之與上訟也確矣需訟象詞中孚皆指坎之中爻乃兩卦爻詞皆不之及何耶葢象舉全卦之德是有孚者坎之中爻合乾而言之者也至於需之九五一爻止于二為應此卦九二之一爻止于五為應則不得以全乾視之矣然需之五應二以上求下為虚已以聽也此之二應五以下援上為非分相干也德既異則其吉㐫自殊耳然同一有孚也需何以光此何以窒同一坎之中爻也在彼何以需酒食而吉在此何以不克訟而逋葢需之孚實積于乾所謂周身之元氣也故有以充説於其體及其出乎坎而積中者著矣此之孚則變為否所謂一時之客氣也故不能浃洽於其中及其不克訟而外来者歸矣六三食舊德貞厲終吉或從王事无成象曰食舊德從上吉也三變姤遇巽巽以入為德舊德之所入必深食舊德象應上而近不與二四比貞象處危地厲象不忘本而妄有附和以訟為利故終吉也或從王事无成則占詞也占者不必此卦為此事故乾五爻皆言龍而三爻言君子以發其例此六爻皆言訟而於三兼及從王事以發其例故加或字别之六三之應上九各卦多㐫而此獨終吉者葢訟之道以剛不以柔二與四皆剛而能訟者也初與三皆柔而不能訟者也然初則事猶在下故但有口角之微争不至於訟也三則在下之上是訟已興而不可以已矣但三陰柔非能訟者殆為所訟者也且處於二剛之間下乗剛則必為二所争上乗剛則必為四所争而自與上應故二四之争三必皆與上為訟矣苐三雖處危地為所訟而固守其從上之貞不與之争故終獲其吉聖人隨各卦爻之時位而各著其義豈泥於一定之説哉九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也四變渙遇巽渙散則不克訟矣天水曰訟今變為風水涣是渝也雖曰渝而實復其本然之命是渝而無所失焉故曰安貞也二之歸四之復皆惕而中止者故曰不克訟春秋傳曰吾非力不足也義實不爾克也然同一不克而二則歸而逋四則復而渝何也按二剛皆得中象既謂其有孚似非無情之訟且上承六三為近而在所必争者但窒於中止知三為已之所必争而不知三為上之所正應而其剛中又自否變才非上匹也是為不度德已雖剛而時則在險上雖亢而身則乗剛勢又非上之敵是為不量力夫子約其詞曰自下訟上故不克訟而逋也逋有逋負逋逃二義傳特以竄字明之訟而至於竄患可知矣又五不求二而二求五故曰患自取也四雖不中不正而隔體下争乎三但下有初六之正應則取初之明以自鑒故能復即命又處改革之際乾之文言曰乾道乃革者也故不克訟而渝也然其歸其復則皆同故二之詞曰旡眚四之傳曰不失失字作失足㸔不入於淵也乾之四曰或躍在淵此之象曰入於淵蓋四之多懼如此九五訟元吉象曰訟元吉以中正也五變未濟遇離離明故能聽訟然豈惟聽訟而已變自乾來訟之未濟亦未濟之訟未濟六五曰君子之光有孚吉今曰元吉中正夫子嘗曰大畏民志是則使民無訟者乎元吉與大吉微異坤五離二履上復初皆言其德之純也此外凡吉之在天下者多曰元吉吉之在一人者多曰大吉此卦之五與大畜之四有無訟刑措之風故皆曰元吉也説本安溪李氏竊按大吉者乾剛之吉也元吉者從来未有之美事今始有之之吉所謂元者善之長也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也上變困遇兑困者辱也兑又為毁折故有褫衣之義就本氣言之乾為圜為衣鞶帶象為君錫鞶帶象為天一日一周者也終朝象上有三之正應為訟得勝而受服象上無位而其道窮窮則變為三褫之象葢言一言二數之一定者也言三則數之未定者也經書中凡曰三者大概謂其多耳算法數始於一終於三六則倍之九則再倍之十則仍為一三為不盡之數安溪李氏曰上以剛處上之極訟不可成也而成之象之所謂終㐫者也士庶之訟止於闘訐進之則其争彌大詩曰受爵不讓至於已斯亡書曰矜其能䘮厥功是故名位之争訟之大者二之所以保邑而无眚三之所以從上而无成皆守禄位善功名之道上有鞶帶之榮而曽不終朝昧於三讓而進一揖而退之義矣竊按傳言不足敬者以為縦不至即禠亦以争而得不足敬也所以足經之意此武安與魏其争帝不以為直丙吉不言微時保䕶功帝所以大賢之歟坎下坤上師貞丈人吉无咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣卦詞雖與五爻詞一意然卦詞渾爻詞切當各玩貞正也孟子亦云征之為言正也各欲正已也用師者能以已之正正天下之不正有不王者乎以衆字本義謂一陽在下之中而五陰皆為所以專指將帥言而以可王句謂為王者之師合訂因語意與象傳不合故謂二以衆五以二此五之所以王也以補救之然卦詞但只説箇大概正不必指定為何爻也貞正也乃特釋之之詞即此可見諸卦爻所繫之貞必非正字也使貞即是正字則此又特特註明其意何居乎出師之道在正名與擇帥而已名不正則師出無名而事不成帥不擇則將不知兵而以卒予敵矣吉无咎兼承貞與丈人來象傳亦如此但世儒因有可以王句便謂吉无咎止承丈人非也程傳吉而有咎凡無名之師倖勝者是也无咎而不吉凡聲罪致討而不勝者是也讀象傳當于能以衆正句下謂出師者但如此即有王者規模矣况又將帥得人以仁義行師則師勝而又何過之有若以下四句專指丈人則剛中句尚説得去行險句則統論全卦不專指二爻矣剛中句為君言則為二剛中而五應之不中制也為將帥言則為二剛中而上應九五凜天威也此與下句皆當重讀而字象曰地中有水師君子以容民畜衆初六師出以律否臧㐫象曰師出以律失律㐫也初變臨遇兑坎水流水也兑澤止水也水而歸澤則無汎濫之失有師出以律之義初六陰柔才弱有否臧㐫象否臧即失律也九二在師中吉无咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也二變全坤坤之德順又二以陽爻在衆陰間而獨異今變坤則亦衆人耳故有中吉錫命之義在師絶句中絶句按五爻象傳以中行也可知中字當另讀程傳居下而專制其事惟在師則可又云凡師之道威和并至則吉也觀此則知恃專而失為下之道者吉而有咎也不專而無成功之理者無咎而不吉也威和即寛嚴并濟寛而不嚴嚴而不寛其吉其咎亦如此中之時義大矣哉詞所以不言正而言中也若如蒙引謂如俗説在軍中則何以曰吉又無咎乎夫子曰在師中吉承天寵也程傳發揮甚明合訂曰元老之猷天子之功也將千古飛揚䟦扈之軰一概抹却爻詞王三錫命見丈人得君之專合訂謂師之吉由錫命之寵命之錫由萬邦之懐此為君言也若為將帥言則師之吉以其中而應上承天之寵命耳非敢言功也命之錫正以險而順行懐柔萬邦耳不宜肆殺也聖人之言無所不包如此六三師或輿尸㐫象曰師或輿尸大无功也三變升遇巽升有輕進意巽亦有深入意考左氏春秋曰彘子尸之本此言在輿而尸其師也三四五互坤為輿三之㐫由于尸師不尸則不㐫故曰或若如本義不但或字無着且既曰輿尸又曰㐫亦犯複且五爻傳曰使不當使者主使之謂正與此傳大無功相證葢大即指九二若泛以甚無功言亦有何謂乎六四師左次无咎象曰左次无咎未失常也四變恒遇震恒即常也下卦陽在二上卦變陽在初有左次之義四之所以左次无咎者不但居陰得正亦以其多懼也子路問行軍夫子曰臨事而懼故耳六五田有禽利執言无咎長子帥師弟子輿尸貞㐫象曰長子帥師以中行也弟子輿尸使不當也五變習坎坎為盜故曰田有禽乃二五皆陽爻便有中制掣肘之象象意甚廣此則止就本爻而審其時義耳執言執之而聲其罪也不為兵端以六五之柔順居中言之若卦詞之貞則弔民伐罪如湯武南巢牧野之師則豈必桀紂加兵而始應之乎長子帥師即五之應二也弟子輿尸亦以三之志剛處下之上有敢進之勢四之位近有依附親信之心五之陰柔寡斷而所承所乗皆陰有䜛象或以三為勇或以四為忠必且私委宻諭以分二之權如後世用寺人監軍之類此皆從本爻㸔出而切著之者也葢統觀全卦則止有長子帥師象故曰丈人也但論五之一爻則既有長子帥師之象又有弟子輿尸象故并言也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也上變蒙遇艮艮為小子艮止故曰小人勿用開國承家二句合訂以為冊命之詞説作人君戒飭成功將帥之語似非夫子傳言亂邦之意合訂所以如此説者以本義論功行賞之時爵土不及於小人理却去不得然語類記朱子他日亦云勿用與小人謀議經畫耳此意方思得未曽改入本義而安溪李氏謂為與賢者制治以防前亂與智者圖㡬以遏未萌此又開説不拘拘於成功之小人亦未為無見竊按上爻居順之極而順君者必小人也又所承所應皆陰是為小人近君之象夫功高者多忌從來聽䜛而不能保全功臣者多矣故戒其勿用六以陰居陰非能斷者故但曰勿用也孟子曰惡佞恐其亂邦也然則象傳之所謂小人固可知矣正功二字概却開國承家著師之始終皆以正也安溪李氏曰中四爻皆用事者則皆有師中之任初與上不當事任故因之以發行師終始之道坤下坎上比吉原筮元永貞无咎不寜方來後夫㐫彖曰比吉也比輔也下順從也原筮元永貞无咎以剛中也不寜方來上下應也後夫㐫其道窮也以為全乾之元變坤之永貞此合訂之特見也然則元永貞者元其永貞也記曰心无為也以守至正此之謂也不寜方來本義所解覺費力且亦將字無根竊以不寜者寜不也古人多如此倒裝語如詩衛風云不瑕有害註瑕何通謂豈不有害於義理乎方當如方以類聚之方謂有元永貞之德則不求人比而人寜有不各以其方而羣聚者耶如此説似妥且得羣陰相比意五爻詞所以通逺近而言也彖傳既曰下順從則上下應上字湏讀斷只如四爻從上五爻上使中之上皆指五言也合訂謂為初二三四極是不得牽上爻在内後夫㐫方是説上爻觀象傳曰其道窮也可見象曰地上有水比先王以建萬國親諸侯當可馮氏曰地上之水異源同流畎澮相比以比於川九川相比以比於海如萬國諸侯大小相比而方伯連帥率之以比於天子也初六有孚比之无咎有孚盈缶終來有他吉象曰比之初六有他吉也初變屯遇震屯雷雨動而滿盈者也故曰有孚盈缶缶坤土也震動故曰來坤衆而震起之故曰有他吉葢人之初念未有不誠孟子所謂良知也故蒙之初筮告訟之初辨明皆是物也有初則有終矣易言誠之書也故於此卦初爻鄭重言之有孚比之无咎就比人者言有孚盈缶終來有他吉就比於人者言初為卦始而志剛有孚也自初爻一氣貫注於四盈缶也可見二三四皆本此初念之孚故終以類聚上比於五也若上則隔位無初之孚矣无首是以无終即一初爻詞而諸爻之意已可概見合訂曰卦名比是現成字爻言比之是用力字初能孚信以比于二可以无咎矣而猶不止此也二與五為正應初能孚信充實終得同升諸公故曰有他吉終來之吉於初決之觀此則象傳比之初六初字當重讀五之剛中失前禽是五固以初為逺而不期其相應者乃終亦來焉故云有他吉也六二比之自内貞吉象曰比之自内不自失也二變全坎上下一坎者由於内卦之變也故曰比之自内而夫子曰不自失也然五求二二不求五比之自内當云五於外來比之者由于内之二有直方大之德也内自守其貞待五之求而應之其吉為何如合訂以莘野南陽方之是也六三比之匪人象曰比之匪人不亦傷乎三變蹇遇艮為匪人或謂上或謂二與四然彦肅趙氏曰初比五先也二應也四承也六三无是三者之義將不能比五矣此又以不比五即謂所比匪其人也意亦佳六四外比之貞吉象曰外比於賢以從上也四變萃遇兑萃聚羣賢以悦其上又坎難遇兑悦葢以謹畏之小心而致寅恭之和氣此之為貞此之為吉歟觀象傳則爻詞外比之貞絶句不得于之字畫住四以陰居陰得正也近於五而下承坤之順貴而不驕也下無應援不植私黨也合下之順以比上以人事君也已離順之體説以道不為佞也位高多懼而處坎始若履險艱憂深思逺也此皆貞之義也夫子特曰比於賢其不比於匪可知然則獻可替否所謂和也非同也是比之道也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也五變全坤上下大順可謂無為而天下治矣只顯比二字概却洪範無偏無黨一段議論王用三驅失前禽不勤逺略也邑人不誡不事煩言也王道之大實寫得出詳玩之五剛中則光明正大顯象五止下應二初則在應外矣失前禽象五自剛中非有求於下也不誡象五雖與二應然皆中正得位以道相求非以私相結正所謂顯比也按中字仍属民中者蕩平正直之王道也皇建其有極庶民即無不㑹極歸極何用告誡為是上居中而民自化非有以使之而若或使之耳上六比之无首㐫象曰比之无首尢所終也上變觀遇巽以坎之難而巽伏之機深不可測是後服而其心擕貳者也故曰无首无終合訂曰首先也其於初爻亦曰比貴乎首先然則有首者有孚无首者无孚是抗也所謂後夫之㐫終至於敗亡而已矣乾下巽上小畜亨宻雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨宻雲不雨尚徃也自我西郊施未行也夫小畜何以亨亨矣而何以又不雨且彖傳既曰行又曰未行何前後之詞互異也備觀先儒所説莫不得此失彼矯强附㑹甚且謂為小人之畜君子其為説益詳而於理益悖􅑾杌予心而不可據以為安者久矣乃今而捨諸家之説獨詳玩彖傳始知夫子已一一明切曉著不審學者何以多昧焉而不察也夫子曰小畜柔得位而上下應之曰小畜是明明謂一柔能畜五剛上下陽爻皆為所止而聚之未嘗曰一陰畜五陽能係而不能固也又曰健而巽則剛得巽而非粗厲之剛柔得健而非畏葸之柔是明明謂其剛柔相濟未嘗謂一陰止不得五陽為柔德之不足也且曰剛居中而志行則上下兩剛居中用事同心同德故曰志行未嘗以不雨之未行者并謂剛中亦未遽行必及其成始謂有亨理也惟其剛柔相濟兩中志行故小畜之亨亨以此是其德實足以嘉天下之㑹而無難焉者矣然其所以嘉之㑹者方尚徃而未及下逮其志行而其施未行故雖亨而但充之於中未即措之於外則小畜之時為之耳文王若曰此其上徃而下未逮志行而施未行擬其景象如宻雲不雨者然夫其不雨也豈有他哉實自我西郊而已然矣膏澤之屯我實為之其又奚尤是故汝墳方興孔邇之歌而岐周猶深赬尾之痛明德已先道㟁之豋而穆穆不已緝熙之敬孟子曰文王視民如傷望道而未之見葢觀於此卦之詞而信其有然也子又曰易之興也其當殷之末世周之盛德耶當文王與紂之事耶是時文王正在羑里思有以上格君心而下蘇民困乃力有未能是故觀於小畜之象而自怨自艾葢傷之焉夫德自有剛有柔剛大而柔小發强剛毅剛也寛裕温柔柔也齋莊中正中也文理宻察巽也豈必小即為陰邪小人而剛之應即謂君子為小人用乎卦惟一陰爻而在四位得位也然雖得位而在上其氣未下行故為宻雲不雨之象非畜之不固而竟不雨也柔未及逮下而剛志自亨如屯之坎亦曰雲其卦詞亦曰大亨貞又曰雷雨之動滿盈可見尚徃者如今時俗以不雨謂為天高是也按後天方位下卦之乾在西北上巽為風秦之諺曰長安自古西風雨則巽乾應雨也應雨而不雨是非天為之我之柔德未至也故明夷曰内文明而外柔順文王以之使柔順之德圓滿具足如地天之泰則不惟剛之志行而柔之施亦行故曰天地交而萬物通上下交而其志同是則其亨為時措之宜而非僅充實之美也已易酌曰本義以為文王演易於羑里視岐周為西方故曰自我葢引咎責躬愧其不能和二氣而布德澤於天下也極得文王心事象曰風行天上小畜君子以懿文德程朱傳義仍以繫擾不久為言後儒皆因之竊玩風行天上四字似謂風行於天之上則雲氣徃來卷舒天之文也故君子則之以懿其文德世所謂風度風采等説義實本此大象多别發一義不與卦詞相蒙此亦不必曲為之説也初九復自道何其咎吉象曰復自道其義吉也初變重巽易對徃則言復如泰之九三曰无徃不復是也乾性健徃變巽之伏似竟為巽所畜矣然乾之初自有潛象則其復也亦自由其道耳非巽為之也故曰何其咎傳曰其義吉也九二牽復吉象曰牽復在中亦不自失也二變家人遇離乾而明則行止不失其正又家人一體相連者也初既復自道則二亦隨之而復故曰牽也亦不自失即從初爻説來詞未言及中義夫子特為補備之九三輿説輻夫妻反目象曰夫妻反目不能正室也三變中孚遇兑之毁折乾健行者也能行莫如輿健行而遇毁折有輿説輻之象上卦巽巽多白眼兑為倒巽乾變兑與上卦為兩巽相向有夫妻反目之象三四比而隔體何謂為夫妻葢兑為悦為口舌夫相悦莫如夫妻而以口舌致怒日相見而不相視者亦莫如夫妻故取此象蒙引曰輻車輪之轑輹車上伏兎也按此則輻所以持輪輹所以轉軸脱輹則輿離軸自止而不行也一舉輿於軸則行矣脱輻則輪壊不可行是久住也三四近而相悦且志欲上行而四之柔止之不能行也故曰輿説輻又乾健已極果鋭而暴故曰夫妻反目此陰之强畜其陽如婦之强畜其夫者也夫强畜者非必悍妻之謂即如誠之未至而遽畜其欲者皆是此六四之所以有孚而能畜也如文王為紂所拘之類六四有孚血去惕出无咎象曰有孚惕出上合志也四變全乾上下一氣故曰有孚巽為風風之為物也陰伏而凝結於内陽入而散之人身之易凝結者為血今變乾則凝結者散矣是血去也四多懼凝結既散則憂懼亦已故曰惕出血去惕出自旡所咎傳以為上合志者四雖為初正應然初在下善潛已非四所能止而聚之則必合五斯可以得志所謂不獲乎上民不可得而治者也如文王之不得乎君即無以澤下者是九五有孚孿如富以其鄰象曰有孚孿如不獨富也五變大畜遇艮變陰而下比四故曰有孚而本氣陽也與初二三上原屬一氣則不獨五孚四亦將合衆陽而皆與四孚故曰孿如是四之能畜惟五之力故曰富以其鄰陽剛為大大者富也變小畜而為大畜故曰富也傳曰不獨富正言其能聚上九既雨既處尚德載婦貞厲月㡬望君子征㐫象曰既雨既處德積載也君子征㐫有所疑也上變需遇坎水雨象需不進處象巽為長女婦象變坎險貞象坎為月在天之上月㡬望象上處窮位而變需不進故征則㐫也夫乾天之上有四柔之得位有五剛之得中陰陽和矣所謂德也陰陽和而有不雨者乎上雖無位而以陽剛臨於德之和者之上其所處有不安者乎然陰雖資陽以成膏雨之功而變坎者陰則已驕矣婦之貞恐未免於厲也上雖藉四五以獲居處之安而變坎者陽為所抗矣月之盈恐未免於虧也當此時而猶可以征乎君子征㐫者惟君子能有所疑而不進而非所論於小人也尚德載乃爻詞自釋上句文義傳又加一積字則并下乾之義亦該之有所疑又傳釋君子二字之義此則聖人教人之微意也易酌曰葢周公曲體文王之遇之心而繫詞也尚德載即文王之陰行善也月㡬望即文王之三分有二也但以分言則曰婦曰月以德言則曰君子若貞厲若㡬望若征㐫皆狀文王以服事殷之心也先儒云文王志在明夷道在小畜其謂此乎此説婦貞厲月㡬望亦有義可互玩也兑下乾上履虎尾不咥人亨彖曰履柔履剛也説而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也履者禮也禮之為體極嚴絲毫踰越即蹈干名犯分之愆而為國法物議所加故惟循禮而行不敢踰矩遜以出之無少乖戾則無所傷矣以卦體論兑為少女柔之柔也乾為純陽剛之剛也以至柔而躡至剛則兢兢小心自無尺寸之失以卦德論乾天理也天理在前而不心慕神追則違天違天者不祥兑以説應之則順天而無不通故有履虎尾不咥人之象故曰亨叅義云乾體剛健非專為暴者象之以虎所以極言和悦之無患也按繫詞大傳云履和而至又云履以和行可知此卦最重兑悦上乾行也下兑和以行也雜卦亦云不處不處即行也以明即和即禮即禮即和非無和之禮亦非無禮之和故無不可行也此即論語有子論禮之註脚彖傳止説而應乎乾一句説卦詞具足無餘下剛中三句特以易最重五爻而此卦九五剛中得位卦詞却未顯及至五爻又止即本爻而繫之詞非全卦之意故夫子特發於此其實即從卦詞㸔出亦非補卦詞之不及也和説以行故不疚所謂光明也者見禮出扵説凡委曲煩重之數無一不本乎人情體之信逹之順光明洞逹明著而不可掩者也光明從不疚來不疚從中正來上九視履考祥即内省不疚之謂而象傳獨指九五者葢全卦之義統著於五五者君也事固統于尊且有德有時有位操制禮之權者也説而應乎乾者下寡過也為下不倍也履帝位而不疚者上寡民之過也居上不驕也二語可括後半部中庸象曰上天下澤履君子以辨上下定民志初九素履徃无咎象曰素履之徃獨行願也初變訟訟有孚窒者素履之徃率真以行全無虚假有孚也朴慤無文詞不逹意窒也禮失而求諸野故曰旡咎禮器曰忠信禮之本也是以初為素履傳曰獨行願者仲誠張氏謂為下民朴率心之所願則行之不講于儀節不謀于他人其説極是初無應故曰獨行其志願即志也如四爻志行之説九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也二變旡妄遇震震為大塗故曰履道旡妄故坦坦坦坦者夫子所謂中也幽人亦不盡指泉石隱遯之流凡賢而未仕者皆是中不自亂以中字概履道坦坦句不自亂即貞吉惟其中故能正而吉也六三眇能視跛能履履虎尾咥人㐫武人為干大君象曰𦕈能視不足以有明也跛能履不足以與行也咥人之㐫位不當也武人為于大君志剛也三變全乾玩傳不足以有明二句意重在𦕈與跛故曰位不當今解多重視履失其㫖矣九四履虎尾愬愬終吉象曰愬愬終吉志行也四變中孚遇巽愬愬雖非和然兢兢守禮久則相安故不曰吉而曰終吉夫子曰志行也同一履虎尾也然卦詞與爻詞異三爻與四爻之詞又異葢即全卦而論之説而應乎乾其履虎尾則雍雍而率循乎禮者也三則兑之乾矣兑毁折有𦕈跛象乾强健有能視能履象兑為口有咥人象乾三志剛而上行其履虎尾則行行而侵犯乎禮者也四則乾之巽矣巽進退不果位又近而多懼有愬愬象其履虎尾則兢兢而謹守乎禮者也三之咥人踰禮則干分干分則犯法聖人恐人不明乎此也又指明其象曰此武人之為于大君者夫為于大君則非自私自利可知而武人為于大君則非循循盡禮又可知豈惟韓彭之不學道謙譲功名不終即李臨淮之抗命不赴霍子孟之不學無術皆是也故夫子曰位不當也然則禮樂征伐自天子出為臣子者苟有一毫之專擅苟有一毫之不禀承即干名犯分而罹于法雖逃當時斧鉞之誅而必不能免後世清議之及吁可畏也哉九五夬履貞厲象曰夬履貞厲位正當也五變睽遇離此爻説者各異合訂亦從安溪之説葢因卦詞履帝位不疚及象傳位正當之語故云也竊以卦詞為全卦之爻不變者言而爻詞則為本爻之變者言既已變矣則為履之睽而非履也履以和行而本氣則剛變氣則乖合剛與乖此又安得與卦詞一例而論乎且五以中正得時得位操制作之權有履貞象以本氣言剛而無正應則説之氣未通有夬履象以變氣言二女不同居則睽之勢正盛有貞厲象此等威極嚴君尊臣卑之際故曰位正當也位不當者無時無位而作禮樂者也位正當者有時有位而作禮樂者也此禮之體非禮之用也至上九則禮制已定行于天下而小大由之矣上九視履考祥其旋元吉象曰元吉在上大有慶也上變全兑所謂禮之用和為貴也夫道之不行由于不明履之不疚以光明六三亦言履先言視上爻亦言視履上多㐫而此爻獨大善無戒詞者葢上為事之終此制禮後天下行禮之時也又以剛變柔為兑禮以和行又與六三正應上下相觀為戒故曰視履考祥又曰其旋乾變兑先後相因説而應乎乾健以行其説上下兩兑廽環相顧此祥之終又為彼祥之始豈不為無窮之吉夫子曰元吉在上大有慶也此則禮陶樂淑教化行而風俗美非一人之慶天下從來未有之慶矣故曰元吉也乾下坤上㤗小徃大來吉亨彖曰㤗小徃大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外陰内健而外順内君子而外小人君子道長小人道消也彖傳不煩詳説苐就卦詞而贊歎之令人恍然于唐虞之盛也君子道長小人道消此即舉直錯枉能使枉直之意猶地道然地豈有惡乎以天道去來為善惡也象曰天地交㤗后以財成天地之道輔相天地之宜以左右民財成者如田里樹畜天地本有此道而不能自成者是矣君不財成則陰陽不遂其交通之氣而民無所利用輔相者如禮樂刑政天地本無而宜有不可不補以助之者是矣君不輔相則剛柔无相調和之氣而民不能相安左佐也右佑也佐以助其用佑以導其行説出仲誠張氏初九㧞茅茹以其彚征吉象曰㧞茅征吉志在外也初變升遇巽升故征與二三同氣故以其彚乾之初有潛象似非征者然本氣健而變氣升與四應夫子特申之曰志在外則固其進而有為者與九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也二變明夷遇離明夷自晦離為大腹故包荒利艱貞故用馮河内文明故不遐遺外柔順故朋亡馮河自本義以來皆以果斷剛決為説竊疑當是擔當之意葢二賢位世運之㤗皆賢人以天下為己任者致之也馮河者不假舟楫徒步以涉二爻陽變陰合三四為坎坎河象二應五必歴坎濟河象二中正不倚馮河象想見賢者處危疑而不驚當大任而不懼隻身獨力撑持世界光景夫天下之水惟河為最大亦惟河為最險人臣當大任處大難而思所以濟之莫過於任賢使能然非有包荒大度則且分立門户棄其踈逖而䁥其親近偏私不公如此而又何濟之有此秦誓所以思休休有容之一个臣也㸔來包荒數句一意説下不分作數項故夫子直舉上下兩端曰包荒得尚於中行夫九二之才一中字概之聖人言語簡而該豈必於此瑣瑣臚列為正以此卦小徃大來正君子道長小人道消之時若君子於此不包荒則小人無所容勢且激變成禍東漢之末宋之元祐紹聖間可見也今以㤗之二爻陽變為陰適有此義故聖人特為發之先儒曰正當㤗時而曰用馮河憂盛危明之意然九二所以致㤗者也安溪李氏曰當方㤗之正中在上交之主位有剛中之實德為羣陽之所宗故於此而備言安上順下長君子消小人之道也竊按包荒四句若分作四項説九二之才便不切㤗卦之爻詞葢此卦只重上下交君子與小人消長之際耳不曰以中正而曰得尚於中行尚上也指六五言其以中應中而其德得逹於上也即書之元德升聞意九三无平不陂无徃不復艱貞无咎勿恤其孚于食有福象曰无徃不復天地際也三變臨遇兑本氣為一平象變氣為一陂象又兑為毁折故曰无平不陂臨之卦詞八月有㐫傳曰消不久此爻在乾之上以陽變陰長極欲消正符此義合訂曰勿恤其孚作兩句讀謂勿恤也其將孚乎孚則格人亦格神故曰食福竊按傳曰天地際三字正以乾之終即坤之始以為上下交關之際也本義謂㤗將終而否欲來又以四爻為已過中㤗已極故三陰翩然而下復夫合坤乾而為㤗合乾坤而為否未有以下乾為㤗上坤為否者也亦未有以下坤為否而上乾又為㤗者也若以九三為㤗極則亦將以六三為否極乎而上六之城復於隍上九之傾否又何以謂之故无徃不復止可曰陽極則陰生徃者將來也不可曰㤗極而否欲來也三未陂而憂其陂上則陂果至矣以其與上爻交故有此義葢本氣與上應有艱象其變氣為兑悦處艱而説有貞象艱而貞勿恤也貞其艱其孚也兑之時為秋西成得食之候其下則坤萬物皆致餋焉故曰於食有福也六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也四變大壯遇震順以動有翩翩象不富夫子曰失實本義曰陰本在下在上為失實翩翩非一鳥飛也翩翩不富則皆失實矣大壯卦詞曰天地之情可見故曰不戒以孚初與二一氣四與五一氣否之四亦曰疇離祉則言四皆兼言五也中指五言五之心願下交故以其鄰皆來交也五能以四四不能以五君有權也四雖應初而近實比五近臣無私交也故四曰中心願而五曰中以行願心有所願而欲至故翩翩願之所至即至之故歸初曰志四曰願願即志也二曰行五亦曰行故四之以其鄰即初之以其彚五之歸妹即二之得尚後世尚主之説實本於此六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也五變需遇坎需飲食宴樂者也五以君求賢代己以理天下故能旡為而治仲誠張氏以堯之嬪虞為説歴來雖無明證然千古上下交而其志同無有如堯之於舜者千古天地交而萬物通亦未有如唐虞之際者則信非此不足以當之矣帝乙歸妹止為下交者説一様子非爻象也以祉元吉乃象如訟五之元吉是也是以夫子但曰以祉元吉中以行願而不舉帝乙為言矣上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也上變大畜遇艮其卦傳曰能止健則乾剛之性有所不及矣故有城復於隍等義以陰陽徃來論之上之陽來居於初下之陰徃居於上是為蠱蠱者壊也坤為土又㤗極則否一反易此之上即彼之初城復於隍象坤為衆遇艮止勿用師象坤為邑遇艮命令不出四境自邑告命象不知其㤗之已極而安然不知變計曰貞故吝傳曰其命亂命者理也城復於隍高者卑矣本為㤗反成否理之不得正者也非理有不正人所以處㤗之理非也勿用師承平日久人不知兵也自邑告命溺於宴安政出房闥也貞吝不知其非而自謂㤗者也城復於隍言㤗極之時勢下三句言㤗極之情景而㤗之為否只在上一句故象傳但舉此為言此卦全講交氣彖傳天地交而萬物通上下交而其志同二語不但解卦詞并且統括諸爻葢分而言之初即四四即初故初曰以其彚四亦曰以其鄰初與四之上下交也二即五五即二故二曰尚五亦曰歸二與五之上下交也三即上上即三故三曰復上亦曰復三與上之上下交也合而言之上既復而無位矣三為天地際則自三以下為天之氣下交於地也自三以上為地之氣上交於天也然初與四曰志曰願則交而未交也二與五皆曰行則志交而果交也故曰其志同也易翼述信卷三
